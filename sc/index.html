<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>나만의 검색 대시보드</title>
    <meta name="referrer" content="no-referrer">
    <style>
        :root {
            --bg-color: #050505;
            --card-bg: #161616;
            --accent: #3498db;
            --text: #ffffff;
            --text-dim: #888;
            --danger: #ff4d4d;
            --radius: 14px;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0; padding: 15px;
            display: flex; flex-direction: column; gap: 15px;
            padding-bottom: 160px; /* 하단 푸터 공간 확보 */
        }

        /* 상단 탭 메뉴 */
        .tabs { 
            display: flex; gap: 10px; overflow-x: auto; padding: 10px 0; 
            position: sticky; top: 0; background: var(--bg-color); z-index: 10;
        }
        .tabs::-webkit-scrollbar { display: none; } /* 스크롤바 숨김 */
        
        .tab-btn {
            background: #222; border: 1px solid #333; color: var(--text-dim);
            padding: 10px 20px; border-radius: 20px; cursor: pointer; 
            white-space: nowrap; font-weight: bold; transition: 0.3s;
        }
        .tab-btn.active { background: var(--accent); color: white; border-color: var(--accent); }

        /* 섹션 카드 */
        .row-section {
            background: var(--card-bg); padding: 18px; border-radius: var(--radius);
            border: 1px solid #222; box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        .row-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .row-title { font-size: 0.75rem; color: var(--text-dim); letter-spacing: 1.5px; text-transform: uppercase; }
        
        .add-btn {
            background: #2a2a2a; border: none; color: var(--accent);
            width: 32px; height: 32px; border-radius: 10px; cursor: pointer; font-size: 20px;
            display: flex; align-items: center; justify-content: center;
        }

        /* 단어 아이템 목록 */
        .word-list { display: flex; flex-wrap: wrap; gap: 10px; min-height: 30px; }
        .word-item {
            background: #222; border: 1px solid #333; border-radius: 10px;
            padding: 8px 14px; display: flex; align-items: center; gap: 8px; 
            font-size: 15px; cursor: pointer; transition: 0.2s;
        }
        .word-item.selected { 
            border-color: var(--accent); 
            background: rgba(52, 152, 219, 0.15); 
            color: var(--accent); 
        }
        
        .del-btn { 
            color: #555; font-size: 16px; border: none; background: none; 
            cursor: pointer; padding: 0 0 0 5px; line-height: 1;
        }
        .del-btn:hover { color: var(--danger); }

        /* 하단 고정 푸터 */
        .footer {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: rgba(5, 5, 5, 0.95); backdrop-filter: blur(15px);
            padding: 15px 20px env(safe-area-inset-bottom); /* 아이폰 하단 바 대응 */
            border-top: 1px solid #222; z-index: 100;
        }
        
        .preview {
            text-align: center; margin-bottom: 12px; font-size: 14px; 
            color: var(--accent); min-height: 20px; font-weight: 500;
        }

        /* 제외 옵션 체크박스 */
        .exclude-options {
            display: flex; justify-content: center; gap: 15px;
            margin-bottom: 15px; font-size: 12px; color: var(--text-dim);
        }
        .exclude-options label {
            display: flex; align-items: center; gap: 6px; cursor: pointer;
        }
        .exclude-options input[type="checkbox"] {
            accent-color: var(--accent); width: 15px; height: 15px; margin: 0;
        }

        .search-btn {
            background: var(--accent); color: white; border: none; width: 100%;
            padding: 18px; border-radius: var(--radius); font-size: 17px; 
            font-weight: bold; cursor: pointer; box-shadow: 0 4px 15px rgba(52, 152, 219, 0.3);
        }
        .search-btn:active { transform: scale(0.98); }
    </style>
</head>
<body>

    <div class="tabs" id="tab-bar">
        <button class="tab-btn active" onclick="switchTab('인테리어')">인테리어</button>
        <button class="tab-btn" onclick="switchTab('배경화면')">배경화면</button>
        <button class="tab-btn" onclick="switchTab('여행')">여행</button>
    </div>

    <div id="content-area">
        <div class="row-section">
            <div class="row-header">
                <span class="row-title">Step 1 (분류)</span>
                <button class="add-btn" onclick="addWord(1)">+</button>
            </div>
            <div class="word-list" id="list-1"></div>
        </div>

        <div class="row-section">
            <div class="row-header">
                <span class="row-title">Step 2 (대상)</span>
                <button class="add-btn" onclick="addWord(2)">+</button>
            </div>
            <div class="word-list" id="list-2"></div>
        </div>

        <div class="row-section">
            <div class="row-header">
                <span class="row-title">Step 3 (스타일)</span>
                <button class="add-btn" onclick="addWord(3)">+</button>
            </div>
            <div class="word-list" id="list-3"></div>
        </div>
    </div>

    <div class="footer">
        <div class="preview" id="preview-text">단어를 조합해보세요</div>
        
        <div class="exclude-options">
            <label><input type="checkbox" id="ex-insta" checked> 인스타 제외</label>
            <label><input type="checkbox" id="ex-tiktok" checked> 틱톡 제외</label>
            <label><input type="checkbox" id="ex-fb" checked> 페북 제외</label>
        </div>

        <button class="search-btn" onclick="doSearch()">구글 검색 실행</button>
    </div>

<script>
    let currentTab = '인테리어';
    let selections = { 1: "", 2: "", 3: "" };
    
    // 초기 기본 데이터 (이미 저장된 데이터가 없으면 사용됨)
    const defaultData = {
        '인테리어': { r1: ['거실', '주방', '안방'], r2: ['조명', '커튼', '소파'], r3: ['화이트', '우드', '모던'] },
        '배경화면': { r1: ['아이폰', '갤럭시', 'PC'], r2: ['4K', '고화질', '미니멀'], r3: ['자연', '도시', '캐릭터'] },
        '여행': { r1: ['국내', '유럽', '동남아'], r2: ['맛집', '호텔', '명소'], r3: ['가족', '커플', '혼자'] }
    };

    // 로컬 스토리지에서 데이터 불러오기
    let db = JSON.parse(localStorage.getItem('searchDashboardDB')) || defaultData;

    // 탭 전환 함수
    function switchTab(tabName) {
        currentTab = tabName;
        selections = { 1: "", 2: "", 3: "" }; // 탭 변경 시 선택 리셋
        
        // 탭 버튼 UI 업데이트
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.classList.toggle('active', btn.innerText === tabName);
        });
        
        renderLists();
        updatePreview();
    }

    // 화면에 단어 목록 그리기
    function renderLists() {
        for (let i = 1; i <= 3; i++) {
            const listEl = document.getElementById(`list-${i}`);
            listEl.innerHTML = '';
            
            const words = db[currentTab][`r${i}`] || [];
            words.forEach(word => {
                const item = document.createElement('div');
                item.className = 'word-item';
                item.innerHTML = `<span>${word}</span><button class="del-btn">✕</button>`;
                
                // 단어 클릭 시 선택/해제
                item.onclick = () => toggleWord(item, i, word);
                
                // 삭제 버튼 클릭 시
                item.querySelector('.del-btn').onclick = (e) => {
                    e.stopPropagation(); // 부모 클릭 방지
                    if(confirm(`'${word}' 단어를 삭제할까요?`)) {
                        deleteWord(i, word);
                    }
                };
                listEl.appendChild(item);
            });
        }
    }

    // 단어 선택 토글
    function toggleWord(el, rowId, word) {
        if (el.classList.contains('selected')) {
            el.classList.remove('selected');
            selections[rowId] = "";
        } else {
            // 같은 줄의 다른 선택 해제
            el.parentElement.querySelectorAll('.word-item').forEach(i => i.classList.remove('selected'));
            el.classList.add('selected');
            selections[rowId] = word;
        }
        updatePreview();
    }

    // 단어 추가
    function addWord(rowId) {
        const word = prompt(`[${currentTab}] 탭의 Step ${rowId}에 추가할 검색어:`);
        if (word && word.trim() !== "") {
            db[currentTab][`r${rowId}`].push(word.trim());
            saveAndRender();
        }
    }

    // 단어 삭제
    function deleteWord(rowId, word) {
        db[currentTab][`r${rowId}`] = db[currentTab][`r${rowId}`].filter(w => w !== word);
        if (selections[rowId] === word) selections[rowId] = "";
        saveAndRender();
    }

    // 데이터 저장 후 새로고침
    function saveAndRender() {
        localStorage.setItem('searchDashboardDB', JSON.stringify(db));
        renderLists();
        updatePreview();
    }

    // 미리보기 텍스트 업데이트
    function updatePreview() {
        const combined = Object.values(selections).filter(v => v !== "").join(" ");
        document.getElementById('preview-text').innerText = combined || "단어를 조합해보세요";
    }

    // 구글 검색 실행
    function doSearch() {
        let query = Object.values(selections).filter(v => v !== "").join(" ");
        if (!query) {
            alert("조합할 단어를 최소 하나 이상 선택해주세요!");
            return;
        }

        // 제외 사이트 옵션 체크
        let excludes = "";
        if (document.getElementById('ex-insta').checked) excludes += " -site:instagram.com";
        if (document.getElementById('ex-tiktok').checked) excludes += " -site:tiktok.com";
        if (document.getElementById('ex-fb').checked) excludes += " -site:facebook.com";

        const finalQuery = query + excludes;
        window.open(`https://www.google.com/search?q=${encodeURIComponent(finalQuery)}`, '_blank');
    }

    // 초기 실행
    switchTab('인테리어');
</script>
</body>
</html>
