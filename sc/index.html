<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Image Search Pro</title>
    <link rel="icon" type="image/png" href="icon.png">
    <link rel="apple-touch-icon" href="icon.png">
    <meta name="referrer" content="no-referrer">
    <style>
        :root {
            --bg-color: #050505;
            --card-bg: #161616;
            --accent: #3498db;
            --text: #ffffff;
            --text-dim: #888;
            --danger: #ff4d4d;
            --radius: 14px;
        }

        /* 라이트 모드 변수 */
        body.light-mode {
            --bg-color: #f0f2f5;
            --card-bg: #ffffff;
            --text: #1c1e21;
            --text-dim: #606770;
            --accent: #1877f2;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            margin: 0; padding: 15px;
            display: flex; flex-direction: column; gap: 15px;
            padding-bottom: 260px;
            transition: background 0.3s, color 0.3s;
        }

        /* 헤더 & 탭 */
        .header-nav { display: flex; align-items: center; gap: 10px; position: sticky; top: 0; background: var(--bg-color); z-index: 10; padding-bottom: 5px; border-bottom: 1px solid rgba(128,128,128,0.1); }
        .tabs { display: flex; gap: 10px; overflow-x: auto; flex: 1; padding: 10px 0; scrollbar-width: none; }
        .tabs::-webkit-scrollbar { display: none; }
        
        .tab-btn {
            background: rgba(128,128,128,0.1); border: 1px solid rgba(128,128,128,0.2); color: var(--text-dim);
            padding: 8px 16px; border-radius: 20px; cursor: pointer; white-space: nowrap; font-weight: bold;
        }
        .tab-btn.active { background: var(--accent); color: white; border-color: var(--accent); }

        /* 섹션 카드 */
        .row-section { background: var(--card-bg); padding: 15px; border-radius: var(--radius); border: 1px solid rgba(128,128,128,0.1); box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .row-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .row-title { font-size: 0.75rem; color: var(--accent); font-weight: bold; text-transform: uppercase; }
        .add-btn { background: var(--accent); border: none; color: white; width: 28px; height: 28px; border-radius: 8px; cursor: pointer; font-size: 18px; opacity: 0.8; }

        /* 단어 아이템 */
        .word-list { display: flex; flex-wrap: wrap; gap: 8px; min-height: 20px; }
        .word-item {
            background: rgba(128,128,128,0.1); border: 1px solid rgba(128,128,128,0.15); border-radius: 10px;
            padding: 8px 12px; display: flex; align-items: center; gap: 6px; font-size: 14px; cursor: pointer;
        }
        .word-item.selected { border-color: var(--accent); background: rgba(52, 152, 219, 0.2); color: var(--accent); font-weight: bold; }
        .del-btn { color: var(--text-dim); border: none; background: none; cursor: pointer; font-size: 14px; margin-left: 4px; }

        /* 설정 페이지 전용 디자인 */
        .settings-area { display: flex; flex-direction: column; gap: 15px; }
        .setting-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid rgba(128,128,128,0.1); }
        .util-btn { background: var(--accent); color: white; border: none; padding: 10px 15px; border-radius: 10px; cursor: pointer; font-size: 14px; flex: 1; text-align: center; }
        .btn-group { display: flex; gap: 10px; width: 100%; }

        /* 하단 푸터 영역 */
        .footer {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: var(--bg-color); backdrop-filter: blur(15px);
            padding: 15px 20px env(safe-area-inset-bottom); border-top: 1px solid rgba(128,128,128,0.1); z-index: 100;
        }
        .history-area { display: flex; gap: 8px; overflow-x: auto; margin-bottom: 12px; scrollbar-width: none; }
        .history-chip { background: rgba(128,128,128,0.1); padding: 6px 12px; border-radius: 12px; color: var(--text-dim); white-space: nowrap; font-size: 12px; }
        .custom-input { width: 100%; box-sizing: border-box; background: rgba(128,128,128,0.05); border: 1px solid rgba(128,128,128,0.2); border-radius: 10px; padding: 12px; color: var(--text); font-size: 15px; margin-bottom: 10px; outline: none; }
        .search-btn { background: var(--accent); color: white; border: none; width: 100%; padding: 16px; border-radius: var(--radius); font-size: 17px; font-weight: bold; }

        /* 로고 & 버전 */
        .info-area { text-align: center; margin-top: 20px; padding-bottom: 20px; }
        .logo-img { width: 80px; height: auto; border-radius: 10px; margin-bottom: 8px; }
        .version-text { font-family: 'Courier New', Courier, monospace; font-size: 12px; color: var(--text-dim); }
    </style>
</head>
<body class="dark-mode">

    <div class="header-nav">
        <div class="tabs" id="tab-bar"></div>
    </div>

    <div id="main-content">
        </div>

    <div class="footer" id="search-footer">
        <div class="history-area" id="history-list"></div>
        <input type="text" id="direct-input" class="custom-input" placeholder="추가 키워드 직접 입력...">
        <div style="display:flex; justify-content:center; gap:15px; margin-bottom:12px; font-size:12px; color:var(--text-dim);">
            <label><input type="checkbox" id="ex-insta" checked> 인스타 제외</label>
            <label><input type="checkbox" id="ex-tiktok" checked> 틱톡 제외</label>
            <label><input type="checkbox" id="ex-fb" checked> 페북 제외</label>
        </div>
        <button class="search-btn" onclick="doSearch()">이미지 검색 실행</button>
    </div>

<script>
    let currentTab = "";
    let selections = { 1: "", 2: "", 3: "" };
    let isDarkMode = true;

    const defaultData = {
        tabs: ['인테리어', '목공', '여행'],
        content: {
            '인테리어': { r1: ['거실', '주방'], r2: ['조명', '소파'], r3: ['모던', '화이트'] },
            '목공': { r1: ['테이블', '의자'], r2: ['원목', '합판'], r3: ['DIY', '마감'] },
            '여행': { r1: ['일본', '제주'], r2: ['맛집', '풍경'], r3: ['감성', '지도'] }
        },
        history: [],
        isDark: true
    };

    let db = JSON.parse(localStorage.getItem('searchPro_v1')) || defaultData;

    function renderTabs() {
        const tabBar = document.getElementById('tab-bar');
        tabBar.innerHTML = '';
        db.tabs.forEach(tab => {
            const btn = document.createElement('button');
            btn.className = `tab-btn ${currentTab === tab ? 'active' : ''}`;
            btn.innerText = tab;
            btn.onclick = () => switchTab(tab);
            tabBar.appendChild(btn);
        });
        // 설정 탭 추가
        const settingBtn = document.createElement('button');
        settingBtn.className = `tab-btn ${currentTab === 'SETTING' ? 'active' : ''}`;
        settingBtn.innerText = '⚙️ 설정';
        settingBtn.onclick = () => switchTab('SETTING');
        tabBar.appendChild(settingBtn);

        if(!currentTab) switchTab(db.tabs[0]);
    }

    function switchTab(name) {
        currentTab = name;
        selections = { 1: "", 2: "", 3: "" };
        renderTabs();
        
        const contentArea = document.getElementById('main-content');
        const footer = document.getElementById('search-footer');

        if(name === 'SETTING') {
            footer.style.display = 'none';
            renderSettings(contentArea);
        } else {
            footer.style.display = 'block';
            renderKeywords(contentArea);
        }
    }

    function renderKeywords(container) {
        container.innerHTML = `
            ${[1,2,3].map(i => `
                <div class="row-section">
                    <div class="row-header"><span class="row-title">STEP ${i}</span><button class="add-btn" onclick="addWord(${i})">+</button></div>
                    <div class="word-list" id="list-${i}"></div>
                </div>
            `).join('')}
            <div class="info-area">
                <img src="logo.jpg" class="logo-img" alt="Logo" onerror="this.style.display='none'">
                <div class="version-text">Version 1.0</div>
            </div>
        `;
        renderLists();
    }

    function renderLists() {
        for (let i = 1; i <= 3; i++) {
            const listEl = document.getElementById(`list-${i}`);
            if(!listEl) continue;
            listEl.innerHTML = '';
            (db.content[currentTab][`r${i}`] || []).forEach(word => {
                const item = document.createElement('div');
                item.className = `word-item ${selections[i] === word ? 'selected' : ''}`;
                item.innerHTML = `<span>${word}</span><button class="del-btn">✕</button>`;
                item.onclick = () => {
                    selections[i] = (selections[i] === word) ? "" : word;
                    renderLists();
                };
                item.querySelector('.del-btn').onclick = (e) => {
                    e.stopPropagation();
                    if(confirm('삭제할까요?')) {
                        db.content[currentTab][`r${i}`] = db.content[currentTab][`r${i}`].filter(w => w !== word);
                        saveData(); renderLists();
                    }
                };
                listEl.appendChild(item);
            });
        }
        renderHistory();
    }

    function renderSettings(container) {
        container.innerHTML = `
            <div class="row-section settings-area">
                <div class="row-title">UI 설정</div>
                <div class="setting-item">
                    <span>테마 모드</span>
                    <button class="util-btn" onclick="toggleTheme()">${db.isDark ? '라이트 모드로' : '다크 모드로'}</button>
                </div>
                <div class="setting-item">
                    <span>현재 탭 이름</span>
                    <button class="util-btn" onclick="editTabName()">이름 수정</button>
                </div>
                <div class="row-title" style="margin-top:10px;">데이터 관리</div>
                <div class="btn-group">
                    <button class="util-btn" onclick="exportData()">내보내기 (JSON)</button>
                    <button class="util-btn" onclick="importData()">들여오기 (JSON)</button>
                </div>
                <button class="util-btn" style="background:var(--danger); margin-top:20px;" onclick="resetAll()">데이터 전체 초기화</button>
            </div>
        `;
    }

    // 기능 함수들
    function toggleTheme() {
        db.isDark = !db.isDark;
        applyTheme();
        saveData();
        switchTab('SETTING');
    }

    function applyTheme() {
        document.body.classList.toggle('light-mode', !db.isDark);
    }

    function addWord(row) {
        const w = prompt("단어 입력:");
        if(w) { db.content[currentTab][`r${row}`].push(w); saveData(); renderLists(); }
    }

    function editTabName() {
        const n = prompt("새 탭 이름 (현재 탭 대상):");
        if(n) {
            const idx = db.tabs.indexOf(currentTab);
            if(idx === -1) return alert('기본 탭만 수정 가능합니다.');
            const old = currentTab;
            db.tabs[idx] = n;
            db.content[n] = db.content[old];
            delete db.content[old];
            currentTab = n;
            saveData(); renderTabs();
        }
    }

    function exportData() {
        const dataStr = JSON.stringify(db);
        const blob = new Blob([dataStr], {type: "application/json"});
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.href = url;
        link.download = "search_backup.json";
        link.click();
    }

    function importData() {
        const input = document.createElement('input');
        input.type = 'file';
        input.accept = '.json';
        input.onchange = e => {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = event => {
                db = JSON.parse(event.target.result);
                saveData();
                location.reload();
            };
            reader.readAsText(file);
        };
        input.click();
    }

    function resetAll() {
        if(confirm('모든 데이터가 삭제됩니다.') && prompt("'삭제' 입력") === '삭제') {
            localStorage.removeItem('searchPro_v1');
            location.reload();
        }
    }

    function doSearch() {
        let words = Object.values(selections).filter(v => v !== "");
        let direct = document.getElementById('direct-input').value.trim();
        if(direct) words.push(direct);
        if(!words.length) return alert("단어 선택!");

        let query = words.join(" ");
        if(document.getElementById('ex-insta').checked) query += " -site:instagram.com";
        if(document.getElementById('ex-tiktok').checked) query += " -site:tiktok.com";
        if(document.getElementById('ex-fb').checked) query += " -site:facebook.com";

        db.history = [words.join(" "), ...db.history.filter(h => h !== words.join(" "))].slice(0,5);
        saveData();
        window.open(`https://www.google.com/search?q=${encodeURIComponent(query)}&tbm=isch`, '_blank');
    }

    function renderHistory() {
        const hList = document.getElementById('history-list');
        if(hList) hList.innerHTML = db.history.map(h => `<div class="history-chip" onclick="window.open('https://www.google.com/search?q=${encodeURIComponent(h)}&tbm=isch','_blank')">${h}</div>`).join('');
    }

    function saveData() { localStorage.setItem('searchPro_v1', JSON.stringify(db)); }

    // 초기 테마 적용
    applyTheme();
    renderTabs();
</script>
</body>
</html>
