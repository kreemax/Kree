<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search Board Pro</title>
    <meta name="referrer" content="no-referrer">
    <style>
        :root {
            --bg-color: #050505;
            --card-bg: #161616;
            --accent: #3498db;
            --text: #ffffff;
            --text-dim: #888;
            --radius: 14px;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text);
            font-family: -apple-system, sans-serif;
            margin: 0; padding: 15px;
            display: flex; flex-direction: column; gap: 15px;
            padding-bottom: 120px; /* 하단 버튼 공간 */
        }

        /* 탭 디자인 */
        .tabs { display: flex; gap: 10px; overflow-x: auto; padding: 10px 0; sticky: top; background: var(--bg-color); }
        .tab-btn {
            background: #222; border: 1px solid #333; color: var(--text-dim);
            padding: 10px 18px; border-radius: 20px; cursor: pointer; white-space: nowrap; font-weight: bold;
        }
        .tab-btn.active { background: var(--accent); color: white; border-color: var(--accent); }

        /* 섹션 카드 */
        .row-section {
            background: var(--card-bg); padding: 18px; border-radius: var(--radius);
            border: 1px solid #222;
        }
        .row-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .row-title { font-size: 0.85rem; color: var(--text-dim); letter-spacing: 1px; text-transform: uppercase; }
        
        .add-btn {
            background: #2a2a2a; border: none; color: var(--accent);
            width: 32px; height: 32px; border-radius: 10px; cursor: pointer; font-size: 20px;
        }

        /* 단어 아이템 */
        .word-list { display: flex; flex-wrap: wrap; gap: 10px; min-height: 30px; }
        .word-item {
            background: #222; border: 1px solid #333; border-radius: 10px;
            padding: 8px 14px; display: flex; align-items: center; gap: 8px; font-size: 15px;
        }
        .word-item.selected { border-color: var(--accent); background: rgba(52, 152, 219, 0.15); color: var(--accent); }
        
        .del-btn { color: #555; font-size: 16px; border: none; background: none; cursor: pointer; padding: 0 0 0 5px; }

        /* 하단 고정 검색바 */
        .footer {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: rgba(5, 5, 5, 0.9); backdrop-filter: blur(10px);
            padding: 15px; border-top: 1px solid #222;
        }
        .preview {
            text-align: center; margin-bottom: 10px; font-size: 14px; color: var(--accent); min-height: 20px;
        }
        .search-btn {
            background: var(--accent); color: white; border: none; width: 100%;
            padding: 16px; border-radius: var(--radius); font-size: 17px; font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="tabs" id="tab-bar">
        <button class="tab-btn active" onclick="switchTab('인테리어')">인테리어</button>
        <button class="tab-btn" onclick="switchTab('배경화면')">배경화면</button>
        <button class="tab-btn" onclick="switchTab('여행')">여행</button>
    </div>

    <div id="content-area">
        <div class="row-section">
            <div class="row-header"><span class="row-title">Step 1</span><button class="add-btn" onclick="addWord(1)">+</button></div>
            <div class="word-list" id="list-1"></div>
        </div>
        <div class="row-section">
            <div class="row-header"><span class="row-title">Step 2</span><button class="add-btn" onclick="addWord(2)">+</button></div>
            <div class="word-list" id="list-2"></div>
        </div>
        <div class="row-section">
            <div class="row-header"><span class="row-title">Step 3</span><button class="add-btn" onclick="addWord(3)">+</button></div>
            <div class="word-list" id="list-3"></div>
        </div>
    </div>

    <div class="footer">
        <div class="preview" id="preview-text">단어를 조합해보세요</div>
        <button class="search-btn" onclick="doSearch()">구글 검색 실행</button>
    </div>

<script>
    let currentTab = '인테리어';
    let selections = { 1: "", 2: "", 3: "" };
    
    // 전체 데이터 구조: { '인테리어': { r1: [], r2: [], r3: [] }, '배경화면': ... }
    let db = JSON.parse(localStorage.getItem('searchDB')) || {
        '인테리어': { r1: ['거실', '주방'], r2: ['조명', '소파'], r3: ['모던', '빈티지'] },
        '배경화면': { r1: ['아이폰', 'PC'], r2: ['고화질', '4K'], r3: ['풍경', '우주'] },
        '여행': { r1: ['유럽', '제주도'], r2: ['맛집', '숙소'], r3: ['커플', '혼자'] }
    };

    function switchTab(tabName) {
        currentTab = tabName;
        selections = { 1: "", 2: "", 3: "" }; // 탭 바꿀 때 선택 초기화
        
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.classList.toggle('active', btn.innerText === tabName);
        });
        
        renderLists();
        updatePreview();
    }

    function renderLists() {
        for (let i = 1; i <= 3; i++) {
            const listEl = document.getElementById(`list-${i}`);
            listEl.innerHTML = '';
            db[currentTab][`r${i}`].forEach(word => {
                const item = document.createElement('div');
                item.className = 'word-item';
                item.innerHTML = `<span>${word}</span><button class="del-btn">✕</button>`;
                item.onclick = () => toggleWord(item, i, word);
                item.querySelector('.del-btn').onclick = (e) => {
                    e.stopPropagation();
                    deleteWord(i, word);
                };
                listEl.appendChild(item);
            });
        }
    }

    function toggleWord(el, rowId, word) {
        if (el.classList.contains('selected')) {
            el.classList.remove('selected');
            selections[rowId] = "";
        } else {
            el.parentElement.querySelectorAll('.word-item').forEach(i => i.classList.remove('selected'));
            el.classList.add('selected');
            selections[rowId] = word;
        }
        updatePreview();
    }

    function addWord(rowId) {
        const word = prompt(`${currentTab}의 Step ${rowId}에 추가할 단어:`);
        if (word) {
            db[currentTab][`r${rowId}`].push(word);
            saveAndRender();
        }
    }

    function deleteWord(rowId, word) {
        db[currentTab][`r${rowId}`] = db[currentTab][`r${rowId}`].filter(w => w !== word);
        saveAndRender();
    }

    function saveAndRender() {
        localStorage.setItem('searchDB', JSON.stringify(db));
        renderLists();
    }

    function updatePreview() {
        const combined = Object.values(selections).filter(v => v !== "").join(" ");
        document.getElementById('preview-text').innerText = combined || "단어를 조합해보세요";
    }

    function doSearch() {
        const query = Object.values(selections).filter(v => v !== "").join(" ");
        if (!query) return alert("단어를 선택해주세요!");
        window.open(`https://www.google.com/search?q=${encodeURIComponent(query)}`, '_blank');
    }

    // 초기 실행
    switchTab('인테리어');
</script>
</body>
</html>
