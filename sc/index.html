<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Smart Search Dashboard</title>
    <meta name="referrer" content="no-referrer">
    <style>
        :root {
            --bg-color: #050505;
            --card-bg: #161616;
            --accent: #3498db;
            --text: #ffffff;
            --text-dim: #888;
            --danger: #ff4d4d;
            --radius: 14px;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            margin: 0; padding: 15px;
            display: flex; flex-direction: column; gap: 15px;
            padding-bottom: 220px;
        }

        /* 상단 탭 및 설정 */
        .header-nav { display: flex; align-items: center; gap: 10px; position: sticky; top: 0; background: var(--bg-color); z-index: 10; }
        .tabs { display: flex; gap: 10px; overflow-x: auto; flex: 1; padding: 10px 0; }
        .tabs::-webkit-scrollbar { display: none; }
        .tab-btn {
            background: #222; border: 1px solid #333; color: var(--text-dim);
            padding: 8px 16px; border-radius: 20px; cursor: pointer; white-space: nowrap; font-weight: bold;
        }
        .tab-btn.active { background: var(--accent); color: white; border-color: var(--accent); }
        .btn-util { background: #222; border: none; color: var(--text-dim); padding: 8px; border-radius: 10px; cursor: pointer; }

        /* 섹션 카드 */
        .row-section { background: var(--card-bg); padding: 15px; border-radius: var(--radius); border: 1px solid #222; }
        .row-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .row-title { font-size: 0.7rem; color: var(--text-dim); letter-spacing: 1px; }
        .add-btn { background: #2a2a2a; border: none; color: var(--accent); width: 30px; height: 30px; border-radius: 8px; cursor: pointer; }

        /* 단어 아이템 */
        .word-list { display: flex; flex-wrap: wrap; gap: 8px; }
        .word-item {
            background: #222; border: 1px solid #333; border-radius: 10px;
            padding: 7px 12px; display: flex; align-items: center; gap: 6px; font-size: 14px; cursor: pointer;
        }
        .word-item.selected { border-color: var(--accent); background: rgba(52, 152, 219, 0.1); color: var(--accent); }
        .del-btn { color: #444; border: none; background: none; cursor: pointer; font-size: 14px; }

        /* 하단 고정 영역 */
        .footer {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: rgba(5, 5, 5, 0.95); backdrop-filter: blur(15px);
            padding: 15px 20px env(safe-area-inset-bottom); border-top: 1px solid #222; z-index: 100;
        }

        /* 직접 입력바 */
        .custom-input-area { display: flex; gap: 8px; margin-bottom: 12px; }
        .custom-input {
            flex: 1; background: #111; border: 1px solid #333; border-radius: 10px;
            padding: 10px; color: white; font-size: 14px;
        }

        /* 최근 검색 기록 */
        .history-area { display: flex; gap: 8px; overflow-x: auto; margin-bottom: 12px; font-size: 12px; }
        .history-chip { background: #222; padding: 5px 10px; border-radius: 12px; color: var(--text-dim); white-space: nowrap; cursor: pointer; }

        .exclude-options { display: flex; justify-content: center; gap: 12px; margin-bottom: 12px; font-size: 11px; color: var(--text-dim); }
        .search-btn {
            background: var(--accent); color: white; border: none; width: 100%;
            padding: 16px; border-radius: var(--radius); font-size: 16px; font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="header-nav">
        <div class="tabs" id="tab-bar"></div>
        <button class="btn-util" onclick="editTabName()" title="탭 이름 수정">✏️</button>
        <button class="btn-util" onclick="resetAllData()" style="color: var(--danger);" title="전체 초기화">🔄</button>
    </div>

    <div id="content-area">
        <div class="row-section">
            <div class="row-header"><span id="title-1" class="row-title">STEP 1</span><button class="add-btn" onclick="addWord(1)">+</button></div>
            <div class="word-list" id="list-1"></div>
        </div>
        <div class="row-section">
            <div class="row-header"><span id="title-2" class="row-title">STEP 2</span><button class="add-btn" onclick="addWord(2)">+</button></div>
            <div class="word-list" id="list-2"></div>
        </div>
        <div class="row-section">
            <div class="row-header"><span id="title-3" class="row-title">STEP 3</span><button class="add-btn" onclick="addWord(3)">+</button></div>
            <div class="word-list" id="list-3"></div>
        </div>
    </div>

    <div class="footer">
        <div class="history-area" id="history-list"></div>

        <div class="custom-input-area">
            <input type="text" id="direct-input" class="custom-input" placeholder="추가 키워드 직접 입력...">
        </div>
        
        <div class="exclude-options">
            <label><input type="checkbox" id="ex-insta" checked> 인스타 제외</label>
            <label><input type="checkbox" id="ex-tiktok" checked> 틱톡 제외</label>
            <label><input type="checkbox" id="ex-fb" checked> 페북 제외</label>
        </div>

        <button class="search-btn" onclick="doSearch()">구글 검색 실행</button>
    </div>

<script>
    let currentTab = "";
    let selections = { 1: "", 2: "", 3: "" };
    
    // 초기화용 기본 데이터
    const defaultData = {
        tabs: ['인테리어', '배경화면', '여행'],
        content: {
            '인테리어': { r1: ['거실', '주방'], r2: ['조명', '소파'], r3: ['모던', '화이트'] },
            '배경화면': { r1: ['아이폰', 'PC'], r2: ['고화질', '4K'], r3: ['자연', '심플'] },
            '여행': { r1: ['제주', '일본'], r2: ['맛집', '숙소'], r3: ['커플', '혼자'] }
        },
        history: []
    };

    let db = JSON.parse(localStorage.getItem('megaSearchDB')) || defaultData;

    // 1. 탭 렌더링
    function renderTabs() {
        const tabBar = document.getElementById('tab-bar');
        tabBar.innerHTML = '';
        db.tabs.forEach(tab => {
            const btn = document.createElement('button');
            btn.className = `tab-btn ${currentTab === tab ? 'active' : ''}`;
            btn.innerText = tab;
            btn.onclick = () => switchTab(tab);
            tabBar.appendChild(btn);
        });
        if(!currentTab) switchTab(db.tabs[0]);
    }

    function switchTab(name) {
        currentTab = name;
        selections = { 1: "", 2: "", 3: "" };
        renderTabs();
        renderLists();
    }

    // 2. 탭 이름 수정 (2번 기능)
    function editTabName() {
        const newName = prompt(`현재 탭 '${currentTab}'의 새 이름을 입력하세요:`);
        if (newName && newName.trim() !== "") {
            const oldName = currentTab;
            const idx = db.tabs.indexOf(oldName);
            db.tabs[idx] = newName;
            db.content[newName] = db.content[oldName];
            delete db.content[oldName];
            currentTab = newName;
            saveData();
            renderTabs();
        }
    }

    // 3. 단어 목록 렌더링
    function renderLists() {
        for (let i = 1; i <= 3; i++) {
            const listEl = document.getElementById(`list-${i}`);
            listEl.innerHTML = '';
            (db.content[currentTab][`r${i}`] || []).forEach(word => {
                const item = document.createElement('div');
                item.className = 'word-item';
                item.innerHTML = `<span>${word}</span><button class="del-btn">✕</button>`;
                item.onclick = () => {
                    item.classList.toggle('selected');
                    selections[i] = item.classList.contains('selected') ? word : "";
                    item.parentElement.querySelectorAll('.word-item').forEach(sib => {
                        if(sib !== item) sib.classList.remove('selected');
                    });
                };
                item.querySelector('.del-btn').onclick = (e) => {
                    e.stopPropagation();
                    if(confirm('삭제하시겠습니까?')) {
                        db.content[currentTab][`r${i}`] = db.content[currentTab][`r${i}`].filter(w => w !== word);
                        saveData(); renderLists();
                    }
                };
                listEl.appendChild(item);
            });
        }
        renderHistory();
    }

    function addWord(rowId) {
        const word = prompt("단어 입력:");
        if(word) { db.content[currentTab][`r${rowId}`].push(word); saveData(); renderLists(); }
    }

    // 4. 최근 검색 기록 (4번 기능)
    function renderHistory() {
        const histEl = document.getElementById('history-list');
        histEl.innerHTML = db.history.map(h => `<div class="history-chip" onclick="quickSearch('${h}')">${h}</div>`).join('');
    }

    function quickSearch(text) {
        window.open(`https://www.google.com/search?q=${encodeURIComponent(text)}`, '_blank');
    }

    // 5. 검색 실행 및 기록 저장
    function doSearch() {
        let words = Object.values(selections).filter(v => v !== "");
        let direct = document.getElementById('direct-input').value.trim();
        if(direct) words.push(direct);

        if(words.length === 0) return alert("단어를 선택하거나 입력해주세요.");

        let query = words.join(" ");
        
        // 제외 옵션
        if (document.getElementById('ex-insta').checked) query += " -site:instagram.com";
        if (document.getElementById('ex-tiktok').checked) query += " -site:tiktok.com";
        if (document.getElementById('ex-fb').checked) query += " -site:facebook.com";

        // 기록 저장 (최근 5개)
        db.history.unshift(words.join(" "));
        db.history = [...new Set(db.history)].slice(0, 5);
        saveData();

        window.open(`https://www.google.com/search?q=${encodeURIComponent(query)}`, '_blank');
    }

    // 6. 전체 초기화 (실수 방지 기능)
    function resetAllData() {
        // 1단계 확인
        if(confirm("⚠️ 모든 설정과 단어 데이터가 삭제됩니다. 계속할까요?")) {
            // 2단계 확인 (실수 방지)
            const verify = prompt("초기화를 원하시면 '삭제'라고 입력해주세요.");
            if(verify === "삭제") {
                localStorage.removeItem('megaSearchDB');
                location.reload();
            } else {
                alert("입력값이 일치하지 않아 취소되었습니다.");
            }
        }
    }

    function saveData() { localStorage.setItem('megaSearchDB', JSON.stringify(db)); }

    renderTabs();
</script>

    // 초기 실행
    switchTab('인테리어');
</script>
</body>
</html>
