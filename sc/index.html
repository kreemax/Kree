<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Image Search Dashboard</title>
    <meta name="referrer" content="no-referrer">
    <style>
        :root {
            --bg-color: #050505;
            --card-bg: #161616;
            --accent: #3498db;
            --text: #ffffff;
            --text-dim: #888;
            --danger: #ff4d4d;
            --radius: 14px;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            margin: 0; padding: 15px;
            display: flex; flex-direction: column; gap: 15px;
            padding-bottom: 240px; /* 푸터 높이 고려 */
        }

        .header-nav { display: flex; align-items: center; gap: 10px; position: sticky; top: 0; background: var(--bg-color); z-index: 10; padding-bottom: 5px; }
        .tabs { display: flex; gap: 10px; overflow-x: auto; flex: 1; padding: 10px 0; scrollbar-width: none; }
        .tabs::-webkit-scrollbar { display: none; }
        
        .tab-btn {
            background: #222; border: 1px solid #333; color: var(--text-dim);
            padding: 8px 16px; border-radius: 20px; cursor: pointer; white-space: nowrap; font-weight: bold;
        }
        .tab-btn.active { background: var(--accent); color: white; border-color: var(--accent); }
        .btn-util { background: #222; border: none; color: var(--text-dim); padding: 8px; border-radius: 10px; cursor: pointer; font-size: 16px; display: flex; align-items: center; }

        .row-section { background: var(--card-bg); padding: 15px; border-radius: var(--radius); border: 1px solid #222; }
        .row-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .row-title { font-size: 0.7rem; color: var(--text-dim); letter-spacing: 1px; font-weight: bold; }
        .add-btn { background: #2a2a2a; border: none; color: var(--accent); width: 32px; height: 32px; border-radius: 8px; cursor: pointer; font-size: 18px; }

        .word-list { display: flex; flex-wrap: wrap; gap: 8px; min-height: 20px; }
        .word-item {
            background: #222; border: 1px solid #333; border-radius: 10px;
            padding: 8px 12px; display: flex; align-items: center; gap: 6px; font-size: 14px; cursor: pointer;
        }
        .word-item.selected { border-color: var(--accent); background: rgba(52, 152, 219, 0.15); color: var(--accent); }
        .del-btn { color: #555; border: none; background: none; cursor: pointer; font-size: 16px; padding-left: 4px; }

        .footer {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: rgba(5, 5, 5, 0.95); backdrop-filter: blur(15px);
            padding: 15px 20px env(safe-area-inset-bottom); border-top: 1px solid #222; z-index: 100;
        }

        .history-area { display: flex; gap: 8px; overflow-x: auto; margin-bottom: 12px; scrollbar-width: none; }
        .history-area::-webkit-scrollbar { display: none; }
        .history-chip { background: #222; padding: 6px 12px; border-radius: 12px; color: var(--text-dim); white-space: nowrap; cursor: pointer; font-size: 12px; border: 1px solid #333; }

        .custom-input-area { display: flex; gap: 8px; margin-bottom: 12px; }
        .custom-input {
            flex: 1; background: #111; border: 1px solid #333; border-radius: 10px;
            padding: 12px; color: white; font-size: 15px; outline: none;
        }
        .custom-input:focus { border-color: var(--accent); }

        .exclude-options { display: flex; justify-content: center; gap: 15px; margin-bottom: 15px; font-size: 12px; color: var(--text-dim); }
        .exclude-options label { display: flex; align-items: center; gap: 5px; cursor: pointer; }
        .exclude-options input { accent-color: var(--accent); width: 16px; height: 16px; }

        .search-btn {
            background: var(--accent); color: white; border: none; width: 100%;
            padding: 18px; border-radius: var(--radius); font-size: 17px; font-weight: bold;
            box-shadow: 0 4px 15px rgba(52, 152, 219, 0.3);
        }
        .search-btn:active { transform: scale(0.98); }
    </style>
</head>
<body>

    <div class="header-nav">
        <div class="tabs" id="tab-bar"></div>
        <button class="btn-util" onclick="editTabName()">✏️</button>
        <button class="btn-util" onclick="resetAllData()" style="color: var(--danger);">🔄</button>
    </div>

    <div id="content-area">
        <div class="row-section">
            <div class="row-header"><span class="row-title">STEP 1</span><button class="add-btn" onclick="addWord(1)">+</button></div>
            <div class="word-list" id="list-1"></div>
        </div>
        <div class="row-section">
            <div class="row-header"><span class="row-title">STEP 2</span><button class="add-btn" onclick="addWord(2)">+</button></div>
            <div class="word-list" id="list-2"></div>
        </div>
        <div class="row-section">
            <div class="row-header"><span class="row-title">STEP 3</span><button class="add-btn" onclick="addWord(3)">+</button></div>
            <div class="word-list" id="list-3"></div>
        </div>
    </div>

    <div class="footer">
        <div class="history-area" id="history-list"></div>

        <div class="custom-input-area">
            <input type="text" id="direct-input" class="custom-input" placeholder="추가 키워드 직접 입력...">
        </div>
        
        <div class="exclude-options">
            <label><input type="checkbox" id="ex-insta" checked> 인스타 제외</label>
            <label><input type="checkbox" id="ex-tiktok" checked> 틱톡 제외</label>
            <label><input type="checkbox" id="ex-fb" checked> 페북 제외</label>
        </div>

        <button class="search-btn" onclick="doSearch()">구글 이미지 검색 실행</button>
    </div>

<script>
    let currentTab = "";
    let selections = { 1: "", 2: "", 3: "" };
    
    const defaultData = {
        tabs: ['인테리어', '목공', '여행'],
        content: {
            '인테리어': { r1: ['거실', '주방'], r2: ['조명', '소파'], r3: ['모던', '화이트'] },
            '목공': { r1: ['테이블', '의자'], r2: ['원목', '합판'], r3: ['DIY', '마감'] },
            '여행': { r1: ['일본', '제주'], r2: ['맛집', '풍경'], r3: ['감성', '지도'] }
        },
        history: []
    };

    let db = JSON.parse(localStorage.getItem('megaSearchDB_v2')) || defaultData;

    function renderTabs() {
        const tabBar = document.getElementById('tab-bar');
        tabBar.innerHTML = '';
        db.tabs.forEach(tab => {
            const btn = document.createElement('button');
            btn.className = `tab-btn ${currentTab === tab ? 'active' : ''}`;
            btn.innerText = tab;
            btn.onclick = () => switchTab(tab);
            tabBar.appendChild(btn);
        });
        if(!currentTab) switchTab(db.tabs[0]);
    }

    function switchTab(name) {
        currentTab = name;
        selections = { 1: "", 2: "", 3: "" };
        renderTabs();
        renderLists();
    }

    function editTabName() {
        const newName = prompt(`현재 탭 '${currentTab}'의 새 이름을 입력하세요:`, currentTab);
        if (newName && newName.trim() !== "" && newName !== currentTab) {
            const idx = db.tabs.indexOf(currentTab);
            db.tabs[idx] = newName;
            db.content[newName] = db.content[currentTab];
            delete db.content[currentTab];
            currentTab = newName;
            saveData();
            renderTabs();
        }
    }

    function renderLists() {
        for (let i = 1; i <= 3; i++) {
            const listEl = document.getElementById(`list-${i}`);
            listEl.innerHTML = '';
            const words = db.content[currentTab][`r${i}`] || [];
            words.forEach(word => {
                const item = document.createElement('div');
                item.className = `word-item ${selections[i] === word ? 'selected' : ''}`;
                item.innerHTML = `<span>${word}</span><button class="del-btn">✕</button>`;
                
                item.onclick = () => {
                    if (selections[i] === word) {
                        selections[i] = "";
                        item.classList.remove('selected');
                    } else {
                        selections[i] = word;
                        renderLists(); // 같은 행 다른 아이템 해제를 위해 다시 그림
                    }
                };

                item.querySelector('.del-btn').onclick = (e) => {
                    e.stopPropagation();
                    if(confirm(`'${word}'을(를) 삭제하시겠습니까?`)) {
                        db.content[currentTab][`r${i}`] = db.content[currentTab][`r${i}`].filter(w => w !== word);
                        if(selections[i] === word) selections[i] = "";
                        saveData(); renderLists();
                    }
                };
                listEl.appendChild(item);
            });
        }
        renderHistory();
    }

    function addWord(rowId) {
        const word = prompt("추가할 단어를 입력하세요:");
        if(word && word.trim() !== "") { 
            db.content[currentTab][`r${rowId}`].push(word.trim()); 
            saveData(); 
            renderLists(); 
        }
    }

    function renderHistory() {
        const histEl = document.getElementById('history-list');
        histEl.innerHTML = db.history.map(h => `<div class="history-chip" onclick="quickSearch('${h}')">${h}</div>`).join('');
    }

    // 기록 클릭 시에도 이미지 검색
    function quickSearch(text) {
        let url = `https://www.google.com/search?q=${encodeURIComponent(text)}&tbm=isch`;
        window.open(url, '_blank');
    }

    function doSearch() {
        let words = Object.values(selections).filter(v => v !== "");
        let direct = document.getElementById('direct-input').value.trim();
        if(direct) words.push(direct);

        if(words.length === 0) {
            alert("선택하거나 입력한 단어가 없습니다.");
            return;
        }

        let query = words.join(" ");
        let historyEntry = query; // 기록용 원본 키워드

        // 제외 옵션 추가
        if (document.getElementById('ex-insta').checked) query += " -site:instagram.com";
        if (document.getElementById('ex-tiktok').checked) query += " -site:tiktok.com";
        if (document.getElementById('ex-fb').checked) query += " -site:facebook.com";

        // 히스토리 업데이트
        db.history = [historyEntry, ...db.history.filter(h => h !== historyEntry)].slice(0, 7);
        saveData();

        // 구글 이미지 검색 URL (&tbm=isch 추가)
        const finalUrl = `https://www.google.com/search?q=${encodeURIComponent(query)}&tbm=isch`;
        window.open(finalUrl, '_blank');
    }

    function resetAllData() {
        if(confirm("모든 단어와 설정이 초기화됩니다. 계속하시겠습니까?")) {
            const verify = prompt("'삭제'라고 입력하면 초기화됩니다.");
            if(verify === "삭제") {
                localStorage.removeItem('megaSearchDB_v2');
                location.reload();
            }
        }
    }

    function saveData() { localStorage.setItem('megaSearchDB_v2', JSON.stringify(db)); }

    renderTabs();
</script>
</body>
</html>
