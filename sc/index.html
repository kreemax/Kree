<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Image Search Pro v1.2</title>
    <link rel="icon" type="image/png" href="icon.png">
    <link rel="apple-touch-icon" href="icon.png">
    <meta name="referrer" content="no-referrer">
    <style>
        :root {
            --bg-color: #050505;
            --card-bg: #161616;
            --accent: #3498db;
            --text: #ffffff;
            --text-dim: #888;
            --danger: #ff4d4d;
            --radius: 14px;
        }

        body.light-mode {
            --bg-color: #f0f2f5;
            --card-bg: #ffffff;
            --text: #1c1e21;
            --text-dim: #606770;
            --accent: #1877f2;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            margin: 0; padding: 15px;
            display: flex; flex-direction: column; gap: 15px;
            padding-bottom: 260px;
            transition: background 0.3s, color 0.3s;
        }

        /* 헤더 & 탭 */
        .header-nav { display: flex; align-items: center; gap: 10px; position: sticky; top: 0; background: var(--bg-color); z-index: 10; padding-bottom: 5px; border-bottom: 1px solid rgba(128,128,128,0.1); }
        .tabs { display: flex; gap: 10px; overflow-x: auto; flex: 1; padding: 10px 0; scrollbar-width: none; }
        .tabs::-webkit-scrollbar { display: none; }
        
        .tab-btn {
            background: rgba(128,128,128,0.1); border: 1px solid rgba(128,128,128,0.2); color: var(--text-dim);
            padding: 8px 16px; border-radius: 20px; cursor: pointer; white-space: nowrap; font-weight: bold;
        }
        .tab-btn.active { background: var(--accent); color: white; border-color: var(--accent); }

        /* 섹션 */
        .row-section { background: var(--card-bg); padding: 15px; border-radius: var(--radius); border: 1px solid rgba(128,128,128,0.1); }
        .row-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .row-title { font-size: 0.75rem; color: var(--accent); font-weight: bold; }
        .add-btn { background: var(--accent); border: none; color: white; width: 28px; height: 28px; border-radius: 8px; cursor: pointer; }

        .word-list { display: flex; flex-wrap: wrap; gap: 8px; }
        .word-item {
            background: rgba(128,128,128,0.1); border: 1px solid rgba(128,128,128,0.15); border-radius: 10px;
            padding: 8px 12px; display: flex; align-items: center; gap: 6px; font-size: 14px; cursor: pointer;
        }
        .word-item.selected { border-color: var(--accent); background: rgba(52, 152, 219, 0.2); color: var(--accent); font-weight: bold; }
        
        /* 설정 전용 */
        .setting-sub-title { font-size: 0.8rem; color: var(--text-dim); margin: 15px 0 8px; font-weight: bold; border-left: 3px solid var(--accent); padding-left: 8px; }
        .util-btn { background: var(--accent); color: white; border: none; padding: 12px; border-radius: 10px; cursor: pointer; font-size: 13px; flex: 1; }
        .manage-item { display: flex; justify-content: space-between; align-items: center; background: rgba(128,128,128,0.05); padding: 8px 12px; border-radius: 10px; margin-bottom: 5px; font-size: 14px; }
        .icon-btn { background: none; border: none; cursor: pointer; font-size: 16px; padding: 0 5px; }

        /* 하단 검색바 */
        .footer { position: fixed; bottom: 0; left: 0; right: 0; background: var(--bg-color); padding: 15px 20px env(safe-area-inset-bottom); border-top: 1px solid rgba(128,128,128,0.1); z-index: 100; }
        .history-area { display: flex; gap: 8px; overflow-x: auto; margin-bottom: 12px; scrollbar-width: none; }
        .history-chip { background: rgba(128,128,128,0.1); padding: 6px 12px; border-radius: 12px; color: var(--text-dim); font-size: 12px; white-space: nowrap; }
        .custom-input { width: 100%; box-sizing: border-box; background: rgba(128,128,128,0.05); border: 1px solid rgba(128,128,128,0.2); border-radius: 10px; padding: 12px; color: var(--text); margin-bottom: 10px; outline: none; }
        .search-btn { background: var(--accent); color: white; border: none; width: 100%; padding: 16px; border-radius: var(--radius); font-size: 17px; font-weight: bold; }

        /* 로고 & 버전 (설정 탭) */
        .info-area { text-align: center; margin-top: 40px; padding-bottom: 20px; }
        .logo-img { width: 200px; height: auto; border-radius: 20px; margin-bottom: 15px; box-shadow: 0 10px 20px rgba(0,0,0,0.3); }
        .version-text { font-family: 'Courier New', monospace; font-size: 14px; color: var(--text-dim); font-weight: bold; }
    </style>
</head>
<body class="dark-mode" onclick="enableFullScreen()">

    <div class="header-nav">
        <div class="tabs" id="tab-bar"></div>
    </div>

    <div id="main-content"></div>

    <div class="footer" id="search-footer">
        <div class="history-area" id="history-list"></div>
        <input type="text" id="direct-input" class="custom-input" placeholder="키워드 직접 입력...">
        <div style="display:flex; justify-content:center; gap:12px; margin-bottom:12px; font-size:11px; color:var(--text-dim);">
            <label><input type="checkbox" id="ex-insta" checked> 인스타</label>
            <label><input type="checkbox" id="ex-tiktok" checked> 틱톡</label>
            <label><input type="checkbox" id="ex-fb" checked> 페북</label>
            <label><input type="checkbox" id="ex-custom" checked> 커스텀 차단</label>
        </div>
        <button class="search-btn" onclick="doSearch()">이미지 검색 실행</button>
    </div>

<script>
    let currentTab = "";
    let selections = { 1: "", 2: "", 3: "" };

    const defaultData = {
        tabs: ['인테리어', '목공', '여행'],
        content: {
            '인테리어': { r1: ['거실', '주방'], r2: ['조명', '소파'], r3: ['모던', '화이트'] },
            '목공': { r1: ['테이블', '의자'], r2: ['원목'], r3: ['DIY'] },
            '여행': { r1: ['일본'], r2: ['맛집'], r3: ['감성'] }
        },
        history: [],
        isDark: true,
        blockSites: ['pinterest.com', 'daum.net'] // 초기 커스텀 차단 사이트 예시
    };

    let db = JSON.parse(localStorage.getItem('searchPro_v1.2')) || defaultData;

    // 전체화면 활성화 (사용자 클릭 시 1회 동작)
    function enableFullScreen() {
        if (!document.fullscreenElement) {
            document.documentElement.requestFullscreen().catch(() => {});
        }
    }

    function renderTabs() {
        const tabBar = document.getElementById('tab-bar');
        tabBar.innerHTML = '';
        db.tabs.forEach(tab => {
            const btn = document.createElement('button');
            btn.className = `tab-btn ${currentTab === tab ? 'active' : ''}`;
            btn.innerText = tab;
            btn.onclick = () => switchTab(tab);
            tabBar.appendChild(btn);
        });
        const sBtn = document.createElement('button');
        sBtn.className = `tab-btn ${currentTab === 'SETTING' ? 'active' : ''}`;
        sBtn.innerText = '⚙️ 설정';
        sBtn.onclick = () => switchTab('SETTING');
        tabBar.appendChild(sBtn);

        if(!currentTab) switchTab(db.tabs[0]);
    }

    function switchTab(name) {
        currentTab = name;
        selections = { 1: "", 2: "", 3: "" };
        renderTabs();
        const contentArea = document.getElementById('main-content');
        const footer = document.getElementById('search-footer');

        if(name === 'SETTING') {
            footer.style.display = 'none';
            renderSettings(contentArea);
        } else {
            footer.style.display = 'block';
            renderKeywords(contentArea);
        }
    }

    function renderKeywords(container) {
        container.innerHTML = [1,2,3].map(i => `
            <div class="row-section">
                <div class="row-header"><span class="row-title">STEP ${i}</span><button class="add-btn" onclick="addWord(${i})">+</button></div>
                <div class="word-list" id="list-${i}"></div>
            </div>
        `).join('');
        renderLists();
    }

    function renderLists() {
        for (let i = 1; i <= 3; i++) {
            const listEl = document.getElementById(`list-${i}`);
            if(!listEl) continue;
            listEl.innerHTML = '';
            (db.content[currentTab][`r${i}`] || []).forEach(word => {
                const item = document.createElement('div');
                item.className = `word-item ${selections[i] === word ? 'selected' : ''}`;
                item.innerHTML = `<span>${word}</span><button class="icon-btn" style="font-size:12px; color:#555;">✕</button>`;
                item.onclick = () => { selections[i] = (selections[i] === word) ? "" : word; renderLists(); };
                item.querySelector('button').onclick = (e) => {
                    e.stopPropagation();
                    db.content[currentTab][`r${i}`] = db.content[currentTab][`r${i}`].filter(w => w !== word);
                    saveData(); renderLists();
                };
                listEl.appendChild(item);
            });
        }
        renderHistory();
    }

    function renderSettings(container) {
        container.innerHTML = `
            <div class="row-section">
                <div class="setting-sub-title">일반 설정</div>
                <button class="util-btn" onclick="toggleTheme()">${db.isDark ? '라이트 모드' : '다크 모드'}</button>
                
                <div class="setting-sub-title">탭 관리 (순서/수정/삭제)</div>
                <div id="tab-manager">
                    ${db.tabs.map((t, i) => `
                        <div class="manage-item">
                            <span onclick="renameTab('${t}')">${t} ✏️</span>
                            <div>
                                <button class="icon-btn" onclick="moveTab(${i}, -1)">▲</button>
                                <button class="icon-btn" onclick="moveTab(${i}, 1)">▼</button>
                                <button class="icon-btn" onclick="deleteTab('${t}')" style="color:var(--danger)">✕</button>
                            </div>
                        </div>
                    `).join('')}
                    <button class="util-btn" style="margin-top:10px; background:#444;" onclick="addNewTab()">+ 새 탭 추가</button>
                </div>

                <div class="setting-sub-title">항시 차단 사이트 관리</div>
                <div id="block-manager">
                    ${db.blockSites.map(site => `
                        <div class="manage-item">
                            <span>${site}</span>
                            <button class="icon-btn" onclick="removeBlockSite('${site}')">✕</button>
                        </div>
                    `).join('')}
                    <button class="util-btn" style="margin-top:10px; background:#444;" onclick="addBlockSite()">+ 차단 사이트 추가</button>
                </div>

                <div class="setting-sub-title">데이터</div>
                <div style="display:flex; gap:10px;">
                    <button class="util-btn" onclick="exportData()">내보내기</button>
                    <button class="util-btn" onclick="importData()">들여오기</button>
                </div>
                <button class="util-btn" style="background:var(--danger); margin-top:10px; width:100%;" onclick="resetAll()">초기화</button>

                <div class="info-area">
                    <img src="logo.jpg" class="logo-img" alt="Logo" onerror="this.style.display='none'">
                    <div class="version-text">Version 1.2 PRO</div>
                </div>
            </div>
        `;
    }

    // 탭 관리 기능들
    function addNewTab() {
        const name = prompt("새 탭 이름:");
        if(name && !db.tabs.includes(name)) {
            db.tabs.push(name);
            db.content[name] = { r1:[], r2:[], r3:[] };
            saveData(); switchTab('SETTING');
        }
    }
    function deleteTab(name) {
        if(confirm(`'${name}' 탭을 삭제할까요?`)) {
            db.tabs = db.tabs.filter(t => t !== name);
            delete db.content[name];
            saveData(); switchTab('SETTING');
        }
    }
    function moveTab(idx, dir) {
        const target = idx + dir;
        if(target >= 0 && target < db.tabs.length) {
            [db.tabs[idx], db.tabs[target]] = [db.tabs[target], db.tabs[idx]];
            saveData(); switchTab('SETTING');
        }
    }
    function renameTab(old) {
        const n = prompt("새 이름:", old);
        if(n && n !== old) {
            db.tabs[db.tabs.indexOf(old)] = n;
            db.content[n] = db.content[old];
            delete db.content[old];
            saveData(); switchTab('SETTING');
        }
    }

    // 차단 사이트 관리
    function addBlockSite() {
        const site = prompt("차단할 도메인 (예: pinterest.com):");
        if(site) { db.blockSites.push(site.replace('https://','').replace('http://','')); saveData(); switchTab('SETTING'); }
    }
    function removeBlockSite(site) {
        db.blockSites = db.blockSites.filter(s => s !== site);
        saveData(); switchTab('SETTING');
    }

    function toggleTheme() { db.isDark = !db.isDark; applyTheme(); saveData(); switchTab('SETTING'); }
    function applyTheme() { document.body.classList.toggle('light-mode', !db.isDark); }
    function addWord(r) { const w = prompt("단어 입력:"); if(w) { db.content[currentTab][`r${r}`].push(w); saveData(); renderLists(); } }
    function saveData() { localStorage.setItem('searchPro_v1.2', JSON.stringify(db)); }
    function exportData() { 
        const blob = new Blob([JSON.stringify(db)], {type: "application/json"});
        const a = document.createElement("a"); a.href = URL.createObjectURL(blob); a.download = "search_pro_backup.json"; a.click();
    }
    function importData() {
        const i = document.createElement('input'); i.type = 'file'; i.accept = '.json';
        i.onchange = e => {
            const r = new FileReader();
            r.onload = ev => { db = JSON.parse(ev.target.result); saveData(); location.reload(); };
            r.readAsText(e.target.files[0]);
        }; i.click();
    }
    function resetAll() { if(confirm('전체 초기화?') && prompt("'삭제' 입력") === '삭제') { localStorage.removeItem('searchPro_v1.2'); location.reload(); } }

    function doSearch() {
        let words = Object.values(selections).filter(v => v !== "");
        let direct = document.getElementById('direct-input').value.trim();
        if(direct) words.push(direct);
        if(!words.length) return alert("키워드 없음");

        let q = words.join(" ");
        if(document.getElementById('ex-insta').checked) q += " -site:instagram.com";
        if(document.getElementById('ex-tiktok').checked) q += " -site:tiktok.com";
        if(document.getElementById('ex-fb').checked) q += " -site:facebook.com";
        if(document.getElementById('ex-custom').checked) {
            db.blockSites.forEach(s => q += ` -site:${s}`);
        }

        db.history = [words.join(" "), ...db.history.filter(h => h !== words.join(" "))].slice(0,5);
        saveData();
        window.open(`https://www.google.com/search?q=${encodeURIComponent(q)}&tbm=isch`, '_blank');
    }

    function renderHistory() {
        const hList = document.getElementById('history-list');
        if(hList) hList.innerHTML = db.history.map(h => `<div class="history-chip" onclick="window.open('https://www.google.com/search?q=${encodeURIComponent(h)}&tbm=isch','_blank')">${h}</div>`).join('');
    }

    applyTheme();
    renderTabs();
</script>
</body>
</html>
