<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Quick Memo Slim</title>
    <style>
        :root {
            --bg: #0f172a;
            --card-bg: #1e293b;
            --accent: #38bdf8;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --danger: #fb7185;
            --success: #34d399;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            margin: 0; padding: 0;
            background-color: var(--bg);
            color: var(--text-main);
            font-family: 'Pretendard', sans-serif;
            display: flex; flex-direction: column;
            height: 100vh; overflow: hidden; /* 전체 스크롤 방지 */
        }

        /* 상단 입력창 */
        .app-header {
            padding: 12px 12px 8px;
            background: var(--bg);
        }

        .input-box {
            display: flex; gap: 6px;
            background: var(--card-bg);
            padding: 4px 10px;
            border-radius: 8px;
            border: 1px solid #334155;
        }

        .input-box input {
            flex: 1; background: none; border: none; outline: none;
            color: var(--text-main); font-size: 15px; padding: 8px 0;
        }

        .btn-add {
            background: var(--accent); color: var(--bg);
            border: none; border-radius: 6px; padding: 0 12px;
            font-weight: bold; cursor: pointer; font-size: 13px;
        }

        /* 메모 리스트 영역 (고정 높이 및 내부 스크롤) */
        .memo-container {
            flex: 1; 
            max-height: 220px; /* 대략 메모 3~4개 높이 */
            overflow-y: auto;
            padding: 0 12px;
            margin-bottom: 8px;
        }

        .memo-card {
            background: var(--card-bg);
            border-radius: 8px;
            padding: 8px 12px;
            margin-bottom: 6px;
            display: flex; align-items: center; justify-content: space-between;
            border: 1px solid #1e293b;
            animation: fadeIn 0.2s ease;
        }

        .memo-body {
            flex: 1;
            font-size: 14px;
            white-space: nowrap; /* 한 줄 유지 */
            overflow: hidden;
            text-overflow: ellipsis; /* 길면 ... 처리 */
            color: #cbd5e1;
        }

        .memo-actions {
            display: flex; gap: 10px; margin-left: 10px;
        }

        .icon-btn {
            background: none; border: none; cursor: pointer;
            padding: 4px; font-size: 14px;
        }
        .btn-copy { color: var(--success); font-weight: bold; }
        .btn-del { color: var(--danger); font-size: 18px; line-height: 1; }

        /* 하단 칩 섹션 (키패드 바로 위 타겟) */
        .chip-section {
            background: #1e293b;
            padding: 10px 12px env(safe-area-inset-bottom);
            border-radius: 16px 16px 0 0;
        }

        .chip-container {
            display: flex; flex-wrap: wrap; gap: 6px;
            max-height: 120px; overflow-y: auto;
        }

        .chip {
            background: #334155; color: var(--accent);
            padding: 4px 10px; border-radius: 12px; font-size: 12px;
            display: flex; align-items: center; gap: 4px;
        }

        .del-chip { color: var(--danger); font-size: 14px; padding-left: 2px; }

        .add-chip-btn {
            border: 1px dashed var(--text-dim); color: var(--text-dim);
            padding: 3px 10px; border-radius: 12px; font-size: 12px;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* 스크롤바 디자인 */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body>

<div class="app-header">
    <div class="input-box">
        <input type="text" id="mainInput" placeholder="검색 또는 입력..." autocomplete="off">
        <button class="btn-add" onclick="saveMemo()">저장</button>
    </div>
</div>

<div id="memoList" class="memo-container">
    </div>

<div class="chip-section">
    <div id="chipContainer" class="chip-container">
        <div class="add-chip-btn" onclick="addNewChip()">+ 추가</div>
    </div>
</div>

<script>
    let memos = JSON.parse(localStorage.getItem('kree_memos_v2')) || [];
    let chips = JSON.parse(localStorage.getItem('kree_chips_v2')) || ['#계좌', '#주소', '#전화', '출근'];

    const mainInput = document.getElementById('mainInput');
    const memoList = document.getElementById('memoList');
    const chipContainer = document.getElementById('chipContainer');

    function getChosung(str) {
        const cho = ["ㄱ","ㄲ","ㄴ","ㄷ","ㄸ","ㄹ","ㅁ","ㅂ","ㅃ","ㅅ","ㅆ","ㅇ","ㅈ","ㅉ","ㅊ","ㅋ","ㅌ","ㅍ","ㅎ"];
        let result = "";
        for(let i=0; i<str.length; i++) {
            let code = str.charCodeAt(i) - 44032;
            if(code > -1 && code < 11172) result += cho[Math.floor(code/588)];
            else result += str.charAt(i);
        }
        return result;
    }

    function saveMemo() {
        const text = mainInput.value.trim();
        if(!text) return;
        memos.unshift({ id: Date.now(), text: text });
        localStorage.setItem('kree_memos_v2', JSON.stringify(memos));
        mainInput.value = "";
        render();
    }

    function copyToClipboard(text) {
        navigator.clipboard.writeText(text);
        // 사용자 경험을 위해 살짝 알림 보일 수 있음 (생략 가능)
    }

    function deleteMemo(id) {
        memos = memos.filter(m => m.id !== id);
        localStorage.setItem('kree_memos_v2', JSON.stringify(memos));
        render();
    }

    function renderChips() {
        const base = `<div class="add-chip-btn" onclick="addNewChip()">+ 추가</div>`;
        chipContainer.innerHTML = chips.map((c, i) => `
            <div class="chip" onclick="insertChip('${c}')">
                ${c} <span class="del-chip" onclick="deleteChip(${i}, event)">×</span>
            </div>
        `).join('') + base;
    }

    function insertChip(text) {
        mainInput.value += (mainInput.value ? " " : "") + text;
        mainInput.focus();
        render();
    }

    function addNewChip() {
        const val = prompt("자주 쓰는 단어 입력");
        if(val) {
            chips.push(val);
            localStorage.setItem('kree_chips_v2', JSON.stringify(chips));
            renderChips();
        }
    }

    function deleteChip(index, e) {
        e.stopPropagation();
        chips.splice(index, 1);
        localStorage.setItem('kree_chips_v2', JSON.stringify(chips));
        renderChips();
    }

    function render() {
        const filter = mainInput.value.toLowerCase();
        const choFilter = getChosung(filter);
        
        memoList.innerHTML = memos
            .filter(m => {
                const txt = m.text.toLowerCase();
                return txt.includes(filter) || getChosung(txt).includes(choFilter);
            })
            .map(m => `
                <div class="memo-card">
                    <div class="memo-body">${m.text}</div>
                    <div class="memo-actions">
                        <button class="icon-btn btn-copy" onclick="copyToClipboard('${m.text.replace(/'/g, "\\'")}')">C</button>
                        <button class="icon-btn btn-del" onclick="deleteMemo(${m.id})">×</button>
                    </div>
                </div>
            `).join('');
    }

    mainInput.addEventListener('input', render);
    mainInput.addEventListener('keypress', e => { if(e.key === 'Enter') saveMemo(); });

    renderChips();
    render();
</script>

</body>
</html>
