<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Quick Memo Pro</title>
    
    <link rel="icon" type="image/png" href="icon.png">
    <link rel="apple-touch-icon" href="icon.png">
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <style>
        :root {
            --bg: #0f172a; --card-bg: #1e293b; --accent: #38bdf8;
            --text-main: #f8fafc; --text-dim: #94a3b8; --danger: #fb7185;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            margin: 0; padding: 0; background-color: var(--bg); color: var(--text-main);
            font-family: 'Pretendard', sans-serif; display: flex; flex-direction: column;
            height: 100vh; overflow: hidden;
        }
        .app-header { padding: 12px; flex-shrink: 0; }
        .input-box {
            display: flex; gap: 8px; background: var(--card-bg);
            padding: 4px 12px; border-radius: 10px; border: 1px solid #334155;
        }
        .input-box input {
            flex: 1; background: none; border: none; outline: none;
            color: var(--text-main); font-size: 16px; padding: 8px 0;
        }
        .btn-add { background: var(--accent); color: var(--bg); border: none; border-radius: 6px; padding: 0 14px; font-weight: 800; cursor: pointer; }
        .memo-container { height: 160px; overflow-y: auto; padding: 0 12px; display: flex; flex-direction: column; gap: 6px; flex-shrink: 0; border-bottom: 1px solid #1e293b; }
        .memo-card { background: var(--card-bg); border-radius: 8px; padding: 12px 14px; border: 1px solid #334155; flex-shrink: 0; user-select: none; }
        .memo-body { font-size: 14px; line-height: 1.4; color: #cbd5e1; pointer-events: none; }
        .chip-section { padding: 12px; flex-shrink: 0; }
        .chip-container { display: flex; flex-wrap: wrap; gap: 8px; }
        .chip { background: #334155; color: var(--accent); padding: 8px 14px; border-radius: 20px; font-size: 13px; cursor: pointer; user-select: none; }
        .add-chip-btn { border: 1px dashed var(--text-dim); color: var(--text-dim); padding: 6px 12px; border-radius: 20px; font-size: 13px; cursor: pointer; }
        .touch-area { flex: 1; min-height: 50px; }
        .admin-tools { position: fixed; bottom: 0; left: 0; right: 0; display: flex; justify-content: space-around; padding: 12px 8px calc(15px + env(safe-area-inset-bottom)); background: #1e293b; border-top: 1px solid #334155; }
        .admin-tools button { background: none; border: none; color: var(--text-dim); font-size: 11px; cursor: pointer; }
        #customModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 100; align-items: center; justify-content: center; }
        .modal-content { background: var(--card-bg); width: 85%; max-width: 320px; border-radius: 16px; padding: 20px; border: 1px solid var(--accent); }
        .modal-title { font-size: 18px; font-weight: bold; margin-bottom: 12px; color: var(--accent); }
        .modal-body { font-size: 14px; line-height: 1.6; color: var(--text-dim); white-space: pre-wrap; margin-bottom: 20px; }
        .modal-close { background: var(--accent); color: var(--bg); border: none; width: 100%; padding: 10px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 10px; }
    </style>
</head>
<body>

<div class="app-header">
    <div class="input-box">
        <input type="text" id="mainInput" placeholder="검색 또는 입력..." autocomplete="off">
        <button class="btn-add" onclick="saveMemo()">저장</button>
    </div>
</div>
<div id="memoList" class="memo-container"></div>
<div class="chip-section">
    <div id="chipContainer" class="chip-container"></div>
</div>
<div class="touch-area" onclick="document.getElementById('mainInput').focus()"></div>
<div class="admin-tools">
    <button onclick="showModal('공지사항', 'v1.8 업데이트\n- 외부 매니페스트 파일 적용\n- 홈 화면 설치 아이콘 문제 해결 시도')">공지사항</button>
    <button onclick="showModal('사용법', '• 클릭: 복사/칩 입력\n• 길게: 삭제\n• 설치: 브라우저 메뉴 > [앱 설치]')">사용법</button>
    <button onclick="exportCSV()">엑셀다운</button>
    <button onclick="importCSV()">불러오기</button>
    <button onclick="clearAll()" style="color: var(--danger)">전체삭제</button>
</div>

<div id="customModal">
    <div class="modal-content"><div id="modalTitle" class="modal-title"></div><div id="modalBody" class="modal-body"></div><button class="modal-close" onclick="closeModal()">확인</button></div>
</div>

<script>
    const defaultMemos = [
        { id: 1, text: "윗 칸에 글 입력시 자동검색되며 저장 누르시면 메모가 저장됩니다." },
        { id: 2, text: "초성으로 검색하세요. 메모 길게누르면삭제." }
    ];
    const defaultChips = ['터치시', '자동입력', '길게누르면', '삭제'];
    let memos = JSON.parse(localStorage.getItem('kree_v1_8_memos')) || defaultMemos;
    let chips = JSON.parse(localStorage.getItem('kree_v1_8_chips')) || defaultChips;
    let pressTimer;
    const mainInput = document.getElementById('mainInput');
    const memoList = document.getElementById('memoList');
    const chipContainer = document.getElementById('chipContainer');

    function showModal(t, b) { document.getElementById('modalTitle').innerText = t; document.getElementById('modalBody').innerText = b; document.getElementById('customModal').style.display = 'flex'; }
    function closeModal() { document.getElementById('customModal').style.display = 'none'; }

    function setupLongPress(el, onLong, onClick) {
        let isL = false, sX, sY, isM = false;
        const start = (e) => { const t = e.touches ? e.touches[0] : e; sX = t.clientX; sY = t.clientY; isM = false; isL = false; pressTimer = setTimeout(() => { isL = true; onLong(); }, 800); };
        const move = (e) => { const t = e.touches ? e.touches[0] : e; if (Math.abs(t.clientX - sX) > 10 || Math.abs(t.clientY - sY) > 10) { isM = true; clearTimeout(pressTimer); } };
        const end = () => { clearTimeout(pressTimer); if (!isL && !isM) onClick(); };
        el.onmousedown = start; el.onmouseup = end; el.onmousemove = move;
        el.ontouchstart = start; el.ontouchmove = move; el.ontouchend = (e) => { if (!isM) e.preventDefault(); end(); };
    }

    function saveMemo() { const t = mainInput.value.trim(); if(!t) return; memos.unshift({ id: Date.now(), text: t }); updateStorage(); mainInput.value = ""; renderMemos(); }
    function renderChips() {
        chipContainer.innerHTML = "";
        chips.forEach((c, i) => {
            const d = document.createElement('div'); d.className = 'chip'; d.innerText = c;
            setupLongPress(d, () => { if(confirm(`'${c}' 삭제?`)) { chips.splice(i, 1); updateStorage(); renderChips(); } }, () => { insertChip(c); });
            chipContainer.appendChild(d);
        });
        const a = document.createElement('div'); a.className = 'add-chip-btn'; a.innerText = "+ 추가"; a.onclick = () => { const v = prompt("새 칩 이름"); if(v) { chips.push(v); updateStorage(); renderChips(); } };
        chipContainer.appendChild(a);
    }
    function renderMemos() {
        const f = mainInput.value.toLowerCase(), cf = getChosung(f);
        memoList.innerHTML = "";
        memos.filter(m => { const t = m.text.toLowerCase(); return t.includes(f) || getChosung(t).includes(cf); }).forEach(m => {
            const d = document.createElement('div'); d.className = 'memo-card'; d.innerHTML = `<div class="memo-body">${m.text}</div>`;
            setupLongPress(d, () => { if(confirm("삭제?")) { memos = memos.filter(x => x.id !== m.id); updateStorage(); renderMemos(); } }, () => { navigator.clipboard.writeText(m.text); });
            memoList.appendChild(d);
        });
    }
    function insertChip(t) { const c = mainInput.value; mainInput.value = c + (c && !c.endsWith(' ') ? ' ' : '') + t; mainInput.focus(); renderMemos(); }
    function updateStorage() { localStorage.setItem('kree_v1_8_memos', JSON.stringify(memos)); localStorage.setItem('kree_v1_8_chips', JSON.stringify(chips)); }
    function exportCSV() { let c = "\ufeff" + memos.map(m => m.text).join('\n'); const b = new Blob([c], { type: 'text/csv;charset=utf-8;' }); const l = document.createElement("a"); l.href = URL.createObjectURL(b); l.download = `memo_backup.csv`; l.click(); }
    function importCSV() { const i = document.createElement('input'); i.type = 'file'; i.onchange = e => { const r = new FileReader(); r.onload = f => { const t = f.target.result.replace(/^\ufeff/, ""); t.split('\n').forEach(l => { if(l.trim()) memos.push({ id: Date.now() + Math.random(), text: l.trim() }); }); updateStorage(); renderMemos(); }; r.readAsText(e.target.files[0], "UTF-8"); }; i.click(); }
    function clearAll() { if(confirm("전체 삭제?")) { memos = []; updateStorage(); renderMemos(); } }
    function getChosung(s) { const ch = ["ㄱ","ㄲ","ㄴ","ㄷ","ㄸ","ㄹ","ㅁ","ㅂ","ㅃ","ㅅ","ㅆ","ㅇ","ㅈ","ㅉ","ㅊ","ㅋ","ㅌ","ㅍ","ㅎ"]; let r = ""; for(let i=0; i<s.length; i++) { let c = s.charCodeAt(i) - 44032; if(c > -1 && c < 11172) r += ch[Math.floor(c/588)]; else r += s.charAt(i); } return r; }

    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            const b = new Blob(['self.addEventListener("fetch", (e) => {});'], { type: 'text/javascript' });
            navigator.serviceWorker.register(URL.createObjectURL(b));
        });
    }
    mainInput.addEventListener('input', renderMemos);
    mainInput.addEventListener('keypress', e => { if(e.key === 'Enter') saveMemo(); });
    renderChips(); renderMemos();
</script>
</body>
</html>
