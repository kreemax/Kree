<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Quick Memo Pro</title>
    <style>
        :root {
            --bg: #0f172a;
            --card-bg: #1e293b;
            --accent: #38bdf8;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --danger: #fb7185;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            margin: 0; padding: 0;
            background-color: var(--bg);
            color: var(--text-main);
            font-family: 'Pretendard', -apple-system, sans-serif;
            display: flex; flex-direction: column;
            height: 100vh; overflow: hidden;
        }

        /* 1. 상단 입력 */
        .app-header { padding: 12px; flex-shrink: 0; }
        .input-box {
            display: flex; gap: 8px; background: var(--card-bg);
            padding: 4px 12px; border-radius: 10px; border: 1px solid #334155;
        }
        .input-box input {
            flex: 1; background: none; border: none; outline: none;
            color: var(--text-main); font-size: 16px; padding: 8px 0;
        }
        .btn-add {
            background: var(--accent); color: var(--bg);
            border: none; border-radius: 6px; padding: 0 14px; font-weight: 800; cursor: pointer;
        }

        /* 2. 메모 리스트 (고정 높이) */
        .memo-container {
            height: 160px; overflow-y: auto; padding: 0 12px;
            display: flex; flex-direction: column; gap: 6px; flex-shrink: 0;
            border-bottom: 1px solid #1e293b;
        }
        .memo-card {
            background: var(--card-bg); border-radius: 8px; padding: 12px 14px;
            border: 1px solid #334155; flex-shrink: 0; cursor: pointer;
        }
        .memo-body { font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: #cbd5e1; pointer-events: none; }

        /* 3. 칩 섹션 */
        .chip-section { padding: 12px; flex-shrink: 0; }
        .chip-container { display: flex; flex-wrap: wrap; gap: 8px; }
        .chip {
            background: #334155; color: var(--accent); padding: 8px 14px;
            border-radius: 20px; font-size: 13px; cursor: pointer; user-select: none;
        }
        .add-chip-btn { border: 1px dashed var(--text-dim); color: var(--text-dim); padding: 6px 12px; border-radius: 20px; font-size: 13px; cursor: pointer; }

        /* 4. 터치 영역 */
        .touch-area { flex: 1; min-height: 50px; }

        /* 5. 하단 관리 도구 */
        .admin-tools {
            position: fixed; bottom: 0; left: 0; right: 0;
            display: flex; justify-content: space-around; 
            padding: 12px 8px calc(15px + env(safe-area-inset-bottom));
            background: #1e293b; border-top: 1px solid #334155;
        }
        .admin-tools button {
            background: none; border: none; color: var(--text-dim); font-size: 11px; cursor: pointer;
        }

        /* 스크롤바 */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 10px; }
    </style>
</head>
<body>

<div class="app-header">
    <div class="input-box">
        <input type="text" id="mainInput" placeholder="검색/입력..." autocomplete="off">
        <button class="btn-add" onclick="saveMemo()">저장</button>
    </div>
</div>

<div id="memoList" class="memo-container"></div>

<div class="chip-section">
    <div id="chipContainer" class="chip-container">
        </div>
</div>

<div class="touch-area" onclick="document.getElementById('mainInput').focus()"></div>

<div class="admin-tools">
    <button onclick="alert('v1.2 - 최종 안정화 버전')">공지사항</button>
    <button onclick="alert('클릭: 복사/입력\n길게: 삭제')">사용법</button>
    <button onclick="exportCSV()">엑셀다운</button>
    <button onclick="importCSV()">불러오기</button>
    <button onclick="clearAll()" style="color: var(--danger)">전체삭제</button>
</div>

<script>
    let memos = JSON.parse(localStorage.getItem('kree_final_v1')) || [];
    let chips = JSON.parse(localStorage.getItem('kree_chips_v1')) || ['계좌', '주소', '전화', '출근'];
    let pressTimer;

    const mainInput = document.getElementById('mainInput');
    const memoList = document.getElementById('memoList');
    const chipContainer = document.getElementById('chipContainer');

    // 롱프레스 로직 개선
    function setupLongPress(element, onLong, onClick) {
        let isLong = false;
        const start = (e) => {
            isLong = false;
            pressTimer = setTimeout(() => {
                isLong = true;
                onLong();
            }, 700);
        };
        const end = (e) => {
            clearTimeout(pressTimer);
            if (!isLong) onClick();
        };
        element.onmousedown = start;
        element.onmouseup = end;
        element.ontouchstart = start;
        element.ontouchend = (e) => {
            e.preventDefault(); // 터치 후 클릭 중복 방지
            end();
        };
    }

    function saveMemo() {
        const text = mainInput.value.trim();
        if(!text) return;
        memos.unshift({ id: Date.now(), text: text });
        updateStorage();
        mainInput.value = "";
        renderMemos();
    }

    function renderChips() {
        chipContainer.innerHTML = "";
        chips.forEach((c, i) => {
            const div = document.createElement('div');
            div.className = 'chip';
            div.innerText = c;
            setupLongPress(div, 
                () => { if(confirm(`'${c}' 칩을 삭제할까요?`)) { chips.splice(i, 1); updateStorage(); renderChips(); } },
                () => { insertChip(c); }
            );
            chipContainer.appendChild(div);
        });
        
        const addBtn = document.createElement('div');
        addBtn.className = 'add-chip-btn';
        addBtn.innerText = "+ 추가";
        addBtn.onclick = addNewChip;
        chipContainer.appendChild(addBtn);
    }

    function renderMemos() {
        const filter = mainInput.value.toLowerCase();
        const choFilter = getChosung(filter);
        memoList.innerHTML = "";
        
        memos.filter(m => {
            const txt = m.text.toLowerCase();
            return txt.includes(filter) || getChosung(txt).includes(choFilter);
        }).forEach(m => {
            const div = document.createElement('div');
            div.className = 'memo-card';
            div.innerHTML = `<div class="memo-body">${m.text}</div>`;
            setupLongPress(div,
                () => { if(confirm("삭제할까요?")) { memos = memos.filter(x => x.id !== m.id); updateStorage(); renderMemos(); } },
                () => { navigator.clipboard.writeText(m.text); alert("복사됨"); }
            );
            memoList.appendChild(div);
        });
    }

    function insertChip(text) {
        const cur = mainInput.value;
        mainInput.value = cur + (cur && !cur.endsWith(' ') ? ' ' : '') + text;
        mainInput.focus();
        renderMemos();
    }

    function addNewChip() {
        const val = prompt("새 칩 이름");
        if(val) { chips.push(val); updateStorage(); renderChips(); }
    }

    function updateStorage() {
        localStorage.setItem('kree_final_v1', JSON.stringify(memos));
        localStorage.setItem('kree_chips_v1', JSON.stringify(chips));
    }

    function getChosung(str) {
        const cho = ["ㄱ","ㄲ","ㄴ","ㄷ","ㄸ","ㄹ","ㅁ","ㅂ","ㅃ","ㅅ","ㅆ","ㅇ","ㅈ","ㅉ","ㅊ","ㅋ","ㅌ","ㅍ","ㅎ"];
        let result = "";
        for(let i=0; i<str.length; i++) {
            let code = str.charCodeAt(i) - 44032;
            if(code > -1 && code < 11172) result += cho[Math.floor(code/588)];
            else result += str.charAt(i);
        }
        return result;
    }

    function exportCSV() {
        let csv = "\ufeff" + memos.map(m => m.text).join('\n');
        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = `memos.csv`;
        link.click();
    }

    function importCSV() {
        const input = document.createElement('input');
        input.type = 'file';
        input.onchange = e => {
            const reader = new FileReader();
            reader.onload = f => {
                f.target.result.split('\n').forEach(l => {
                    if(l.trim()) memos.push({ id: Date.now() + Math.random(), text: l.trim() });
                });
                updateStorage(); renderMemos();
            };
            reader.readAsText(e.target.files[0]);
        };
        input.click();
    }

    function clearAll() { if(confirm("전체 삭제?")) { memos = []; updateStorage(); renderMemos(); } }

    mainInput.addEventListener('input', renderMemos);
    mainInput.addEventListener('keypress', e => { if(e.key === 'Enter') saveMemo(); });

    renderChips();
    renderMemos();
</script>
</body>
</html>
    renderChips();
    renderMemos();
</script>
</body>
</html>
