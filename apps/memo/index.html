<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Quick Memo Pro</title>
    <style>
        :root {
            --bg: #0f172a;
            --card-bg: #1e293b;
            --accent: #38bdf8;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --danger: #fb7185;
            --success: #34d399;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            margin: 0; padding: 0;
            background-color: var(--bg);
            color: var(--text-main);
            font-family: 'Pretendard', sans-serif;
            display: flex; flex-direction: column; height: 100vh; overflow: hidden;
        }

        /* 1. 상단 입력 */
        .app-header { padding: 12px; flex-shrink: 0; }
        .input-box {
            display: flex; gap: 8px; background: var(--card-bg);
            padding: 4px 12px; border-radius: 10px; border: 1px solid #334155;
        }
        .input-box input {
            flex: 1; background: none; border: none; outline: none;
            color: var(--text-main); font-size: 16px; padding: 8px 0;
        }
        .btn-add {
            background: var(--accent); color: var(--bg);
            border: none; border-radius: 6px; padding: 0 14px; font-weight: 800;
        }

        /* 2. 메모 3줄 고정 노출 */
        .memo-container {
            height: 165px; overflow-y: auto; padding: 0 12px;
            display: flex; flex-direction: column; gap: 6px; flex-shrink: 0;
        }
        .memo-card {
            background: var(--card-bg); border-radius: 8px; padding: 8px 12px;
            display: flex; align-items: center; justify-content: space-between;
            border: 1px solid #334155; flex-shrink: 0;
        }
        .memo-body { flex: 1; font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: #cbd5e1; }
        .btn-copy { color: var(--success); font-weight: bold; background: none; border: none; font-size: 14px; margin: 0 10px; }
        .btn-del { color: var(--danger); font-size: 20px; background: none; border: none; }

        /* 3. 칩 섹션 */
        .chip-section { padding: 12px; flex-shrink: 0; }
        .chip-container { display: flex; flex-wrap: wrap; gap: 8px; }
        .chip {
            background: #334155; color: var(--accent); padding: 8px 14px;
            border-radius: 20px; font-size: 13px; cursor: pointer; user-select: none;
        }
        .add-chip-btn { border: 1px dashed var(--text-dim); color: var(--text-dim); padding: 6px 12px; border-radius: 20px; font-size: 13px; }

        /* 4. 빈 공간 (터치 시 키패드) */
        .touch-area { flex: 1; cursor: text; }

        /* 5. 하단 관리 버튼 */
        .admin-tools {
            display: flex; justify-content: space-between; padding: 10px 12px calc(10px + env(safe-area-inset-bottom));
            background: #1e293b; gap: 4px; flex-shrink: 0;
        }
        .admin-tools button {
            background: none; border: none; color: var(--text-dim); font-size: 11px; padding: 5px; cursor: pointer;
        }

        /* 스크롤바 */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 10px; }
    </style>
</head>
<body>

<div class="app-header">
    <div class="input-box">
        <input type="text" id="mainInput" placeholder="검색/입력..." autocomplete="off">
        <button class="btn-add" onclick="saveMemo()">저장</button>
    </div>
</div>

<div id="memoList" class="memo-container"></div>

<div class="chip-section">
    <div id="chipContainer" class="chip-container">
        <div class="add-chip-btn" onclick="addNewChip()">+ 추가</div>
    </div>
</div>

<div class="touch-area" onclick="document.getElementById('mainInput').focus()"></div>

<div class="admin-tools">
    <button onclick="alert('v1.0 - 실시간 초성 검색 퀵메모')">공지사항</button>
    <button onclick="alert('입력: 저장\n검색: 타이핑 시 즉시 필터\n삭제: X 버튼\n칩 삭제: 길게 누르기')">사용법</button>
    <button onclick="exportCSV()">엑셀다운</button>
    <button onclick="importCSV()">불러오기</button>
    <button onclick="clearAll()" style="color: var(--danger)">전체삭제</button>
</div>

<script>
    let memos = JSON.parse(localStorage.getItem('kree_memos_v5')) || [];
    let chips = JSON.parse(localStorage.getItem('kree_chips_v5')) || ['계좌', '주소', '전화', '출근'];
    let pressTimer;

    function saveMemo() {
        const text = mainInput.value.trim();
        if(!text) return;
        memos.unshift({ id: Date.now(), text: text });
        localStorage.setItem('kree_memos_v5', JSON.stringify(memos));
        mainInput.value = "";
        render();
    }

    function renderChips() {
        const btn = `<div class="add-chip-btn" onclick="addNewChip()">+ 추가</div>`;
        chipContainer.innerHTML = chips.map((c, i) => `
            <div class="chip" 
                 onclick="insertChip('${c}')" 
                 onmousedown="startPress(${i})" 
                 onmouseup="endPress()" 
                 ontouchstart="startPress(${i})" 
                 ontouchend="endPress()">${c}</div>
        `).join('') + btn;
    }

    // 롱프레스 삭제 기능
    function startPress(index) {
        pressTimer = window.setTimeout(() => {
            if(confirm(`'${chips[index]}' 칩을 삭제할까요?`)) {
                chips.splice(index, 1);
                localStorage.setItem('kree_chips_v5', JSON.stringify(chips));
                renderChips();
            }
        }, 800);
    }
    function endPress() { clearTimeout(pressTimer); }

    function insertChip(text) {
        const cur = mainInput.value;
        mainInput.value = cur + (cur && !cur.endsWith(' ') ? ' ' : '') + text;
        mainInput.focus();
        render();
    }

    function addNewChip() {
        const val = prompt("새 칩 이름");
        if(val) {
            chips.push(val);
            localStorage.setItem('kree_chips_v5', JSON.stringify(chips));
            renderChips();
        }
    }

    function deleteMemo(id) {
        memos = memos.filter(m => m.id !== id);
        localStorage.setItem('kree_memos_v5', JSON.stringify(memos));
        render();
    }

    function exportCSV() {
        let csv = "\ufeff메모내용\n";
        memos.forEach(m => { csv += `"${m.text.replace(/"/g, '""')}"\n`; });
        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = `memo_${new Date().toLocaleDateString()}.csv`;
        link.click();
    }

    function importCSV() {
        const input = document.createElement('input');
        input.type = 'file';
        input.accept = '.csv';
        input.onchange = e => {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = f => {
                const lines = f.target.result.split('\n').slice(1);
                lines.forEach(l => {
                    if(l.trim()) memos.push({ id: Date.now() + Math.random(), text: l.replace(/"/g, '').trim() });
                });
                localStorage.setItem('kree_memos_v5', JSON.stringify(memos));
                render();
            };
            reader.readAsText(file);
        };
        input.click();
    }

    function clearAll() {
        if(confirm("모든 메모를 삭제할까요?")) {
            memos = [];
            localStorage.setItem('kree_memos_v5', JSON.stringify(memos));
            render();
        }
    }

    function getChosung(str) {
        const cho = ["ㄱ","ㄲ","ㄴ","ㄷ","ㄸ","ㄹ","ㅁ","ㅂ","ㅃ","ㅅ","ㅆ","ㅇ","ㅈ","ㅉ","ㅊ","ㅋ","ㅌ","ㅍ","ㅎ"];
        let result = "";
        for(let i=0; i<str.length; i++) {
            let code = str.charCodeAt(i) - 44032;
            if(code > -1 && code < 11172) result += cho[Math.floor(code/588)];
            else result += str.charAt(i);
        }
        return result;
    }

    function render() {
        const filter = mainInput.value.toLowerCase();
        const choFilter = getChosung(filter);
        memoList.innerHTML = memos
            .filter(m => {
                const txt = m.text.toLowerCase();
                return txt.includes(filter) || getChosung(txt).includes(choFilter);
            })
            .map(m => `
                <div class="memo-card">
                    <div class="memo-body">${m.text}</div>
                    <button class="btn-copy" onclick="navigator.clipboard.writeText('${m.text.replace(/'/g, "\\'")}')">C</button>
                    <button class="btn-del" onclick="deleteMemo(${m.id})">×</button>
                </div>
            `).join('');
    }

    mainInput.addEventListener('input', render);
    mainInput.addEventListener('keypress', e => { if(e.key === 'Enter') saveMemo(); });

    renderChips();
    render();
</script>
</body>
</html>
