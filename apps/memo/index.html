<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Quick Memo Compact</title>
    <style>
        :root {
            --bg: #0f172a;
            --card-bg: #1e293b;
            --accent: #38bdf8;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --danger: #fb7185;
            --success: #34d399;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            margin: 0; padding: 0;
            background-color: var(--bg);
            color: var(--text-main);
            font-family: 'Pretendard', sans-serif;
        }

        /* 1. 상단 입력창 */
        .app-header {
            padding: 12px;
            background: var(--bg);
            position: sticky; top: 0; z-index: 10;
        }

        .input-box {
            display: flex; gap: 8px;
            background: var(--card-bg);
            padding: 4px 12px;
            border-radius: 10px;
            border: 1px solid #334155;
        }

        .input-box input {
            flex: 1; background: none; border: none; outline: none;
            color: var(--text-main); font-size: 16px; padding: 8px 0;
        }

        .btn-add {
            background: var(--accent); color: var(--bg);
            border: none; border-radius: 6px; padding: 0 14px;
            font-weight: 800; cursor: pointer;
        }

        /* 2. 메모 리스트: 높이를 고정하여 딱 3줄 정도만 노출 */
        .memo-container {
            height: 165px; /* 메모 약 3개 + 간격 높이로 고정 */
            overflow-y: auto;
            padding: 0 12px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            /* 스크롤 가이드 라인 */
            border-bottom: 1px solid #1e293b; 
        }

        .memo-card {
            background: var(--card-bg);
            border-radius: 8px;
            padding: 8px 12px;
            display: flex; align-items: center; justify-content: space-between;
            border: 1px solid #334155;
            flex-shrink: 0; /* 높이 고정 유지 */
        }

        .memo-body {
            flex: 1; font-size: 14px;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
            color: #cbd5e1;
        }

        .memo-actions {
            display: flex; gap: 12px; margin-left: 10px;
        }

        .icon-btn { background: none; border: none; cursor: pointer; padding: 4px; }
        .btn-copy { color: var(--success); font-weight: bold; font-size: 14px; }
        .btn-del { color: var(--danger); font-size: 18px; line-height: 1; }

        /* 3. 칩 섹션: 메모 바로 밑에 위치 */
        .chip-section {
            padding: 12px;
            background: var(--bg);
        }

        .chip-container {
            display: flex; flex-wrap: wrap; gap: 8px;
        }

        .chip {
            background: #334155; color: var(--accent);
            padding: 6px 12px; border-radius: 15px; font-size: 13px;
            display: flex; align-items: center; gap: 6px;
        }

        .del-chip { color: var(--danger); font-weight: bold; }

        .add-chip-btn {
            border: 1px dashed var(--text-dim); color: var(--text-dim);
            padding: 5px 12px; border-radius: 15px; font-size: 13px;
        }

        /* 스크롤바 디자인 */
        .memo-container::-webkit-scrollbar { width: 4px; }
        .memo-container::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 10px; }
    </style>
</head>
<body>

<div class="app-header">
    <div class="input-box">
        <input type="text" id="mainInput" placeholder="검색/메모..." autocomplete="off">
        <button class="btn-add" onclick="saveMemo()">저장</button>
    </div>
</div>

<div id="memoList" class="memo-container"></div>

<div class="chip-section">
    <div id="chipContainer" class="chip-container">
        <div class="add-chip-btn" onclick="addNewChip()">+ 추가</div>
    </div>
</div>

<script>
    let memos = JSON.parse(localStorage.getItem('kree_memos_v4')) || [];
    let chips = JSON.parse(localStorage.getItem('kree_chips_v4')) || ['#계좌', '#주소', '#전화', '출근'];

    const mainInput = document.getElementById('mainInput');
    const memoList = document.getElementById('memoList');
    const chipContainer = document.getElementById('chipContainer');

    function getChosung(str) {
        const cho = ["ㄱ","ㄲ","ㄴ","ㄷ","ㄸ","ㄹ","ㅁ","ㅂ","ㅃ","ㅅ","ㅆ","ㅇ","ㅈ","ㅉ","ㅊ","ㅋ","ㅌ","ㅍ","ㅎ"];
        let result = "";
        for(let i=0; i<str.length; i++) {
            let code = str.charCodeAt(i) - 44032;
            if(code > -1 && code < 11172) result += cho[Math.floor(code/588)];
            else result += str.charAt(i);
        }
        return result;
    }

    function saveMemo() {
        const text = mainInput.value.trim();
        if(!text) return;
        memos.unshift({ id: Date.now(), text: text });
        localStorage.setItem('kree_memos_v4', JSON.stringify(memos));
        mainInput.value = "";
        render();
    }

    function deleteMemo(id) {
        memos = memos.filter(m => m.id !== id);
        localStorage.setItem('kree_memos_v4', JSON.stringify(memos));
        render();
    }

    function copyToClipboard(text) {
        const temp = document.createElement("textarea");
        document.body.appendChild(temp);
        temp.value = text;
        temp.select();
        document.execCommand("copy");
        document.body.removeChild(temp);
    }

    function insertChip(text) {
        const cur = mainInput.value;
        mainInput.value = cur + (cur && !cur.endsWith(' ') ? ' ' : '') + text;
        mainInput.focus();
        render();
    }

    function addNewChip() {
        const val = prompt("단어 입력");
        if(val) {
            chips.push(val);
            localStorage.setItem('kree_chips_v4', JSON.stringify(chips));
            renderChips();
        }
    }

    function deleteChip(index, e) {
        e.stopPropagation();
        chips.splice(index, 1);
        localStorage.setItem('kree_chips_v4', JSON.stringify(chips));
        renderChips();
    }

    function renderChips() {
        const btn = `<div class="add-chip-btn" onclick="addNewChip()">+ 추가</div>`;
        chipContainer.innerHTML = chips.map((c, i) => `
            <div class="chip" onclick="insertChip('${c}')">
                ${c} <span class="del-chip" onclick="deleteChip(${i}, event)">×</span>
            </div>
        `).join('') + btn;
    }

    function render() {
        const filter = mainInput.value.toLowerCase();
        const choFilter = getChosung(filter);
        
        memoList.innerHTML = memos
            .filter(m => {
                const txt = m.text.toLowerCase();
                return txt.includes(filter) || getChosung(txt).includes(choFilter);
            })
            .map(m => `
                <div class="memo-card">
                    <div class="memo-body">${m.text}</div>
                    <div class="memo-actions">
                        <button class="icon-btn btn-copy" onclick="copyToClipboard('${m.text.replace(/'/g, "\\'")}')">C</button>
                        <button class="icon-btn btn-del" onclick="deleteMemo(${m.id})">×</button>
                    </div>
                </div>
            `).join('');
    }

    mainInput.addEventListener('input', render);
    mainInput.addEventListener('keypress', e => { if(e.key === 'Enter') saveMemo(); });

    renderChips();
    render();
</script>

</body>
</html>
</script>

</body>
</html>
