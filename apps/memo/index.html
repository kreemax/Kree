<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Quick Memo Pro</title>
    <style>
        :root {
            --bg: #0f172a;
            --card-bg: #1e293b;
            --accent: #38bdf8;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --danger: #fb7185;
            --success: #34d399;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            margin: 0; padding: 0;
            background-color: var(--bg);
            color: var(--text-main);
            font-family: 'Pretendard', -apple-system, sans-serif;
            display: flex;
            flex-direction: column;
            height: 100vh; /* 전체 화면 높이 사용 */
            overflow: hidden;
        }

        /* 입력창 영역 */
        .app-header {
            padding: 16px 16px 8px;
            flex-shrink: 0;
        }

        .input-box {
            display: flex; gap: 8px;
            background: var(--card-bg);
            padding: 6px 12px;
            border-radius: 12px;
            border: 1px solid #334155;
        }

        .input-box input {
            flex: 1; background: none; border: none; outline: none;
            color: var(--text-main); font-size: 16px; padding: 8px 0;
        }

        .btn-add {
            background: var(--accent); color: var(--bg);
            border: none; border-radius: 8px; padding: 0 16px;
            font-weight: 800; cursor: pointer;
        }

        /* 메모 리스트: 남은 공간을 다 차지하고 내부 스크롤 */
        .memo-container {
            flex: 1; 
            overflow-y: auto;
            padding: 8px 16px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .memo-card {
            background: var(--card-bg);
            border-radius: 10px;
            padding: 10px 14px;
            display: flex; align-items: center; justify-content: space-between;
            border: 1px solid #334155;
            min-height: 44px; /* 최소 한 줄 높이 보장 */
        }

        .memo-body {
            flex: 1; font-size: 15px;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
            color: #cbd5e1;
        }

        .memo-actions {
            display: flex; gap: 12px; margin-left: 10px;
        }

        .icon-btn {
            background: none; border: none; cursor: pointer;
            padding: 4px; font-size: 15px;
        }
        .btn-copy { color: var(--success); font-weight: bold; }
        .btn-del { color: var(--danger); font-size: 20px; line-height: 1; }

        /* 하단 칩 섹션: 키패드 바로 위에 붙도록 설정 */
        .chip-section {
            background: #1e293b;
            padding: 12px 16px calc(12px + env(safe-area-inset-bottom));
            border-top: 1px solid #334155;
            flex-shrink: 0;
        }

        .chip-container {
            display: flex; flex-wrap: wrap; gap: 8px;
        }

        .chip {
            background: #334155; color: var(--accent);
            padding: 6px 12px; border-radius: 20px; font-size: 13px;
            display: flex; align-items: center; gap: 6px;
            cursor: pointer;
        }

        .del-chip { color: var(--danger); font-weight: bold; font-size: 14px; }

        .add-chip-btn {
            border: 1px dashed var(--text-dim); color: var(--text-dim);
            padding: 5px 14px; border-radius: 20px; font-size: 13px;
            cursor: pointer;
        }

        /* 스크롤바 미세 조정 */
        .memo-container::-webkit-scrollbar { width: 4px; }
        .memo-container::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body>

<div class="app-header">
    <div class="input-box">
        <input type="text" id="mainInput" placeholder="검색 또는 메모 입력..." autocomplete="off">
        <button class="btn-add" onclick="saveMemo()">저장</button>
    </div>
</div>

<div id="memoList" class="memo-container"></div>

<div class="chip-section">
    <div id="chipContainer" class="chip-container">
        <div class="add-chip-btn" onclick="addNewChip()">+ 추가</div>
    </div>
</div>

<script>
    let memos = JSON.parse(localStorage.getItem('kree_memos_v3')) || [];
    let chips = JSON.parse(localStorage.getItem('kree_chips_v3')) || ['#계좌', '#주소', '#전화', '출근'];

    const mainInput = document.getElementById('mainInput');
    const memoList = document.getElementById('memoList');
    const chipContainer = document.getElementById('chipContainer');

    function getChosung(str) {
        const cho = ["ㄱ","ㄲ","ㄴ","ㄷ","ㄸ","ㄹ","ㅁ","ㅂ","ㅃ","ㅅ","ㅆ","ㅇ","ㅈ","ㅉ","ㅊ","ㅋ","ㅌ","ㅍ","ㅎ"];
        let result = "";
        for(let i=0; i<str.length; i++) {
            let code = str.charCodeAt(i) - 44032;
            if(code > -1 && code < 11172) result += cho[Math.floor(code/588)];
            else result += str.charAt(i);
        }
        return result;
    }

    function saveMemo() {
        const text = mainInput.value.trim();
        if(!text) return;
        memos.unshift({ id: Date.now(), text: text });
        localStorage.setItem('kree_memos_v3', JSON.stringify(memos));
        mainInput.value = "";
        render();
    }

    function deleteMemo(id) {
        if(!confirm('삭제할까요?')) return;
        memos = memos.filter(m => m.id !== id);
        localStorage.setItem('kree_memos_v3', JSON.stringify(memos));
        render();
    }

    function copyToClipboard(text) {
        navigator.clipboard.writeText(text);
    }

    function insertChip(text) {
        const currentVal = mainInput.value;
        mainInput.value = currentVal + (currentVal && !currentVal.endsWith(' ') ? ' ' : '') + text;
        mainInput.focus();
        render();
    }

    function addNewChip() {
        const val = prompt("자주 쓸 단어/태그 입력");
        if(val) {
            chips.push(val);
            localStorage.setItem('kree_chips_v3', JSON.stringify(chips));
            renderChips();
        }
    }

    function deleteChip(index, e) {
        e.stopPropagation();
        chips.splice(index, 1);
        localStorage.setItem('kree_chips_v3', JSON.stringify(chips));
        renderChips();
    }

    function renderChips() {
        const btn = `<div class="add-chip-btn" onclick="addNewChip()">+ 추가</div>`;
        chipContainer.innerHTML = chips.map((c, i) => `
            <div class="chip" onclick="insertChip('${c}')">
                ${c} <span class="del-chip" onclick="deleteChip(${i}, event)">×</span>
            </div>
        `).join('') + btn;
    }

    function render() {
        const filter = mainInput.value.toLowerCase();
        const choFilter = getChosung(filter);
        
        memoList.innerHTML = memos
            .filter(m => {
                const txt = m.text.toLowerCase();
                return txt.includes(filter) || getChosung(txt).includes(choFilter);
            })
            .map(m => `
                <div class="memo-card">
                    <div class="memo-body">${m.text}</div>
                    <div class="memo-actions">
                        <button class="icon-btn btn-copy" onclick="copyToClipboard('${m.text.replace(/'/g, "\\'")}')">C</button>
                        <button class="icon-btn btn-del" onclick="deleteMemo(${m.id})">×</button>
                    </div>
                </div>
            `).join('');
    }

    mainInput.addEventListener('input', render);
    mainInput.addEventListener('keypress', e => { if(e.key === 'Enter') saveMemo(); });

    renderChips();
    render();
</script>

</body>
</html>
