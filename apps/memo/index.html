<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Quick Memo Pro</title>
    
    <link rel="icon" type="image/png" href="icon.png">
    <link rel="shortcut icon" href="icon.png">
    <link rel="apple-touch-icon" href="icon.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="QuickMemo">

    <link rel="manifest" href='data:application/manifest+json,{"name":"Quick Memo Pro","short_name":"Memo","start_url":".","display":"standalone","background_color":"#0f172a","theme_color":"#0f172a","icons":[{"src":"icon.png","sizes":"192x192","type":"image/png","purpose":"any maskable"},{"src":"icon.png","sizes":"512x512","type":"image/png","purpose":"any maskable"}]}'>

    <style>
        :root {
            --bg: #0f172a;
            --card-bg: #1e293b;
            --accent: #38bdf8;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --danger: #fb7185;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            margin: 0; padding: 0;
            background-color: var(--bg);
            color: var(--text-main);
            font-family: 'Pretendard', -apple-system, sans-serif;
            display: flex; flex-direction: column;
            height: 100vh; overflow: hidden;
        }

        /* 헤더 & 입력 */
        .app-header { padding: 12px; flex-shrink: 0; }
        .input-box {
            display: flex; gap: 8px; background: var(--card-bg);
            padding: 4px 12px; border-radius: 10px; border: 1px solid #334155;
        }
        .input-box input {
            flex: 1; background: none; border: none; outline: none;
            color: var(--text-main); font-size: 16px; padding: 8px 0;
        }
        .btn-add {
            background: var(--accent); color: var(--bg);
            border: none; border-radius: 6px; padding: 0 14px; font-weight: 800; cursor: pointer;
        }

        /* 메모 리스트 */
        .memo-container {
            height: 160px; overflow-y: auto; padding: 0 12px;
            display: flex; flex-direction: column; gap: 6px; flex-shrink: 0;
            border-bottom: 1px solid #1e293b;
        }
        .memo-card {
            background: var(--card-bg); border-radius: 8px; padding: 12px 14px;
            border: 1px solid #334155; flex-shrink: 0; user-select: none;
        }
        .memo-body { font-size: 14px; line-height: 1.4; color: #cbd5e1; pointer-events: none; }

        /* 칩 섹션 */
        .chip-section { padding: 12px; flex-shrink: 0; }
        .chip-container { display: flex; flex-wrap: wrap; gap: 8px; }
        .chip {
            background: #334155; color: var(--accent); padding: 8px 14px;
            border-radius: 20px; font-size: 13px; cursor: pointer; user-select: none;
        }
        .add-chip-btn { border: 1px dashed var(--text-dim); color: var(--text-dim); padding: 6px 12px; border-radius: 20px; font-size: 13px; cursor: pointer; }

        .touch-area { flex: 1; min-height: 50px; }

        /* 하단 바 */
        .admin-tools {
            position: fixed; bottom: 0; left: 0; right: 0;
            display: flex; justify-content: space-around; 
            padding: 12px 8px calc(15px + env(safe-area-inset-bottom));
            background: #1e293b; border-top: 1px solid #334155;
        }
        .admin-tools button {
            background: none; border: none; color: var(--text-dim); font-size: 11px; cursor: pointer;
        }

        /* 모달 디자인 */
        #customModal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); z-index: 100; align-items: center; justify-content: center;
        }
        .modal-content {
            background: var(--card-bg); width: 85%; max-width: 320px; border-radius: 16px;
            padding: 20px; border: 1px solid var(--accent);
        }
        .modal-title { font-size: 18px; font-weight: bold; margin-bottom: 12px; color: var(--accent); }
        .modal-body { font-size: 14px; line-height: 1.6; color: var(--text-dim); white-space: pre-wrap; margin-bottom: 20px; }
        .modal-close {
            background: var(--accent); color: var(--bg); border: none; width: 100%;
            padding: 10px; border-radius: 8px; font-weight: bold; cursor: pointer;
        }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 10px; }
    </style>
</head>
<body>

<div class="app-header">
    <div class="input-box">
        <input type="text" id="mainInput" placeholder="검색 또는 입력..." autocomplete="off">
        <button class="btn-add" onclick="saveMemo()">저장</button>
    </div>
</div>

<div id="memoList" class="memo-container"></div>

<div class="chip-section">
    <div id="chipContainer" class="chip-container"></div>
</div>

<div class="touch-area" onclick="document.getElementById('mainInput').focus()"></div>

<div class="admin-tools">
    <button onclick="showModal('공지사항', 'v1.7 PWA 최종 보정\n- 아이콘 마스킹 대응\n- 설치 조건(서비스워커) 강화')">공지사항</button>
    <button onclick="showModal('사용법', '• 클릭: 복사/칩 자동입력\n• 길게: 삭제\n• 설치: 브라우저 메뉴 > [앱 설치]')">사용법</button>
    <button onclick="exportCSV()">엑셀다운</button>
    <button onclick="importCSV()">불러오기</button>
    <button onclick="clearAll()" style="color: var(--danger)">전체삭제</button>
</div>

<div id="customModal">
    <div class="modal-content">
        <div id="modalTitle" class="modal-title"></div>
        <div id="modalBody" class="modal-body"></div>
        <button class="modal-close" onclick="closeModal()">확인</button>
    </div>
</div>

<script>
    const defaultMemos = [
        { id: 1, text: "윗 칸에 글 입력시 자동검색되며 저장 누르시면 메모가 저장됩니다." },
        { id: 2, text: "초성으로 검색하세요. 메모 길게누르면삭제." }
    ];
    const defaultChips = ['터치시', '자동입력', '길게누르면', '삭제'];

    let memos = JSON.parse(localStorage.getItem('kree_v1_7_memos')) || defaultMemos;
    let chips = JSON.parse(localStorage.getItem('kree_v1_7_chips')) || defaultChips;
    let pressTimer;

    const mainInput = document.getElementById('mainInput');
    const memoList = document.getElementById('memoList');
    const chipContainer = document.getElementById('chipContainer');

    function showModal(title, body) {
        document.getElementById('modalTitle').innerText = title;
        document.getElementById('modalBody').innerText = body;
        document.getElementById('customModal').style.display = 'flex';
    }
    function closeModal() { document.getElementById('customModal').style.display = 'none'; }

    function setupLongPress(element, onLong, onClick) {
        let isLong = false;
        let startX, startY;
        let isMoved = false;

        const start = (e) => {
            const touch = e.touches ? e.touches[0] : e;
            startX = touch.clientX; startY = touch.clientY;
            isMoved = false; isLong = false;
            pressTimer = setTimeout(() => { isLong = true; onLong(); }, 800);
        };
        const move = (e) => {
            const touch = e.touches ? e.touches[0] : e;
            if (Math.abs(touch.clientX - startX) > 10 || Math.abs(touch.clientY - startY) > 10) {
                isMoved = true; clearTimeout(pressTimer);
            }
        };
        const end = (e) => {
            clearTimeout(pressTimer);
            if (!isLong && !isMoved) onClick();
        };

        element.onmousedown = start; element.onmouseup = end; element.onmousemove = move;
        element.ontouchstart = start; element.ontouchmove = move;
        element.ontouchend = (e) => { if (!isMoved) e.preventDefault(); end(); };
    }

    function saveMemo() {
        const text = mainInput.value.trim();
        if(!text) return;
        memos.unshift({ id: Date.now(), text: text });
        updateStorage(); mainInput.value = ""; renderMemos();
    }

    function renderChips() {
        chipContainer.innerHTML = "";
        chips.forEach((c, i) => {
            const div = document.createElement('div');
            div.className = 'chip'; div.innerText = c;
            setupLongPress(div, 
                () => { if(confirm(`'${c}' 삭제할까요?`)) { chips.splice(i, 1); updateStorage(); renderChips(); } },
                () => { insertChip(c); }
            );
            chipContainer.appendChild(div);
        });
        const addBtn = document.createElement('div');
        addBtn.className = 'add-chip-btn'; addBtn.innerText = "+ 추가";
        addBtn.onclick = addNewChip;
        chipContainer.appendChild(addBtn);
    }

    function renderMemos() {
        const filter = mainInput.value.toLowerCase();
        const choFilter = getChosung(filter);
        memoList.innerHTML = "";
        memos.filter(m => {
            const txt = m.text.toLowerCase();
            return txt.includes(filter) || getChosung(txt).includes(choFilter);
        }).forEach(m => {
            const div = document.createElement('div');
            div.className = 'memo-card'; div.innerHTML = `<div class="memo-body">${m.text}</div>`;
            setupLongPress(div,
                () => { if(confirm("삭제할까요?")) { memos = memos.filter(x => x.id !== m.id); updateStorage(); renderMemos(); } },
                () => { navigator.clipboard.writeText(m.text); }
            );
            memoList.appendChild(div);
        });
    }

    function insertChip(text) {
        const cur = mainInput.value;
        mainInput.value = cur + (cur && !cur.endsWith(' ') ? ' ' : '') + text;
        mainInput.focus(); renderMemos();
    }

    function addNewChip() {
        const val = prompt("새 칩 이름");
        if(val) { chips.push(val); updateStorage(); renderChips(); }
    }

    function updateStorage() {
        localStorage.setItem('kree_v1_7_memos', JSON.stringify(memos));
        localStorage.setItem('kree_v1_7_chips', JSON.stringify(chips));
    }

    function exportCSV() {
        let csvContent = "\ufeff" + memos.map(m => m.text).join('\n');
        const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob); link.download = `memo_backup.csv`; link.click();
    }

    function importCSV() {
        const input = document.createElement('input');
        input.type = 'file';
        input.onchange = e => {
            const reader = new FileReader();
            reader.onload = f => {
                const text = f.target.result.replace(/^\ufeff/, "");
                text.split('\n').forEach(l => {
                    if(l.trim()) memos.push({ id: Date.now() + Math.random(), text: l.trim() });
                });
                updateStorage(); renderMemos();
            };
            reader.readAsText(e.target.files[0], "UTF-8");
        };
        input.click();
    }

    function clearAll() { if(confirm("전체 삭제?")) { memos = []; updateStorage(); renderMemos(); } }

    function getChosung(str) {
        const cho = ["ㄱ","ㄲ","ㄴ","ㄷ","ㄸ","ㄹ","ㅁ","ㅂ","ㅃ","ㅅ","ㅆ","ㅇ","ㅈ","ㅉ","ㅊ","ㅋ","ㅌ","ㅍ","ㅎ"];
        let result = "";
        for(let i=0; i<str.length; i++) {
            let code = str.charCodeAt(i) - 44032;
            if(code > -1 && code < 11172) result += cho[Math.floor(code/588)];
            else result += str.charAt(i);
        }
        return result;
    }

    // 서비스 워커 등록 (인라인 방식)
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            const blob = new Blob(['self.addEventListener("fetch", (e) => {});'], { type: 'text/javascript' });
            const url = URL.createObjectURL(blob);
            navigator.serviceWorker.register(url);
        });
    }

    mainInput.addEventListener('input', renderMemos);
    mainInput.addEventListener('keypress', e => { if(e.key === 'Enter') saveMemo(); });

    renderChips(); renderMemos();
</script>
</body>
</html>
