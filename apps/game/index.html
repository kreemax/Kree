<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>4대 클래스 시스템: 갈고리 탱커 추가</title>
    <style>
        :root { --panel-bg: #2c3e50; --warrior: #e67e22; --archer: #3498db; --mage: #9b59b6; --tank: #f1c40f; }
        * { box-sizing: border-box; }
        body { margin: 0; background: #1a1a1a; color: white; font-family: sans-serif; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        #top-interface { 
            background: var(--panel-bg); 
            padding: 15px; 
            border-bottom: 2px solid #444; 
            flex-shrink: 0; 
            z-index: 1000;
            text-align: center;
            position: relative;
        }
        .class-btn { 
            padding: 10px 18px; 
            font-size: 14px; 
            font-weight: bold; 
            border: none; 
            border-radius: 5px; 
            cursor: pointer; 
            margin: 0 5px; 
            transition: 0.2s; 
            color: white;
            display: inline-block;
        }
        .btn-warrior { background: var(--warrior); }
        .btn-archer { background: var(--archer); }
        .btn-mage { background: var(--mage); }
        .btn-tank { background: var(--tank); color: #333; }
        .class-btn:hover { transform: translateY(-2px); opacity: 1; }
        .class-btn:active { transform: translateY(2px); opacity: 0.8; }

        #game-viewport { flex-grow: 1; overflow-y: auto; background: #1a1a1a; }
        .zone-container { border-bottom: 5px solid #444; background: #2c3e50; position: relative; }
        canvas { display: block; margin: 0 auto; }
        .zone-label { position: absolute; top: 10px; right: 20px; color: rgba(255,255,255,0.2); font-weight: bold; pointer-events: none; }
    </style>
</head>
<body>

<div id="top-interface">
    <button class="btn-warrior class-btn" onclick="spawnUnit('warrior')">⚔️ 검사</button>
    <button class="btn-archer class-btn" onclick="spawnUnit('archer')">🏹 궁수</button>
    <button class="btn-mage class-btn" onclick="spawnUnit('mage')">🔮 법사</button>
    <button class="btn-tank class-btn" onclick="spawnUnit('tank')">⛓️ 탱커</button>
    <div style="font-size: 11px; color: #ccc; margin-top: 8px;">탱커: 갈고리로 적을 끌어당겨 아군에게 배달합니다.</div>
</div>

<div id="game-viewport">
    <div id="game-worlds"></div>
</div>

<script>
const VIEW_WIDTH = 800;
const SAFE_ZONE_HEIGHT = 120;
let zones = [];

// 캐릭터 그리기 함수들
function drawWarrior(ctx, x, y, color) {
    // 검사: 검과 방패를 든 모습
    ctx.save();
    ctx.translate(x, y);
    
    // 몸 (상체)
    ctx.fillStyle = '#8B4513';
    ctx.fillRect(-8, -12, 16, 14);
    
    // 머리
    ctx.fillStyle = '#D4A574';
    ctx.beginPath();
    ctx.arc(0, -15, 6, 0, Math.PI * 2);
    ctx.fill();
    
    // 검
    ctx.strokeStyle = '#C0C0C0';
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(8, -8);
    ctx.lineTo(12, -20);
    ctx.stroke();
    
    // 검의 손잡이
    ctx.fillStyle = '#8B4513';
    ctx.beginPath();
    ctx.arc(8.5, -5, 2, 0, Math.PI * 2);
    ctx.fill();
    
    // 방패
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.ellipse(-8, 0, 5, 7, 0, 0, Math.PI * 2);
    ctx.fill();
    
    // 다리
    ctx.strokeStyle = '#8B4513';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(-4, 2);
    ctx.lineTo(-4, 8);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(4, 2);
    ctx.lineTo(4, 8);
    ctx.stroke();
    
    ctx.restore();
}

function drawArcher(ctx, x, y, color) {
    // 궁수: 활을 든 모습
    ctx.save();
    ctx.translate(x, y);
    
    // 몸 (상체)
    ctx.fillStyle = '#2F4F4F';
    ctx.fillRect(-8, -12, 16, 14);
    
    // 머리
    ctx.fillStyle = '#D4A574';
    ctx.beginPath();
    ctx.arc(0, -15, 6, 0, Math.PI * 2);
    ctx.fill();
    
    // 활
    ctx.strokeStyle = color;
    ctx.lineWidth = 2.5;
    ctx.beginPath();
    ctx.arc(8, -3, 8, Math.PI * 0.3, Math.PI * 1.7, false);
    ctx.stroke();
    
    // 활의 현
    ctx.strokeStyle = '#FFD700';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(10, -10);
    ctx.lineTo(10, 5);
    ctx.stroke();
    
    // 화살
    ctx.fillStyle = '#8B4513';
    ctx.beginPath();
    ctx.moveTo(8, -1);
    ctx.lineTo(12, -1);
    ctx.lineTo(14, -2);
    ctx.lineTo(12, 0);
    ctx.closePath();
    ctx.fill();
    
    // 다리
    ctx.strokeStyle = '#2F4F4F';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(-4, 2);
    ctx.lineTo(-4, 8);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(4, 2);
    ctx.lineTo(4, 8);
    ctx.stroke();
    
    ctx.restore();
}

function drawMage(ctx, x, y, color) {
    // 법사: 지팡이와 마법진을 든 모습
    ctx.save();
    ctx.translate(x, y);
    
    // 로브 (몸)
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.moveTo(-8, -12);
    ctx.lineTo(8, -12);
    ctx.lineTo(10, 2);
    ctx.lineTo(-10, 2);
    ctx.closePath();
    ctx.fill();
    
    // 머리
    ctx.fillStyle = '#D4A574';
    ctx.beginPath();
    ctx.arc(0, -15, 6, 0, Math.PI * 2);
    ctx.fill();
    
    // 지팡이
    ctx.strokeStyle = '#8B4513';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(8, -10);
    ctx.lineTo(12, -25);
    ctx.stroke();
    
    // 지팡이 구슬
    ctx.fillStyle = '#FF00FF';
    ctx.beginPath();
    ctx.arc(12, -26, 3, 0, Math.PI * 2);
    ctx.fill();
    
    // 구슬 주변 마법진
    ctx.strokeStyle = '#FF00FF';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.arc(12, -26, 5, 0, Math.PI * 2);
    ctx.stroke();
    
    // 다리
    ctx.strokeStyle = '#666';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(-4, 2);
    ctx.lineTo(-4, 8);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(4, 2);
    ctx.lineTo(4, 8);
    ctx.stroke();
    
    ctx.restore();
}

function drawTank(ctx, x, y, color) {
    // 탱커: 방패와 갈고리 창
    ctx.save();
    ctx.translate(x, y);
    
    // 갑옷 (몸)
    ctx.fillStyle = '#4A4A4A';
    ctx.fillRect(-10, -12, 20, 16);
    
    // 갑옷 라인
    ctx.strokeStyle = '#888';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(-10, -6);
    ctx.lineTo(10, -6);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(-10, 0);
    ctx.lineTo(10, 0);
    ctx.stroke();
    
    // 머리 (헬멧)
    ctx.fillStyle = '#666';
    ctx.beginPath();
    ctx.arc(0, -16, 7, 0, Math.PI * 2);
    ctx.fill();
    
    // 헬멧 앞부분
    ctx.fillStyle = '#888';
    ctx.fillRect(-4, -15, 8, 3);
    
    // 큰 방패
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.ellipse(-10, -2, 6, 10, 0, 0, Math.PI * 2);
    ctx.fill();
    
    // 방패 테두리
    ctx.strokeStyle = '#FF8C00';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.ellipse(-10, -2, 6, 10, 0, 0, Math.PI * 2);
    ctx.stroke();
    
    // 갈고리 창
    ctx.strokeStyle = '#FFD700';
    ctx.lineWidth = 2.5;
    ctx.beginPath();
    ctx.moveTo(8, 2);
    ctx.lineTo(8, -20);
    ctx.stroke();
    
    // 갈고리
    ctx.strokeStyle = '#FFD700';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(8, -20, 4, 0, Math.PI, false);
    ctx.stroke();
    
    // 다리
    ctx.strokeStyle = '#4A4A4A';
    ctx.lineWidth = 2.5;
    ctx.beginPath();
    ctx.moveTo(-5, 4);
    ctx.lineTo(-5, 10);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(5, 4);
    ctx.lineTo(5, 10);
    ctx.stroke();
    
    ctx.restore();
}

function drawEnemy(ctx, x, y) {
    // 적: 빨간 악마 같은 모습
    ctx.save();
    ctx.translate(x, y);
    
    // 몸
    ctx.fillStyle = '#8B0000';
    ctx.beginPath();
    ctx.ellipse(0, 0, 7, 10, 0, 0, Math.PI * 2);
    ctx.fill();
    
    // 머리
    ctx.fillStyle = '#B22222';
    ctx.beginPath();
    ctx.arc(0, -14, 6, 0, Math.PI * 2);
    ctx.fill();
    
    // 뿔
    ctx.fillStyle = '#696969';
    ctx.beginPath();
    ctx.moveTo(-4, -19);
    ctx.lineTo(-6, -24);
    ctx.lineTo(-3, -20);
    ctx.closePath();
    ctx.fill();
    
    ctx.beginPath();
    ctx.moveTo(4, -19);
    ctx.lineTo(6, -24);
    ctx.lineTo(3, -20);
    ctx.closePath();
    ctx.fill();
    
    // 눈
    ctx.fillStyle = '#FFD700';
    ctx.beginPath();
    ctx.arc(-2, -15, 1.5, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(2, -15, 1.5, 0, Math.PI * 2);
    ctx.fill();
    
    // 다리
    ctx.strokeStyle = '#8B0000';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(-4, 8);
    ctx.lineTo(-4, 14);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(4, 8);
    ctx.lineTo(4, 14);
    ctx.stroke();
    
    ctx.restore();
}

class Entity {
    constructor(x, y, type, subType) {
        this.x = x; this.y = y; this.r = 15;
        this.type = type;
        this.subType = subType;
        
        if (subType === 'warrior') {
            this.name = "검사"; this.color = "#e67e22";
            this.maxHp = 350; this.maxEnergy = 100;
            this.moveSpeed = 2.8; this.atkDist = 60; this.atkSpeed = 1.2;
        } else if (subType === 'archer') {
            this.name = "궁수"; this.color = "#3498db";
            this.maxHp = 150; this.maxEnergy = 120;
            this.moveSpeed = 2.3; this.atkDist = 300; this.atkSpeed = 1.6;
        } else if (subType === 'mage') {
            this.name = "법사"; this.color = "#9b59b6";
            this.maxHp = 120; this.maxEnergy = 150;
            this.moveSpeed = 1.8; this.atkDist = 350; this.atkSpeed = 0.5;
        } else if (subType === 'tank') {
            this.name = "탱커"; this.color = "#f1c40f";
            this.maxHp = 500; this.maxEnergy = 100;
            this.moveSpeed = 2.2; this.atkDist = 380; this.atkSpeed = 0.6; // 개선된 탱커
        } else {
            this.name = ""; this.color = "#e74c3c";
            this.maxHp = 100; this.maxEnergy = 100;
            this.moveSpeed = 1.2; this.atkDist = 150; this.atkSpeed = 0.8;
        }

        this.hp = this.maxHp;
        this.energy = this.maxEnergy;
        this.stunUntil = 0;
        this.lastAtkTime = 0;
        this.atkEffectTimer = 0;
    }

    draw(ctx) {
        if (this.hp <= 0) return;
        
        const bx = this.x - 25;
        ctx.fillStyle = '#111'; ctx.fillRect(bx, this.y+20, 50, 5);
        ctx.fillStyle = '#2ecc71'; ctx.fillRect(bx, this.y+20, 50 * (this.hp/this.maxHp), 5);
        ctx.fillStyle = '#111'; ctx.fillRect(bx, this.y+27, 50, 4);
        ctx.fillStyle = '#3498db'; ctx.fillRect(bx, this.y+27, 50 * (this.energy/this.maxEnergy), 4);
        
        if (this.atkEffectTimer > 0) {
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.atkDist, 0, Math.PI*2);
            ctx.strokeStyle = `rgba(255, 255, 255, ${this.atkEffectTimer/10})`;
            ctx.stroke();
            this.atkEffectTimer--;
        }

        if (this.type === 'char') {
            // 플레이어 캐릭터 그리기
            if (this.subType === 'warrior') {
                drawWarrior(ctx, this.x, this.y, this.color);
            } else if (this.subType === 'archer') {
                drawArcher(ctx, this.x, this.y, this.color);
            } else if (this.subType === 'mage') {
                drawMage(ctx, this.x, this.y, this.color);
            } else if (this.subType === 'tank') {
                drawTank(ctx, this.x, this.y, this.color);
            }
            
            ctx.fillStyle = "white"; 
            ctx.font = "bold 10px Arial"; ctx.textAlign = "center";
            ctx.fillText(this.name, this.x, this.y + 45);
        } else {
            // 적 캐릭터 그리기
            drawEnemy(ctx, this.x, this.y);
        }
    }

    update(enemies, delta, hLimit, zone) {
        const now = Date.now();
        this.hp = Math.min(this.maxHp, this.hp + (this.maxHp * 0.01 * delta));
        this.energy = Math.min(this.maxEnergy, this.energy + (this.maxEnergy * 0.01 * delta));

        if (now < this.stunUntil) return;

        const targets = enemies.filter(e => e.hp > 0 && !(this.type === 'mon' && e.y < SAFE_ZONE_HEIGHT));
        const nearest = this.findNearest(targets);

        if (this.type === 'char') {
            if (this.subType === 'warrior') {
                if (nearest) {
                    const angle = Math.atan2(nearest.y - this.y, nearest.x - this.x);
                    // 사거리의 80% 지점까지만 접근
                    if (this.dist(nearest) > this.atkDist * 0.7) {
                        this.x += Math.cos(angle) * this.moveSpeed; this.y += Math.sin(angle) * this.moveSpeed;
                    }
                } else { this.y += this.moveSpeed * 0.5; }
            } else if (this.subType === 'tank') {
                // 탱커: 적정 거리 유지하며 접근
                if (nearest) {
                    const dist = this.dist(nearest);
                    const targetDist = this.atkDist * 0.6; // 갈고리 사거리의 60% 지점에서 유지
                    
                    if (dist > targetDist) {
                        const angle = Math.atan2(nearest.y - this.y, nearest.x - this.x);
                        this.x += Math.cos(angle) * this.moveSpeed; this.y += Math.sin(angle) * this.moveSpeed;
                    } else if (dist < targetDist * 0.8) {
                        // 너무 가까우면 후퇴
                        const angle = Math.atan2(nearest.y - this.y, nearest.x - this.x);
                        this.x -= Math.cos(angle) * this.moveSpeed * 0.5; this.y -= Math.sin(angle) * this.moveSpeed * 0.5;
                    }
                } else { this.y += this.moveSpeed * 0.5; }
            } else {
                if (nearest && this.dist(nearest) < this.atkDist * 0.6) {
                    const angle = Math.atan2(this.y - nearest.y, this.x - nearest.x);
                    this.x += Math.cos(angle) * this.moveSpeed; this.y += Math.sin(angle) * this.moveSpeed;
                } else { this.y += this.moveSpeed * 0.3; }
            }
        } else {
            if (nearest && this.dist(nearest) < 300) {
                const a = Math.atan2(nearest.y - this.y, nearest.x - this.x);
                this.x += Math.cos(a) * this.moveSpeed; this.y += Math.sin(a) * this.moveSpeed;
            } else { this.y += 0.3; }
            if (this.y < SAFE_ZONE_HEIGHT + 20) this.y = SAFE_ZONE_HEIGHT + 20;
        }

        this.x = Math.max(15, Math.min(VIEW_WIDTH-15, this.x));
        this.y = Math.max(15, Math.min(hLimit+50, this.y));

        if (this.y > SAFE_ZONE_HEIGHT && nearest) {
            const cost = this.maxEnergy * 0.05;
            if (this.dist(nearest) <= this.atkDist && now - this.lastAtkTime > 1000/this.atkSpeed) {
                if (this.energy >= cost) {
                    this.energy -= cost;
                    this.lastAtkTime = now;
                    const dmg = this.maxEnergy * 0.05;

                    if (this.subType === 'warrior') {
                        this.atkEffectTimer = 10;
                        targets.forEach(t => { if (this.dist(t) <= this.atkDist + 10) t.takeDamage(dmg, this.x, this.y); });
                    } else if (this.subType === 'mage') {
                        zone.projectiles.push(new Projectile(this.x, this.y, nearest, this.atkDist, dmg * 2, 6, 'mage', 60)); 
                    } else if (this.subType === 'tank') {
                        // 탱커: 갈고리 발사 (개선된 데미지와 속도)
                        zone.projectiles.push(new Projectile(this.x, this.y, nearest, this.atkDist, 8, 18, 'hook', 10, this));
                    } else {
                        zone.projectiles.push(new Projectile(this.x, this.y, nearest, this.atkDist, dmg, 14, this.type, 10));
                    }
                }
            }
        }
    }

    dist(t) { return Math.sqrt((this.x-t.x)**2+(this.y-t.y)**2); }
    findNearest(ts) {
        let n = null, d = Infinity;
        ts.forEach(t => { const dist = this.dist(t); if(dist < d) { d = dist; n = t; } });
        return n;
    }
    takeDamage(dmg, sx, sy) {
        this.hp -= dmg; this.stunUntil = Date.now() + 150;
        const a = Math.atan2(this.y-sy, this.x-sx);
        this.x += Math.cos(a)*15; this.y += Math.sin(a)*15;
    }
}

class Projectile {
    constructor(x, y, target, md, dmg, spd, st, range, owner = null) {
        this.x = x; this.y = y; this.sx = x; this.sy = y;
        this.md = md; this.dmg = dmg; this.st = st;
        this.dead = false; this.speed = spd; this.range = range;
        this.owner = owner; // 갈고리를 던진 본인
        const a = Math.atan2(target.y - y, target.x - x);
        this.vx = Math.cos(a)*this.speed; this.vy = Math.sin(a)*this.speed;
        this.explosionTimer = 0;
    }
    update(ts) {
        if (this.explosionTimer > 0) { this.explosionTimer--; if(this.explosionTimer <= 0) this.dead = true; return; }
        this.x += this.vx; this.y += this.vy;
        
        let hit = ts.find(t => t.hp > 0 && Math.sqrt((this.x-t.x)**2+(this.y-t.y)**2) < 20);
        if (hit || Math.sqrt((this.x-this.sx)**2+(this.y-this.sy)**2) > this.md) {
            if (this.st === 'hook' && hit) {
                // 갈고리 로직: 적을 끌어당김
                hit.x = this.owner.x + (this.vx > 0 ? -35 : 35);
                hit.y = this.owner.y + (this.vy > 0 ? -35 : 35);
                hit.takeDamage(this.dmg, this.owner.x, this.owner.y);
                hit.stunUntil = Date.now() + 600; // 끌려오면 잠시 기절
                this.dead = true;
            } else {
                this.explode(ts);
            }
        }
    }
    explode(ts) {
        ts.forEach(t => {
            if (t.hp > 0 && Math.sqrt((this.x-t.x)**2+(this.y-t.y)**2) <= this.range) {
                t.takeDamage(this.dmg, this.x, this.y);
            }
        });
        this.explosionTimer = 15;
    }
    draw(ctx) {
        if (this.st === 'hook') {
            // 사슬 그리기
            ctx.beginPath();
            ctx.moveTo(this.sx, this.sy);
            ctx.lineTo(this.x, this.y);
            ctx.strokeStyle = "#f1c40f";
            ctx.lineWidth = 2;
            ctx.setLineDash([5, 5]);
            ctx.stroke();
            ctx.setLineDash([]);
            // 갈고리 머리
            ctx.fillStyle = "#f1c40f";
            ctx.fillRect(this.x-5, this.y-5, 10, 10);
            return;
        }
        if (this.explosionTimer > 0) {
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.range * (1 - this.explosionTimer/15), 0, Math.PI*2);
            ctx.fillStyle = this.st === 'mage' ? `rgba(155, 89, 182, 0.5)` : `rgba(255, 255, 255, 0.5)`;
            ctx.fill();
            return;
        }
        ctx.fillStyle = (this.st === 'mage') ? "#9b59b6" : (this.st === 'char' ? "#3498db" : "#e74c3c");
        ctx.beginPath(); 
        ctx.arc(this.x, this.y, (this.st === 'mage' ? 8 : 3), 0, Math.PI*2); 
        ctx.fill();
    }
}

class Zone {
    constructor(stageNum) {
        this.stageNum = stageNum;
        this.height = 1000;
        this.container = document.createElement('div');
        this.container.className = 'zone-container';
        this.container.innerHTML = `<div class="zone-label">ZONE ${stageNum}</div>`;
        this.canvas = document.createElement('canvas');
        this.canvas.width = VIEW_WIDTH; this.canvas.height = this.height;
        this.ctx = this.canvas.getContext('2d');
        this.container.appendChild(this.canvas);
        document.getElementById('game-worlds').appendChild(this.container);
        this.characters = []; this.monsters = []; this.projectiles = [];
        this.initMap();
    }
    initMap() {
        for(let i=0; i < 5 + this.stageNum; i++) {
            this.monsters.push(new Entity(Math.random()*VIEW_WIDTH, 400 + Math.random()*500, 'mon', 'enemy'));
        }
    }
    update() {
        this.characters.forEach((c, idx) => {
            if (c.hp > 0) {
                c.update(this.monsters, 0.1, this.height, this);
                if (c.y > this.height - 20) { moveToNextZone(this.stageNum, c); this.characters.splice(idx, 1); }
            }
        });
        this.monsters.forEach(m => { if (m.hp > 0) m.update(this.characters, 0.1, this.height, this); });
        this.projectiles = this.projectiles.filter(p => !p.dead);
        this.projectiles.forEach(p => p.update(p.st === 'mon' ? this.characters : this.monsters));
        this.draw();
    }
    draw() {
        this.ctx.clearRect(0, 0, VIEW_WIDTH, this.height);
        this.ctx.fillStyle = "rgba(46, 204, 113, 0.05)"; this.ctx.fillRect(0, 0, VIEW_WIDTH, SAFE_ZONE_HEIGHT);
        this.characters.forEach(c => c.draw(this.ctx));
        this.monsters.forEach(m => m.draw(this.ctx));
        this.projectiles.forEach(p => p.draw(this.ctx));
    }
}

function spawnUnit(subType) {
    zones[0].characters.push(new Entity(100 + Math.random()*600, 60, 'char', subType));
}

function moveToNextZone(stageNum, character) {
    character.y = 50;
    let nextZone = zones.find(z => z.stageNum === stageNum + 1);
    if (!nextZone) { nextZone = new Zone(stageNum + 1); zones.push(nextZone); }
    nextZone.characters.push(character);
}

zones.push(new Zone(1));
function mainLoop() { zones.forEach(z => z.update()); requestAnimationFrame(mainLoop); }
mainLoop();
</script>
</body>
</html>
