<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mini First Queen - Full Combat System</title>
    <style>
        body { margin: 0; padding: 0; background: #222; color: #fff; font-family: sans-serif; overflow: hidden; touch-action: none; }
        .screen { display: none; width: 100vw; height: 100vh; flex-direction: column; }
        .active { display: flex; }
        button { margin: 5px; padding: 10px; cursor: pointer; background: #444; color: white; border: 1px solid #777; border-radius: 4px; }
        
        /* 대기방 및 메뉴 */
        #top-menu { display: flex; background: #111; padding: 5px; border-bottom: 2px solid #555; }
        .zone { position: relative; flex: 1; border: 1px solid #444; overflow: hidden; }
        #waiting-zone { background: #2a2a2a; }
        #battle-zone { background: #2d352d; border-top: 4px double #666; }
        
        .unit { position: absolute; width: 60px; height: 60px; display: flex; flex-direction: column; justify-content: center; align-items: center; cursor: pointer; z-index: 10; touch-action: none; }
        .unit-symbol { font-size: 30px; font-weight: bold; pointer-events: none; }
        .unit-label { font-size: 11px; margin-top: 2px; pointer-events: none; background: rgba(0,0,0,0.6); padding: 0 4px; border-radius: 3px; }

        /* 전투 필드 */
        #combat-field { position: relative; width: 100%; background: #1a1a1a; overflow: hidden; flex: 1; }
        .combat-unit { position: absolute; width: 30px; height: 30px; display: flex; justify-content: center; align-items: center; font-weight: bold; z-index: 5; }
        .hp-bar { position: absolute; top: -10px; left: 0; width: 100%; height: 4px; background: #500; }
        .hp-inner { height: 100%; background: #0f0; width: 100%; }

        /* 투사체 */
        .projectile { position: absolute; border-radius: 50%; z-index: 6; pointer-events: none; }
        .arrow { width: 6px; height: 2px; background: #fff; box-shadow: 0 0 3px #fff; }
        .magic-ball { width: 12px; height: 12px; background: #55f; box-shadow: 0 0 10px #aaf; }

        /* 이펙트 */
        .attack-radial { position: absolute; border-radius: 50%; pointer-events: none; transform: translate(-50%, -50%); z-index: 2; mask: radial-gradient(transparent 55%, black 60%); -webkit-mask: radial-gradient(transparent 55%, black 60%); }
        .explosion { position: absolute; border-radius: 50%; pointer-events: none; transform: translate(-50%, -50%); z-index: 2; animation: boom 0.3s ease-out forwards; }
        @keyframes boom { 0% { transform: translate(-50%, -50%) scale(0.1); opacity: 1; } 100% { transform: translate(-50%, -50%) scale(1.5); opacity: 0; } }

        #info-panel { height: 100px; background: #111; display: grid; grid-template-columns: repeat(10, 1fr); gap: 2px; padding: 4px; }
        .info-slot { background: #222; border: 1px solid #333; font-size: 8px; display: flex; flex-direction: column; justify-content: center; align-items: center; color: #444; }
        .info-slot.active { color: #fff; border-color: #4a4; }
    </style>
</head>
<body>

    <div id="login-screen" class="screen active" style="justify-content: center; align-items: center;">
        <h2 style="color:#d4af37">FIRST QUEEN MINI</h2>
        <button onclick="changeScreen('waiting-room')" style="padding:15px 30px; background:#d4af37; color:black; font-weight:bold;">게임 입장</button>
    </div>

    <div id="waiting-room" class="screen">
        <div id="top-menu">
            <button onclick="alert('캐릭터 정보를 불러오는 중...')">캐릭터정보</button>
            <button id="stage-btn" onclick="startCombat()" style="background: #822; font-weight: bold;">전투 시작!</button>
        </div>
        <div id="waiting-zone" class="zone"></div>
        <div id="battle-zone" class="zone"></div>
        <div id="info-panel"></div>
    </div>

    <div id="combat-screen" class="screen">
        <div style="padding: 10px; display: flex; justify-content: space-between; background: #000; height: 40px; z-index: 20;">
            <span id="stage-title">BATTLE IN PROGRESS</span>
            <button onclick="endCombat()" style="margin:0; padding:2px 10px;">퇴각하기</button>
        </div>
        <div id="combat-field"></div>
    </div>

<script>
    // 1. 유닛 기본 데이터 설정
    const heroTemplates = [
        { id: 0, name: "궁수", symbol: "▷", job: "궁수", hp: 100, atk: 7, range: 250, area: 15, moveSpd: 1.6, atkSpd: 1.5, pCount: 1, pSpeed: 10 },
        { id: 1, name: "전사", symbol: "□", job: "전사", hp: 200, atk: 12, range: 40, area: 80, moveSpd: 2.1, atkSpd: 1.1 },
        { id: 2, name: "마법사", symbol: "＠", job: "마법사", hp: 80, atk: 18, range: 200, area: 90, moveSpd: 1.1, atkSpd: 0.6, pCount: 1, pSpeed: 5 }
    ];

    let myHeroes = heroTemplates.map((h, i) => ({...h, status: 'waiting', deployTime: 0, x: 20 + (i * 80), y: 40}));
    let combatActive = false;
    let allies = [], enemies = [], projectiles = [];

    // 2. 화면 전환 로직
    function changeScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(id === 'waiting-room') initWaitingRoom();
    }

    // 3. 대기실 초기화 및 드래그 설정
    function initWaitingRoom() {
        const wz = document.getElementById('waiting-zone');
        const bz = document.getElementById('battle-zone');
        wz.innerHTML = ''; bz.innerHTML = '';
        myHeroes.forEach((hero) => {
            const el = document.createElement('div');
            el.className = 'unit'; el.id = `hero-${hero.id}`;
            el.style.left = hero.x + 'px'; el.style.top = hero.y + 'px';
            el.innerHTML = `<div class="unit-symbol" style="color:${getColor(hero.job)}">${hero.symbol}</div><div class="unit-label">${hero.name}</div>`;
            (hero.status === 'waiting' ? wz : bz).appendChild(el);
            makeDraggable(el, hero);
        });
        updateInfoPanel();
    }

    // 4. 전투 시각 효과 함수
    function createRadialEffect(x, y, radius, color) {
        const effect = document.createElement('div');
        effect.className = 'attack-radial';
        effect.style.width = (radius * 2) + 'px'; effect.style.height = (radius * 2) + 'px';
        effect.style.left = x + 'px'; effect.style.top = y + 'px';
        document.getElementById('combat-field').appendChild(effect);
        let progress = 0;
        function draw() {
            progress += 10;
            effect.style.background = `conic-gradient(from 0deg, ${color} ${progress}%, transparent ${progress}%)`;
            if (progress < 100) requestAnimationFrame(draw); else setTimeout(() => effect.remove(), 50);
        }
        draw();
    }

    function createExplosion(x, y, radius, color) {
        const exp = document.createElement('div');
        exp.className = 'explosion';
        exp.style.width = (radius * 2) + 'px'; exp.style.height = (radius * 2) + 'px';
        exp.style.left = x + 'px'; exp.style.top = y + 'px';
        exp.style.backgroundColor = color;
        document.getElementById('combat-field').appendChild(exp);
        setTimeout(() => exp.remove(), 300);
    }

    // 5. 전투 시작 및 루프
    function startCombat() {
        const deployed = myHeroes.filter(h => h.status === 'battle');
        if(deployed.length === 0) return alert("출전 부대에 캐릭터를 배치해주세요.");
        
        changeScreen('combat-screen');
        const field = document.getElementById('combat-field');
        field.innerHTML = ''; allies = []; enemies = []; projectiles = [];

        deployed.forEach((h, i) => {
            const obj = { ...h, x: (window.innerWidth/(deployed.length+1))*(i+1), y: field.offsetHeight - 80, curHp: h.hp, lastAtk: 0, type: 'hero' };
            obj.el = createCombatEl(obj);
            allies.push(obj);
        });

        for(let i=0; i<10; i++) {
            const m = { symbol: "㉾", hp: 100, curHp: 100, atk: 6, range: 40, area: 40, moveSpd: 1.3, atkSpd: 0.8, x: Math.random()*(window.innerWidth-40), y: Math.random()*200, lastAtk: 0, type: 'enemy' };
            m.el = createCombatEl(m);
            enemies.push(m);
        }
        combatActive = true;
        requestAnimationFrame(combatLoop);
    }

    function createCombatEl(u) {
        const el = document.createElement('div');
        el.className = 'combat-unit'; el.innerText = u.symbol;
        el.style.color = u.type === 'hero' ? getColor(u.job) : '#f0f';
        el.innerHTML += `<div class="hp-bar"><div class="hp-inner"></div></div>`;
        document.getElementById('combat-field').appendChild(el);
        return el;
    }

    function combatLoop() {
        if(!combatActive) return;
        processAI(allies, enemies);
        processAI(enemies, allies);
        processProjectiles();
        
        if(allies.length === 0 || enemies.length === 0) {
            combatActive = false;
            alert(allies.length > 0 ? "승리!" : "패배...");
            endCombat();
        } else requestAnimationFrame(combatLoop);
    }

    // 6. 핵심 AI 로직 (뒷걸음질 포함)
    function processAI(sources, targets) {
        sources.forEach(u => {
            let closest = null, minDist = 9999;
            targets.forEach(t => {
                const d = Math.hypot(t.x - u.x, t.y - u.y);
                if(d < minDist) { minDist = d; closest = t; }
            });
            if(!closest) return;

            const angle = Math.atan2(closest.y - u.y, closest.x - u.x);

            // 원거리 유닛 카이팅 (뒤로 빠지기)
            if((u.job === '궁수' || u.job === '마법사') && u.type === 'hero') {
                const safeDistance = u.range * 0.7; 
                if (minDist < safeDistance) {
                    u.x -= Math.cos(angle) * u.moveSpd;
                    u.y -= Math.sin(angle) * u.moveSpd;
                } else if (minDist > u.range) {
                    u.x += Math.cos(angle) * u.moveSpd;
                    u.y += Math.sin(angle) * u.moveSpd;
                }
            } else {
                if(minDist > u.range) {
                    u.x += Math.cos(angle) * u.moveSpd;
                    u.y += Math.sin(angle) * u.moveSpd;
                }
            }

            // 공격 실행
            if (minDist <= u.range && Date.now() - u.lastAtk > 1000 / u.atkSpd) {
                u.lastAtk = Date.now();
                if(u.job === '전사' || u.type === 'enemy') {
                    const color = u.type === 'hero' ? getColor(u.job) : 'rgba(255,0,255,0.4)';
                    createRadialEffect(u.x + 15, u.y + 15, u.area, color);
                    applyAreaDamage(u.x, u.y, u.area, u.atk, targets);
                } else {
                    fireProjectile(u, angle);
                }
            }

            // 필드 경계 제한
            const field = document.getElementById('combat-field');
            u.x = Math.max(0, Math.min(window.innerWidth - 30, u.x));
            u.y = Math.max(0, Math.min(field.offsetHeight - 30, u.y));

            u.el.style.left = u.x + 'px'; u.el.style.top = u.y + 'px';
            u.el.querySelector('.hp-inner').style.width = (u.curHp/u.hp)*100 + '%';
        });

        for(let i=targets.length-1; i>=0; i--) { 
            if(targets[i].curHp <= 0) { 
                targets[i].el.remove(); targets.splice(i, 1); 
            } 
        }
    }

    // 7. 투사체 시스템
    function fireProjectile(owner, angle) {
        const pEl = document.createElement('div');
        pEl.className = 'projectile ' + (owner.job === '궁수' ? 'arrow' : 'magic-ball');
        document.getElementById('combat-field').appendChild(pEl);
        projectiles.push({
            el: pEl, x: owner.x + 15, y: owner.y + 15,
            angle: angle, speed: owner.pSpeed,
            atk: owner.atk, area: owner.area,
            maxDist: owner.range, traveled: 0,
            job: owner.job, targets: owner.type === 'hero' ? enemies : allies
        });
    }

    function processProjectiles() {
        for(let i = projectiles.length - 1; i >= 0; i--) {
            const p = projectiles[i];
            p.x += Math.cos(p.angle) * p.speed;
            p.y += Math.sin(p.angle) * p.speed;
            p.traveled += p.speed;
            p.el.style.left = p.x + 'px'; p.el.style.top = p.y + 'px';

            let hitTarget = null;
            p.targets.forEach(t => {
                if(Math.hypot(t.x + 15 - p.x, t.y + 15 - p.y) < 20) hitTarget = t;
            });

            if(hitTarget || p.traveled >= p.maxDist) {
                if(p.job === '마법사') createExplosion(p.x, p.y, p.area, 'rgba(100,100,255,0.4)');
                applyAreaDamage(p.x - 15, p.y - 15, p.area, p.atk, p.targets);
                p.el.remove();
                projectiles.splice(i, 1);
            }
        }
    }

    function applyAreaDamage(x, y, area, atk, targets) {
        targets.forEach(t => {
            if(Math.hypot(t.x - x, t.y - y) <= area) t.curHp -= atk;
        });
    }

    // 8. 기타 유틸리티
    function endCombat() { combatActive = false; changeScreen('waiting-room'); }
    function getColor(j) { return j==='전사'?'#ff6b6b':(j==='궁수'?'#51cf66':'#5c7cff'); }

    function makeDraggable(el, hero) {
        let isDragging = false;
        const start = (e) => { isDragging = true; el.style.zIndex = 1000; e.preventDefault(); };
        const move = (e) => {
            if (!isDragging) return;
            const cx = e.touches ? e.touches[0].clientX : e.clientX;
            const cy = e.touches ? e.touches[0].clientY : e.clientY;
            el.style.position = 'fixed'; el.style.left = (cx - 30) + 'px'; el.style.top = (cy - 30) + 'px';
        };
        const end = (e) => {
            if (!isDragging) return; isDragging = false;
            const touch = e.changedTouches ? e.changedTouches[0] : e;
            const wzRect = document.getElementById('waiting-zone').getBoundingClientRect();
            hero.status = touch.clientY > wzRect.bottom ? 'battle' : 'waiting';
            const targetZone = hero.status === 'battle' ? document.getElementById('battle-zone') : document.getElementById('waiting-zone');
            const rect = targetZone.getBoundingClientRect();
            hero.x = touch.clientX - rect.left - 30; hero.y = touch.clientY - rect.top - 30;
            hero.deployTime = (hero.status === 'battle') ? Date.now() : 0;
            initWaitingRoom();
        };
        el.addEventListener('mousedown', start); el.addEventListener('touchstart', start, {passive: false});
        window.addEventListener('mousemove', move); window.addEventListener('touchmove', move, {passive: false});
        window.addEventListener('mouseup', end); window.addEventListener('touchend', end);
    }

    function updateInfoPanel() {
        const ip = document.getElementById('info-panel'); ip.innerHTML = '';
        const deployed = myHeroes.filter(h => h.status === 'battle').sort((a,b) => a.deployTime - b.deployTime);
        for(let i=0; i<20; i++) {
            const slot = document.createElement('div');
            slot.className = 'info-slot' + (deployed[i]?' active':'');
            slot.innerHTML = deployed[i] ? `<b>${deployed[i].name}</b><br>${deployed[i].job}` : '-<br>-';
            ip.appendChild(slot);
        }
    }

    initWaitingRoom();
</script>
</body>
</html>
