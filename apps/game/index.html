<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>AI 전투 시뮬레이터 v3</title>
    <style>
        body { margin: 0; overflow: hidden; background: #1a1a1a; color: white; font-family: 'Malgun Gothic', sans-serif; }
        canvas { display: block; background: #2c3e50; margin: 0 auto; }
        #ui { position: absolute; top: 10px; left: 10px; pointer-events: none; text-shadow: 1px 1px 2px black; }
    </style>
</head>
<body>
    <div id="ui">
        <h2>전투 시뮬레이션 v3.0</h2>
        <p>기능: 넉백 시스템, 안전지대 완전회복 로직 적용</p>
    </div>
    <canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

canvas.width = window.innerWidth > 800 ? 800 : window.innerWidth;
canvas.height = 800;

const SAFE_ZONE_HEIGHT = 120;

class Entity {
    constructor(x, y, name, lv, hp, regen, energy, energyRegen, atkSpeed, moveSpeed, atkDist, atkRange, color, type) {
        this.x = x; this.y = y;
        this.name = name; this.lv = lv;
        this.maxHp = hp; this.hp = hp;
        this.regen = regen;
        this.maxEnergy = energy; this.energy = energy;
        this.energyRegen = energyRegen;
        this.atkSpeed = atkSpeed;
        this.moveSpeed = moveSpeed;
        this.atkDist = atkDist;
        this.atkRange = atkRange;
        this.color = color;
        this.type = type;
        
        this.hitRecovery = 0.3; 
        this.stunUntil = 0;
        this.lastAtkTime = 0;
        this.isRetreating = false; // 후퇴 모드 상태 변수
    }

    draw() {
        const barWidth = 50;
        const barX = this.x - barWidth / 2;
        
        // 체력바
        ctx.fillStyle = '#444';
        ctx.fillRect(barX, this.y + 25, barWidth, 6);
        ctx.fillStyle = '#2ecc71';
        ctx.fillRect(barX, this.y + 25, barWidth * (Math.max(0, this.hp) / this.maxHp), 6);

        // 에너지바
        ctx.fillStyle = '#222';
        ctx.fillRect(barX, this.y + 33, barWidth, 4);
        ctx.fillStyle = '#3498db';
        ctx.fillRect(barX, this.y + 33, barWidth * (this.energy / this.maxEnergy), 4);
        
        ctx.fillStyle = "white";
        ctx.font = "bold 11px Arial";
        ctx.textAlign = "center";
        ctx.fillText(`${this.name} (Lv.${this.lv})`, this.x, this.y + 48);

        if (Date.now() < this.stunUntil) ctx.globalAlpha = 0.4;
        ctx.fillStyle = this.color;
        if (this.type === 'char') {
            ctx.beginPath(); ctx.arc(this.x, this.y, 15, 0, Math.PI * 2); ctx.fill();
        } else {
            ctx.fillRect(this.x - 15, this.y - 15, 30, 30);
        }
        ctx.globalAlpha = 1.0;
    }

    update(enemies, delta) {
        const now = Date.now();
        
        // 자연 회복 (초당 회복력 / 10 한 값, delta가 0.1이므로)
        if (this.hp < this.maxHp) this.hp = Math.min(this.maxHp, this.hp + (this.regen * delta));
        if (this.energy < this.maxEnergy) this.energy = Math.min(this.maxEnergy, this.energy + (this.energyRegen * delta));

        if (now < this.stunUntil) return; // 경직 시 이동/공격 불가

        // 캐릭터 특수 AI: 후퇴 로직
        if (this.type === 'char') {
            if (this.hp < this.maxHp * 0.3) this.isRetreating = true; // 체력 낮으면 후퇴 시작
            if (this.isRetreating && this.hp >= this.maxHp) this.isRetreating = false; // 완치 시 다시 전장으로

            if (this.isRetreating) {
                if (this.y > 50) this.y -= this.moveSpeed;
            } else if (this.y < canvas.height - 50) {
                this.y += this.moveSpeed * 0.5; // 하단으로 진격
            }
        }

        // 몬스터 AI: 추격
        const visibleEnemies = enemies.filter(e => !(this.type === 'mon' && e.y < SAFE_ZONE_HEIGHT) && e.hp > 0);
        const target = this.findNearestTarget(visibleEnemies);

        if (this.type === 'mon' && target) {
            const dist = this.getDist(target);
            if (dist > this.atkDist * 0.8) {
                const angle = Math.atan2(target.y - this.y, target.x - this.x);
                this.x += Math.cos(angle) * this.moveSpeed;
                this.y += Math.sin(angle) * this.moveSpeed;
            }
        }

        // 공격 로직
        if (target && this.getDist(target) <= this.atkDist) {
            if (now - this.lastAtkTime > 1000 / this.atkSpeed) {
                if (this.energy >= this.maxEnergy * 0.1) {
                    this.attack(target);
                    this.lastAtkTime = now;
                }
            }
        }
    }

    getDist(target) { return Math.sqrt((this.x - target.x)**2 + (this.y - target.y)**2); }

    findNearestTarget(targets) {
        let nearest = null; let minDist = Infinity;
        targets.forEach(t => {
            let d = this.getDist(t);
            if (d < minDist) { minDist = d; nearest = t; }
        });
        return nearest;
    }

    attack(target) {
        const damage = this.maxEnergy * 0.1;
        this.energy -= damage;
        projectiles.push(new Projectile(this.x, this.y, target, this.atkDist, this.atkRange, damage, this.type === 'char' ? '●' : '■', this.type));
    }

    // 데미지 및 넉백 처리
    takeDamage(dmg, shooterX, shooterY) {
        this.hp -= dmg;
        this.stunUntil = Date.now() + (this.hitRecovery * 1000);
        
        // 넉백: 공격자 반대 방향으로 밀림
        const angle = Math.atan2(this.y - shooterY, this.x - shooterX);
        const knockbackDist = 20;
        this.x += Math.cos(angle) * knockbackDist;
        this.y += Math.sin(angle) * knockbackDist;
        
        // 화면 밖으로 나가지 않게 보정
        this.x = Math.max(20, Math.min(canvas.width - 20, this.x));
        this.y = Math.max(20, Math.min(canvas.height - 20, this.y));
    }
}

class Projectile {
    constructor(x, y, target, maxDist, range, damage, shape, shooterType) {
        this.x = x; this.y = y; this.startX = x; this.startY = y;
        this.maxDist = maxDist; this.range = range; this.damage = damage; this.shape = shape;
        this.shooterType = shooterType;
        this.speed = 8; this.dead = false;
        const angle = Math.atan2(target.y - y, target.x - x);
        this.vx = Math.cos(angle) * this.speed; this.vy = Math.sin(angle) * this.speed;
    }

    update(targets) {
        this.x += this.vx; this.y += this.vy;
        const dist = Math.sqrt((this.x - this.startX)**2 + (this.y - this.startY)**2);
        let hitTarget = targets.find(t => Math.sqrt((this.x - t.x)**2 + (this.y - t.y)**2) < 20);
        
        if (dist >= this.maxDist || hitTarget) {
            this.explode(targets);
            this.dead = true;
        }
    }

    explode(targets) {
        targets.forEach(t => {
            if (Math.sqrt((this.x - t.x)**2 + (this.y - t.y)**2) <= this.range) {
                t.takeDamage(this.damage, this.x, this.y);
            }
        });
        // 폭발 시각 효과
        ctx.beginPath(); ctx.arc(this.x, this.y, this.range, 0, Math.PI*2);
        ctx.strokeStyle = "rgba(255, 255, 255, 0.3)"; ctx.stroke();
    }

    draw() {
        ctx.fillStyle = this.shooterType === 'char' ? "#3498db" : "#e74c3c";
        ctx.font = "20px Arial";
        ctx.fillText(this.shape, this.x, this.y);
    }
}

// 요청하신 능력치 밸런스 설정 (생명력 100, 재생 1, 에너지 100, 재생 1)
const characters = [
    new Entity(200, 60, "검사", 5, 100, 1, 100, 1, 1.5, 2.0, 150, 40, "#3498db", 'char'),
    new Entity(400, 60, "술사", 5, 100, 1, 100, 1, 0.8, 1.5, 300, 80, "#9b59b6", 'char'),
    new Entity(600, 60, "궁수", 5, 100, 1, 100, 1, 2.0, 1.8, 350, 20, "#f1c40f", 'char')
];

let monsters = [];
function spawnMonster() {
    monsters.push(new Entity(
        Math.random() * canvas.width, 350 + Math.random() * 400, 
        "몹", 1, 100, 1, 100, 1, 0.7, 0.8, 120, 40, "#e74c3c", 'mon'
    ));
}
for(let i=0; i<10; i++) spawnMonster();

let projectiles = [];

function loop() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // 안전 구역 배경
    ctx.fillStyle = "rgba(46, 204, 113, 0.1)";
    ctx.fillRect(0, 0, canvas.width, SAFE_ZONE_HEIGHT);
    ctx.strokeStyle = "#2ecc71";
    ctx.strokeRect(0, 0, canvas.width, SAFE_ZONE_HEIGHT);

    // 캐릭터 및 몬스터 처리
    characters.forEach(c => { c.update(monsters, 0.1); c.draw(); });
    monsters = monsters.filter(m => m.hp > 0);
    while(monsters.length < 10) spawnMonster();
    monsters.forEach(m => { m.update(characters, 0.1); m.draw(); });

    // 투사체 처리
    projectiles = projectiles.filter(p => !p.dead);
    projectiles.forEach(p => {
        p.update(p.shooterType === 'char' ? monsters : characters);
        p.draw();
    });

    requestAnimationFrame(loop);
}

loop();
</script>
</body>
</html>
