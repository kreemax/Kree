<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mini First Queen - Stage System</title>
    <style>
        body {
            margin: 0; padding: 0; background: #222; color: #fff;
            font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
            overflow: hidden; touch-action: none;
        }
        /* 공통 버튼 스타일 */
        button { margin: 5px; padding: 10px; cursor: pointer; background: #444; color: white; border: 1px solid #777; border-radius: 4px; }
        
        /* 섹션 제어 */
        .screen { display: none; width: 100vw; height: 100vh; flex-direction: column; }
        .active { display: flex; }

        /* 대기방 스타일 (기존 유지) */
        #top-menu { display: flex; background: #111; padding: 5px; border-bottom: 2px solid #555; }
        #top-menu button { flex: 1; font-size: 11px; }
        .zone { position: relative; flex: 1; border: 1px solid #444; overflow: hidden; }
        #waiting-zone { background: #2a2a2a; }
        #battle-zone { background: #2d352d; border-top: 4px double #666; }
        
        /* 전투 필드 스타일 */
        #combat-screen { background: #1a1a1a; overflow-y: auto; overflow-x: hidden; position: relative; }
        #combat-field { position: relative; width: 100%; background: #252525; border: 2px solid #555; margin: 0 auto; }
        .combat-unit { position: absolute; width: 30px; height: 30px; display: flex; justify-content: center; align-items: center; font-weight: bold; border-radius: 50%; }

        /* 하단 정보창 */
        #info-panel { height: 100px; background: #111; display: grid; grid-template-columns: repeat(10, 1fr); gap: 2px; padding: 4px; border-top: 2px solid #555; }
        .info-slot { background: #222; border: 1px solid #333; font-size: 8px; display: flex; flex-direction: column; justify-content: center; align-items: center; color: #444; }
        .info-slot.active { color: #fff; border-color: #4a4; }

        /* 모달 */
        #modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 300; padding: 20px; }
        .modal-content { background: #333; padding: 15px; border: 2px solid #777; border-radius: 10px; max-height: 80vh; overflow-y: auto; }
    </style>
</head>
<body>

    <div id="login-screen" class="screen active" style="justify-content: center; align-items: center;">
        <h2 style="color:#d4af37">FIRST QUEEN MINI</h2>
        <input type="text" id="nickname" placeholder="닉네임 입력" style="padding:10px;">
        <button onclick="changeScreen('waiting-room')" style="width:150px; background:#d4af37; color:black;">게임 시작</button>
    </div>

    <div id="waiting-room" class="screen">
        <div id="top-menu">
            <button onclick="openCharInfo()">캐릭터정보</button>
            <button>인벤토리</button>
            <button>정보</button>
            <button id="stage-btn" onclick="startStage()" style="background: #822;">스테이지 1 진입</button>
        </div>
        <div id="waiting-zone" class="zone"></div>
        <div id="battle-zone" class="zone"></div>
        <div id="info-panel"></div>
    </div>

    <div id="combat-screen" class="screen">
        <div style="padding: 10px; display: flex; justify-content: space-between; background: #000;">
            <span id="stage-title">STAGE 1</span>
            <button onclick="changeScreen('waiting-room')" style="margin:0; padding:2px 10px;">퇴각</button>
        </div>
        <div id="combat-field"></div>
    </div>

    <div id="modal-overlay">
        <div class="modal-content">
            <div id="modal-body"></div>
            <button onclick="document.getElementById('modal-overlay').style.display='none'" style="width:100%">닫기</button>
        </div>
    </div>

<script>
    // 스테이지 데이터 생성
    const stages = [];
    for(let i=1; i<=10; i++) {
        const ratio = Math.pow(1.2, i-1);
        stages.push({
            level: i,
            height: 500 + (i-1)*50,
            monsterStat: ratio,
            monsterCount: Math.floor(10 * ratio),
            cleared: 'N'
        });
    }

    let currentStageIdx = 0;

    const unitsData = [
        { id: 1, name: "궁수", symbol: "▷", job: "궁수", lv: 1, hp: 100, atk: 5, moveSpd: 2, owned: 'Y' },
        { id: 3, name: "전사", symbol: "□", job: "전사", lv: 1, hp: 100, atk: 10, moveSpd: 3, owned: 'Y' },
        { id: 4, name: "마법사", symbol: "＠", job: "마법사", lv: 1, hp: 100, atk: 3, moveSpd: 1, owned: 'Y' }
    ];

    let myUnits = unitsData.map(u => ({...u, status: 'waiting', deployTime: 0}));

    function changeScreen(screenId) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(screenId).classList.add('active');
        if(screenId === 'waiting-room') initWaitingRoom();
    }

    function initWaitingRoom() {
        const wz = document.getElementById('waiting-zone');
        const bz = document.getElementById('battle-zone');
        const ip = document.getElementById('info-panel');
        const sBtn = document.getElementById('stage-btn');
        
        wz.innerHTML = '<span class="zone-label">대기 중</span>';
        bz.innerHTML = '<span class="zone-label">출전 부대</span>';
        ip.innerHTML = '';

        // 클리어 여부에 따른 버튼 텍스트
        sBtn.innerText = `스테이지 ${currentStageIdx + 1} 진입`;

        for(let i=0; i<20; i++) {
            const slot = document.createElement('div');
            slot.className = 'info-slot';
            slot.id = `slot-${i}`;
            slot.innerHTML = '-<br>-';
            ip.appendChild(slot);
        }

        myUnits.forEach(unit => {
            const el = document.createElement('div');
            el.className = 'unit';
            el.id = `unit-${unit.id}`;
            el.innerHTML = `<div class="unit-symbol" style="color:${getColor(unit.job)}">${unit.symbol}</div><span class="unit-label">${unit.name}</span>`;
            
            const targetZone = unit.status === 'waiting' ? wz : bz;
            el.dataset.x = Math.random() * (window.innerWidth - 50);
            el.dataset.y = Math.random() * (targetZone.offsetHeight - 50);
            targetZone.appendChild(el);
            makeDraggable(el, unit);
        });
        updateInfoPanel();
    }

    function startStage() {
        const deployed = myUnits.filter(u => u.status === 'battle');
        if(deployed.length === 0) return alert("출전 부대에 캐릭터를 최소 1명 배치해주세요!");

        const stage = stages[currentStageIdx];
        changeScreen('combat-screen');
        
        const field = document.getElementById('combat-field');
        const title = document.getElementById('stage-title');
        
        title.innerText = `STAGE ${stage.level}`;
        field.style.height = stage.height + 'px';
        field.innerHTML = '';

        // 몬스터 배치 (상단 50% 영역)
        for(let i=0; i<stage.monsterCount; i++) {
            const m = document.createElement('div');
            m.className = 'combat-unit';
            m.style.color = '#ff00ff';
            m.innerText = '㉾';
            m.style.left = Math.random() * (window.innerWidth - 40) + 'px';
            m.style.top = Math.random() * (stage.height * 0.4) + 'px';
            field.appendChild(m);
        }

        // 아군 배치 (하단 20% 영역)
        deployed.forEach((unit, idx) => {
            const u = document.createElement('div');
            u.className = 'combat-unit';
            u.style.color = getColor(unit.job);
            u.innerText = unit.symbol;
            u.style.left = (window.innerWidth / (deployed.length + 1)) * (idx + 1) - 15 + 'px';
            u.style.top = (stage.height - 60) + 'px';
            field.appendChild(u);
        });
    }

    // --- 유틸리티 함수들 ---

    function makeDraggable(el, unit) {
        let isDragging = false;
        const start = () => { isDragging = true; el.style.zIndex = 100; };
        const move = (e) => {
            if (!isDragging) return;
            const cx = e.touches ? e.touches[0].clientX : e.clientX;
            const cy = e.touches ? e.touches[0].clientY : e.clientY;
            el.style.position = 'fixed';
            el.style.left = (cx - 20) + 'px'; el.style.top = (cy - 20) + 'px';
        };
        const end = (e) => {
            if (!isDragging) return;
            isDragging = false;
            el.style.zIndex = 10; el.style.position = 'absolute';
            const cy = e.changedTouches ? e.changedTouches[0].clientY : e.clientY;
            const borderY = document.getElementById('waiting-zone').getBoundingClientRect().bottom;
            
            if (cy > borderY) {
                if(unit.status !== 'battle') unit.deployTime = Date.now();
                unit.status = 'battle';
                document.getElementById('battle-zone').appendChild(el);
                el.dataset.y = cy - borderY - 20;
            } else {
                unit.status = 'waiting'; unit.deployTime = 0;
                document.getElementById('waiting-zone').appendChild(el);
                el.dataset.y = cy - document.getElementById('waiting-zone').getBoundingClientRect().top - 20;
            }
            el.dataset.x = (e.changedTouches ? e.changedTouches[0].clientX : e.clientX) - 20;
            updateInfoPanel();
        };
        el.addEventListener('mousedown', start); el.addEventListener('touchstart', start);
        window.addEventListener('mousemove', move); window.addEventListener('touchmove', move);
        window.addEventListener('mouseup', end); window.addEventListener('touchend', end);
    }

    function updateInfoPanel() {
        const deployed = myUnits.filter(u => u.status === 'battle').sort((a, b) => a.deployTime - b.deployTime);
        for(let i=0; i<20; i++) {
            const slot = document.getElementById(`slot-${i}`);
            if(deployed[i]) {
                slot.innerHTML = `<b>${deployed[i].name}</b><br>${deployed[i].job}`;
                slot.classList.add('active');
            } else {
                slot.innerHTML = '-<br>-'; slot.classList.remove('active');
            }
        }
    }

    function getColor(job) {
        return job === '전사' ? '#ff6b6b' : (job === '궁수' ? '#51cf66' : '#5c7cff');
    }

    function openCharInfo() {
        const body = document.getElementById('modal-body');
        body.innerHTML = '<h3>보유 캐릭터 정보</h3>';
        myUnits.forEach(u => {
            body.innerHTML += `<div style="padding:5px; border-bottom:1px solid #555;">
                ${u.symbol} <b>${u.name}</b> (Lv.${u.lv}) - ATK: ${u.atk}, HP: ${u.hp}</div>`;
        });
        document.getElementById('modal-overlay').style.display = 'block';
    }

    // 대기방 배회 애니메이션
    function animate() {
        myUnits.forEach(unit => {
            const el = document.getElementById(`unit-${unit.id}`);
            if(!el || el.style.position === 'fixed' || !document.getElementById('waiting-room').classList.contains('active')) return;
            const zone = unit.status === 'battle' ? document.getElementById('battle-zone') : document.getElementById('waiting-zone');
            let x = parseFloat(el.dataset.x) || 0;
            let y = parseFloat(el.dataset.y) || 0;
            x += Math.sin(Date.now() / 3000 + unit.id) * 0.15;
            y += Math.cos(Date.now() / 3000 + unit.id) * 0.15;
            el.style.left = x + 'px'; el.style.top = y + 'px';
        });
        requestAnimationFrame(animate);
    }
    animate();
</script>
</body>
</html>
