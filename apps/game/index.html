<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mini First Queen - Joystick Control</title>
    <style>
        body { margin: 0; padding: 0; background: #222; color: #fff; font-family: sans-serif; overflow: hidden; touch-action: none; }
        .screen { display: none; width: 100vw; height: 100vh; flex-direction: column; }
        .active { display: flex; }
        button { margin: 5px; padding: 10px; cursor: pointer; background: #444; color: white; border: 1px solid #777; border-radius: 4px; }
        
        /* 대기방 영역 */
        #top-menu { display: flex; background: #111; padding: 5px; border-bottom: 2px solid #555; }
        .zone { position: relative; flex: 1; border: 1px solid #444; overflow: hidden; }
        #waiting-zone { background: #2a2a2a; }
        #battle-zone { background: #2d352d; border-top: 4px double #666; }
        
        .unit { position: absolute; width: 60px; height: 60px; display: flex; flex-direction: column; justify-content: center; align-items: center; cursor: pointer; z-index: 10; touch-action: none; }
        .unit-symbol { font-size: 30px; font-weight: bold; pointer-events: none; }
        .unit-label { font-size: 11px; margin-top: 2px; pointer-events: none; background: rgba(0,0,0,0.6); padding: 0 4px; border-radius: 3px; }

        /* 전투 화면 */
        #combat-field { position: relative; width: 100%; background: #1a1a1a; overflow: hidden; flex: 1; }
        .combat-unit { position: absolute; width: 30px; height: 30px; display: flex; justify-content: center; align-items: center; font-weight: bold; z-index: 5; }
        .combat-unit.selected { filter: drop-shadow(0 0 5px yellow); }
        .combat-unit.selected::after { content: ''; position: absolute; bottom: -5px; width: 20px; height: 5px; background: rgba(255,255,0,0.5); border-radius: 50%; }
        
        .hp-bar { position: absolute; top: -10px; left: 0; width: 100%; height: 4px; background: #500; }
        .hp-inner { height: 100%; background: #0f0; width: 100%; }

        /* 조이스틱 스타일 */
        #joystick-container { position: absolute; bottom: 120px; left: 20px; width: 100px; height: 100px; background: rgba(255,255,255,0.1); border-radius: 50%; display: none; z-index: 100; touch-action: none; border: 2px solid rgba(255,255,255,0.2); }
        #joystick-stick { position: absolute; top: 50%; left: 50%; width: 40px; height: 40px; background: rgba(255,255,255,0.4); border-radius: 50%; transform: translate(-50%, -50%); pointer-events: none; }

        /* 하단 정보창 (고정) */
        #info-panel { height: 100px; background: #111; display: grid; grid-template-columns: repeat(10, 1fr); gap: 2px; padding: 4px; border-top: 2px solid #555; z-index: 110; }
        .info-slot { background: #222; border: 1px solid #333; font-size: 8px; display: flex; flex-direction: column; justify-content: center; align-items: center; color: #444; cursor: pointer; }
        .info-slot.active { color: #fff; border-color: #4a4; }
        .info-slot.selected-slot { border-color: yellow; background: #332; }

        /* 이펙트 및 투사체 */
        .projectile { position: absolute; border-radius: 50%; z-index: 6; pointer-events: none; }
        .arrow { width: 6px; height: 2px; background: #fff; }
        .magic-ball { width: 12px; height: 12px; background: #55f; box-shadow: 0 0 10px #aaf; }
        .attack-radial { position: absolute; border-radius: 50%; pointer-events: none; transform: translate(-50%, -50%); z-index: 2; mask: radial-gradient(transparent 55%, black 60%); -webkit-mask: radial-gradient(transparent 55%, black 60%); }
        .explosion { position: absolute; border-radius: 50%; pointer-events: none; transform: translate(-50%, -50%); z-index: 2; animation: boom 0.3s ease-out forwards; }
        @keyframes boom { 0% { transform: translate(-50%, -50%) scale(0.1); opacity: 1; } 100% { transform: translate(-50%, -50%) scale(1.5); opacity: 0; } }
    </style>
</head>
<body>

    <div id="login-screen" class="screen active" style="justify-content: center; align-items: center;">
        <h2 style="color:#d4af37">FIRST QUEEN MINI</h2>
        <button onclick="changeScreen('waiting-room')" style="padding:15px 30px; background:#d4af37; color:black; font-weight:bold;">월드 진입</button>
    </div>

    <div id="waiting-room" class="screen">
        <div id="top-menu">
            <button onclick="alert('데이터 로드 완료')">캐릭터정보</button>
            <button id="stage-btn" onclick="startCombat()" style="background: #822; font-weight: bold;">전투 개시</button>
        </div>
        <div id="waiting-zone" class="zone"></div>
        <div id="battle-zone" class="zone"></div>
        <div id="info-panel-wait" style="height:100px;"></div>
    </div>

    <div id="combat-screen" class="screen">
        <div style="padding: 10px; display: flex; justify-content: space-between; background: #000; height: 40px; z-index: 20;">
            <span id="stage-title">BATTLE FIELD</span>
            <button onclick="endCombat()" style="margin:0; padding:2px 10px;">후퇴</button>
        </div>
        <div id="combat-field">
            <div id="joystick-container"><div id="joystick-stick"></div></div>
        </div>
        <div id="info-panel-combat" style="height:100px;"></div>
    </div>

<script>
    const heroTemplates = [
        { id: 0, name: "궁수", symbol: "▷", job: "궁수", hp: 100, atk: 7, range: 250, area: 15, moveSpd: 2.0, atkSpd: 1.5, pCount: 1, pSpeed: 10 },
        { id: 1, name: "전사", symbol: "□", job: "전사", hp: 200, atk: 12, range: 40, area: 80, moveSpd: 2.5, atkSpd: 1.1 },
        { id: 2, name: "마법사", symbol: "＠", job: "마법사", hp: 80, atk: 18, range: 200, area: 90, moveSpd: 1.5, atkSpd: 0.6, pCount: 1, pSpeed: 5 }
    ];

    let myHeroes = heroTemplates.map((h, i) => ({...h, status: 'waiting', deployTime: 0, x: 20 + (i * 80), y: 40}));
    let combatActive = false;
    let allies = [], enemies = [], projectiles = [];
    let selectedUnit = null;

    // 조이스틱 상태
    let joystick = { active: false, startX: 0, startY: 0, curX: 0, curY: 0, vectorX: 0, vectorY: 0 };

    function changeScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(id === 'waiting-room') initWaitingRoom();
    }

    function initWaitingRoom() {
        const wz = document.getElementById('waiting-zone');
        const bz = document.getElementById('battle-zone');
        wz.innerHTML = ''; bz.innerHTML = '';
        myHeroes.forEach((hero) => {
            const el = document.createElement('div');
            el.className = 'unit'; el.style.left = hero.x + 'px'; el.style.top = hero.y + 'px';
            el.innerHTML = `<div class="unit-symbol" style="color:${getColor(hero.job)}">${hero.symbol}</div><div class="unit-label">${hero.name}</div>`;
            (hero.status === 'waiting' ? wz : bz).appendChild(el);
            makeDraggable(el, hero);
        });
        renderInfoPanel('info-panel-wait');
    }

    function startCombat() {
        const deployed = myHeroes.filter(h => h.status === 'battle');
        if(deployed.length === 0) return alert("캐릭터를 배치해주세요.");
        
        changeScreen('combat-screen');
        const field = document.getElementById('combat-field');
        const joy = document.getElementById('joystick-container');
        field.innerHTML = ''; field.appendChild(joy);
        joy.style.display = 'block';

        allies = []; enemies = []; projectiles = []; selectedUnit = null;

        deployed.forEach((h, i) => {
            const obj = { ...h, x: (window.innerWidth/(deployed.length+1))*(i+1), y: field.offsetHeight - 80, curHp: h.hp, lastAtk: 0, type: 'hero' };
            obj.el = createCombatEl(obj);
            allies.push(obj);
        });

        for(let i=0; i<10; i++) {
            const m = { symbol: "㉾", hp: 100, curHp: 100, atk: 6, range: 40, area: 40, moveSpd: 1.3, atkSpd: 0.8, x: Math.random()*(window.innerWidth-40), y: Math.random()*200, lastAtk: 0, type: 'enemy' };
            m.el = createCombatEl(m);
            enemies.push(m);
        }
        combatActive = true;
        renderInfoPanel('info-panel-combat');
        requestAnimationFrame(combatLoop);
    }

    function createCombatEl(u) {
        const el = document.createElement('div');
        el.className = 'combat-unit'; el.innerText = u.symbol;
        el.style.color = u.type === 'hero' ? getColor(u.job) : '#f0f';
        el.innerHTML += `<div class="hp-bar"><div class="hp-inner"></div></div>`;
        document.getElementById('combat-field').appendChild(el);
        
        if(u.type === 'hero') {
            el.onclick = () => selectHero(u);
        }
        return el;
    }

    function selectHero(unit) {
        allies.forEach(a => a.el.classList.remove('selected'));
        selectedUnit = unit;
        unit.el.classList.add('selected');
        renderInfoPanel('info-panel-combat');
    }

    function combatLoop() {
        if(!combatActive) return;
        processAI(allies, enemies);
        processAI(enemies, allies);
        processProjectiles();
        
        if(allies.length === 0 || enemies.length === 0) {
            combatActive = false;
            alert(allies.length > 0 ? "승리!" : "전멸...");
            endCombat();
        } else requestAnimationFrame(combatLoop);
    }

    function processAI(sources, targets) {
        sources.forEach(u => {
            let closest = null, minDist = 9999;
            targets.forEach(t => {
                const d = Math.hypot(t.x - u.x, t.y - u.y);
                if(d < minDist) { minDist = d; closest = t; }
            });

            // 수동 조작 (선택된 아군 + 조이스틱 활성 시)
            if(u === selectedUnit && joystick.active) {
                u.x += joystick.vectorX * u.moveSpd;
                u.y += joystick.vectorY * u.moveSpd;
            } else if(!closest) {
                // 적이 없으면 대기
            } else {
                // 기존 AI (자동 이동/카이팅)
                const angle = Math.atan2(closest.y - u.y, closest.x - u.x);
                if((u.job === '궁수' || u.job === '마법사') && u.type === 'hero') {
                    const safeDistance = u.range * 0.7; 
                    if (minDist < safeDistance) {
                        u.x -= Math.cos(angle) * u.moveSpd; u.y -= Math.sin(angle) * u.moveSpd;
                    } else if (minDist > u.range) {
                        u.x += Math.cos(angle) * u.moveSpd; u.y += Math.sin(angle) * u.moveSpd;
                    }
                } else {
                    if(minDist > u.range) {
                        u.x += Math.cos(angle) * u.moveSpd; u.y += Math.sin(angle) * u.moveSpd;
                    }
                }
            }

            // 공격 판정 (이동 중에도 거리 내에 적이 있으면 공격)
            if (closest && minDist <= u.range && Date.now() - u.lastAtk > 1000 / u.atkSpd) {
                const atkAngle = Math.atan2(closest.y - u.y, closest.x - u.x);
                u.lastAtk = Date.now();
                if(u.job === '전사' || u.type === 'enemy') {
                    createRadialEffect(u.x + 15, u.y + 15, u.area, u.type === 'hero' ? getColor(u.job) : 'rgba(255,0,255,0.4)');
                    applyAreaDamage(u.x, u.y, u.area, u.atk, targets);
                } else {
                    fireProjectile(u, atkAngle);
                }
            }

            const field = document.getElementById('combat-field');
            u.x = Math.max(0, Math.min(window.innerWidth - 30, u.x));
            u.y = Math.max(0, Math.min(field.offsetHeight - 30, u.y));
            u.el.style.left = u.x + 'px'; u.el.style.top = u.y + 'px';
            u.el.querySelector('.hp-inner').style.width = (u.curHp/u.hp)*100 + '%';
        });

        for(let i=targets.length-1; i>=0; i--) { 
            if(targets[i].curHp <= 0) { targets[i].el.remove(); targets.splice(i, 1); if(selectedUnit === targets[i]) selectedUnit = null; } 
        }
    }

    // --- 조이스틱 로직 ---
    const joyCont = document.getElementById('joystick-container');
    const joyStick = document.getElementById('joystick-stick');

    joyCont.addEventListener('touchstart', (e) => {
        joystick.active = true;
        const rect = joyCont.getBoundingClientRect();
        joystick.startX = rect.left + rect.width / 2;
        joystick.startY = rect.top + rect.height / 2;
    });

    window.addEventListener('touchmove', (e) => {
        if (!joystick.active) return;
        const touch = e.touches[0];
        const dist = Math.hypot(touch.clientX - joystick.startX, touch.clientY - joystick.startY);
        const maxDist = 40;
        const angle = Math.atan2(touch.clientY - joystick.startY, touch.clientX - joystick.startX);
        
        const moveDist = Math.min(dist, maxDist);
        const moveX = Math.cos(angle) * moveDist;
        const moveY = Math.sin(angle) * moveDist;

        joyStick.style.transform = `translate(calc(-50% + ${moveX}px), calc(-50% + ${moveY}px))`;
        
        joystick.vectorX = Math.cos(angle) * (moveDist / maxDist);
        joystick.vectorY = Math.sin(angle) * (moveDist / maxDist);
    });

    window.addEventListener('touchend', () => {
        joystick.active = false;
        joystick.vectorX = 0; joystick.vectorY = 0;
        joyStick.style.transform = `translate(-50%, -50%)`;
    });

    // --- 시스템 함수 ---
    function fireProjectile(owner, angle) {
        const pEl = document.createElement('div');
        pEl.className = 'projectile ' + (owner.job === '궁수' ? 'arrow' : 'magic-ball');
        document.getElementById('combat-field').appendChild(pEl);
        projectiles.push({ el: pEl, x: owner.x + 15, y: owner.y + 15, angle: angle, speed: owner.pSpeed, atk: owner.atk, area: owner.area, maxDist: owner.range, traveled: 0, job: owner.job, targets: owner.type === 'hero' ? enemies : allies });
    }

    function processProjectiles() {
        for(let i = projectiles.length - 1; i >= 0; i--) {
            const p = projectiles[i];
            p.x += Math.cos(p.angle) * p.speed; p.y += Math.sin(p.angle) * p.speed;
            p.traveled += p.speed;
            p.el.style.left = p.x + 'px'; p.el.style.top = p.y + 'px';
            let hit = false;
            p.targets.forEach(t => { if(Math.hypot(t.x + 15 - p.x, t.y + 15 - p.y) < 20) hit = true; });
            if(hit || p.traveled >= p.maxDist) {
                if(p.job === '마법사') createExplosion(p.x, p.y, p.area, 'rgba(100,100,255,0.4)');
                applyAreaDamage(p.x - 15, p.y - 15, p.area, p.atk, p.targets);
                p.el.remove(); projectiles.splice(i, 1);
            }
        }
    }

    function applyAreaDamage(x, y, area, atk, targets) {
        targets.forEach(t => { if(Math.hypot(t.x - x, t.y - y) <= area) t.curHp -= atk; });
    }

    function createRadialEffect(x, y, radius, color) {
        const effect = document.createElement('div');
        effect.className = 'attack-radial';
        effect.style.width = (radius * 2) + 'px'; effect.style.height = (radius * 2) + 'px';
        effect.style.left = x + 'px'; effect.style.top = y + 'px';
        document.getElementById('combat-field').appendChild(effect);
        let progress = 0;
        function draw() {
            progress += 10;
            effect.style.background = `conic-gradient(from 0deg, ${color} ${progress}%, transparent ${progress}%)`;
            if (progress < 100) requestAnimationFrame(draw); else setTimeout(() => effect.remove(), 50);
        }
        draw();
    }

    function renderInfoPanel(containerId) {
        const ip = document.getElementById(containerId);
        if(!ip) return;
        ip.id = containerId; ip.className = 'info-panel';
        ip.innerHTML = '';
        const deployed = myHeroes.filter(h => h.status === 'battle').sort((a,b) => a.deployTime - b.deployTime);
        for(let i=0; i<10; i++) {
            const slot = document.createElement('div');
            const hero = deployed[i];
            slot.className = 'info-slot' + (hero ? ' active' : '');
            if(hero && selectedUnit && hero.id === selectedUnit.id) slot.classList.add('selected-slot');
            slot.innerHTML = hero ? `<b>${hero.name}</b><br>${hero.job}` : '-<br>-';
            if(hero && containerId === 'info-panel-combat') {
                slot.onclick = () => selectHero(allies.find(a => a.id === hero.id));
            }
            ip.appendChild(slot);
        }
    }

    function endCombat() { combatActive = false; changeScreen('waiting-room'); }
    function getColor(j) { return j==='전사'?'#ff6b6b':(j==='궁수'?'#51cf66':'#5c7cff'); }
    function makeDraggable(el, hero) {
        let isDragging = false;
        el.onmousedown = el.ontouchstart = (e) => { isDragging = true; el.style.zIndex = 1000; e.preventDefault(); };
        window.onmousemove = window.ontouchmove = (e) => {
            if (!isDragging) return;
            const cx = e.touches ? e.touches[0].clientX : e.clientX;
            const cy = e.touches ? e.touches[0].clientY : e.clientY;
            el.style.position = 'fixed'; el.style.left = (cx - 30) + 'px'; el.style.top = (cy - 30) + 'px';
        };
        window.onmouseup = window.ontouchend = (e) => {
            if (!isDragging) return; isDragging = false;
            const touch = e.changedTouches ? e.changedTouches[0] : e;
            const wzRect = document.getElementById('waiting-zone').getBoundingClientRect();
            hero.status = touch.clientY > wzRect.bottom ? 'battle' : 'waiting';
            const targetZone = hero.status === 'battle' ? document.getElementById('battle-zone') : document.getElementById('waiting-zone');
            const rect = targetZone.getBoundingClientRect();
            hero.x = touch.clientX - rect.left - 30; hero.y = touch.clientY - rect.top - 30;
            hero.deployTime = (hero.status === 'battle') ? Date.now() : 0;
            initWaitingRoom();
        };
    }
    initWaitingRoom();
</script>
</body>
</html>
