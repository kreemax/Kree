<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mini First Queen - Combat AI</title>
    <style>
        body { margin: 0; padding: 0; background: #222; color: #fff; font-family: sans-serif; overflow: hidden; touch-action: none; }
        .screen { display: none; width: 100vw; height: 100vh; flex-direction: column; }
        .active { display: flex; }
        button { margin: 5px; padding: 10px; cursor: pointer; background: #444; color: white; border: 1px solid #777; border-radius: 4px; }
        
        /* 대기방 구역 */
        #top-menu { display: flex; background: #111; padding: 5px; border-bottom: 2px solid #555; }
        .zone { position: relative; flex: 1; border: 1px solid #444; overflow: hidden; }
        #waiting-zone { background: #2a2a2a; }
        #battle-zone { background: #2d352d; border-top: 4px double #666; }
        .unit { position: absolute; width: 40px; height: 40px; display: flex; justify-content: center; align-items: center; cursor: pointer; z-index: 10; }
        .unit-symbol { font-size: 24px; font-weight: bold; }
        .unit-label { position: absolute; bottom: -12px; font-size: 10px; white-space: nowrap; }

        /* 전투 필드 */
        #combat-screen { background: #111; overflow-y: auto; position: relative; }
        #combat-field { position: relative; width: 100%; background: #222; margin: 0 auto; overflow: hidden; }
        .combat-unit { 
            position: absolute; width: 30px; height: 30px; 
            display: flex; justify-content: center; align-items: center; 
            font-weight: bold; transition: transform 0.1s;
        }
        .hp-bar { position: absolute; top: -10px; left: 0; width: 100%; height: 4px; background: red; border: 1px solid #000; }
        .hp-inner { height: 100%; background: #0f0; width: 100%; }

        /* 하단 슬롯 */
        #info-panel { height: 100px; background: #111; display: grid; grid-template-columns: repeat(10, 1fr); gap: 2px; padding: 4px; border-top: 2px solid #555; }
        .info-slot { background: #222; border: 1px solid #333; font-size: 8px; display: flex; flex-direction: column; justify-content: center; align-items: center; color: #444; }
        .info-slot.active { color: #fff; border-color: #4a4; }
    </style>
</head>
<body>

    <div id="login-screen" class="screen active" style="justify-content: center; align-items: center;">
        <h2 style="color:#d4af37">FIRST QUEEN MINI</h2>
        <button onclick="changeScreen('waiting-room')" style="width:150px; background:#d4af37; color:black; font-weight:bold;">용사단 입장</button>
    </div>

    <div id="waiting-room" class="screen">
        <div id="top-menu">
            <button onclick="alert('정보창')">캐릭터정보</button>
            <button id="stage-btn" onclick="startCombat()" style="background: #822;">전투 시작 (STAGE 1)</button>
        </div>
        <div id="waiting-zone" class="zone"></div>
        <div id="battle-zone" class="zone"></div>
        <div id="info-panel"></div>
    </div>

    <div id="combat-screen" class="screen">
        <div style="padding: 10px; display: flex; justify-content: space-between; background: #000; z-index: 10;">
            <span id="stage-title">BATTLE</span>
            <button onclick="endCombat()" style="margin:0; padding:2px 10px;">후퇴</button>
        </div>
        <div id="combat-field"></div>
    </div>

<script>
    // 유닛 기본 데이터
    const heroTemplates = [
        { name: "궁수", symbol: "▷", job: "궁수", lv: 1, hp: 100, atk: 8, range: 120, area: 10, moveSpd: 1.5, atkSpd: 1, owned: 'Y' },
        { name: "전사", symbol: "□", job: "전사", lv: 1, hp: 150, atk: 12, range: 35, area: 40, moveSpd: 2.2, atkSpd: 1.2, owned: 'Y' },
        { name: "마법사", symbol: "＠", job: "마법사", lv: 1, hp: 80, atk: 15, range: 80, area: 80, moveSpd: 1.2, atkSpd: 0.6, owned: 'Y' }
    ];

    let myHeroes = heroTemplates.map((h, i) => ({...h, id: i, status: 'waiting', deployTime: 0}));
    let combatActive = false;
    let allies = [];
    let enemies = [];

    // 화면 전환
    function changeScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(id === 'waiting-room') initWaitingRoom();
    }

    function initWaitingRoom() {
        const wz = document.getElementById('waiting-zone');
        const bz = document.getElementById('battle-zone');
        wz.innerHTML = ''; bz.innerHTML = '';
        myHeroes.forEach(hero => {
            const el = document.createElement('div');
            el.className = 'unit'; el.id = `hero-${hero.id}`;
            el.innerHTML = `<div class="unit-symbol" style="color:${getColor(hero.job)}">${hero.symbol}</div><span class="unit-label">${hero.name}</span>`;
            const zone = hero.status === 'waiting' ? wz : bz;
            el.dataset.x = Math.random() * (window.innerWidth - 40);
            el.dataset.y = Math.random() * (zone.offsetHeight - 40);
            zone.appendChild(el);
            makeDraggable(el, hero);
        });
        updateInfoPanel();
    }

    // 전투 개시 로직
    function startCombat() {
        const deployed = myHeroes.filter(h => h.status === 'battle');
        if(deployed.length === 0) return alert("부대를 배치하세요!");

        changeScreen('combat-screen');
        const field = document.getElementById('combat-field');
        const height = 600; 
        field.style.height = height + 'px';
        field.innerHTML = '';

        allies = [];
        enemies = [];

        // 아군 생성
        deployed.forEach((h, i) => {
            const obj = { ...h, x: (window.innerWidth/(deployed.length+1))*(i+1), y: height - 50, curHp: h.hp, lastAtk: 0, type: 'hero' };
            obj.el = createCombatEl(obj);
            allies.push(obj);
        });

        // 몬스터 생성 (스테이지 1 기준 10마리)
        for(let i=0; i<10; i++) {
            const m = { 
                name: "몬스터", symbol: "㉾", hp: 100, curHp: 100, atk: 5, 
                range: 30, area: 30, moveSpd: 1.8, atkSpd: 1, 
                x: Math.random() * (window.innerWidth - 30), y: Math.random() * 200, 
                lastAtk: 0, type: 'enemy' 
            };
            m.el = createCombatEl(m);
            enemies.push(m);
        }

        combatActive = true;
        requestAnimationFrame(combatLoop);
    }

    function createCombatEl(unit) {
        const el = document.createElement('div');
        el.className = 'combat-unit';
        el.innerText = unit.symbol;
        el.style.color = unit.type === 'hero' ? getColor(unit.job) : '#f0f';
        el.innerHTML += `<div class="hp-bar"><div class="hp-inner"></div></div>`;
        document.getElementById('combat-field').appendChild(el);
        return el;
    }

    // 메인 전투 루프
    function combatLoop() {
        if(!combatActive) return;

        updateUnitAI(allies, enemies);
        updateUnitAI(enemies, allies);

        if(allies.length === 0 || enemies.length === 0) {
            combatActive = false;
            alert(allies.length > 0 ? "승리!" : "패배...");
            endCombat();
            return;
        }
        requestAnimationFrame(combatLoop);
    }

    function updateUnitAI(sourceList, targetList) {
        sourceList.forEach((unit, idx) => {
            // 1. 가장 가까운 타겟 찾기
            let closest = null;
            let minDist = 9999;
            targetList.forEach(t => {
                const d = Math.hypot(t.x - unit.x, t.y - unit.y);
                if(d < minDist) { minDist = d; closest = t; }
            });

            if(!closest) return;

            // 2. 이동 또는 공격
            if(minDist > unit.range) {
                // 이동 속도 적용
                const angle = Math.atan2(closest.y - unit.y, closest.x - unit.x);
                unit.x += Math.cos(angle) * unit.moveSpd;
                unit.y += Math.sin(angle) * unit.moveSpd;
            } else {
                // 공격 속도 확인 (초당 unit.atkSpd회)
                const now = Date.now();
                if(now - unit.lastAtk > 1000 / unit.atkSpd) {
                    performAttack(unit, closest, targetList);
                    unit.lastAtk = now;
                }
            }

            // 엘리먼트 위치 갱신
            unit.el.style.left = unit.x + 'px';
            unit.el.style.top = unit.y + 'px';
            const hpPer = (unit.curHp / unit.hp) * 100;
            unit.el.querySelector('.hp-inner').style.width = hpPer + '%';
        });
    }

    function performAttack(attacker, mainTarget, victims) {
        // 공격 범위(Area) 내의 모든 적 타격
        victims.forEach((v, i) => {
            const dist = Math.hypot(v.x - attacker.x, v.y - attacker.y);
            if(dist <= attacker.area + attacker.range) {
                v.curHp -= attacker.atk;
                // 데미지 연출 (살짝 흔들림)
                v.el.style.transform = "scale(1.2)";
                setTimeout(() => { if(v.el) v.el.style.transform = "scale(1)"; }, 100);
            }
        });

        // 사망 처리
        for(let i = victims.length - 1; i >= 0; i--) {
            if(victims[i].curHp <= 0) {
                victims[i].el.remove();
                victims.splice(i, 1);
            }
        }
    }

    function endCombat() { combatActive = false; changeScreen('waiting-room'); }

    // --- 유틸리티 ---
    function getColor(job) { return job==='전사'?'#ff6b6b':(job==='궁수'?'#51cf66':'#5c7cff'); }
    function makeDraggable(el, hero) {
        let isDragging = false;
        el.onmousedown = el.ontouchstart = () => { isDragging = true; el.style.zIndex = 100; };
        window.onmousemove = window.ontouchmove = (e) => {
            if(!isDragging) return;
            const cx = e.touches ? e.touches[0].clientX : e.clientX;
            const cy = e.touches ? e.touches[0].clientY : e.clientY;
            el.style.position = 'fixed'; el.style.left = (cx-20)+'px'; el.style.top = (cy-20)+'px';
        };
        window.onmouseup = window.ontouchend = (e) => {
            if(!isDragging) return; isDragging = false;
            el.style.position = 'absolute';
            const cy = e.changedTouches ? e.changedTouches[0].clientY : e.clientY;
            const borderY = document.getElementById('waiting-zone').getBoundingClientRect().bottom;
            hero.status = cy > borderY ? 'battle' : 'waiting';
            initWaitingRoom();
        };
    }
    function updateInfoPanel() {
        const ip = document.getElementById('info-panel');
        ip.innerHTML = '';
        const deployed = myHeroes.filter(h => h.status === 'battle');
        for(let i=0; i<20; i++) {
            const slot = document.createElement('div');
            slot.className = 'info-slot' + (deployed[i]?' active':'');
            slot.innerHTML = deployed[i] ? `<b>${deployed[i].name}</b><br>${deployed[i].job}` : '-<br>-';
            ip.appendChild(slot);
        }
    }
    initWaitingRoom();
</script>
</body>
</html>
