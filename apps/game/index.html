<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>AI 로그라이크: 캐릭터 생성 시스템</title>
    <style>
        body { margin: 0; background: #1a1a1a; color: white; font-family: sans-serif; overflow-y: auto; }
        #creator-ui { position: fixed; top: 0; left: 0; width: 100%; background: rgba(0,0,0,0.9); z-index: 100; padding: 10px; border-bottom: 2px solid #444; display: flex; gap: 20px; align-items: center; }
        .stat-input { width: 50px; background: #333; color: white; border: 1px solid #666; }
        #character-list { display: flex; gap: 10px; }
        .char-btn { background: #3498db; border: none; color: white; padding: 5px 15px; cursor: pointer; border-radius: 3px; }
        .char-btn:hover { background: #2980b9; }
        .zone-container { border-bottom: 5px solid #444; position: relative; background: #2c3e50; margin-top: 100px; }
        canvas { display: block; margin: 0 auto; }
        .ui-layer { position: absolute; top: 10px; left: 10px; pointer-events: none; background: rgba(0,0,0,0.5); padding: 5px; }
    </style>
</head>
<body>

<div id="creator-ui">
    <div style="border-right: 1px solid #555; padding-right: 15px;">
        <strong>캐릭터 생성:</strong>
        이름 <input type="text" id="in-name" class="stat-input" style="width:70px" value="용사">
        HP <input type="number" id="in-hp" class="stat-input" value="100">
        ATK dist <input type="number" id="in-dist" class="stat-input" value="150">
        SPD <input type="number" id="in-spd" class="stat-input" value="2">
        <button onclick="createCharacter()">생성</button>
    </div>
    <div id="character-list">
        </div>
</div>

<div id="game-worlds"></div>

<script>
const VIEW_WIDTH = 800;
const SAFE_ZONE_HEIGHT = 120;
let zones = [];
let waitingCharacters = []; // 생성되었으나 대기 중인 캐릭터들

class Zone {
    constructor(stageNum) {
        this.stageNum = stageNum;
        this.height = 700 * Math.pow(1.1, stageNum - 1);
        this.monsterMult = Math.pow(1.1, stageNum - 1);
        
        this.container = document.createElement('div');
        this.container.className = 'zone-container';
        if(stageNum === 1) this.container.style.marginTop = "100px";
        
        this.canvas = document.createElement('canvas');
        this.canvas.width = VIEW_WIDTH;
        this.canvas.height = this.height;
        this.ctx = this.canvas.getContext('2d');
        
        this.container.appendChild(this.canvas);
        document.getElementById('game-worlds').appendChild(this.container);

        this.characters = [];
        this.monsters = [];
        this.obstacles = [];
        this.hazards = [];
        this.projectiles = [];
        this.initMap();
    }

    initMap() {
        for(let i=0; i < this.stageNum; i++) {
            this.obstacles.push({x: Math.random()*700, y: 200 + Math.random()*(this.height-400), w: 50, h: 50});
            this.hazards.push({x: Math.random()*700, y: 200 + Math.random()*(this.height-400), w: 50, h: 50});
        }
        let mCount = Math.floor(8 * Math.pow(1.1, this.stageNum - 1));
        for(let i=0; i < mCount; i++) {
            this.monsters.push(new Entity(
                Math.random()*VIEW_WIDTH, 300 + Math.random()*(this.height-400), 
                "", this.stageNum, 100*this.monsterMult, 1*this.monsterMult, 100*this.monsterMult, 1*this.monsterMult, 
                0.7*this.monsterMult, 0.8*this.monsterMult, 120, 40, "#e74c3c", 'mon'
            ));
        }
    }

    update() {
        const delta = 0.1;
        this.characters.forEach((c, idx) => {
            if (c.hp > 0) {
                c.update(this.monsters, this.obstacles, this.hazards, delta, this.height);
                if (c.y > this.height - 20) {
                    moveToNextZone(this.stageNum, c);
                    this.characters.splice(idx, 1);
                }
            }
        });
        this.monsters.forEach(m => {
            if (m.hp > 0) m.update(this.characters, this.obstacles, this.hazards, delta, this.height);
        });
        this.projectiles = this.projectiles.filter(p => !p.dead);
        this.projectiles.forEach(p => p.update(p.st === 'char' ? this.monsters : this.characters));
        this.draw();
    }

    draw() {
        const ctx = this.ctx;
        ctx.clearRect(0, 0, VIEW_WIDTH, this.height);
        ctx.fillStyle = "rgba(46, 204, 113, 0.1)"; ctx.fillRect(0, 0, VIEW_WIDTH, SAFE_ZONE_HEIGHT);
        ctx.fillStyle = "rgba(155, 89, 182, 0.5)"; this.hazards.forEach(h => ctx.fillRect(h.x, h.y, h.w, h.h));
        ctx.fillStyle = "#7f8c8d"; this.obstacles.forEach(o => ctx.fillRect(o.x, o.y, o.w, o.h));
        this.characters.forEach(c => c.draw(ctx));
        this.monsters.forEach(m => m.draw(ctx));
        this.projectiles.forEach(p => p.draw(ctx, p.st === 'char' ? "#3498db" : "#e74c3c"));
    }
}

class Entity {
    constructor(x, y, name, lv, hp, regen, energy, energyRegen, atkSpeed, moveSpeed, atkDist, atkRange, color, type) {
        this.x = x; this.y = y; this.r = 15;
        this.name = name; this.lv = lv;
        this.maxHp = hp; this.hp = hp; this.regen = regen;
        this.maxEnergy = energy; this.energy = energy; this.energyRegen = energyRegen;
        this.atkSpeed = atkSpeed; this.moveSpeed = moveSpeed;
        this.atkDist = atkDist; this.atkRange = atkRange;
        this.color = color; this.type = type;
        this.stunUntil = 0; this.lastAtkTime = 0; this.isRetreating = false;
        this.wanderAngle = Math.random() * Math.PI * 2;
        this.wanderTimer = 0;
    }

    draw(ctx) {
        if (this.hp <= 0) return;
        const barW = 50; const bx = this.x - 25;
        ctx.fillStyle = '#444'; ctx.fillRect(bx, this.y+20, barW, 4);
        ctx.fillStyle = '#2ecc71'; ctx.fillRect(bx, this.y+20, barW*(this.hp/this.maxHp), 4);
        ctx.fillStyle = '#3498db'; ctx.fillRect(bx, this.y+26, barW, 2);
        ctx.fillRect(bx, this.y+26, barW*(this.energy/this.maxEnergy), 2);
        
        // 주인공만 이름 표시
        if (this.type === 'char') {
            ctx.fillStyle = "white"; ctx.font = "bold 10px Arial"; ctx.textAlign = "center";
            ctx.fillText(this.name, this.x, this.y + 40);
        }

        if (Date.now() < this.stunUntil) ctx.globalAlpha = 0.4;
        ctx.fillStyle = this.color;
        if (this.type === 'char') { ctx.beginPath(); ctx.arc(this.x, this.y, this.r, 0, Math.PI*2); ctx.fill(); }
        else { ctx.fillRect(this.x-12, this.y-12, 24, 24); }
        ctx.globalAlpha = 1.0;
    }

    update(enemies, obstacles, hazards, delta, hLimit) {
        const now = Date.now();
        this.hp = Math.min(this.maxHp, this.hp + (this.regen * delta));
        this.energy = Math.min(this.maxEnergy, this.energy + (this.energyRegen * delta));

        hazards.forEach(h => {
            if(this.x > h.x && this.x < h.x+h.w && this.y > h.y && this.y < h.y+h.h) this.hp -= (this.maxHp * 0.01) * delta;
        });

        if (now < this.stunUntil) return;

        let ox = this.x, oy = this.y;
        
        if (this.type === 'char') {
            if (this.hp < this.maxHp * 0.3) this.isRetreating = true;
            if (this.isRetreating && this.hp >= this.maxHp) this.isRetreating = false;
            this.y += this.isRetreating ? -this.moveSpeed : this.moveSpeed * 0.5;
        } else {
            const targets = enemies.filter(e => e.y > SAFE_ZONE_HEIGHT && e.hp > 0);
            const target = this.findNearest(targets);
            if (target && this.dist(target) < 400) {
                const a = Math.atan2(target.y - this.y, target.x - this.x);
                this.x += Math.cos(a) * this.moveSpeed; this.y += Math.sin(a) * this.moveSpeed;
            } else {
                if (now > this.wanderTimer) {
                    this.wanderAngle = Math.random() * Math.PI * 2;
                    this.wanderTimer = now + 1000 + Math.random()*2000;
                }
                this.x += Math.cos(this.wanderAngle) * (this.moveSpeed * 0.5);
                this.y += Math.sin(this.wanderAngle) * (this.moveSpeed * 0.5);
            }
            // 몬스터는 안전지대 침범 불가
            if (this.y < SAFE_ZONE_HEIGHT + 20) this.y = SAFE_ZONE_HEIGHT + 20;
        }

        // 장애물 충돌 및 화면 경계 보정
        obstacles.forEach(o => {
            if(this.x+12 > o.x && this.x-12 < o.x+o.w && this.y+12 > o.y && this.y-12 < o.y+o.h) {
                this.x = ox; this.y = oy;
            }
        });
        this.x = Math.max(15, Math.min(VIEW_WIDTH-15, this.x));
        this.y = Math.max(15, Math.min(hLimit+50, this.y));

        // 공격 (안전지대 공격 불가)
        if (this.y > SAFE_ZONE_HEIGHT) {
            const targets = enemies.filter(e => !(this.type === 'mon' && e.y < SAFE_ZONE_HEIGHT) && e.hp > 0);
            const target = this.findNearest(targets);
            if (target && this.dist(target) <= this.atkDist && now - this.lastAtkTime > 1000/this.atkSpeed) {
                if (this.energy >= this.maxEnergy * 0.1) {
                    this.energy -= this.maxEnergy * 0.1;
                    const z = zones.find(z => z.characters.includes(this) || z.monsters.includes(this));
                    if(z) z.projectiles.push(new Projectile(this.x, this.y, target, this.atkDist, this.atkRange, this.maxEnergy*0.1, this.type));
                    this.lastAtkTime = now;
                }
            }
        }
    }

    dist(t) { return Math.sqrt((this.x-t.x)**2+(this.y-t.y)**2); }
    findNearest(ts) {
        let n = null, d = Infinity;
        ts.forEach(t => { const dist = this.dist(t); if(dist < d) { d = dist; n = t; } });
        return n;
    }
    takeDamage(dmg, sx, sy) {
        this.hp -= dmg; this.stunUntil = Date.now() + 300;
        const a = Math.atan2(this.y-sy, this.x-sx);
        let kX = this.x + Math.cos(a)*25;
        let kY = this.y + Math.sin(a)*25;
        
        // 넉백 시 장애물 통과 방지 체크
        const currentZone = zones.find(z => z.characters.includes(this) || z.monsters.includes(this));
        let canMove = true;
        if(currentZone) {
            currentZone.obstacles.forEach(o => {
                if(kX+10 > o.x && kX-10 < o.x+o.w && kY+10 > o.y && kY-10 < o.y+o.h) canMove = false;
            });
        }
        if(canMove) { this.x = kX; this.y = kY; }
    }
}

class Projectile {
    constructor(x, y, target, md, r, dmg, st) {
        this.x = x; this.y = y; this.sx = x; this.sy = y;
        this.md = md; this.r = r; this.dmg = dmg; this.st = st;
        this.dead = false; this.speed = 10;
        const a = Math.atan2(target.y - y, target.x - x);
        this.vx = Math.cos(a)*this.speed; this.vy = Math.sin(a)*this.speed;
    }
    update(ts) {
        this.x += this.vx; this.y += this.vy;
        if (Math.sqrt((this.x-this.sx)**2+(this.y-this.sy)**2) > this.md) this.explode(ts);
        let hit = ts.find(t => t.hp > 0 && Math.sqrt((this.x-t.x)**2+(this.y-t.y)**2) < 20);
        if (hit) this.explode(ts);
    }
    explode(ts) {
        ts.forEach(t => { if(t.hp > 0 && Math.sqrt((this.x-t.x)**2+(this.y-t.y)**2) <= this.r) t.takeDamage(this.dmg, this.x, this.y); });
        this.dead = true;
    }
    draw(ctx, color) {
        ctx.fillStyle = color; ctx.beginPath(); ctx.arc(this.x, this.y, 5, 0, Math.PI*2); ctx.fill();
    }
}

// 캐릭터 생성 및 출격 시스템
function createCharacter() {
    const name = document.getElementById('in-name').value;
    const hp = parseFloat(document.getElementById('in-hp').value);
    const dist = parseFloat(document.getElementById('in-dist').value);
    const spd = parseFloat(document.getElementById('in-spd').value);

    const newChar = new Entity(
        100 + Math.random()*600, 60, name, 1, 
        hp, 1, 100, 1, 1.2, spd, dist, 40, "#3498db", 'char'
    );

    const btn = document.createElement('button');
    btn.className = 'char-btn';
    btn.innerText = name;
    btn.onclick = () => {
        if(!zones[0].characters.includes(newChar)) {
            zones[0].characters.push(newChar);
            btn.style.opacity = "0.5";
            btn.disabled = true;
        }
    };
    document.getElementById('character-list').appendChild(btn);
}

function moveToNextZone(currentStageNum, character) {
    character.y = 50;
    let nextZone = zones.find(z => z.stageNum === currentStageNum + 1);
    if (!nextZone) {
        nextZone = new Zone(currentStageNum + 1);
        zones.push(nextZone);
    }
    nextZone.characters.push(character);
}

// 게임 초기화
zones.push(new Zone(1));

function mainLoop() {
    zones.forEach(z => z.update());
    requestAnimationFrame(mainLoop);
}
mainLoop();
</script>
</body>
</html>
