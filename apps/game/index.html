<script>
    // ... (상단 데이터 및 이펙트 함수들은 동일) ...

    function processAI(sources, targets) {
        sources.forEach(u => {
            let closest = null, minDist = 9999;
            targets.forEach(t => {
                const d = Math.hypot(t.x - u.x, t.y - u.y);
                if(d < minDist) { minDist = d; closest = t; }
            });
            if(!closest) return;

            const angle = Math.atan2(closest.y - u.y, closest.x - u.x);

            // [추가된 로직] 원거리 유닛의 거리 유지 (카이팅)
            if((u.job === '궁수' || u.job === '마법사') && u.type === 'hero') {
                const safeDistance = u.range * 0.6; // 사거리의 60%를 안전 거리로 설정

                if (minDist < safeDistance) {
                    // 너무 가까우면 반대 방향으로 후퇴
                    u.x -= Math.cos(angle) * u.moveSpd;
                    u.y -= Math.sin(angle) * u.moveSpd;
                } else if (minDist > u.range) {
                    // 너무 멀면 전진
                    u.x += Math.cos(angle) * u.moveSpd;
                    u.y += Math.sin(angle) * u.moveSpd;
                }
                // 안전 거리 안에서는 이동하지 않고 공격에 집중
            } else {
                // 근접 유닛이나 적군은 기존처럼 전진
                if(minDist > u.range) {
                    u.x += Math.cos(angle) * u.moveSpd;
                    u.y += Math.sin(angle) * u.moveSpd;
                }
            }

            // 공격 로직 (공격 거리 내에 있을 때만 실행)
            if (minDist <= u.range && Date.now() - u.lastAtk > 1000 / u.atkSpd) {
                u.lastAtk = Date.now();
                if(u.job === '전사' || u.type === 'enemy') {
                    const color = u.type === 'hero' ? getColor(u.job) : 'rgba(255,0,255,0.3)';
                    createRadialEffect(u.x + 15, u.y + 15, u.area, color);
                    applyAreaDamage(u.x, u.y, u.area + u.range, u.atk, targets);
                } else {
                    for(let i=0; i< (u.pCount || 1); i++) {
                        fireProjectile(u, angle);
                    }
                }
            }

            // 화면 경계 밖으로 나가지 않도록 제한
            const field = document.getElementById('combat-field');
            u.x = Math.max(0, Math.min(window.innerWidth - 30, u.x));
            u.y = Math.max(0, Math.min(field.offsetHeight - 30, u.y));

            u.el.style.left = u.x + 'px'; u.el.style.top = u.y + 'px';
            u.el.querySelector('.hp-inner').style.width = (u.curHp/u.hp)*100 + '%';
        });

        // 사망 처리
        for(let i=targets.length-1; i>=0; i--) { 
            if(targets[i].curHp <= 0) { 
                targets[i].el.remove(); 
                targets.splice(i, 1); 
            } 
        }
    }

    // ... (나머지 fireProjectile, processProjectiles, makeDraggable 등 함수 유지) ...
</script>
