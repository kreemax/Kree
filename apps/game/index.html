<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mini First Queen - Waiting Room</title>
    <style>
        body {
            margin: 0; padding: 0; background: #222; color: #fff;
            font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
            overflow: hidden; touch-action: none;
        }
        #login-screen {
            position: fixed; inset: 0; background: rgba(0,0,0,0.9);
            display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100;
        }
        input { padding: 10px; font-size: 16px; border-radius: 5px; border: none; }
        button { margin-top: 10px; padding: 10px 20px; cursor: pointer; background: #444; color: white; border: 1px solid #777; }

        .game-container { display: none; width: 100vw; height: 100vh; flex-direction: column; }
        
        /* 구역 설정 */
        .zone { position: relative; flex: 1; border: 2px dashed #444; overflow: hidden; background: #333; }
        #waiting-zone { background: #2a2a2a; border-bottom: 4px double #666; }
        #battle-zone { background: #3a3a3a; }
        .zone-label { position: absolute; top: 5px; left: 10px; color: rgba(255,255,255,0.3); font-size: 12px; pointer-events: none; }

        /* 캐릭터 유닛 */
        .unit {
            position: absolute; width: 40px; height: 40px;
            display: flex; justify-content: center; align-items: center;
            cursor: pointer; user-select: none; transition: transform 0.1s;
            font-size: 24px; font-weight: bold; z-index: 10;
        }
        .unit-label { position: absolute; bottom: -15px; font-size: 10px; white-space: nowrap; }

        /* 하단 정보창 */
        #info-panel {
            height: 120px; background: #111; display: grid;
            grid-template-columns: repeat(10, 1fr); grid-template-rows: repeat(2, 1fr);
            gap: 2px; padding: 5px; border-top: 2px solid #555;
        }
        .info-slot {
            background: #222; border: 1px solid #333; font-size: 9px;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            color: #aaa; overflow: hidden;
        }
        .info-slot.active { color: #fff; border-color: #0f0; }
    </style>
</head>
<body>

    <div id="-screen">
        <h2 style="color:#d4af37">FIRST QUEEN MINI</h2>
        <input type="text" id="nickname" placeholder="용사의 이름을 입력하세요" maxlength="8">
        <button onclick="startGame()">입장하기</button>
    </div>

    <div class="game-container" id="game-container">
        <div id="waiting-zone" class="zone">
            <span class="zone-label">준비 구역</span>
        </div>

        <div id="battle-zone" class="zone">
            <span class="zone-label">출전 부대</span>
        </div>

        <div id="info-panel"></div>
        
        <div style="text-align: center; padding: 5px; background: #000;">
            <button onclick="alert('전투 기능을 준비 중입니다!')" style="margin:0; width:100%; border:none; background:#822;">전투 개시</button>
        </div>
    </div>

<script>
    const unitsData = [
        { id: 1, name: "궁수", symbol: "▷", job: "궁수", lv: 1, hp: 100, atk: 5, status: 'waiting', owned: 'Y' },
        { id: 2, name: "궁수2", symbol: "▷", job: "궁수", lv: 1, hp: 100, atk: 5, status: 'waiting', owned: 'N' },
        { id: 3, name: "전사", symbol: "□", job: "전사", lv: 1, hp: 100, atk: 10, status: 'waiting', owned: 'Y' },
        { id: 4, name: "마법사", symbol: "＠", job: "마법사", lv: 1, hp: 100, atk: 3, status: 'waiting', owned: 'Y' }
    ];

    let myUnits = unitsData.filter(u => u.owned === 'Y');
    const waitingZone = document.getElementById('waiting-zone');
    const battleZone = document.getElementById('battle-zone');
    const infoPanel = document.getElementById('info-panel');

    function startGame() {
        const nick = document.getElementById('nickname').value;
        if(!nick) return alert("닉네임을 입력해주세요!");
        document.getElementById('-screen').style.display = 'none';
        document.getElementById('game-container').style.display = 'flex';
        initGame();
    }

    function initGame() {
        // 하단 슬롯 생성 (20칸)
        infoPanel.innerHTML = '';
        for(let i=0; i<20; i++) {
            const slot = document.createElement('div');
            slot.className = 'info-slot';
            slot.id = `slot-${i}`;
            slot.innerHTML = `이름: -<br>직업: -`;
            infoPanel.appendChild(slot);
        }

        // 캐릭터 배치
        myUnits.forEach((unit, idx) => {
            createUnitElement(unit);
        });
        
        updateInfoPanel();
        animate();
    }

    function createUnitElement(unit) {
        const el = document.createElement('div');
        el.className = 'unit';
        el.id = `unit-${unit.id}`;
        el.innerText = unit.symbol;
        el.style.color = unit.job === '전사' ? '#f55' : (unit.job === '궁수' ? '#5f5' : '#55f');
        
        const label = document.createElement('span');
        label.className = 'unit-label';
        label.innerText = unit.name;
        el.appendChild(label);

        // 초기 위치
        el.dataset.x = Math.random() * (window.innerWidth - 40);
        el.dataset.y = Math.random() * (waitingZone.offsetHeight - 40);
        
        waitingZone.appendChild(el);
        makeDraggable(el, unit);
    }

    function makeDraggable(el, unit) {
        let isDragging = false;

        const start = (e) => {
            isDragging = true;
            el.style.zIndex = 1000;
        };

        const move = (e) => {
            if (!isDragging) return;
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            
            el.style.left = (clientX - 20) + 'px';
            el.style.top = (clientY - (unit.status === 'battle' ? waitingZone.offsetHeight : 0) - 20) + 'px';
        };

        const end = (e) => {
            if (!isDragging) return;
            isDragging = false;
            el.style.zIndex = 10;
            
            const clientY = e.changedTouches ? e.changedTouches[0].clientY : e.clientY;
            const middle = waitingZone.offsetHeight;

            if (clientY > middle && unit.status === 'waiting') {
                unit.status = 'battle';
                battleZone.appendChild(el);
            } else if (clientY <= middle && unit.status === 'battle') {
                unit.status = 'waiting';
                waitingZone.appendChild(el);
            }
            
            // 위치 보정
            el.dataset.x = parseInt(el.style.left);
            el.dataset.y = parseInt(el.style.top);
            updateInfoPanel();
        };

        el.addEventListener('mousedown', start);
        el.addEventListener('touchstart', start);
        window.addEventListener('mousemove', move);
        window.addEventListener('touchmove', move);
        window.addEventListener('mouseup', end);
        window.addEventListener('touchend', end);
    }

    function updateInfoPanel() {
        // 정보창 초기화
        for(let i=0; i<20; i++) {
            const slot = document.getElementById(`slot-${i}`);
            slot.innerHTML = `이름: -<br>직업: -`;
            slot.classList.remove('active');
        }

        // 배치된 유닛 정보 표시
        const deployed = myUnits.filter(u => u.status === 'battle');
        deployed.forEach((unit, idx) => {
            if(idx < 20) {
                const slot = document.getElementById(`slot-${idx}`);
                slot.innerHTML = `<b>${unit.name}</b><br>${unit.job}`;
                slot.classList.add('active');
            }
        });
    }

    function animate() {
        myUnits.forEach(unit => {
            const el = document.getElementById(`unit-${unit.id}`);
            if(!el || el.style.zIndex > 100) return; // 드래그 중엔 정지

            // 느린 랜덤 움직임
            let x = parseFloat(el.dataset.x) || 0;
            let y = parseFloat(el.dataset.y) || 0;
            
            x += Math.sin(Date.now() / 1000 + unit.id) * 0.5;
            y += Math.cos(Date.now() / 1000 + unit.id) * 0.5;

            el.dataset.x = x;
            el.dataset.y = y;
            el.style.left = x + 'px';
            el.style.top = y + 'px';
        });
        requestAnimationFrame(animate);
    }
</script>
</body>
</html>
