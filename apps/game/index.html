<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>First Queen Mini - Complete</title>
    <style>
        body { margin: 0; padding: 0; background: #222; color: #fff; font-family: sans-serif; overflow: hidden; touch-action: none; }
        .screen { display: none; width: 100vw; height: 100vh; flex-direction: column; }
        .active { display: flex; }
        button { margin: 2px; padding: 8px 12px; cursor: pointer; background: #444; color: white; border: 1px solid #777; border-radius: 4px; font-size: 12px; }
        
        /* 상단 메뉴 및 상태창 */
        #top-menu { display: flex; background: #111; padding: 5px; border-bottom: 2px solid #555; height: 50px; align-items: center; justify-content: space-between; }
        #battle-timer { font-family: monospace; font-size: 1.1rem; color: #ffeb3b; font-weight: bold; }
        #gold-display { color: #ffd700; font-weight: bold; font-size: 14px; margin-right: 10px; }

        .zone { position: relative; flex: 1; border: 1px solid #444; overflow: hidden; }
        #waiting-zone { background: #2a2a2a; }
        #battle-zone { background: #2d352d; border-top: 4px double #666; }
        
        /* 유닛 스타일 */
        .unit { position: absolute; width: 60px; height: 60px; display: flex; flex-direction: column; justify-content: center; align-items: center; cursor: pointer; z-index: 10; touch-action: none; }
        .unit-symbol { font-size: 28px; font-weight: bold; pointer-events: none; }
        .unit-label { font-size: 10px; margin-top: 2px; background: rgba(0,0,0,0.6); padding: 0 4px; border-radius: 3px; }

        /* 전투 필드 */
        #combat-field { position: relative; width: 100%; background: #1a1a1a; overflow: hidden; flex: 1; }
        .combat-unit { position: absolute; width: 34px; height: 34px; display: flex; justify-content: center; align-items: center; font-weight: bold; z-index: 10; }
        .combat-unit.selected { filter: drop-shadow(0 0 8px yellow); border: 1px dashed yellow; border-radius: 50%; }
        .hp-bar { position: absolute; top: -10px; left: 0; width: 100%; height: 4px; background: #500; border-radius: 2px; }
        .hp-inner { height: 100%; background: #0f0; width: 100%; border-radius: 2px; }

        /* 조이스틱 */
        #joystick-container { position: absolute; bottom: 30px; left: 30px; width: 110px; height: 110px; background: rgba(255,255,255,0.1); border: 2px solid rgba(255,255,255,0.3); border-radius: 50%; display: none; z-index: 100; touch-action: none; }
        #joystick-stick { position: absolute; top: 50%; left: 50%; width: 44px; height: 44px; background: rgba(255,255,255,0.4); border-radius: 50%; transform: translate(-50%, -50%); pointer-events: none; }

        /* 정보창 모달 */
        #info-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 500; justify-content: center; align-items: center; }
        .modal-content { background: #333; width: 85%; padding: 20px; border-radius: 10px; border: 2px solid #d4af37; }
        table { width: 100%; border-collapse: collapse; font-size: 11px; }
        th, td { border: 1px solid #555; padding: 6px; text-align: center; }

        /* 하단 정보 패널 */
        .info-panel { height: 90px; background: #111; display: grid; grid-template-columns: repeat(10, 1fr); gap: 2px; padding: 4px; border-top: 2px solid #555; }
        .info-slot { background: #222; border: 1px solid #333; font-size: 8px; display: flex; flex-direction: column; justify-content: center; align-items: center; color: #444; }
        .info-slot.active { color: #fff; border-color: #4a4; }
        .info-slot.selected-slot { border-color: yellow; color: yellow; background: #332; }

        /* 투사체 및 이펙트 */
        .projectile { position: absolute; pointer-events: none; }
        .arrow { width: 10px; height: 2px; background: #fff; }
        .magic-ball { width: 12px; height: 12px; background: #55f; border-radius: 50%; box-shadow: 0 0 8px #aaf; }
    </style>
</head>
<body>

    <div id="info-modal">
        <div class="modal-content">
            <h3 style="color:#d4af37; margin-top:0;">부대 정보</h3>
            <table id="info-table">
                <thead><tr><th>이름</th><th>HP</th><th>공격</th><th>속도</th></tr></thead>
                <tbody id="info-tbody"></tbody>
            </table>
            <button onclick="closeInfo()" style="width:100%; margin-top:15px;">닫기</button>
        </div>
    </div>

    <div id="login-screen" class="screen active" style="justify-content: center; align-items: center;">
        <h1 style="color:#d4af37;">FIRST QUEEN</h1>
        <button onclick="changeScreen('waiting-room')" style="padding:15px 40px;">시작하기</button>
    </div>

    <div id="waiting-room" class="screen">
        <div id="top-menu">
            <div style="display:flex;">
                <button onclick="openInfo()">정보</button>
                <button onclick="resetPlacement()">초기화</button>
                <button onclick="upgradeAtk()">강화</button>
            </div>
            <div id="gold-display">G: 0</div>
            <button id="btn-start" onclick="startCombat()" style="background:#a22; font-weight:bold;">전투 개시</button>
        </div>
        <div id="waiting-zone" class="zone"></div>
        <div id="battle-zone" class="zone"></div>
        <div id="info-panel-wait" class="info-panel"></div>
    </div>

    <div id="combat-screen" class="screen">
        <div id="top-menu">
            <span id="stage-display">STAGE 1</span>
            <div id="battle-timer">00:00</div>
            <button onclick="endCombat()">후퇴</button>
        </div>
        <div id="combat-field">
            <div id="joystick-container"><div id="joystick-stick"></div></div>
        </div>
        <div id="info-panel-combat" class="info-panel"></div>
    </div>

<script>
    // --- 초기 데이터 및 변수 ---
    const heroTemplates = [
        { id: 0, name: "궁수", symbol: "▷", job: "궁수", hp: 100, atk: 10, range: 240, area: 15, moveSpd: 2.2, atkSpd: 1.5, pSpeed: 12 },
        { id: 1, name: "전사", symbol: "□", job: "전사", hp: 220, atk: 18, range: 45, area: 80, moveSpd: 2.8, atkSpd: 1.2 },
        { id: 2, name: "법사", symbol: "＠", job: "마법사", hp: 80, atk: 28, range: 200, area: 100, moveSpd: 1.8, atkSpd: 0.6, pSpeed: 7 }
    ];

    let myHeroes = heroTemplates.map((h, i) => ({...h, status: 'waiting', x: 20 + (i * 70), y: 30, deployTime: 0}));
    let allies = [], enemies = [], projectiles = [];
    let combatActive = false, selectedUnit = null;
    let currentStage = 1, gold = 100, upgradeLevel = 0, battleStartTime = 0;
    
    const joyState = { active: false, startX: 0, startY: 0, vx: 0, vy: 0 };

    // --- 기본 UI 로직 ---
    function changeScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(id === 'waiting-room') renderWaitingRoom();
    }

    function openInfo() {
        const tbody = document.getElementById('info-tbody');
        tbody.innerHTML = heroTemplates.map(h => `<tr><td>${h.name}</td><td>${h.hp}</td><td>${h.atk + (upgradeLevel*2)}</td><td>${h.moveSpd}</td></tr>`).join('');
        document.getElementById('info-modal').style.display = 'flex';
    }
    function closeInfo() { document.getElementById('info-modal').style.display = 'none'; }

    function resetPlacement() {
        myHeroes.forEach((h, i) => { h.status = 'waiting'; h.x = 20 + (i * 70); h.y = 30; });
        renderWaitingRoom();
    }

    function upgradeAtk() {
        if(gold >= 50) { gold -= 50; upgradeLevel++; alert(`공격력이 상승했습니다! (현재 Lv.${upgradeLevel})`); renderWaitingRoom(); }
        else { alert("골드가 부족합니다."); }
    }

    function renderWaitingRoom() {
        document.getElementById('gold-display').innerText = `G: ${gold}`;
        const wz = document.getElementById('waiting-zone'), bz = document.getElementById('battle-zone');
        wz.innerHTML = ''; bz.innerHTML = '';
        myHeroes.forEach(hero => {
            const el = document.createElement('div'); el.className = 'unit';
            el.style.left = hero.x + 'px'; el.style.top = hero.y + 'px';
            el.innerHTML = `<div class="unit-symbol" style="color:${getColor(hero.job)}">${hero.symbol}</div><div class="unit-label">${hero.name}</div>`;
            (hero.status === 'waiting' ? wz : bz).appendChild(el);
            bindDrag(el, hero);
        });
        document.getElementById('btn-start').innerText = `STAGE ${currentStage} 개시`;
        updateInfoDisplay('info-panel-wait');
    }

    // --- 드래그 로직 ---
    function bindDrag(el, hero) {
        let ox, oy;
        const start = (e) => {
            const t = e.touches ? e.touches[0] : e; const r = el.getBoundingClientRect();
            ox = t.clientX - r.left; oy = t.clientY - r.top;
            const move = (me) => {
                const mt = me.touches ? me.touches[0] : me;
                el.style.position = 'fixed'; el.style.left = (mt.clientX - ox) + 'px'; el.style.top = (mt.clientY - oy) + 'px';
            };
            const end = (ee) => {
                const et = ee.changedTouches ? ee.changedTouches[0] : ee;
                window.removeEventListener('mousemove', move); window.removeEventListener('mouseup', end);
                window.removeEventListener('touchmove', move); window.removeEventListener('touchend', end);
                const wzR = document.getElementById('waiting-zone').getBoundingClientRect();
                hero.status = et.clientY > wzR.bottom ? 'battle' : 'waiting';
                const tr = (hero.status === 'battle' ? document.getElementById('battle-zone') : document.getElementById('waiting-zone')).getBoundingClientRect();
                hero.x = et.clientX - tr.left - ox; hero.y = et.clientY - tr.top - oy;
                hero.deployTime = Date.now();
                renderWaitingRoom();
            };
            window.addEventListener('mousemove', move); window.addEventListener('mouseup', end);
            window.addEventListener('touchmove', move, {passive:false}); window.addEventListener('touchend', end);
        };
        el.addEventListener('mousedown', start); el.addEventListener('touchstart', start, {passive:false});
    }

    // --- 전투 로직 ---
    function startCombat() {
        const deployed = myHeroes.filter(h => h.status === 'battle');
        if(deployed.length === 0) return alert("부대를 배치해 주세요!");
        changeScreen('combat-screen');
        const field = document.getElementById('combat-field');
        Array.from(field.children).forEach(c => { if(c.id !== 'joystick-container') c.remove(); });
        document.getElementById('joystick-container').style.display = 'block';
        
        allies = []; enemies = []; projectiles = []; selectedUnit = null;
        battleStartTime = Date.now();

        deployed.forEach((h, i) => {
            const unit = { ...h, atk: h.atk + (upgradeLevel*2), x: 50 + (i*60), y: field.offsetHeight - 80, curHp: h.hp, lastAtk: 0, type: 'hero' };
            unit.el = createCombatEl(unit); allies.push(unit);
        });

        const mult = Math.pow(1.2, currentStage - 1);
        for(let i=0; i<5 + currentStage; i++) {
            const m = { symbol: "㉾", hp: 110*mult, curHp: 110*mult, atk: 7*mult, range: 45, area: 50, moveSpd: 1.2*Math.min(1.6, mult), atkSpd: 0.8, x: Math.random()*(window.innerWidth-40), y: Math.random()*200, lastAtk: 0, type: 'enemy' };
            m.el = createCombatEl(m); enemies.push(m);
        }
        combatActive = true; updateInfoDisplay('info-panel-combat'); requestAnimationFrame(tick);
    }

    function createCombatEl(u) {
        const el = document.createElement('div'); el.className = 'combat-unit'; el.innerText = u.symbol;
        el.style.color = u.type === 'hero' ? getColor(u.job) : '#f0f';
        el.innerHTML += `<div class="hp-bar"><div class="hp-inner"></div></div>`;
        document.getElementById('combat-field').appendChild(el);
        if(u.type === 'hero') {
            const select = () => { allies.forEach(a=>a.el.classList.remove('selected')); selectedUnit=u; u.el.classList.add('selected'); updateInfoDisplay('info-panel-combat'); };
            el.onmousedown = select; el.ontouchstart = (e) => { e.preventDefault(); select(); };
        }
        return el;
    }

    function tick() {
        if(!combatActive) return;
        const sec = Math.floor((Date.now() - battleStartTime)/1000);
        document.getElementById('battle-timer').innerText = `${String(Math.floor(sec/60)).padStart(2,'0')}:${String(sec%60).padStart(2,'0')}`;

        [allies, enemies].forEach((src, idx) => {
            const targets = idx === 0 ? enemies : allies;
            for(let i = src.length - 1; i >= 0; i--) {
                const u = src[i];
                if(u.curHp <= 0) { u.el.remove(); src.splice(i, 1); if(selectedUnit === u) selectedUnit = null; continue; }

                let target = null, minDist = 9999;
                targets.forEach(t => { if(t.curHp > 0) { const d = Math.hypot(t.x-u.x, t.y-u.y); if(d < minDist) { minDist=d; target=t; } } });

                // 조이스틱 이동
                if(u === selectedUnit && joyState.active) { u.x += joyState.vx * u.moveSpd * 1.5; u.y += joyState.vy * u.moveSpd * 1.5; }
                else if(target && minDist > u.range) {
                    const ang = Math.atan2(target.y-u.y, target.x-u.x);
                    u.x += Math.cos(ang)*u.moveSpd; u.y += Math.sin(ang)*u.moveSpd;
                }

                // 공격 로직
                if(target && minDist <= u.range && Date.now() - u.lastAtk > 1000/u.atkSpd) {
                    u.lastAtk = Date.now();
                    if(u.job==='전사' || u.type==='enemy') damage(u.x, u.y, u.area, u.atk, targets);
                    else fire(u, Math.atan2(target.y-u.y, target.x-u.x));
                }
                u.x = Math.max(0, Math.min(window.innerWidth-34, u.x));
                u.y = Math.max(0, Math.min(document.getElementById('combat-field').offsetHeight-34, u.y));
                u.el.style.transform = `translate(${u.x}px, ${u.y}px)`;
                u.el.querySelector('.hp-inner').style.width = (u.curHp/u.hp)*100 + '%';
            }
        });

        updateProjectiles();
        if(allies.length === 0 || enemies.length === 0) {
            combatActive = false;
            if(allies.length > 0) { currentStage++; gold += 100; alert("승리! 보상 100G 획득"); }
            else { alert("패배했습니다..."); }
            endCombat();
        } else requestAnimationFrame(tick);
    }

    function fire(owner, ang) {
        const pEl = document.createElement('div'); pEl.className = 'projectile ' + (owner.job==='궁수'?'arrow':'magic-ball');
        document.getElementById('combat-field').appendChild(pEl);
        projectiles.push({ el: pEl, x: owner.x+17, y: owner.y+17, ang, speed: owner.pSpeed, atk: owner.atk, max: owner.range, traveled: 0, targets: owner.type==='hero'?enemies:allies });
    }

    function updateProjectiles() {
        for(let i=projectiles.length-1; i>=0; i--) {
            const p = projectiles[i]; p.x += Math.cos(p.ang)*p.speed; p.y += Math.sin(p.ang)*p.speed; p.traveled += p.speed;
            p.el.style.transform = `translate(${p.x}px, ${p.y}px) rotate(${p.ang}rad)`;
            let hit = false; p.targets.forEach(t => { if(t.curHp>0 && Math.hypot(t.x+17-p.x, t.y+17-p.y) < 20) hit=true; });
            if(hit || p.traveled >= p.max) { damage(p.x-17, p.y-17, 40, p.atk, p.targets); p.el.remove(); projectiles.splice(i,1); }
        }
    }

    function damage(x,y,r,a,targs) { targs.forEach(t => { if(t.curHp > 0 && Math.hypot(t.x-x, t.y-y) <= r) t.curHp -= a; }); }

    // --- 조이스틱 제어 ---
    const joyUI = document.getElementById('joystick-container'), joyS = document.getElementById('joystick-stick');
    const jStart = (e) => { joyState.active=true; const t=e.touches?e.touches[0]:e, r=joyUI.getBoundingClientRect(); joyState.startX=r.left+r.width/2; joyState.startY=r.top+r.height/2; e.preventDefault(); };
    const jMove = (e) => {
        if(!joyState.active) return; const t=e.touches?e.touches[0]:e;
        const dx=t.clientX-joyState.startX, dy=t.clientY-joyState.startY, dist=Math.min(Math.hypot(dx,dy), 40), ang=Math.atan2(dy,dx);
        joyS.style.transform=`translate(calc(-50% + ${Math.cos(ang)*dist}px), calc(-50% + ${Math.sin(ang)*dist}px))`;
        joyState.vx=Math.cos(ang)*(dist/40); joyState.vy=Math.sin(ang)*(dist/40);
    };
    const jEnd = () => { joyState.active=false; joyState.vx=0; joyState.vy=0; joyS.style.transform='translate(-50%, -50%)'; };
    joyUI.addEventListener('touchstart', jStart, {passive:false}); window.addEventListener('touchmove', jMove, {passive:false}); window.addEventListener('touchend', jEnd);
    joyUI.addEventListener('mousedown', jStart); window.addEventListener('mousemove', jMove); window.addEventListener('mouseup', jEnd);

    function updateInfoDisplay(pId) {
        const p = document.getElementById(pId); if(!p) return; p.innerHTML = '';
        const dep = myHeroes.filter(h => h.status==='battle').sort((a,b)=>a.deployTime-b.deployTime);
        for(let i=0; i<10; i++) {
            const h = dep[i], s = document.createElement('div'); s.className='info-slot'+(h?' active':'')+(h&&selectedUnit&&h.id===selectedUnit.id?' selected-slot':'');
            s.innerHTML = h ? `<b>${h.name}</b>` : '-';
            if(h && pId==='info-panel-combat') s.onclick=() => { allies.forEach(a=>a.el.classList.remove('selected')); const target=allies.find(a=>a.id===h.id); if(target){selectedUnit=target; target.el.classList.add('selected'); updateInfoDisplay(pId);} };
            p.appendChild(s);
        }
    }
    function endCombat() { combatActive=false; changeScreen('waiting-room'); }
    function getColor(j) { return j==='전사'?'#ff6b6b':(j==='궁수'?'#51cf66':'#5c7cff'); }
    changeScreen('login-screen');
</script>
</body>
</html>
