<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mini First Queen - Circular Attack</title>
    <style>
        body { margin: 0; padding: 0; background: #222; color: #fff; font-family: sans-serif; overflow: hidden; touch-action: none; }
        .screen { display: none; width: 100vw; height: 100vh; flex-direction: column; }
        .active { display: flex; }
        button { margin: 5px; padding: 10px; cursor: pointer; background: #444; color: white; border: 1px solid #777; border-radius: 4px; }
        
        /* 대기방 */
        #top-menu { display: flex; background: #111; padding: 5px; border-bottom: 2px solid #555; }
        .zone { position: relative; flex: 1; border: 1px solid #444; overflow: hidden; }
        #waiting-zone { background: #2a2a2a; }
        #battle-zone { background: #2d352d; border-top: 4px double #666; }
        .unit { position: absolute; width: 50px; height: 50px; display: flex; justify-content: center; align-items: center; cursor: pointer; z-index: 10; touch-action: none; }
        .unit-symbol { font-size: 28px; font-weight: bold; }
        .unit-label { position: absolute; bottom: -5px; font-size: 11px; background: rgba(0,0,0,0.5); padding: 0 4px; }

        /* 전투 필드 */
        #combat-field { position: relative; width: 100%; background: #1a1a1a; overflow: hidden; flex: 1; }
        .combat-unit { position: absolute; width: 30px; height: 30px; display: flex; justify-content: center; align-items: center; font-weight: bold; z-index: 5; }
        .hp-bar { position: absolute; top: -10px; left: 0; width: 100%; height: 4px; background: red; }
        .hp-inner { height: 100%; background: #0f0; width: 100%; }

        /* 공격 원형 이펙트 */
        .attack-ring {
            position: absolute; border-radius: 50%; border: 2px solid rgba(255, 255, 255, 0.6);
            background: rgba(255, 255, 255, 0.1); pointer-events: none;
            transform: translate(-50%, -50%); animation: flash 0.3s ease-out forwards;
            z-index: 2;
        }
        @keyframes flash {
            0% { opacity: 1; transform: translate(-50%, -50%) scale(0.5); }
            100% { opacity: 0; transform: translate(-50%, -50%) scale(1.2); }
        }

        #info-panel { height: 100px; background: #111; display: grid; grid-template-columns: repeat(10, 1fr); gap: 2px; padding: 4px; }
        .info-slot { background: #222; border: 1px solid #333; font-size: 8px; display: flex; flex-direction: column; justify-content: center; align-items: center; color: #444; }
        .info-slot.active { color: #fff; border-color: #4a4; }
    </style>
</head>
<body>

    <div id="login-screen" class="screen active" style="justify-content: center; align-items: center;">
        <h2 style="color:#d4af37">FIRST QUEEN MINI</h2>
        <button onclick="changeScreen('waiting-room')" style="padding:15px 30px; background:#d4af37; color:black; font-weight:bold;">게임 접속</button>
    </div>

    <div id="waiting-room" class="screen">
        <div id="top-menu">
            <button onclick="alert('캐릭터 정보 준비중')">캐릭터정보</button>
            <button id="stage-btn" onclick="startCombat()" style="background: #822;">전투 시작</button>
        </div>
        <div id="waiting-zone" class="zone"></div>
        <div id="battle-zone" class="zone"></div>
        <div id="info-panel"></div>
    </div>

    <div id="combat-screen" class="screen">
        <div style="padding: 10px; display: flex; justify-content: space-between; background: #000; height: 40px;">
            <span id="stage-title">STAGE 1</span>
            <button onclick="endCombat()" style="margin:0; padding:2px 10px;">후퇴</button>
        </div>
        <div id="combat-field"></div>
    </div>

<script>
    const heroTemplates = [
        { id: 0, name: "궁수", symbol: "▷", job: "궁수", hp: 100, atk: 8, range: 150, area: 20, moveSpd: 1.5, atkSpd: 1 },
        { id: 1, name: "전사", symbol: "□", job: "전사", hp: 180, atk: 12, range: 30, area: 60, moveSpd: 2.0, atkSpd: 1.2 },
        { id: 2, name: "마법사", symbol: "＠", job: "마법사", hp: 80, atk: 15, range: 100, area: 100, moveSpd: 1.0, atkSpd: 0.5 }
    ];

    let myHeroes = heroTemplates.map(h => ({...h, status: 'waiting', deployTime: 0, x: 0, y: 0}));
    let combatActive = false;
    let allies = [], enemies = [];

    function changeScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(id === 'waiting-room') initWaitingRoom();
    }

    function initWaitingRoom() {
        const wz = document.getElementById('waiting-zone');
        const bz = document.getElementById('battle-zone');
        wz.innerHTML = ''; bz.innerHTML = '';

        myHeroes.forEach((hero, i) => {
            const el = document.createElement('div');
            el.className = 'unit'; el.id = `hero-${hero.id}`;
            el.innerHTML = `<div class="unit-symbol" style="color:${getColor(hero.job)}">${hero.symbol}</div><span class="unit-label">${hero.name}</span>`;
            
            const zone = hero.status === 'waiting' ? wz : bz;
            
            // 겹침 방지: 초기 좌표가 없으면 순서대로 배치
            if (hero.x === 0) {
                hero.x = 20 + (i * 60); 
                hero.y = 30;
            }

            el.style.left = hero.x + 'px';
            el.style.top = hero.y + 'px';
            zone.appendChild(el);
            makeDraggable(el, hero);
        });
        updateInfoPanel();
    }

    function createAttackEffect(x, y, radius, color) {
        const ring = document.createElement('div');
        ring.className = 'attack-ring';
        ring.style.width = (radius * 2) + 'px';
        ring.style.height = (radius * 2) + 'px';
        ring.style.left = x + 'px';
        ring.style.top = y + 'px';
        ring.style.borderColor = color;
        document.getElementById('combat-field').appendChild(ring);
        setTimeout(() => ring.remove(), 300);
    }

    function startCombat() {
        const deployed = myHeroes.filter(h => h.status === 'battle');
        if(deployed.length === 0) return alert("부대를 배치하세요!");

        changeScreen('combat-screen');
        const field = document.getElementById('combat-field');
        field.innerHTML = '';
        allies = []; enemies = [];

        deployed.forEach((h, i) => {
            const obj = { ...h, x: (window.innerWidth/(deployed.length+1))*(i+1), y: field.offsetHeight - 80, curHp: h.hp, lastAtk: 0, type: 'hero' };
            obj.el = createCombatEl(obj);
            allies.push(obj);
        });

        for(let i=0; i<10; i++) {
            const m = { symbol: "㉾", hp: 100, curHp: 100, atk: 5, range: 35, area: 40, moveSpd: 1.5, atkSpd: 0.8, x: Math.random()*(window.innerWidth-40), y: Math.random()*200, lastAtk: 0, type: 'enemy' };
            m.el = createCombatEl(m);
            enemies.push(m);
        }
        combatActive = true;
        requestAnimationFrame(combatLoop);
    }

    function createCombatEl(u) {
        const el = document.createElement('div');
        el.className = 'combat-unit';
        el.innerText = u.symbol;
        el.style.color = u.type === 'hero' ? getColor(u.job) : '#f0f';
        el.innerHTML += `<div class="hp-bar"><div class="hp-inner"></div></div>`;
        document.getElementById('combat-field').appendChild(el);
        return el;
    }

    function combatLoop() {
        if(!combatActive) return;
        processAI(allies, enemies);
        processAI(enemies, allies);
        if(allies.length === 0 || enemies.length === 0) {
            combatActive = false;
            alert(allies.length > 0 ? "승리!" : "전멸했습니다...");
            endCombat();
        } else {
            requestAnimationFrame(combatLoop);
        }
    }

    function processAI(sources, targets) {
        sources.forEach(u => {
            let closest = null; let minDist = 9999;
            targets.forEach(t => {
                const d = Math.hypot(t.x - u.x, t.y - u.y);
                if(d < minDist) { minDist = d; closest = t; }
            });

            if(!closest) return;

            if(minDist > u.range) {
                const angle = Math.atan2(closest.y - u.y, closest.x - u.x);
                u.x += Math.cos(angle) * u.moveSpd;
                u.y += Math.sin(angle) * u.moveSpd;
            } else if (Date.now() - u.lastAtk > 1000 / u.atkSpd) {
                // 공격 실행 및 이펙트
                u.lastAtk = Date.now();
                const color = u.type === 'hero' ? getColor(u.job) : '#f0f';
                createAttackEffect(u.x + 15, u.y + 15, u.area, color);
                
                targets.forEach((target, idx) => {
                    const dist = Math.hypot(target.x - u.x, target.y - u.y);
                    if(dist <= u.area + u.range) {
                        target.curHp -= u.atk;
                    }
                });
            }
            u.el.style.left = u.x + 'px'; u.el.style.top = u.y + 'px';
            u.el.querySelector('.hp-inner').style.width = (u.curHp/u.hp)*100 + '%';
        });

        for(let i=targets.length-1; i>=0; i--) {
            if(targets[i].curHp <= 0) { targets[i].el.remove(); targets.splice(i, 1); }
        }
    }

    function endCombat() { combatActive = false; changeScreen('waiting-room'); }
    function getColor(j) { return j==='전사'?'#ff6b6b':(j==='궁수'?'#51cf66':'#5c7cff'); }

    function makeDraggable(el, hero) {
        let isDragging = false;
        el.onmousedown = el.ontouchstart = (e) => { 
            isDragging = true; el.style.zIndex = 100; 
            e.preventDefault();
        };
        window.onmousemove = window.ontouchmove = (e) => {
            if(!isDragging) return;
            const cx = e.touches ? e.touches[0].clientX : e.clientX;
            const cy = e.touches ? e.touches[0].clientY : e.clientY;
            el.style.position = 'fixed'; el.style.left = (cx-25)+'px'; el.style.top = (cy-25)+'px';
        };
        window.onmouseup = window.ontouchend = (e) => {
            if(!isDragging) return; isDragging = false;
            el.style.position = 'absolute';
            const cy = e.changedTouches ? e.changedTouches[0].clientY : e.clientY;
            const cx = e.changedTouches ? e.changedTouches[0].clientX : e.clientX;
            const wzRect = document.getElementById('waiting-zone').getBoundingClientRect();
            
            hero.status = cy > wzRect.bottom ? 'battle' : 'waiting';
            
            // 좌표 저장
            const parentRect = (hero.status === 'battle' ? document.getElementById('battle-zone') : document.getElementById('waiting-zone')).getBoundingClientRect();
            hero.x = cx - parentRect.left - 25;
            hero.y = cy - parentRect.top - 25;
            
            initWaitingRoom();
        };
    }

    function updateInfoPanel() {
        const ip = document.getElementById('info-panel'); ip.innerHTML = '';
        const deployed = myHeroes.filter(h => h.status === 'battle');
        for(let i=0; i<20; i++) {
            const slot = document.createElement('div');
            slot.className = 'info-slot' + (deployed[i]?' active':'');
            slot.innerHTML = deployed[i] ? `<b>${deployed[i].name}</b><br>${deployed[i].job}` : '-<br>-';
            ip.appendChild(slot);
        }
    }
    initWaitingRoom();
</script>
</body>
</html>
