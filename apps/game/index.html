<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>4대 클래스 시스템: 모션 업데이트</title>
    <style>
        :root { --panel-bg: #2c3e50; --warrior: #e67e22; --archer: #3498db; --mage: #9b59b6; --tank: #f1c40f; }
        * { box-sizing: border-box; }
        body { margin: 0; background: #1a1a1a; color: white; font-family: sans-serif; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        #top-interface { 
            background: var(--panel-bg); 
            padding: 15px; 
            border-bottom: 2px solid #444; 
            flex-shrink: 0; 
            z-index: 1000;
            text-align: center;
        }
        .class-btn { 
            padding: 10px 18px; 
            font-size: 14px; 
            font-weight: bold; 
            border: none; 
            border-radius: 5px; 
            cursor: pointer; 
            margin: 0 5px; 
            transition: 0.2s; 
            color: white;
        }
        .btn-warrior { background: var(--warrior); }
        .btn-archer { background: var(--archer); }
        .btn-mage { background: var(--mage); }
        .btn-tank { background: var(--tank); color: #333; }
        .class-btn:hover { transform: translateY(-2px); }

        #game-viewport { flex-grow: 1; overflow-y: auto; background: #1a1a1a; }
        .zone-container { border-bottom: 5px solid #444; background: #2c3e50; position: relative; }
        canvas { display: block; margin: 0 auto; }
        .zone-label { position: absolute; top: 10px; right: 20px; color: rgba(255,255,255,0.2); font-weight: bold; }
    </style>
</head>
<body>

<div id="top-interface">
    <button class="btn-warrior class-btn" onclick="spawnUnit('warrior')">⚔️ 검사</button>
    <button class="btn-archer class-btn" onclick="spawnUnit('archer')">🏹 궁수</button>
    <button class="btn-mage class-btn" onclick="spawnUnit('mage')">🔮 법사</button>
    <button class="btn-tank class-btn" onclick="spawnUnit('tank')">⛓️ 탱커</button>
</div>

<div id="game-viewport">
    <div id="game-worlds"></div>
</div>

<script>
const VIEW_WIDTH = 800;
const SAFE_ZONE_HEIGHT = 120;
let zones = [];

// --- 애니메이션 유틸리티 ---
function getBobbing(tick) { return Math.sin(tick * 0.2) * 3; }
function getWobble(tick) { return Math.sin(tick * 0.2) * 0.15; }

// --- 드로잉 함수 (모션 적용) ---
function drawWarrior(ctx, x, y, color, anim) {
    ctx.save();
    ctx.translate(x, y + anim.bob);
    ctx.rotate(anim.wobble);
    
    // 몸체
    ctx.fillStyle = '#8B4513'; ctx.fillRect(-8, -12, 16, 14);
    ctx.fillStyle = '#D4A574'; ctx.beginPath(); ctx.arc(0, -15, 6, 0, Math.PI * 2); ctx.fill();
    
    // 검 (공격 시 휘두름)
    ctx.save();
    if(anim.isAttacking) ctx.rotate(Math.sin(anim.atkTick * 0.5) * 1.2);
    ctx.strokeStyle = '#C0C0C0'; ctx.lineWidth = 3;
    ctx.beginPath(); ctx.moveTo(8, -8); ctx.lineTo(12, -22); ctx.stroke();
    ctx.restore();
    
    // 방패
    ctx.fillStyle = color; ctx.beginPath(); ctx.ellipse(-8, 0, 5, 7, 0, 0, Math.PI * 2); ctx.fill();
    ctx.restore();
}

function drawArcher(ctx, x, y, color, anim) {
    ctx.save();
    ctx.translate(x, y + anim.bob);
    ctx.rotate(anim.wobble);
    
    ctx.fillStyle = '#2F4F4F'; ctx.fillRect(-8, -12, 16, 14);
    ctx.fillStyle = '#D4A574'; ctx.beginPath(); ctx.arc(0, -15, 6, 0, Math.PI * 2); ctx.fill();
    
    // 활 (공격 시 뒤로 당김)
    let pull = anim.isAttacking ? Math.sin(anim.atkTick * 0.3) * 5 : 0;
    ctx.strokeStyle = color; ctx.lineWidth = 2.5;
    ctx.beginPath(); ctx.arc(8 - pull, -3, 8, Math.PI * 0.3, Math.PI * 1.7, false); ctx.stroke();
    
    ctx.restore();
}

function drawMage(ctx, x, y, color, anim) {
    ctx.save();
    ctx.translate(x, y + anim.bob);
    
    // 로브
    ctx.fillStyle = color; ctx.beginPath(); ctx.moveTo(-8, -12); ctx.lineTo(8, -12); ctx.lineTo(10, 2); ctx.lineTo(-10, 2); ctx.fill();
    ctx.fillStyle = '#D4A574'; ctx.beginPath(); ctx.arc(0, -15, 6, 0, Math.PI * 2); ctx.fill();
    
    // 지팡이 (공격 시 빛남)
    ctx.save();
    if(anim.isAttacking) ctx.translate(Math.cos(anim.atkTick)*2, Math.sin(anim.atkTick)*2);
    ctx.strokeStyle = '#8B4513'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(8, -10); ctx.lineTo(14, -25); ctx.stroke();
    ctx.fillStyle = anim.isAttacking ? '#fff' : '#FF00FF';
    ctx.beginPath(); ctx.arc(14, -26, 4, 0, Math.PI*2); ctx.fill();
    ctx.restore();
    
    ctx.restore();
}

function drawTank(ctx, x, y, color, anim) {
    ctx.save();
    ctx.translate(x, y + anim.bob);
    
    ctx.fillStyle = '#4A4A4A'; ctx.fillRect(-10, -12, 20, 16);
    ctx.fillStyle = '#666'; ctx.beginPath(); ctx.arc(0, -16, 7, 0, Math.PI * 2); ctx.fill();
    
    // 갈고리 (공격 시 앞으로 내묾)
    let thrust = anim.isAttacking ? -10 : 0;
    ctx.strokeStyle = '#FFD700'; ctx.lineWidth = 2.5;
    ctx.beginPath(); ctx.moveTo(8, 2); ctx.lineTo(8, -20 + thrust); ctx.stroke();
    
    ctx.fillStyle = color; ctx.beginPath(); ctx.ellipse(-10, -2, 7, 11, 0, 0, Math.PI * 2); ctx.fill();
    ctx.restore();
}

function drawEnemy(ctx, x, y, anim) {
    ctx.save();
    ctx.translate(x, y + anim.bob);
    ctx.rotate(anim.wobble);
    ctx.fillStyle = '#8B0000'; ctx.beginPath(); ctx.ellipse(0, 0, 7, 10, 0, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#B22222'; ctx.beginPath(); ctx.arc(0, -14, 6, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#FFD700'; ctx.beginPath(); ctx.arc(-2, -15, 1.5, 0, Math.PI * 2); ctx.fill();
    ctx.arc(2, -15, 1.5, 0, Math.PI * 2); ctx.fill();
    ctx.restore();
}

class Entity {
    constructor(x, y, type, subType) {
        this.x = x; this.y = y; this.type = type; this.subType = subType;
        this.tick = Math.random() * 100;
        this.isMoving = false;
        this.atkTick = 0;
        
        // 스탯 설정
        if (subType === 'warrior') { this.name = "검사"; this.color = "#e67e22"; this.maxHp = 350; this.moveSpeed = 2.8; this.atkDist = 60; this.atkSpeed = 1.2; }
        else if (subType === 'archer') { this.name = "궁수"; this.color = "#3498db"; this.maxHp = 150; this.moveSpeed = 2.3; this.atkDist = 300; this.atkSpeed = 1.6; }
        else if (subType === 'mage') { this.name = "법사"; this.color = "#9b59b6"; this.maxHp = 120; this.moveSpeed = 1.8; this.atkDist = 350; this.atkSpeed = 0.5; }
        else if (subType === 'tank') { this.name = "탱커"; this.color = "#f1c40f"; this.maxHp = 500; this.moveSpeed = 2.2; this.atkDist = 380; this.atkSpeed = 0.6; }
        else { this.name = ""; this.color = "#e74c3c"; this.maxHp = 100; this.moveSpeed = 1.2; this.atkDist = 150; this.atkSpeed = 0.8; }

        this.hp = this.maxHp;
        this.energy = 100;
        this.lastAtkTime = 0;
    }

    draw(ctx) {
        if (this.hp <= 0) return;
        
        // 애니메이션 데이터 구성
        const anim = {
            bob: this.isMoving ? getBobbing(this.tick) : 0,
            wobble: this.isMoving ? getWobble(this.tick) : 0,
            isAttacking: (Date.now() - this.lastAtkTime) < 300,
            atkTick: (Date.now() - this.lastAtkTime) * 0.1
        };

        if (this.type === 'char') {
            if (this.subType === 'warrior') drawWarrior(ctx, this.x, this.y, this.color, anim);
            else if (this.subType === 'archer') drawArcher(ctx, this.x, this.y, this.color, anim);
            else if (this.subType === 'mage') drawMage(ctx, this.x, this.y, this.color, anim);
            else if (this.subType === 'tank') drawTank(ctx, this.x, this.y, this.color, anim);
        } else {
            drawEnemy(ctx, this.x, this.y, anim);
        }

        // UI (HP)
        ctx.fillStyle = '#2ecc71'; ctx.fillRect(this.x - 20, this.y + 25, 40 * (this.hp/this.maxHp), 4);
    }

    update(enemies, delta, hLimit, zone) {
        this.tick++;
        const now = Date.now();
        const targets = enemies.filter(e => e.hp > 0);
        const nearest = this.findNearest(targets);
        
        let oldX = this.x, oldY = this.y;

        // 이동 로직 (기존 로직 유지하되 isMoving 체크)
        if (nearest) {
            const d = this.dist(nearest);
            if (d > this.atkDist * 0.8) {
                const a = Math.atan2(nearest.y - this.y, nearest.x - this.x);
                this.x += Math.cos(a) * this.moveSpeed; this.y += Math.sin(a) * this.moveSpeed;
            }
        } else {
            this.y += this.moveSpeed * 0.5;
        }

        this.isMoving = Math.abs(this.x - oldX) + Math.abs(this.y - oldY) > 0.1;

        // 공격 로직
        if (nearest && this.dist(nearest) <= this.atkDist && now - this.lastAtkTime > 1000/this.atkSpeed) {
            this.lastAtkTime = now;
            if (this.subType === 'tank') {
                zone.projectiles.push(new Projectile(this.x, this.y, nearest, this.atkDist, 10, 15, 'hook', 10, this));
            } else if (this.subType === 'mage') {
                zone.projectiles.push(new Projectile(this.x, this.y, nearest, this.atkDist, 20, 6, 'mage', 40));
            } else if (this.subType === 'archer') {
                zone.projectiles.push(new Projectile(this.x, this.y, nearest, this.atkDist, 15, 12, 'char', 5));
            } else {
                nearest.takeDamage(20, this.x, this.y);
            }
        }

        this.x = Math.max(20, Math.min(VIEW_WIDTH-20, this.x));
        if (this.y > hLimit) { this.y = hLimit; }
    }

    dist(t) { return Math.sqrt((this.x-t.x)**2+(this.y-t.y)**2); }
    findNearest(ts) {
        let n = null, d = Infinity;
        ts.forEach(t => { const dist = this.dist(t); if(dist < d) { d = dist; n = t; } });
        return n;
    }
    takeDamage(dmg, sx, sy) {
        this.hp -= dmg;
        const a = Math.atan2(this.y-sy, this.x-sx);
        this.x += Math.cos(a)*10; this.y += Math.sin(a)*10;
    }
}

class Projectile {
    constructor(x, y, target, md, dmg, spd, st, range, owner = null) {
        this.x = x; this.y = y; this.sx = x; this.sy = y;
        this.md = md; this.dmg = dmg; this.st = st; this.speed = spd; this.range = range;
        this.owner = owner; this.dead = false;
        const a = Math.atan2(target.y - y, target.x - x);
        this.vx = Math.cos(a)*this.speed; this.vy = Math.sin(a)*this.speed;
    }
    update(ts) {
        this.x += this.vx; this.y += this.vy;
        let hit = ts.find(t => t.hp > 0 && Math.sqrt((this.x-t.x)**2+(this.y-t.y)**2) < 20);
        if (hit || Math.sqrt((this.x-this.sx)**2+(this.y-this.sy)**2) > this.md) {
            if (this.st === 'hook' && hit) {
                hit.x = this.owner.x + (this.vx > 0 ? -30 : 30);
                hit.y = this.owner.y;
                hit.takeDamage(this.dmg, this.owner.x, this.owner.y);
            } else if (hit) {
                hit.takeDamage(this.dmg, this.x, this.y);
            }
            this.dead = true;
        }
    }
    draw(ctx) {
        ctx.fillStyle = this.st === 'hook' ? "#f1c40f" : "#fff";
        ctx.beginPath(); ctx.arc(this.x, this.y, 4, 0, Math.PI*2); ctx.fill();
        if(this.st === 'hook') {
            ctx.strokeStyle = "#f1c40f"; ctx.beginPath(); ctx.moveTo(this.sx, this.sy); ctx.lineTo(this.x, this.y); ctx.stroke();
        }
    }
}

class Zone {
    constructor(stageNum) {
        this.stageNum = stageNum;
        this.container = document.createElement('div');
        this.container.className = 'zone-container';
        this.container.innerHTML = `<div class="zone-label">ZONE ${stageNum}</div>`;
        this.canvas = document.createElement('canvas');
        this.canvas.width = VIEW_WIDTH; this.canvas.height = 600;
        this.ctx = this.canvas.getContext('2d');
        this.container.appendChild(this.canvas);
        document.getElementById('game-worlds').appendChild(this.container);
        this.characters = []; this.monsters = []; this.projectiles = [];
        for(let i=0; i<4; i++) this.monsters.push(new Entity(Math.random()*700+50, 400+Math.random()*150, 'mon', 'enemy'));
    }
    update() {
        this.characters.forEach(c => c.update(this.monsters, 1, 580, this));
        this.monsters.forEach(m => m.update(this.characters, 1, 580, this));
        this.projectiles.forEach(p => p.update(this.monsters));
        this.projectiles = this.projectiles.filter(p => !p.dead);
        this.draw();
    }
    draw() {
        this.ctx.clearRect(0,0,800,600);
        this.characters.forEach(c => c.draw(this.ctx));
        this.monsters.forEach(m => m.draw(this.ctx));
        this.projectiles.forEach(p => p.draw(this.ctx));
    }
}

function spawnUnit(type) { zones[0].characters.push(new Entity(Math.random()*600+100, 50, 'char', type)); }
zones.push(new Zone(1));
function loop() { zones.forEach(z => z.update()); requestAnimationFrame(loop); }
loop();
</script>
</body>
</html>
