<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Character List Manager Pro</title>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; background-color: #f0f2f5; padding: 20px; color: #333; }
        .container { max-width: 1300px; margin: 0 auto; }
        .controls { background: #fff; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); margin-bottom: 20px; }
        .input-group { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 15px; align-items: center; }
        .input-group input { padding: 8px; border: 1px solid #ced4da; border-radius: 6px; width: 80px; outline: none; }
        .input-group input:focus { border-color: #4dabf7; }
        
        .button-bar { display: flex; gap: 10px; flex-wrap: wrap; padding-top: 10px; border-top: 1px solid #eee; }
        button { padding: 10px 18px; cursor: pointer; border: none; border-radius: 6px; font-weight: bold; transition: all 0.2s; display: flex; align-items: center; gap: 5px; }
        .btn-add { background-color: #2b8a3e; color: white; }
        .btn-rand { background-color: #1971c2; color: white; }
        .btn-rand10 { background-color: #862e9c; color: white; }
        .btn-save { background-color: #e67e22; color: white; }
        .btn-load { background-color: #34495e; color: white; }
        .btn-clear { background-color: #fa5252; color: white; margin-left: auto; }
        button:hover { opacity: 0.9; transform: translateY(-1px); }

        .table-container { background: #fff; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; text-align: center; min-width: 1100px; }
        thead { background-color: #343a40; color: #fff; }
        th { padding: 12px; font-size: 13px; text-transform: uppercase; }
        td { padding: 12px; border-bottom: 1px solid #eee; font-size: 14px; }
        tr:hover { background-color: #f8f9fa; }
        .code-cell { font-family: 'Courier New', monospace; font-weight: bold; color: #1c7ed6; }
        #file-input { display: none; }
    </style>
</head>
<body>

<div class="container">
    <h2>🎮 Character Manager (SSD Storage Mode)</h2>

    <div class="controls">
        <div class="input-group">
            <strong>수동 입력:</strong>
            <input type="text" id="in-code" placeholder="CODE">
            <input type="number" id="in-team" placeholder="TEAM">
            <input type="number" id="in-pearl" placeholder="PEARL">
            <input type="number" id="in-ap" placeholder="AP">
            <input type="number" id="in-hp" placeholder="HP">
            <input type="number" id="in-ep" placeholder="EP">
            <input type="number" id="in-mr" placeholder="MR">
            <input type="number" id="in-tc" placeholder="TC">
            <input type="number" id="in-sy" placeholder="SY">
            <input type="number" id="in-as" placeholder="AS">
            <input type="number" id="in-ms" placeholder="MS">
            <button class="btn-add" onclick="addManual()">+</button>
        </div>

        <div class="button-bar">
            <button class="btn-rand" onclick="addRandom(1)">🎲 R+</button>
            <button class="btn-rand10" onclick="addRandom(10)">🚀 R+10</button>
            <button class="btn-save" onclick="exportData()">💾 목록 다운로드 (JSON)</button>
            <button class="btn-load" onclick="document.getElementById('file-input').click()">📁 목록 불러오기</button>
            <input type="file" id="file-input" accept=".json" onchange="importData(event)">
            <button class="btn-clear" onclick="clearData()">🧹 전체 삭제</button>
        </div>
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>CODE</th>
                    <th>TEAM</th>
                    <th>PEARL</th>
                    <th>ENERGY</th>
                    <th>AP</th>
                    <th>HP</th>
                    <th>EP</th>
                    <th>MR</th>
                    <th>TC</th>
                    <th>SY</th>
                    <th>AS</th>
                    <th>MS</th>
                </tr>
            </thead>
            <tbody id="char-table-body"></tbody>
        </table>
    </div>
</div>

<script>
    let characters = [];

    // 페이지 로드 시 LocalStorage에서 데이터 복구
    window.onload = () => {
        const savedData = localStorage.getItem('character_db');
        if (savedData) {
            characters = JSON.parse(savedData);
            renderTable();
        }
    };

    // 데이터를 브라우저 저장소에 저장 (SSD 역할)
    function syncStorage() {
        localStorage.setItem('character_db', JSON.stringify(characters));
    }

    // 테이블 화면 갱신
    function renderTable() {
        const tbody = document.getElementById('char-table-body');
        tbody.innerHTML = '';
        characters.forEach(char => {
            const row = tbody.insertRow();
            row.innerHTML = `
                <td class="code-cell">${char.code}</td>
                <td>${char.team}</td>
                <td>${char.pearl}</td>
                <td>${char.energy}</td>
                <td>${char.ap}</td>
                <td>${char.hp}</td>
                <td>${char.ep}</td>
                <td>${char.mr}</td>
                <td>${char.tc}</td>
                <td>${char.sy}</td>
                <td>${char.as}</td>
                <td>${char.ms}</td>
            `;
        });
    }

    const rand = (min, max) => Math.floor(Math.random() * (max - min + 1)) + min;
    
    // 랜덤 코드 생성 (알파벳3개 + 숫자01-99)
    const randCode = () => {
        const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
        let res = "";
        for(let i=0; i<3; i++) res += chars.charAt(rand(0, 25));
        res += String(rand(1, 99)).padStart(2, '0');
        return res;
    };

    // 수동 데이터 추가
    function addManual() {
        const char = {
            code: document.getElementById('in-code').value || randCode(),
            team: parseInt(document.getElementById('in-team').value) || 1,
            pearl: parseInt(document.getElementById('in-pearl').value) || 100,
            energy: 0,
            ap: parseInt(document.getElementById('in-ap').value) || 10,
            hp: parseInt(document.getElementById('in-hp').value) || 1000,
            ep: parseInt(document.getElementById('in-ep').value) || 1000,
            mr: parseInt(document.getElementById('in-mr').value) || 1,
            tc: parseInt(document.getElementById('in-tc').value) || 1,
            sy: parseInt(document.getElementById('in-sy').value) || 1,
            as: parseInt(document.getElementById('in-as').value) || 1,
            ms: parseInt(document.getElementById('in-ms').value) || 1
        };
        characters.unshift(char);
        syncStorage();
        renderTable();
    }

    // 랜덤 데이터 추가
    function addRandom(count) {
        for(let i=0; i<count; i++) {
            characters.unshift({
                code: randCode(),
                team: rand(1, 200),
                pearl: rand(100, 1000),
                energy: 0,
                ap: rand(10, 100),
                hp: rand(1000, 10000),
                ep: rand(1000, 10000),
                mr: rand(1, 10),
                tc: rand(1, 10),
                sy: rand(1, 10),
                as: rand(1, 10),
                ms: rand(1, 10)
            });
        }
        syncStorage();
        renderTable();
    }

    // JSON 파일로 다운로드
    function exportData() {
        const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(characters, null, 2));
        const downloadAnchorNode = document.createElement('a');
        downloadAnchorNode.setAttribute("href", dataStr);
        downloadAnchorNode.setAttribute("download", "character_list.json");
        document.body.appendChild(downloadAnchorNode);
        downloadAnchorNode.click();
        downloadAnchorNode.remove();
    }

    // JSON 파일 불러오기
    function importData(event) {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (e) => {
            try {
                const imported = JSON.parse(e.target.result);
                if(Array.isArray(imported)) {
                    characters = imported;
                    syncStorage();
                    renderTable();
                    alert('데이터를 성공적으로 불러왔습니다.');
                }
            } catch (err) {
                alert('파일 형식에 오류가 있습니다.');
            }
        };
        reader.readAsText(file);
    }

    // 전체 삭제
    function clearData() {
        if(confirm('모든 데이터를 삭제하시겠습니까? 저장소도 비워집니다.')) {
            characters = [];
            syncStorage();
            renderTable();
        }
    }
</script>

</body>
</html>
