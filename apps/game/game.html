<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Character World Game</title>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; background-color: #222; color: #fff; margin: 0; display: flex; flex-direction: column; align-items: center; }
        .setup-screen { margin-top: 50px; background: #333; padding: 30px; border-radius: 15px; box-shadow: 0 0 20px rgba(0,0,0,0.5); text-align: center; }
        .setup-screen input { padding: 10px; width: 80px; border-radius: 5px; border: none; margin: 0 10px; }
        .btn-start { padding: 10px 25px; background: #1971c2; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        
        #game-viewport { 
            display: none; 
            width: 100vw; 
            height: 100vh; 
            overflow: auto; 
            position: relative; 
            background-color: #1a1a1a;
            background-image: 
                linear-gradient(rgba(255,255,255,0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.05) 1px, transparent 1px);
            background-size: 50px 50px;
        }
        
        #game-map { position: relative; background: transparent; }
        
        .char-unit { 
            position: absolute; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            transform: translate(-50%, -50%); 
            user-select: none;
        }
        
        .char-code { 
            font-size: 10px; 
            background: rgba(0,0,0,0.7); 
            padding: 2px 5px; 
            border-radius: 3px; 
            margin-bottom: 2px; 
            white-space: nowrap;
            color: #4dabf7;
            font-family: monospace;
        }
        
        .char-symbol { 
            font-size: 24px; 
            cursor: pointer;
            text-shadow: 0 0 10px rgba(255,255,255,0.5);
        }
        
        .info-panel {
            position: fixed;
            top: 10px;
            left: 10px;
            background: rgba(0,0,0,0.8);
            padding: 10px;
            border-radius: 8px;
            font-size: 13px;
            z-index: 100;
        }
    </style>
</head>
<body>

    <div id="setup" class="setup-screen">
        <h2>🗺️ 맵 사이즈 설정</h2>
        <div style="margin-bottom: 20px;">
            가로: <input type="number" id="map-width" value="2000">
            세로: <input type="number" id="map-height" value="2000">
        </div>
        <button class="btn-start" onclick="startGame()">게임 생성 및 시작</button>
        <p style="font-size: 12px; color: #aaa; margin-top: 15px;">cha.html에서 저장된 캐릭터들이 소환됩니다.</p>
    </div>

    <div id="game-viewport">
        <div id="info" class="info-panel">
            접속 중인 캐릭터: <span id="char-count">0</span>명<br>
            <small>드래그해서 맵을 둘러보세요</small>
        </div>
        <div id="game-map"></div>
    </div>

    <script>
        function startGame() {
            const width = document.getElementById('map-width').value || 2000;
            const height = document.getElementById('map-height').value || 2000;
            
            // 1. 저장된 캐릭터 데이터 가져오기 (cha.html과 동일한 키 사용)
            const savedData = localStorage.getItem('character_db_v4');
            const characters = savedData ? JSON.parse(savedData) : [];
            
            if (characters.length === 0) {
                alert('소환할 캐릭터가 없습니다! cha.html에서 캐릭터를 먼저 생성해주세요.');
                return;
            }

            // 2. 화면 전환
            document.getElementById('setup').style.display = 'none';
            const viewport = document.getElementById('game-viewport');
            const map = document.getElementById('game-map');
            viewport.style.display = 'block';
            
            // 3. 맵 크기 설정
            map.style.width = width + 'px';
            map.style.height = height + 'px';
            document.getElementById('char-count').innerText = characters.length;

            // 4. 캐릭터 배치
            characters.forEach(char => {
                createCharacter(char, width, height);
            });
            
            // 맵 중앙으로 스크롤 이동
            viewport.scrollLeft = (width - window.innerWidth) / 2;
            viewport.scrollTop = (height - window.innerHeight) / 2;
        }

        function createCharacter(data, mapW, mapH) {
            const map = document.getElementById('game-map');
            
            // 캐릭터 컨테이너
            const unit = document.createElement('div');
            unit.className = 'char-unit';
            
            // 랜덤 좌표 (맵 경계 안쪽으로)
            const posX = Math.floor(Math.random() * (mapW - 100)) + 50;
            const posY = Math.floor(Math.random() * (mapH - 100)) + 50;
            
            unit.style.left = posX + 'px';
            unit.style.top = posY + 'px';
            
            // 코드 표시 (상단)
            const code = document.createElement('div');
            code.className = 'char-code';
            code.innerText = data.code;
            
            // 심볼 표시 (하단)
            const symbol = document.createElement('div');
            symbol.className = 'char-symbol';
            symbol.innerText = data.symbol;
            symbol.title = `Type: ${data.type} | HP: ${data.hp} | Team: ${data.team}`; // 마우스 올리면 정보 표시
            
            // 색상 구분 (타입별)
            if(data.type === 'A') symbol.style.color = '#ff6b6b';
            else if(data.type === 'B') symbol.style.color = '#51cf66';
            else if(data.type === 'C') symbol.style.color = '#339af0';

            unit.appendChild(code);
            unit.appendChild(symbol);
            map.appendChild(unit);
            
            // 클릭 시 간단한 피드백
            unit.onclick = () => {
                alert(`[${data.code}] 상세 정보\n------------------\nType: ${data.type}\nHP: ${data.hp}\nEnergy: ${data.energy}\nHome: ${data.home}`);
            };
        }
    </script>
</body>
</html>
