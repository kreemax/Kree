<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Character Battle World</title>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; background-color: #1a1a1a; color: #fff; margin: 0; overflow: hidden; }
        .setup-screen { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #333; padding: 30px; border-radius: 15px; text-align: center; z-index: 1000; box-shadow: 0 0 30px rgba(0,0,0,0.5); }
        .setup-screen input { padding: 10px; width: 80px; margin: 0 10px; border-radius: 5px; border: none; }
        .btn-start { padding: 10px 25px; background: #e64980; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        
        #game-viewport { width: 100vw; height: 100vh; overflow: auto; position: relative; display: none; }
        #game-map { position: relative; background-color: #111; background-image: radial-gradient(#222 1px, transparent 1px); background-size: 50px 50px; }
        
        .char-unit { 
            position: absolute; display: flex; flex-direction: column; align-items: center; 
            transform: translate(-50%, -50%); will-change: left, top; z-index: 10;
        }
        .char-code { font-size: 9px; background: rgba(0,0,0,0.6); padding: 1px 4px; border-radius: 3px; margin-bottom: 2px; font-family: monospace; }
        .char-symbol { font-size: 24px; cursor: pointer; transition: transform 0.1s; }
        .hp-bar-container { width: 30px; height: 4px; background: #555; border-radius: 2px; margin-top: 2px; overflow: hidden; }
        .hp-bar-fill { height: 100%; background: #ff6b6b; width: 100%; transition: width 0.2s; }
        
        /* 전투 이펙트 */
        .hit-effect {
            position: absolute; width: 40px; height: 40px; background: radial-gradient(circle, #fff 0%, rgba(255,165,0,0.8) 50%, transparent 70%);
            border-radius: 50%; transform: translate(-50%, -50%); pointer-events: none; animation: flare 0.3s ease-out forwards; z-index: 20;
        }
        @keyframes flare { from { transform: translate(-50%, -50%) scale(0.5); opacity: 1; } to { transform: translate(-50%, -50%) scale(1.5); opacity: 0; } }

        .info-panel { position: fixed; top: 10px; left: 10px; background: rgba(0,0,0,0.8); padding: 10px; border-radius: 8px; z-index: 100; font-size: 13px; border-left: 4px solid #e64980; }
    </style>
</head>
<body>

    <div id="setup" class="setup-screen">
        <h2>⚔️ BATTLE SIMULATOR</h2>
        <div style="margin-bottom: 20px;">
            가로: <input type="number" id="map-width" value="2000">
            세로: <input type="number" id="map-height" value="2000">
        </div>
        <button class="btn-start" onclick="startGame()">전투 시작</button>
    </div>

    <div id="game-viewport">
        <div class="info-panel">
            생존자: <span id="char-count">0</span><br>
            A: 추격전투 | B: 회피 | C: 방황<br>
            <small>에너지가 오를수록 공격력이 강해집니다!</small>
        </div>
        <div id="game-map"></div>
    </div>

    <script>
        let characters = [];
        let mapW, mapH;
        const SIGHT_RANGE = 300;

        function startGame() {
            mapW = parseInt(document.getElementById('map-width').value);
            mapH = parseInt(document.getElementById('map-height').value);
            
            const savedData = localStorage.getItem('character_db_v4');
            const rawData = savedData ? JSON.parse(savedData) : [];
            
            if (rawData.length === 0) { alert('캐릭터가 없습니다!'); return; }

            document.getElementById('setup').style.display = 'none';
            document.getElementById('game-viewport').style.display = 'block';
            const map = document.getElementById('game-map');
            map.style.width = mapW + 'px';
            map.style.height = mapH + 'px';

            const teamGroups = {};
            rawData.forEach(d => {
                if(!teamGroups[d.team]) teamGroups[d.team] = [];
                teamGroups[d.team].push(d);
            });

            characters = rawData.map(d => {
                const teamMembers = teamGroups[d.team];
                const maxMR = Math.max(...teamMembers.map(m => m.mr));
                const isLeader = d.mr === maxMR;
                const x = Math.random() * mapW;
                const y = Math.random() * mapH;
                
                // DOM 생성
                const unit = document.createElement('div');
                unit.className = 'char-unit';
                unit.innerHTML = `
                    <div class="char-code">${d.code}</div>
                    <div class="char-symbol" style="color: ${d.type==='A'?'#ff6b6b':d.type==='B'?'#51cf66':'#339af0'}">${d.symbol}</div>
                    <div class="hp-bar-container"><div class="hp-bar-fill" id="hp-${d.code}"></div></div>
                `;
                map.appendChild(unit);

                return {
                    ...d,
                    maxHp: d.hp,
                    maxEp: d.ep,
                    currentHp: d.hp,
                    currentEp: d.ep,
                    energy: 0,
                    x, y, vx: 0, vy: 0,
                    isLeader, el: unit,
                    hpBar: unit.querySelector('.hp-bar-fill'),
                    lastAttackTime: 0
                };
            });

            requestAnimationFrame(update);
        }

        function createEffect(x, y) {
            const effect = document.createElement('div');
            effect.className = 'hit-effect';
            effect.style.left = x + 'px';
            effect.style.top = y + 'px';
            document.getElementById('game-map').appendChild(effect);
            setTimeout(() => effect.remove(), 300);
        }

        function update(time) {
            characters = characters.filter(c => {
                if (c.currentHp <= 0) {
                    c.el.remove();
                    return false;
                }
                return true;
            });
            document.getElementById('char-count').innerText = characters.length;

            characters.forEach(c => {
                let accelX = (Math.random() - 0.5) * 0.2;
                let accelY = (Math.random() - 0.5) * 0.2;

                characters.forEach(other => {
                    if (c === other) return;
                    const dx = other.x - c.x;
                    const dy = other.y - c.y;
                    const dist = Math.sqrt(dx*dx + dy*dy);

                    if (dist < SIGHT_RANGE) {
                        if (c.team === other.team) {
                            if (other.isLeader && dist > 40) {
                                accelX += dx / dist * 0.5;
                                accelY += dy / dist * 0.5;
                            }
                        } else {
                            if (c.type === 'A') { accelX += dx / dist * 0.8; accelY += dy / dist * 0.8; }
                            else if (c.type === 'B') { accelX -= dx / dist * 1.0; accelY -= dy / dist * 1.0; }
                            
                            // 전투 로직 (접촉 시)
                            if (dist < 30) {
                                const attackCooldown = 1000 / c.as; // 초당 공격 횟수 반영
                                if (time - c.lastAttackTime > attackCooldown) {
                                    // 1. 공격자 밀어내기/전진 연출
                                    const unitX = dx / dist;
                                    const unitY = dy / dist;
                                    c.x += unitX * 2; c.y += unitY * 2; // 전진
                                    other.x += unitX * 2; other.y += unitY * 2; // 밀어내기
                                    createEffect(other.x, other.y);

                                    // 2. 공격자 소모 및 변화
                                    c.currentHp -= c.maxHp * 0.02;
                                    let epLossA = other.mr * c.sy;
                                    c.currentEp -= epLossA;
                                    c.energy += epLossA * 0.1;

                                    // 3. 피격자 피해 및 변화
                                    other.currentHp -= other.maxHp * 0.01;
                                    let attackPower = c.mr * c.tc * (c.energy || 1);
                                    let epLossB = attackPower * other.sy;
                                    other.currentEp -= epLossB;
                                    other.energy += epLossB * 0.1;

                                    c.lastAttackTime = time;
                                }
                            }
                        }
                    }
                });

                // 이동 물리 적용
                c.vx += accelX; c.vy += accelY;
                const speed = Math.sqrt(c.vx*c.vx + c.vy*c.vy);
                const maxSpeed = Math.max(1, c.ms / 5);
                if (speed > maxSpeed) { c.vx = (c.vx/speed)*maxSpeed; c.vy = (c.vy/speed)*maxSpeed; }

                c.x += c.vx; c.y += c.vy;
                if (c.x < 0 || c.x > mapW) c.vx *= -1;
                if (c.y < 0 || c.y > mapH) c.vy *= -1;

                // UI 업데이트
                c.el.style.left = c.x + 'px';
                c.el.style.top = c.y + 'px';
                const hpPercent = Math.max(0, (c.currentHp / c.maxHp) * 100);
                c.hpBar.style.width = hpPercent + '%';
            });

            requestAnimationFrame(update);
        }
    </script>
</body>
</html>
