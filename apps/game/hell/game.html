<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Character Life Simulator - Drag & Drop Update</title>
    <style>
        body { margin: 0; overflow: hidden; background: #e9ecef; font-family: 'Malgun Gothic', sans-serif; user-select: none; }
        
        #ui-panel {
            position: absolute; top: 10px; left: 10px; 
            background: rgba(255, 255, 255, 0.95); padding: 15px; 
            border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.15);
            z-index: 100; min-width: 280px;
        }
        .section-title { font-size: 11px; color: #888; font-weight: bold; text-transform: uppercase; margin-bottom: 5px; }
        .tool-bar { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 15px; }
        
        button { 
            padding: 6px 10px; cursor: pointer; border: 1px solid #ddd; 
            border-radius: 6px; background: white; font-weight: bold; font-size: 13px;
        }
        button.active { border-color: #339af0; background: #339af0; color: white; }
        .brush-bar button { width: 45px; }
        
        #stats-monitor {
            position: absolute; top: 10px; right: 10px;
            background: rgba(0, 0, 0, 0.8); color: #fff;
            padding: 10px 15px; border-radius: 8px; font-size: 13px;
        }
        canvas { display: block; cursor: crosshair; }
    </style>
</head>
<body>

<div id="ui-panel">
    <h3 style="margin:0 0 15px 0;">🌍 Life Simulation</h3>
    
    <div class="section-title">Brush Size</div>
    <div class="tool-bar brush-bar">
        <button onclick="setBrush(1)" id="br-1" class="active">1x1</button>
        <button onclick="setBrush(3)" id="br-3">3x3</button>
        <button onclick="setBrush(5)" id="br-5">5x5</button>
    </div>

    <div class="section-title">Tile Type</div>
    <div class="tool-bar">
        <button onclick="setTool('normal')" id="t-normal" class="active">⚪ 기본</button>
        <button onclick="setTool('wall')" id="t-wall">🌑 벽</button>
        <button onclick="setTool('lava')" id="t-lava" style="color:red;">🔥 용암</button>
        <button onclick="setTool('restaurant')" id="t-restaurant" style="color:orange;">🍱 식당</button>
        <button onclick="setTool('work')" id="t-work" style="color:blue;">💼 일터</button>
    </div>
    
    <div id="info" style="font-size: 12px; color: #666;">
        🖱️ 우클릭: 이동 | 🎡 휠: 확대 | 👆 좌클릭: 타일/<b>캐릭터 끌기</b>
    </div>
</div>

<div id="stats-monitor">
    Alive: <span id="alive-count">0</span>
</div>

<canvas id="gameCanvas"></canvas>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    const GRID_COUNT = 100;
    const TILE_SIZE = 20;
    const WORLD_SIZE = GRID_COUNT * TILE_SIZE;

    let camera = { x: window.innerWidth/2 - WORLD_SIZE/2, y: window.innerHeight/2 - WORLD_SIZE/2, zoom: 1.0 };
    let tiles = {}; 
    let characters = [];
    let currentTool = 'normal';
    let brushSize = 1;
    let isLeftDown = false, isRightDown = false;
    let lastMouse = { x: 0, y: 0 };
    
    // 드래그 관련 변수
    let grabbedChar = null;

    class GameCharacter {
        constructor(data) {
            this.data = data;
            this.x = Math.random() * WORLD_SIZE;
            this.y = Math.random() * WORLD_SIZE;
            this.vx = (Math.random() - 0.5) * data.speed;
            this.vy = (Math.random() - 0.5) * data.speed;
            this.hitTimer = 0;
            this.angle = 0; // 흔들리는 효과용
        }

        update() {
            if (this.data.hp <= 0) return;

            // 드래그 중일 때는 마우스 위치를 따라감 (물리 효과 가미)
            if (grabbedChar === this) {
                const worldM = screenToWorld(lastMouse.x, lastMouse.y);
                // 부드럽게 따라오는 지연 효과 (Lerp)
                this.x += (worldM.x - this.x) * 0.2;
                this.y += (worldM.y - this.y) * 0.2;
                this.vx = 0; this.vy = 0;
                this.angle = Math.sin(Date.now() * 0.01) * 0.2; // 매달려 흔들리는 느낌
                return;
            }

            this.angle = 0;
            let nextX = this.x + this.vx;
            let nextY = this.y + this.vy;
            let tx = Math.floor(nextX / TILE_SIZE);
            let ty = Math.floor(nextY / TILE_SIZE);

            if (tiles[`${tx},${ty}`] === 1 || nextX < 0 || nextX > WORLD_SIZE) { this.vx *= -1; nextX = this.x; }
            if (tiles[`${tx},${ty}`] === 1 || nextY < 0 || nextY > WORLD_SIZE) { this.vy *= -1; nextY = this.y; }

            this.x = nextX;
            this.y = nextY;

            const curTx = Math.floor(this.x / TILE_SIZE);
            const curTy = Math.floor(this.y / TILE_SIZE);
            const tileType = tiles[`${curTx},${curTy}`];
            const maxHp = this.data.level * 100;

            // 타일 효과 정산 (초당 수치/60)
            if (tileType === 2) { // 용암
                this.data.hp -= (maxHp * 0.001);
                this.hitTimer = 10; 
            } else if (tileType === 3) { // 식당: 소지금-1, HP+1, 배고픔-1
                if (this.data.money > 0) {
                    this.data.money -= (1/60);
                    this.data.hp = Math.min(maxHp, this.data.hp + (1/60));
                    this.data.hunger = Math.max(0, this.data.hunger - (1/60));
                }
            } else if (tileType === 4) { // 일터: 소지금+1, HP-1, 배고픔+1
                this.data.money += (1/60);
                this.data.hp -= (1/60);
                this.data.hunger = Math.min(100, this.data.hunger + (1/60));
                this.hitTimer = 5;
            }

            if (this.hitTimer > 0) this.hitTimer--;
            if (this.data.hp < 0) this.data.hp = 0;
        }

        draw() {
            if (this.data.hp <= 0) {
                ctx.font = "16px Arial"; ctx.fillText("🪦", this.x, this.y); return;
            }

            ctx.save();
            ctx.translate(this.x, this.y);
            ctx.rotate(this.angle);

            if (this.hitTimer > 0) {
                ctx.shadowBlur = 10; ctx.shadowColor = "red"; ctx.fillStyle = "red";
            }

            ctx.font = "24px Arial";
            ctx.textAlign = "center";
            ctx.fillText(this.data.symbol, 0, 0);
            ctx.restore();

            // 정보 표시
            ctx.font = "bold 9px sans-serif"; ctx.fillStyle = "#000"; ctx.textAlign = "center";
            ctx.fillText(`${this.data.code} Lv.${this.data.level}`, this.x, this.y - 32);
            ctx.fillStyle = "#666";
            ctx.fillText(`💰${Math.floor(this.data.money)} 🍖${Math.floor(this.data.hunger)}`, this.x, this.y + 20);

            // HP 바
            const barW = 30;
            const hpPer = this.data.hp / (this.data.level * 100);
            ctx.fillStyle = "#ddd"; ctx.fillRect(this.x - barW/2, this.y - 25, barW, 4);
            ctx.fillStyle = hpPer > 0.3 ? "#2ecc71" : "#e74c3c";
            ctx.fillRect(this.x - barW/2, this.y - 25, barW * hpPer, 4);
        }
    }

    function screenToWorld(sx, sy) {
        return {
            x: (sx - camera.x) / camera.zoom,
            y: (sy - camera.y) / camera.zoom
        };
    }

    function setTool(t) {
        currentTool = t;
        document.querySelectorAll('.tool-bar button').forEach(b => b.classList.remove('active'));
        document.getElementById('t-' + t).classList.add('active');
    }

    function setBrush(s) {
        brushSize = s;
        document.querySelectorAll('.brush-bar button').forEach(b => b.classList.remove('active'));
        document.getElementById('br-' + s).classList.add('active');
    }

    function handlePaint(e) {
        if (grabbedChar) return; // 캐릭터 잡고 있을 땐 타일 안 깔림
        const worldM = screenToWorld(e.clientX, e.clientY);
        const centerX = Math.floor(worldM.x / TILE_SIZE);
        const centerY = Math.floor(worldM.y / TILE_SIZE);

        const offset = Math.floor(brushSize / 2);
        for (let i = -offset; i <= offset; i++) {
            for (let j = -offset; j <= offset; j++) {
                const tx = centerX + i; const ty = centerY + j;
                if (tx >= 0 && tx < GRID_COUNT && ty >= 0 && ty < GRID_COUNT) {
                    const key = `${tx},${ty}`;
                    if (currentTool === 'wall') tiles[key] = 1;
                    else if (currentTool === 'lava') tiles[key] = 2;
                    else if (currentTool === 'restaurant') tiles[key] = 3;
                    else if (currentTool === 'work') tiles[key] = 4;
                    else delete tiles[key];
                }
            }
        }
    }

    function init() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        const saved = JSON.parse(localStorage.getItem('char_db_v5') || "[]");
        characters = saved.map(d => new GameCharacter(d));

        canvas.onmousedown = (e) => {
            lastMouse = { x: e.clientX, y: e.clientY };
            if (e.button === 0) {
                isLeftDown = true;
                // 클릭한 위치에 캐릭터가 있는지 확인 (집기 기능)
                const worldM = screenToWorld(e.clientX, e.clientY);
                grabbedChar = characters.find(c => 
                    c.data.hp > 0 && Math.hypot(c.x - worldM.x, c.y - worldM.y) < 20
                );
                if (!grabbedChar) handlePaint(e);
            }
            if (e.button === 2) isRightDown = true;
        };

        window.onmouseup = () => { 
            isLeftDown = false; isRightDown = false; 
            if (grabbedChar) {
                // 놓을 때 속도 초기화 (튕겨나가는 느낌 방지)
                grabbedChar.vx = (Math.random() - 0.5) * grabbedChar.data.speed;
                grabbedChar.vy = (Math.random() - 0.5) * grabbedChar.data.speed;
                grabbedChar = null; 
            }
        };

        window.onmousemove = (e) => {
            if (isRightDown) { camera.x += e.clientX - lastMouse.x; camera.y += e.clientY - lastMouse.y; }
            if (isLeftDown) {
                if (grabbedChar) { /* 캐릭터 이동 로직은 update에서 수행 */ }
                else handlePaint(e);
            }
            lastMouse = { x: e.clientX, y: e.clientY };
        };

        canvas.onwheel = (e) => {
            e.preventDefault();
            const scale = e.deltaY > 0 ? 0.9 : 1.1;
            camera.zoom = Math.min(Math.max(camera.zoom * scale, 0.1), 5);
        };
        canvas.oncontextmenu = (e) => e.preventDefault();
        animate();
    }

    function animate() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.save();
        ctx.translate(camera.x, camera.y);
        ctx.scale(camera.zoom, camera.zoom);

        ctx.fillStyle = "#fff"; ctx.fillRect(0, 0, WORLD_SIZE, WORLD_SIZE);

        for (let key in tiles) {
            const [tx, ty] = key.split(',').map(Number);
            const t = tiles[key];
            if (t === 1) ctx.fillStyle = "#888";
            else if (t === 2) ctx.fillStyle = "#ff4d4f";
            else if (t === 3) ctx.fillStyle = "#ffd8a8";
            else if (t === 4) ctx.fillStyle = "#a5d8ff";
            ctx.fillRect(tx * TILE_SIZE, ty * TILE_SIZE, TILE_SIZE, TILE_SIZE);
        }

        characters.forEach(c => { c.update(); c.draw(); });
        ctx.restore();
        document.getElementById('alive-count').textContent = characters.filter(c => c.data.hp > 0).length;
        requestAnimationFrame(animate);
    }

    window.onresize = () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; };
    init();
</script>
</body>
</html>
