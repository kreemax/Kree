<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Character World - Auto Simulator</title>
    <style>
        body { margin: 0; background: #222; color: white; overflow: hidden; font-family: sans-serif; }
        #ui-layer { position: absolute; top: 10px; left: 10px; pointer-events: none; }
        canvas { display: block; background: #333; }
        .stats { background: rgba(0,0,0,0.7); padding: 10px; border-radius: 8px; margin-bottom: 5px; font-size: 12px; }
    </style>
</head>
<body>

<div id="ui-layer">
    <h2>🌍 Character World (Auto-Mode)</h2>
    <div id="status-display"></div>
</div>

<canvas id="gameCanvas"></canvas>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    let characters = []; // 데이터 객체
    let worldObjects = []; // 게임 내 실행 객체

    // 1. 캐릭터 클래스 정의 (로직의 핵심)
    class Character {
        constructor(data) {
            this.data = data; // cha.html에서 가져온 원본 데이터
            this.x = Math.random() * canvas.width;
            this.y = Math.random() * canvas.height;
            this.vx = (Math.random() - 0.5) * data.speed; // 이속 반영
            this.vy = (Math.random() - 0.5) * data.speed;
            this.size = 30;
            
            // 고유 색상 추출
            const seed = data.code.split('').reduce((acc, char) => acc + char.charCodeAt(0), 0);
            this.color = `hsl(${seed % 360}, 70%, 60%)`;
        }

        // 업데이트 로직 (자동 움직임, 배고픔 증가 등)
        update() {
            // 벽 충돌 체크
            if (this.x < 0 || this.x > canvas.width) this.vx *= -1;
            if (this.y < 0 || this.y > canvas.height) this.vy *= -1;

            this.x += this.vx;
            this.y += this.vy;

            // 시간 지남에 따른 수치 변화 (자동 다마고치 로직)
            if (Math.random() < 0.01) { // 아주 가끔 수치 변경
                this.data.hunger = Math.min(100, (this.data.hunger || 0) + 0.1);
            }
        }

        // 그리기 로직 (레고 스타일)
        draw() {
            ctx.fillStyle = this.color;
            // 몸통
            ctx.fillRect(this.x - 15, this.y - 15, 30, 40);
            // 머리
            ctx.fillStyle = "#ffe0bd";
            ctx.fillRect(this.x - 10, this.y - 30, 20, 20);
            // 코드 표시
            ctx.fillStyle = "white";
            ctx.font = "10px Arial";
            ctx.fillText(this.data.code, this.x - 15, this.y - 35);
        }
    }

    // 2. 초기화 및 실행
    function init() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const savedData = localStorage.getItem('char_db_v5');
        if (savedData) {
            characters = JSON.parse(savedData);
            worldObjects = characters.map(d => new Character(d));
        }
        
        animate();
    }

    function animate() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        worldObjects.forEach(obj => {
            obj.update();
            obj.draw();
        });

        requestAnimationFrame(animate);
    }

    window.addEventListener('resize', () => {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    });

    init();
</script>
</body>
</html>
