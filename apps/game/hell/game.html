<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Character Survival Game Pro</title>
    <style>
        body { margin: 0; overflow: hidden; background: #f0f0f0; font-family: 'Malgun Gothic', sans-serif; }
        
        /* 상단 UI 레이어 */
        #ui-panel {
            position: absolute; top: 10px; left: 10px; 
            background: rgba(255, 255, 255, 0.9); padding: 15px; 
            border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            z-index: 100; min-width: 250px;
        }
        .tool-bar { display: flex; gap: 8px; margin: 10px 0; }
        button { 
            padding: 8px 12px; cursor: pointer; border: 2px solid #ddd; 
            border-radius: 6px; background: white; font-weight: bold;
        }
        button.active { border-color: #333; background: #333; color: white; }
        
        #stats-monitor {
            position: absolute; top: 10px; right: 10px;
            background: rgba(0, 0, 0, 0.7); color: #fff;
            padding: 10px; border-radius: 8px; font-size: 12px;
        }

        canvas { display: block; cursor: crosshair; }
    </style>
</head>
<body>

<div id="ui-panel">
    <h3 style="margin:0 0 10px 0;">🌍 Survival World</h3>
    <div style="font-size: 12px; color: #666; margin-bottom: 10px;">
        🖱️ 좌클릭: 타일 배치 (드래그 가능)<br>
        🖱️ 우클릭: 화면 이동 | 🎡 휠: 확대/축소
    </div>
    
    <div class="tool-bar">
        <button onclick="setTool('normal')" id="btn-normal" class="active">⚪ 기본</button>
        <button onclick="setTool('wall')" id="btn-wall" style="color:#666;">🌑 벽</button>
        <button onclick="setTool('lava')" id="btn-lava" style="color:#e03131;">🔥 용암</button>
    </div>
    
    <div id="info-text" style="font-size: 13px; font-weight: bold;"></div>
</div>

<div id="stats-monitor">
    생존 캐릭터: <span id="alive-count">0</span>
</div>

<canvas id="gameCanvas"></canvas>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    // 맵 설정 (100x100)
    const GRID_COUNT = 100;
    const TILE_SIZE = 20;
    const WORLD_SIZE = GRID_COUNT * TILE_SIZE;

    // 카메라 및 상태
    let camera = { x: window.innerWidth/2 - WORLD_SIZE/2, y: window.innerHeight/2 - WORLD_SIZE/2, zoom: 1.0 };
    let tiles = {}; // "x,y" 형식의 키로 지형 저장
    let characters = [];
    let currentTool = 'normal';
    let isLeftDown = false;
    let isRightDown = false;
    let lastMouse = { x: 0, y: 0 };

    // 1. 캐릭터 객체 클래스
    class GameCharacter {
        constructor(data) {
            this.data = data;
            // 초기 위치 랜덤 (벽이 없는 곳으로)
            this.x = Math.random() * WORLD_SIZE;
            this.y = Math.random() * WORLD_SIZE;
            // 방향 벡터
            this.vx = (Math.random() - 0.5) * data.speed;
            this.vy = (Math.random() - 0.5) * data.speed;
        }

        update() {
            if (this.data.hp <= 0) return;

            let nextX = this.x + this.vx;
            let nextY = this.y + this.vy;

            // 지형 좌표 계산
            let tx = Math.floor(nextX / TILE_SIZE);
            let ty = Math.floor(nextY / TILE_SIZE);

            // 벽 충돌 및 맵 경계 처리
            if (tiles[`${tx},${ty}`] === 1 || nextX < 0 || nextX > WORLD_SIZE) {
                this.vx *= -1;
                nextX = this.x;
            }
            if (tiles[`${tx},${ty}`] === 1 || nextY < 0 || nextY > WORLD_SIZE) {
                this.vy *= -1;
                nextY = this.y;
            }

            this.x = nextX;
            this.y = nextY;

            // 용암 데미지 처리 (초당 약 5% 감소)
            const curTx = Math.floor(this.x / TILE_SIZE);
            const curTy = Math.floor(this.y / TILE_SIZE);
            if (tiles[`${curTx},${curTy}`] === 2) {
                const maxHp = this.data.level * 100;
                this.data.hp -= (maxHp * 0.001); // 프레임당 데미지
                if (this.data.hp < 0) this.data.hp = 0;
            }
        }

        draw() {
            if (this.data.hp <= 0) {
                ctx.font = "16px Arial";
                ctx.fillText("🪦", this.x, this.y);
                return;
            }

            // 1. 캐릭터 심볼
            ctx.font = "20px Arial";
            ctx.textAlign = "center";
            ctx.fillText(this.data.symbol, this.x, this.y);

            // 2. 정보 텍스트 (코드 & 레벨)
            ctx.font = "bold 9px sans-serif";
            ctx.fillStyle = "#000";
            ctx.fillText(`${this.data.code} Lv.${this.data.level}`, this.x, this.y - 25);

            // 3. HP 바
            const barW = 26;
            const hpPer = this.data.hp / (this.data.level * 100);
            ctx.fillStyle = "#eee";
            ctx.fillRect(this.x - barW/2, this.y - 20, barW, 4);
            ctx.fillStyle = hpPer > 0.3 ? "#2ecc71" : "#e74c3c";
            ctx.fillRect(this.x - barW/2, this.y - 20, barW * hpPer, 4);
        }
    }

    // 도구 선택
    function setTool(tool) {
        currentTool = tool;
        document.querySelectorAll('.tool-bar button').forEach(btn => btn.classList.remove('active'));
        document.getElementById('btn-' + tool).classList.add('active');
    }

    // 초기화
    function init() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        // localStorage에서 데이터 로드
        const saved = JSON.parse(localStorage.getItem('char_db_v5') || "[]");
        characters = saved.map(d => new GameCharacter(d));

        // 이벤트 바인딩
        canvas.onmousedown = (e) => {
            if (e.button === 0) isLeftDown = true;
            if (e.button === 2) isRightDown = true;
            if (isLeftDown) handlePaint(e);
            lastMouse = { x: e.clientX, y: e.clientY };
        };
        window.onmouseup = () => { isLeftDown = false; isRightDown = false; };
        window.onmousemove = (e) => {
            if (isRightDown) {
                camera.x += e.clientX - lastMouse.x;
                camera.y += e.clientY - lastMouse.y;
            }
            if (isLeftDown) handlePaint(e);
            lastMouse = { x: e.clientX, y: e.clientY };
        };
        canvas.onwheel = (e) => {
            e.preventDefault();
            const zoomSpeed = 0.001;
            const delta = -e.deltaY;
            const scale = Math.pow(1.1, delta/100);
            camera.zoom *= scale;
            // 줌 범위 제한
            camera.zoom = Math.min(Math.max(camera.zoom, 0.2), 3.0);
        };
        canvas.oncontextmenu = (e) => e.preventDefault();

        animate();
    }

    // 타일 칠하기 로직
    function handlePaint(e) {
        const worldX = (e.clientX - camera.x) / camera.zoom;
        const worldY = (e.clientY - camera.y) / camera.zoom;
        const tx = Math.floor(worldX / TILE_SIZE);
        const ty = Math.floor(worldY / TILE_SIZE);

        if (tx >= 0 && tx < GRID_COUNT && ty >= 0 && ty < GRID_COUNT) {
            const key = `${tx},${ty}`;
            if (currentTool === 'wall') tiles[key] = 1;
            else if (currentTool === 'lava') tiles[key] = 2;
            else delete tiles[key];
        }
    }

    function animate() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        ctx.save();
        ctx.translate(camera.x, camera.y);
        ctx.scale(camera.zoom, camera.zoom);

        // 1. 기본 바닥 (흰색)
        ctx.fillStyle = "#ffffff";
        ctx.fillRect(0, 0, WORLD_SIZE, WORLD_SIZE);

        // 2. 그리드 선
        ctx.strokeStyle = "#f0f0f0";
        ctx.lineWidth = 1;
        ctx.beginPath();
        for(let i=0; i<=GRID_COUNT; i++) {
            ctx.moveTo(i * TILE_SIZE, 0); ctx.lineTo(i * TILE_SIZE, WORLD_SIZE);
            ctx.moveTo(0, i * TILE_SIZE); ctx.lineTo(WORLD_SIZE, i * TILE_SIZE);
        }
        ctx.stroke();

        // 3. 타일(벽/용암) 렌더링
        for (let key in tiles) {
            const [tx, ty] = key.split(',').map(Number);
            ctx.fillStyle = tiles[key] === 1 ? "#888" : "#ff4d4f";
            ctx.fillRect(tx * TILE_SIZE, ty * TILE_SIZE, TILE_SIZE, TILE_SIZE);
        }

        // 4. 캐릭터 업데이트 및 그리기
        let alive = 0;
        characters.forEach(c => {
            c.update();
            c.draw();
            if (c.data.hp > 0) alive++;
        });

        ctx.restore();

        // UI 정보 업데이트
        document.getElementById('alive-count').textContent = alive;
        document.getElementById('info-text').textContent = `Zoom: ${camera.zoom.toFixed(2)}x`;

        requestAnimationFrame(animate);
    }

    window.onresize = () => {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    };

    init();
</script>

</body>
</html>
