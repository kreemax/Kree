<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Infinite Grid Map</title>
    <style>
        body { margin: 0; overflow: hidden; background: #1a1a1a; font-family: sans-serif; }
        #ui { position: absolute; top: 10px; left: 10px; color: white; background: rgba(0,0,0,0.6); padding: 15px; border-radius: 8px; pointer-events: none; }
        canvas { display: block; cursor: grab; }
        canvas:active { cursor: grabbing; }
    </style>
</head>
<body>

<div id="ui">
    <b>Map Control</b><br>
    - 이동: 드래그 (Mouse Drag)<br>
    - 확대/축소: 휠 (Mouse Wheel)<br>
    <div id="info" style="margin-top: 10px; font-size: 12px; color: #aaa;"></div>
</div>

<canvas id="gameCanvas"></canvas>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const info = document.getElementById('info');

    // 맵 설정
    const GRID_SIZE = 100; // 가로세로 100개
    const BLOCK_SIZE = 20; // 20px
    const MAP_WIDTH = GRID_SIZE * BLOCK_SIZE;
    const MAP_HEIGHT = GRID_SIZE * BLOCK_SIZE;

    // 카메라(변환) 상태
    let camera = {
        x: window.innerWidth / 2 - MAP_WIDTH / 2, // 중앙 배치
        y: window.innerHeight / 2 - MAP_HEIGHT / 2,
        zoom: 1.0,
        minZoom: 0.1,
        maxZoom: 5.0
    };

    // 드래그 상태
    let isDragging = false;
    let lastMouse = { x: 0, y: 0 };

    function init() {
        resize();
        window.addEventListener('resize', resize);
        
        // 마우스 이벤트
        canvas.addEventListener('mousedown', (e) => { isDragging = true; lastMouse = { x: e.clientX, y: e.clientY }; });
        window.addEventListener('mouseup', () => isDragging = false);
        window.addEventListener('mousemove', handleMouseMove);
        canvas.addEventListener('wheel', handleWheel, { passive: false });

        animate();
    }

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }

    // 화면 이동 (Panning)
    function handleMouseMove(e) {
        if (!isDragging) return;
        const dx = e.clientX - lastMouse.x;
        const dy = e.clientY - lastMouse.y;
        
        camera.x += dx;
        camera.y += dy;
        lastMouse = { x: e.clientX, y: e.clientY };
    }

    // 확대/축소 (Zooming) - 마우스 포인터 기준으로 확대
    function handleWheel(e) {
        e.preventDefault();
        const zoomSpeed = 0.001;
        const delta = -e.deltaY;
        const newZoom = Math.min(Math.max(camera.zoom + delta * zoomSpeed, camera.minZoom), camera.maxZoom);
        
        // 마우스 위치를 기준으로 줌 적용을 위한 계산
        const mouseX = e.clientX;
        const mouseY = e.clientY;

        // 실제 맵 상의 좌표 계산
        const worldX = (mouseX - camera.x) / camera.zoom;
        const worldY = (mouseY - camera.y) / camera.zoom;

        camera.zoom = newZoom;

        // 새로운 줌 기준 카메라 위치 재조정
        camera.x = mouseX - worldX * camera.zoom;
        camera.y = mouseY - worldY * camera.zoom;
    }

    function drawGrid() {
        ctx.strokeStyle = "#333";
        ctx.lineWidth = 1 / camera.zoom; // 줌에 상관없이 일정한 선 굵기 유지

        ctx.beginPath();
        // 세로선
        for (let i = 0; i <= GRID_SIZE; i++) {
            ctx.moveTo(i * BLOCK_SIZE, 0);
            ctx.lineTo(i * BLOCK_SIZE, MAP_HEIGHT);
        }
        // 가로선
        for (let j = 0; j <= GRID_SIZE; j++) {
            ctx.moveTo(0, j * BLOCK_SIZE);
            ctx.lineTo(MAP_WIDTH, j * BLOCK_SIZE);
        }
        ctx.stroke();
    }

    function drawBlocks() {
        // 예시용 캐릭터 블록 (좌측 상단 0,0)
        ctx.fillStyle = "#4dabf7";
        ctx.fillRect(0, 0, BLOCK_SIZE, BLOCK_SIZE);

        // 예시용 캐릭터 블록 (우측 하단 99,99)
        ctx.fillStyle = "#fa5252";
        ctx.fillRect((GRID_SIZE-1) * BLOCK_SIZE, (GRID_SIZE-1) * BLOCK_SIZE, BLOCK_SIZE, BLOCK_SIZE);
    }

    function animate() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        ctx.save(); // 상태 저장
        
        // 1. 카메라 이동 및 확대 적용
        ctx.translate(camera.x, camera.y);
        ctx.scale(camera.zoom, camera.zoom);

        // 2. 맵 배경 (영역 표시)
        ctx.fillStyle = "#252525";
        ctx.fillRect(0, 0, MAP_WIDTH, MAP_HEIGHT);

        // 3. 그리드 및 블록 그리기
        drawGrid();
        drawBlocks();

        ctx.restore(); // 상태 복구

        // UI 정보 업데이트
        info.innerHTML = `Zoom: ${camera.zoom.toFixed(2)}x | Pos: ${Math.round(camera.x)}, ${Math.round(camera.y)}`;

        requestAnimationFrame(animate);
    }

    init();
</script>

</body>
</html>
