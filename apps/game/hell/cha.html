<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Character System v5 - Level Based</title>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; background-color: #f8f9fa; padding: 20px; color: #212529; }
        .container { max-width: 1200px; margin: 0 auto; }
        .controls { background: #fff; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .input-group { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 15px; align-items: center; }
        .input-group input { padding: 8px; border: 1px solid #dee2e6; border-radius: 6px; width: 100px; outline: none; }
        .input-group label { font-size: 13px; font-weight: bold; color: #495057; }
        
        .button-bar { display: flex; gap: 10px; flex-wrap: wrap; padding-top: 10px; border-top: 1px solid #eee; }
        button { padding: 10px 18px; cursor: pointer; border: none; border-radius: 6px; font-weight: bold; transition: all 0.2s; }
        .btn-add { background-color: #007bff; color: white; }
        .btn-rand { background-color: #6c757d; color: white; }
        .btn-save { background-color: #28a745; color: white; }
        .btn-clear { background-color: #dc3545; color: white; margin-left: auto; }
        button:hover { opacity: 0.9; transform: translateY(-1px); }

        .table-container { background: #fff; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; text-align: center; }
        thead { background-color: #212529; color: #fff; }
        th { padding: 15px; font-size: 13px; }
        td { padding: 12px; border-bottom: 1px solid #eee; }
        tr:hover { background-color: #f1f3f5; }
        
        .code-cell { font-family: 'Courier New', monospace; font-weight: bold; color: #007bff; }
        .lv-badge { background: #e7f5ff; color: #1971c2; padding: 2px 8px; border-radius: 4px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h2>🎮 캐릭터 시스템 (레벨 & 생존 스탯)</h2>

    <div class="controls">
        <div class="input-group">
            <label>코드:</label> <input type="text" id="in-code" placeholder="자동생성">
            <label>점수:</label> <input type="number" id="in-score" value="0">
            <label>소지금:</label> <input type="number" id="in-money" value="0">
            <label>배고픔:</label> <input type="number" id="in-hunger" value="0">
            <label>수면:</label> <input type="number" id="in-sleep" value="0">
            <label>명상:</label> <input type="number" id="in-meditation" value="0">
            <button class="btn-add" onclick="addCharacter(false)">캐릭터 추가</button>
        </div>

        <div class="button-bar">
            <button class="btn-rand" onclick="addCharacter(true)">🎲 랜덤 추가</button>
            <button class="btn-save" onclick="exportData()">💾 JSON 저장</button>
            <button class="btn-clear" onclick="clearData()">🧹 초기화</button>
        </div>
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>코드</th>
                    <th>레벨</th>
                    <th>점수</th>
                    <th>소지금</th>
                    <th>생명력</th>
                    <th>배고픔</th>
                    <th>수면</th>
                    <th>명상</th>
                    <th>이동속도</th>
                </tr>
            </thead>
            <tbody id="char-table-body"></tbody>
        </table>
    </div>
</div>

<script>
    let characters = [];

    window.onload = () => {
        const saved = localStorage.getItem('char_db_v5');
        if (saved) {
            characters = JSON.parse(saved);
            renderTable();
        }
    };

    function sync() {
        localStorage.setItem('char_db_v5', JSON.stringify(characters));
        renderTable();
    }

    const rand = (min, max) => Math.floor(Math.random() * (max - min + 1)) + min;
    
    const genCode = () => {
        const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
        return letters[rand(0,25)] + letters[rand(0,25)] + letters[rand(0,25)] + rand(10, 99);
    };

    function addCharacter(isRandom) {
        const score = isRandom ? rand(0, 500) : (parseInt(document.getElementById('in-score').value) || 0);
        // 레벨 계산: 점수 10점당 1레벨 (최소 1레벨 보장)
        const level = Math.max(1, Math.floor(score / 10));
        
        const char = {
            code: isRandom ? genCode() : (document.getElementById('in-code').value || genCode()),
            level: level,
            score: score,
            money: isRandom ? rand(0, 1000) : (parseInt(document.getElementById('in-money').value) || 0),
            hp: level * 100, // 레벨당 100
            hunger: isRandom ? rand(0, 100) : (parseInt(document.getElementById('in-hunger').value) || 0),
            sleep: isRandom ? rand(0, 100) : (parseInt(document.getElementById('in-sleep').value) || 0),
            meditation: isRandom ? rand(0, 100) : (parseInt(document.getElementById('in-meditation').value) || 0),
            speed: level * 1 // 레벨당 1
        };

        characters.unshift(char);
        sync();
    }

    function renderTable() {
        const tbody = document.getElementById('char-table-body');
        tbody.innerHTML = '';
        characters.forEach(c => {
            const row = tbody.insertRow();
            row.innerHTML = `
                <td class="code-cell">${c.code}</td>
                <td><span class="lv-badge">Lv.${c.level}</span></td>
                <td>${c.score.toLocaleString()}</td>
                <td>${c.money.toLocaleString()} G</td>
                <td style="color: #e03131; font-weight:bold;">${c.hp}</td>
                <td>${c.hunger}</td>
                <td>${c.sleep}</td>
                <td>${c.meditation}</td>
                <td>${c.speed} m/s</td>
            `;
        });
    }

    function exportData() {
        const blob = new Blob([JSON.stringify(characters, null, 2)], {type : 'application/json'});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = "character_v5.json";
        a.click();
    }

    function clearData() {
        if(confirm('데이터를 모두 삭제할까요?')) {
            characters = [];
            sync();
        }
    }
</script>

</body>
</html>
