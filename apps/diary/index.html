<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Quick Memo Pro - Daily</title>
    <style>
        :root {
            --bg: #0f172a; --card-bg: #1e293b; --accent: #38bdf8;
            --text-main: #f8fafc; --text-dim: #94a3b8; --danger: #fb7185;
            --date-header: #94a3b8;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            margin: 0; padding: 0; background-color: var(--bg); color: var(--text-main);
            font-family: 'Pretendard', sans-serif; display: flex; flex-direction: column;
            height: 100vh; overflow: hidden;
        }
        .app-header { padding: 16px 12px; flex-shrink: 0; background: var(--bg); z-index: 10; }
        .input-box {
            display: flex; gap: 8px; background: var(--card-bg);
            padding: 4px 12px; border-radius: 10px; border: 1px solid #334155;
        }
        .input-box input {
            flex: 1; background: none; border: none; outline: none;
            color: var(--text-main); font-size: 16px; padding: 10px 0;
        }
        .btn-add { background: var(--accent); color: var(--bg); border: none; border-radius: 6px; padding: 0 16px; font-weight: 800; cursor: pointer; }
        
        /* 메모 리스트 영역 확장 */
        .memo-container { flex: 1; overflow-y: auto; padding: 0 12px 100px 12px; display: flex; flex-direction: column; gap: 16px; }
        
        .date-group { border-left: 2px solid var(--accent); padding-left: 12px; margin-bottom: 8px; }
        .date-title { font-size: 13px; color: var(--accent); font-weight: bold; margin-bottom: 8px; text-transform: uppercase; }
        
        .memo-card { background: var(--card-bg); border-radius: 8px; padding: 12px 14px; border: 1px solid #334155; margin-bottom: 6px; }
        .memo-body { font-size: 15px; line-height: 1.5; color: #cbd5e1; white-space: pre-wrap; word-break: break-all; }
        
        .admin-tools { position: fixed; bottom: 0; left: 0; right: 0; display: flex; justify-content: space-around; padding: 12px 8px calc(15px + env(safe-area-inset-bottom)); background: #1e293b; border-top: 1px solid #334155; }
        .admin-tools button { background: none; border: none; color: var(--text-dim); font-size: 11px; cursor: pointer; }
        
        #customModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 100; align-items: center; justify-content: center; }
        .modal-content { background: var(--card-bg); width: 85%; max-width: 320px; border-radius: 16px; padding: 20px; border: 1px solid var(--accent); }
        .modal-close { background: var(--accent); color: var(--bg); border: none; width: 100%; padding: 10px; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 15px; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 10px; }
    </style>
</head>
<body>

<div class="app-header">
    <div class="input-box">
        <input type="text" id="mainInput" placeholder="메모 입력 또는 검색..." autocomplete="off">
        <button class="btn-add" onclick="saveMemo()">저장</button>
    </div>
</div>

<div id="memoList" class="memo-container">
    </div>

<div class="admin-tools">
    <button onclick="showModal('공지사항', 'v2.0 업데이트\n- 날짜별 자동 그룹화 기능\n- 칩 제거 및 리스트 확장')">공지사항</button>
    <button onclick="showModal('사용법', '• 입력: 상단 바 입력 후 저장\n• 복사: 메모 클릭\n• 삭제: 메모 길게 누르기')">사용법</button>
    <button onclick="exportCSV()">엑셀다운</button>
    <button onclick="clearAll()" style="color: var(--danger)">전체삭제</button>
</div>

<div id="customModal">
    <div class="modal-content"><div id="modalTitle" style="color:var(--accent); font-weight:bold; margin-bottom:10px;"></div><div id="modalBody" style="font-size:14px; color:var(--text-dim); white-space:pre-wrap;"></div><button class="modal-close" onclick="closeModal()">확인</button></div>
</div>

<script>
    let memos = JSON.parse(localStorage.getItem('kree_v2_memos')) || [];
    const mainInput = document.getElementById('mainInput');
    const memoList = document.getElementById('memoList');

    function getFormattedDate() {
        const d = new Date();
        const weeks = ['일요일', '월요일', '화요일', '수요일', '목요일', '금요일', '토요일'];
        return `${d.getFullYear()}년 ${d.getMonth() + 1}월 ${d.getDate()}일 ${weeks[d.getDay()]}`;
    }

    function saveMemo() {
        const text = mainInput.value.trim();
        if(!text) return;

        const dateLabel = getFormattedDate();
        // 메모 객체 생성
        const newMemo = {
            id: Date.now(),
            date: dateLabel,
            content: text,
            timestamp: Date.now()
        };

        memos.unshift(newMemo);
        updateStorage();
        mainInput.value = "";
        renderMemos();
    }

    function renderMemos() {
        const filter = mainInput.value.toLowerCase();
        const chosungFilter = getChosung(filter);
        memoList.innerHTML = "";

        // 필터링된 메모
        const filtered = memos.filter(m => {
            const t = m.content.toLowerCase();
            return t.includes(filter) || getChosung(t).includes(chosungFilter);
        });

        // 날짜별 그룹화
        const groups = filtered.reduce((acc, m) => {
            if (!acc[m.date]) acc[m.date] = [];
            acc[m.date].push(m);
            return acc;
        }, {});

        // 그룹화된 날짜순으로 렌더링
        Object.keys(groups).forEach(date => {
            const groupDiv = document.createElement('div');
            groupDiv.className = 'date-group';
            groupDiv.innerHTML = `<div class="date-title">${date}</div>`;

            groups[date].forEach(m => {
                const card = document.createElement('div');
                card.className = 'memo-card';
                card.innerHTML = `<div class="memo-body">${m.content}</div>`;
                
                setupLongPress(card, 
                    () => { if(confirm("이 메모를 삭제할까요?")) { memos = memos.filter(x => x.id !== m.id); updateStorage(); renderMemos(); } },
                    () => { 
                        navigator.clipboard.writeText(m.content);
                        showModal('알림', '복사되었습니다.');
                        setTimeout(closeModal, 600);
                    }
                );
                groupDiv.appendChild(card);
            });
            memoList.appendChild(groupDiv);
        });
    }

    function setupLongPress(el, onLong, onClick) {
        let isL = false, sX, sY, isM = false, pressTimer;
        const start = (e) => { 
            const t = e.touches ? e.touches[0] : e; 
            sX = t.clientX; sY = t.clientY; isM = false; isL = false; 
            pressTimer = setTimeout(() => { isL = true; onLong(); }, 800); 
        };
        const move = (e) => { 
            const t = e.touches ? e.touches[0] : e; 
            if (Math.abs(t.clientX - sX) > 10 || Math.abs(t.clientY - sY) > 10) { isM = true; clearTimeout(pressTimer); } 
        };
        const end = () => { clearTimeout(pressTimer); if (!isL && !isM) onClick(); };
        
        el.onmousedown = start; el.onmouseup = end; el.onmousemove = move;
        el.ontouchstart = start; el.ontouchmove = move; el.ontouchend = (e) => { if (!isM) e.preventDefault(); end(); };
    }

    function getChosung(s) {
        const ch = ["ㄱ","ㄲ","ㄴ","ㄷ","ㄸ","ㄹ","ㅁ","ㅂ","ㅃ","ㅅ","ㅆ","ㅇ","ㅈ","ㅉ","ㅊ","ㅋ","ㅌ","ㅍ","ㅎ"];
        let r = "";
        for(let i=0; i<s.length; i++) {
            let c = s.charCodeAt(i) - 44032;
            if(c > -1 && c < 11172) r += ch[Math.floor(c/588)];
            else r += s.charAt(i);
        }
        return r;
    }

    function updateStorage() { localStorage.setItem('kree_v2_memos', JSON.stringify(memos)); }
    function showModal(t, b) { document.getElementById('modalTitle').innerText = t; document.getElementById('modalBody').innerText = b; document.getElementById('customModal').style.display = 'flex'; }
    function closeModal() { document.getElementById('customModal').style.display = 'none'; }
    function clearAll() { if(confirm("모든 메모가 삭제됩니다. 계속할까요?")) { memos = []; updateStorage(); renderMemos(); } }
    function exportCSV() { 
        let c = "\ufeff날짜,내용\n" + memos.map(m => `"${m.date}","${m.content.replace(/"/g, '""')}"`).join('\n');
        const b = new Blob([c], { type: 'text/csv;charset=utf-8;' });
        const l = document.createElement("a"); l.href = URL.createObjectURL(b); l.download = `memo_backup.csv`; l.click(); 
    }

    mainInput.addEventListener('input', renderMemos);
    mainInput.addEventListener('keypress', e => { if(e.key === 'Enter') saveMemo(); });
    
    // 초기 렌더링
    renderMemos();
</script>
</body>
</html>
