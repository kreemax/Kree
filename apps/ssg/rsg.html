<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Story Generator - Modal</title>
    <style>
        :root { --bg: #f2f2f7; --accent: #007aff; --card-bg: #ffffff; --border: #e5e5ea; --text: #1c1c1e; --danger: #ff3b30; --success: #34c759; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; padding: 20px; color: var(--text); -webkit-font-smoothing: antialiased; }
        
        .container { max-width: 500px; margin: 0 auto; }
        .btn-main { background: var(--accent); color: white; width: 100%; font-size: 18px; padding: 16px; border-radius: 15px; border: none; font-weight: bold; cursor: pointer; margin-bottom: 30px; box-shadow: 0 4px 12px rgba(0,122,255,0.2); }

        /* 모달 스타일 */
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 1000; align-items: center; justify-content: center; backdrop-filter: blur(4px); }
        .modal-content { background: white; width: 90%; max-width: 400px; border-radius: 24px; padding: 25px; position: relative; box-shadow: 0 20px 40px rgba(0,0,0,0.2); }

        /* 룰렛 스타일 */
        .roulette-container { display: flex; gap: 8px; justify-content: center; margin: 20px 0; height: 80px; }
        .slot { flex: 1; height: 100%; background: var(--bg); border-radius: 12px; border: 2px solid var(--border); display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 13px; text-align: center; padding: 5px; overflow: hidden; }
        .slot.hit { border-color: var(--success); background: #fafff9; animation: bounce 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); font-size: 15px; }
        
        @keyframes bounce { 0% { transform: scale(0.8); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }

        /* 결과 창 및 버튼 */
        #resultControls { display: none; margin-top: 20px; text-align: center; }
        .final-text { font-size: 18px; font-weight: bold; margin-bottom: 15px; line-height: 1.4; color: var(--accent); }
        .btn-group { display: flex; gap: 8px; }
        .btn-group button { flex: 1; padding: 12px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; }
        .btn-save { background: var(--success); color: white; }
        .btn-close { background: #8e8e93; color: white; }

        /* 리스트 스타일 */
        .history-item { background: white; padding: 18px; border-radius: 18px; margin-bottom: 12px; border: 1px solid var(--border); }
        .history-item .title { font-weight: bold; font-size: 16px; margin-bottom: 6px; }
        .history-item .meta { font-size: 12px; color: #8e8e93; display: flex; justify-content: space-between; }
        .history-item textarea { width: 100%; margin-top: 12px; border: 1px solid var(--bg); border-radius: 10px; padding: 10px; font-family: inherit; font-size: 14px; display: none; background: #fafafa; box-sizing: border-box; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="text-align: center; margin-bottom: 25px;">Story Creator</h2>
    
    <button class="btn-main" onclick="openGenerator()">랜덤 조합 생성 🎲</button>

    <div class="history-list" id="historyList">
        <h3 style="margin-left: 5px; font-size: 16px; color: #666;">저장된 스토리</h3>
        <!-- 목록 출력 -->
    </div>
</div>

<!-- 생성 모달 팝업 -->
<div id="genModal" class="modal-overlay">
    <div class="modal-content">
        <h3 style="margin-top: 0; text-align: center;">새로운 스토리 생성</h3>
        
        <div class="roulette-container">
            <div id="slot-cha" class="slot">캐릭터</div>
            <div id="slot-w1" class="slot">단어1</div>
            <div id="slot-w2" class="slot">단어2</div>
        </div>

        <div id="resultControls">
            <div id="finalStory" class="final-text"></div>
            <div style="margin-bottom: 15px;">
                점수: <input type="number" id="storyScore" value="80" style="width: 50px; padding: 5px; border-radius: 5px; border: 1px solid var(--border);">
            </div>
            <div class="btn-group">
                <button class="btn-save" onclick="saveStory()">등록</button>
                <button class="btn-close" onclick="closeModal()">취소</button>
            </div>
        </div>
    </div>
</div>

<script>
    // localStorage 데이터 가져오기
    function getCharacters() { return JSON.parse(localStorage.getItem('characters')) || []; }
    function getWords() { return JSON.parse(localStorage.getItem('words_data_v2')) || { '누구': [], '통합': [], '장소': [], '시작': [], '액션': [] }; }
    function getHistory() { return JSON.parse(localStorage.getItem('story_history')) || []; }

    let historyData = getHistory();

    function openGenerator() {
        const charList = getCharacters();
        const wordData = getWords();
        const tabs = Object.keys(wordData);

        if (charList.length === 0 || wordData[tabs[0]].length === 0) {
            alert("캐릭터나 단어 데이터를 먼저 등록해주세요!");
            return;
        }

        // 초기화 및 모달 열기
        document.getElementById('genModal').style.display = 'flex';
        document.getElementById('resultControls').style.display = 'none';
        document.querySelectorAll('.slot').forEach(s => {
            s.classList.remove('hit');
            s.innerText = "...";
        });

        // 캐릭터 리스트에서 이름(name)만 추출
        const charNames = charList.map(c => c.name);
        const w1Data = wordData[tabs[0]];
        const w2Data = wordData[tabs[1]];

        // 룰렛 실행
        let results = {};
        runSlot('slot-cha', charNames, (res) => {
            results.cha = res;
            runSlot('slot-w1', w1Data, (res) => {
                results.w1 = res;
                runSlot('slot-w2', w2Data, (res) => {
                    results.w2 = res;
                    finishGen(results);
                });
            });
        });
    }

    function runSlot(id, data, callback) {
        const el = document.getElementById(id);
        let count = 0;
        const timer = setInterval(() => {
            el.innerText = data[Math.floor(Math.random() * data.length)];
            count++;
            if (count > 12) {
                clearInterval(timer);
                const final = data[Math.floor(Math.random() * data.length)];
                el.innerText = final;
                el.classList.add('hit');
                callback(final);
            }
        }, 60);
    }

    function finishGen(res) {
        const display = document.getElementById('finalStory');
        display.innerText = `${res.cha} | ${res.w1} | ${res.w2}`;
        document.getElementById('resultControls').style.display = 'block';
    }

    function saveStory() {
        const text = document.getElementById('finalStory').innerText;
        const score = document.getElementById('storyScore').value;
        const newItem = {
            id: Date.now(),
            text: text,
            score: score,
            extra: "",
            date: new Date().toLocaleDateString()
        };
        
        historyData.unshift(newItem);
        localStorage.setItem('story_history', JSON.stringify(historyData));
        renderHistory();
        closeModal();
    }

    function renderHistory() {
        const list = document.getElementById('historyList');
        const title = list.querySelector('h3');
        list.innerHTML = '';
        list.appendChild(title);

        historyData.forEach(item => {
            const card = document.createElement('div');
            card.className = 'history-item';
            card.innerHTML = `
                <div onclick="toggleExtra(${item.id})">
                    <div class="title">${item.text}</div>
                    <div class="meta">
                        <span>⭐ ${item.score}점</span>
                        <span>${item.date}</span>
                    </div>
                </div>
                <textarea id="extra-${item.id}" placeholder="상세 내용을 기록하세요...">${item.extra || ''}</textarea>
            `;
            
            const area = card.querySelector('textarea');
            area.oninput = () => {
                item.extra = area.value;
                localStorage.setItem('story_history', JSON.stringify(historyData));
            };
            list.appendChild(card);
        });
    }

    function toggleExtra(id) {
        const el = document.getElementById(`extra-${id}`);
        el.style.display = (el.style.display === 'block') ? 'none' : 'block';
    }

    function closeModal() {
        document.getElementById('genModal').style.display = 'none';
    }

    // 초기 렌더링
    renderHistory();
</script>
</body>
</html>
