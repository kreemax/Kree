<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Story Chat Pro - Gemini</title>
    <style>
        :root {
            --pink-bg: #fdf2f4;
            --pink-main: #ff85a2;
            --pink-dark: #fb6f92;
            --white: #ffffff;
            --gray-chat: #f0f0f0;
        }

        body {
            margin: 0; padding: 0; font-family: -apple-system, sans-serif;
            background: var(--pink-bg); display: flex; flex-direction: column; height: 100vh;
            overflow: hidden;
        }

        /* 헤더 */
        .header {
            background: var(--white); padding: 15px; display: flex; align-items: center;
            justify-content: space-between; border-bottom: 1px solid #eee; font-weight: bold;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        /* 채팅 영역 */
        #chatDisplay {
            flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px;
            background: var(--pink-bg);
        }

        .msg { max-width: 80%; padding: 10px 14px; border-radius: 18px; font-size: 14px; line-height: 1.5; word-break: break-all; }
        .msg.bot { align-self: flex-start; background: var(--white); border: 1px solid #eee; border-top-left-radius: 2px; color: #333; }
        .msg.user { align-self: flex-end; background: var(--pink-main); color: white; border-top-right-radius: 2px; }
        .sender-name { font-size: 11px; color: #888; margin-bottom: 4px; font-weight: bold; }

        /* 캐릭터 선택창 */
        .char-selector {
            background: var(--white); padding: 12px; display: flex; gap: 8px; overflow-x: auto;
            border-top: 1px solid #eee; -webkit-overflow-scrolling: touch;
        }
        .char-chip {
            flex-shrink: 0; padding: 8px 15px; border-radius: 20px; background: #f0f0f0;
            font-size: 12px; font-weight: bold; cursor: pointer; border: 2px solid transparent; transition: 0.2s;
        }
        .char-chip.active { background: #fff0f3; border-color: var(--pink-main); color: var(--pink-dark); }

        /* 입력창 */
        .input-area {
            background: var(--white); padding: 10px 15px 35px 15px; display: flex; gap: 10px; align-items: center;
            border-top: 1px solid #eee;
        }
        #msgInput {
            flex: 1; border: 1px solid #ddd; border-radius: 22px; padding: 12px 18px; outline: none; font-size: 15px;
        }
        .btn-send { background: var(--pink-main); color: white; border: none; width: 42px; height: 42px; border-radius: 50%; font-weight: bold; cursor: pointer; flex-shrink: 0; }

        /* 설정 모달 */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 100; align-items: center; justify-content: center; padding: 20px; }
        .modal-content { background: white; width: 100%; max-width: 320px; padding: 25px; border-radius: 25px; box-sizing: border-box; }
        
        .loading-dots { display: inline-block; }
        .loading-dots::after { content: '...'; animation: dots 1.5s steps(5, end) infinite; }
        @keyframes dots { 0%, 20% { content: '.'; } 40% { content: '..'; } 60% { content: '...'; } 80%, 100% { content: ''; } }
    </style>
</head>
<body>

<div class="header">
    <span onclick="location.href='cha.html'" style="cursor:pointer; font-size: 18px;">관리로</span>
    <span id="chatTitle">대화 상대를 선택하세요</span>
    <span onclick="openSettings()" style="cursor:pointer; font-size: 20px;">⚙️</span>
</div>

<div id="chatDisplay">
    <div class="msg bot">🌸 반가워요! 대화하고 싶은 캐릭터를 선택하고 메시지를 보내보세요.</div>
</div>

<div class="char-selector" id="charList"></div>

<div class="input-area">
    <input type="text" id="msgInput" placeholder="메시지를 입력하세요..." onkeypress="if(event.keyCode==13) sendMsg()">
    <button class="btn-send" onclick="sendMsg()">↑</button>
</div>

<div id="settingsModal" class="modal">
    <div class="modal-content">
        <h3 style="margin-top:0;">Gemini API 설정</h3>
        <input type="password" id="apiKeyInput" placeholder="AI Key 입력" style="width:100%; padding:12px; margin:15px 0; border:1px solid #ddd; border-radius:12px; box-sizing:border-box;">
        <button onclick="saveApiKey()" style="width:100%; padding:14px; border:none; background:var(--pink-main); color:white; border-radius:12px; font-weight:bold; cursor:pointer;">저장하기</button>
        <button onclick="closeSettings()" style="width:100%; padding:10px; border:none; background:none; color:#999; margin-top:8px; font-size:13px; cursor:pointer;">닫기</button>
    </div>
</div>

<script>
    // cha.html의 저장 키와 반드시 일치해야 함
    const CHAR_KEY = 'chars_csv_final_v2'; 
    const API_KEY_STORAGE = 'gemini_api_key';

    let characters = [];
    let selectedChar = null;

    // 초기화
    window.onload = () => {
        loadCharacters();
        const savedKey = localStorage.getItem(API_KEY_STORAGE);
        if(savedKey) document.getElementById('apiKeyInput').value = savedKey;
        else openSettings();
    };

    function loadCharacters() {
        characters = JSON.parse(localStorage.getItem(CHAR_KEY)) || [];
        renderCharSelector();
    }

    function renderCharSelector() {
        const list = document.getElementById('charList');
        if(characters.length === 0) {
            list.innerHTML = '<div style="font-size:12px; color:#999; padding:10px;">캐릭터를 먼저 등록해주세요.</div>';
            return;
        }
        list.innerHTML = characters.map((c, idx) => `
            <div class="char-chip" id="char-${idx}" onclick="selectChar(${idx})">${c.name}</div>
        `).join('');
    }

    function selectChar(idx) {
        selectedChar = characters[idx];
        document.querySelectorAll('.char-chip').forEach(el => el.classList.remove('active'));
        document.getElementById(`char-${idx}`).classList.add('active');
        document.getElementById('chatTitle').innerText = `${selectedChar.name}님과 대화 중`;
        appendMsg('bot', `${selectedChar.name}(이)가 대화방에 들어왔습니다.`, null, '시스템');
    }

    async function sendMsg() {
        const input = document.getElementById('msgInput');
        const text = input.value.trim();
        const apiKey = localStorage.getItem(API_KEY_STORAGE);

        if(!text) return;
        if(!selectedChar) { alert('캐릭터를 선택해주세요!'); return; }
        if(!apiKey) { alert('API 키를 입력해주세요!'); openSettings(); return; }

        appendMsg('user', text);
        input.value = '';

        const loadingId = 'load-' + Date.now();
        appendMsg('bot', '<span class="loading-dots">생각 중</span>', loadingId, selectedChar.name);

        try {
            // v1 버전 엔드포인트와 표준 모델명 사용
            const url = `https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${apiKey}`;
            
            const response = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{
                        parts: [{ 
                            text: `너의 이름은 ${selectedChar.name}이야. 
                                   직업은 ${selectedChar.job || '비밀'}이고, 계급은 ${selectedChar.rank || '없음'}이야. 
                                   다음은 너의 특징들이야: ${(selectedChar.memos || []).join(', ')}.
                                   위 설정에 충실하게 빙의해서 친구와 채팅하듯 친근하고 짧게 한국어로 대답해줘.
                                   상대방의 말: ${text}` 
                        }]
                    }],
                    generationConfig: { temperature: 0.8, maxOutputTokens: 250 }
                })
            });

            const data = await response.json();
            
            if(data.error) throw new Error(`${data.error.message}`);

            const botText = data.candidates[0].content.parts[0].text;
            document.getElementById(loadingId).remove();
            appendMsg('bot', botText, null, selectedChar.name);

        } catch (e) {
            document.getElementById(loadingId).innerHTML = `<span style="color:#ff3b30;">오류: ${e.message}</span>`;
        }
    }

    function appendMsg(type, text, id, name = '나') {
        const display = document.getElementById('chatDisplay');
        const div = document.createElement('div');
        div.className = `msg ${type}`;
        if(id) div.id = id;
        const nameTag = `<div class="sender-name">${type === 'bot' ? name : '나'}</div>`;
        div.innerHTML = `${type === 'bot' ? nameTag : ''}${text}`;
        display.appendChild(div);
        display.scrollTop = display.scrollHeight;
    }

    function openSettings() { document.getElementById('settingsModal').style.display = 'flex'; }
    function closeSettings() { document.getElementById('settingsModal').style.display = 'none'; }
    function saveApiKey() {
        const key = document.getElementById('apiKeyInput').value.trim();
        if(key) {
            localStorage.setItem(API_KEY_STORAGE, key);
            alert('키가 저장되었습니다!');
            closeSettings();
        }
    }
</script>
</body>
</html>
