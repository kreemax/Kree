<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Story Chat Pro</title>
    <style>
        :root { --pink-bg: #fdf2f4; --pink-main: #ff85a2; --white: #ffffff; }
        body { margin: 0; padding: 0; font-family: -apple-system, sans-serif; background: var(--pink-bg); display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        .header { background: var(--white); padding: 15px; border-bottom: 1px solid #eee; font-weight: bold; display: flex; justify-content: space-between; align-items: center; z-index: 100; }
        .back-btn { cursor: pointer; color: #888; font-size: 14px; visibility: hidden; }
        .back-btn.show { visibility: visible; }

        #mainList { flex: 1; overflow-y: auto; background: var(--white); display: flex; flex-direction: column; }
        .search-area { padding: 10px; background: var(--pink-bg); position: sticky; top: 0; }
        #charSearch { width: 100%; padding: 10px; border: none; border-radius: 10px; box-sizing: border-box; outline: none; }
        
        .char-row { display: flex; justify-content: space-between; align-items: center; padding: 15px; border-bottom: 1px solid #f9f9f9; cursor: pointer; }
        .char-row:active { background: #fff0f3; }
        .char-info { display: flex; flex-direction: column; }
        .char-name { font-weight: bold; font-size: 15px; }
        .char-last-msg { font-size: 12px; color: #999; margin-top: 4px; }
        .exit-icon { color: #ddd; padding: 5px; font-size: 18px; }

        #chatRoom { position: fixed; inset: 0; background: var(--pink-bg); display: none; flex-direction: column; z-index: 50; }
        #chatDisplay { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; }
        
        .msg { max-width: 80%; padding: 10px 14px; border-radius: 18px; font-size: 14px; line-height: 1.5; word-break: break-all; }
        .msg.bot { align-self: flex-start; background: var(--white); border: 1px solid #eee; border-top-left-radius: 2px; }
        .msg.user { align-self: flex-end; background: var(--pink-main); color: white; border-top-right-radius: 2px; }
        .msg-name { font-size: 11px; color: #888; font-weight: bold; margin-bottom: 4px; }

        .input-area { background: var(--white); padding: 10px 15px 35px 15px; display: flex; gap: 10px; border-top: 1px solid #eee; }
        #msgInput { flex: 1; border: 1px solid #ddd; border-radius: 22px; padding: 12px 18px; outline: none; }
        .btn-send { background: var(--pink-main); color: white; border: none; width: 42px; height: 42px; border-radius: 50%; cursor: pointer; font-size: 20px; }

        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 200; align-items: center; justify-content: center; }
        .modal-content { background: white; width: 85%; max-width: 320px; padding: 25px; border-radius: 25px; text-align: center; }
    </style>
</head>
<body>

<div class="header">
    <span id="backBtn" class="back-btn" onclick="closeChat()">◀ 목록</span>
    <span id="chatTitle">친구 목록</span>
    <span onclick="openSettings()" style="cursor:pointer;">⚙️</span>
</div>

<div id="mainList">
    <div class="search-area">
        <input type="text" id="charSearch" placeholder="캐릭터 이름 검색..." oninput="renderCharList()">
    </div>
    <div id="charRows"></div>
</div>

<div id="chatRoom">
    <div id="chatDisplay"></div>
    <div class="input-area">
        <input type="text" id="msgInput" placeholder="메시지를 입력하세요..." onkeypress="if(event.keyCode==13) sendMsg()">
        <button class="btn-send" onclick="sendMsg()">↑</button>
    </div>
</div>

<div id="settingsModal" class="modal">
    <div class="modal-content">
        <h3>Gemini API 설정</h3>
        <input type="text" id="apiKeyInput" placeholder="API 키를 입력하세요" style="width:100%; padding:12px; margin:15px 0; border:1px solid #ddd; border-radius:12px; box-sizing:border-box;">
        <button onclick="saveApiKey()" style="width:100%; padding:14px; border:none; background:var(--pink-main); color:white; border-radius:12px; font-weight:bold;">저장</button>
    </div>
</div>

<script>
    const CHAR_KEY = 'chars_csv_final_v2'; 
    const API_KEY_STORAGE = 'gemini_api_key';
    const CHAT_HISTORY_KEY = 'chat_histories_v1';

    let characters = JSON.parse(localStorage.getItem(CHAR_KEY)) || [];
    let chatHistories = JSON.parse(localStorage.getItem(CHAT_HISTORY_KEY)) || {};
    let selectedChar = null;
    let activeModel = "gemini-1.5-flash"; // 기본 모델 설정

    window.onload = async () => {
        renderCharList();
        const apiKey = localStorage.getItem(API_KEY_STORAGE);
        if(!apiKey) openSettings(); else await findAvailableModel(apiKey);
    };

    function renderCharList() {
        const query = document.getElementById('charSearch').value.toLowerCase();
        const container = document.getElementById('charRows');
        container.innerHTML = '';

        characters.forEach((c, i) => {
            if(c.name.toLowerCase().includes(query)) {
                const history = chatHistories[c.name] || [];
                const lastMsg = history.length > 0 ? history[history.length-1].text : "새 대화를 시작해보세요.";
                
                const row = document.createElement('div');
                row.className = 'char-row';
                row.onclick = () => openChat(i);
                row.innerHTML = `
                    <div class="char-info">
                        <div class="char-name">${c.name}</div>
                        <div class="char-last-msg">${lastMsg.substring(0, 20)}${lastMsg.length > 20 ? '...' : ''}</div>
                    </div>
                    <div class="exit-icon" onclick="exitChat(event, '${c.name}')">×</div>
                `;
                container.appendChild(row);
            }
        });
    }

    function openChat(index) {
        selectedChar = characters[index];
        document.getElementById('chatRoom').style.display = 'flex';
        document.getElementById('backBtn').classList.add('show');
        document.getElementById('chatTitle').innerText = selectedChar.name;
        renderChatMessages();
        scrollToBottom();
    }

    function closeChat() {
        selectedChar = null;
        document.getElementById('chatRoom').style.display = 'none';
        document.getElementById('backBtn').classList.remove('show');
        document.getElementById('chatTitle').innerText = "친구 목록";
        renderCharList();
    }

    function renderChatMessages() {
        const display = document.getElementById('chatDisplay');
        display.innerHTML = '';
        const history = chatHistories[selectedChar.name] || [];
        history.forEach(msg => appendMsg(msg.type, msg.text, null, msg.type === 'bot' ? selectedChar.name : '나', false));
    }

    async function sendMsg() {
        const input = document.getElementById('msgInput');
        const text = input.value.trim();
        const apiKey = localStorage.getItem(API_KEY_STORAGE);
        if(!text || !selectedChar || !activeModel) return;

        appendMsg('user', text);
        saveChat(selectedChar.name, 'user', text);
        input.value = '';
        scrollToBottom();

        const loadingId = 'load-' + Date.now();
        appendMsg('bot', '...', loadingId, selectedChar.name);

        try {
            const worldData = JSON.parse(localStorage.getItem('world_settings_v1')) || [];
            const worldContext = worldData.map(s => s.content).join('\n');

            const url = `https://generativelanguage.googleapis.com/v1beta/models/${activeModel}:generateContent?key=${apiKey}`;
            const response = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: `[세계관]:${worldContext}\n너는 '${selectedChar.name}'이야. 성격:${(selectedChar.memos||[]).join(',')}. 한국어로 대화해.\n질문: ${text}` }] }]
                })
            });

            const data = await response.json();
            if(data.error) throw new Error(data.error.message);
            
            const botReply = data.candidates[0].content.parts[0].text;
            document.getElementById(loadingId).innerText = botReply;
            saveChat(selectedChar.name, 'bot', botReply);
            scrollToBottom();
        } catch (e) {
            document.getElementById(loadingId).innerText = "오류: " + e.message;
            console.error(e);
        }
    }

    function appendMsg(type, text, id, name = '나', scroll = true) {
        const display = document.getElementById('chatDisplay');
        const div = document.createElement('div');
        div.className = `msg ${type}`;
        if(id) div.id = id;
        div.innerHTML = `${type === 'bot' ? `<div class="msg-name">${name}</div>` : ''}${text}`;
        display.appendChild(div);
        if(scroll) scrollToBottom();
    }

    function scrollToBottom() {
        const display = document.getElementById('chatDisplay');
        setTimeout(() => { display.scrollTop = display.scrollHeight; }, 50);
    }

    function saveChat(charName, type, text) {
        if(!chatHistories[charName]) chatHistories[charName] = [];
        chatHistories[charName].push({ type, text });
        localStorage.setItem(CHAT_HISTORY_KEY, JSON.stringify(chatHistories));
    }

    function exitChat(event, charName) {
        event.stopPropagation();
        if(confirm(`${charName}님과의 대화 내역을 삭제할까요?`)) {
            delete chatHistories[charName];
            localStorage.setItem(CHAT_HISTORY_KEY, JSON.stringify(chatHistories));
            renderCharList();
        }
    }

    async function findAvailableModel(apiKey) {
        try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${apiKey}`);
            const data = await response.json();
            if (data.models) {
                const bestModel = data.models.find(m => m.name.includes('flash'));
                if (bestModel) activeModel = bestModel.name.split('/').pop();
            }
        } catch (e) { console.error("모델 확인 실패:", e); }
    }

    function openSettings() { document.getElementById('settingsModal').style.display = 'flex'; }
    function saveApiKey() {
        localStorage.setItem(API_KEY_STORAGE, document.getElementById('apiKeyInput').value.trim());
        location.reload();
    }
</script>
</body>
</html>
