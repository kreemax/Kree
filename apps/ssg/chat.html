<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Story Chat - Gemini</title>
    <style>
        :root {
            --pink-bg: #fdf2f4;
            --pink-main: #ff85a2;
            --pink-dark: #fb6f92;
            --gray-chat: #f0f0f0;
            --white: #ffffff;
        }

        body {
            margin: 0; padding: 0; font-family: -apple-system, sans-serif;
            background: var(--pink-bg); display: flex; flex-direction: column; height: 100vh;
        }

        /* 헤더 */
        .header {
            background: var(--white); padding: 15px; display: flex; align-items: center;
            justify-content: space-between; border-bottom: 1px solid #eee; font-weight: bold;
        }

        /* 채팅 영역 */
        #chatDisplay {
            flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px;
        }

        .msg { max-width: 75%; padding: 10px 14px; border-radius: 18px; font-size: 14px; line-height: 1.4; position: relative; }
        .msg.bot { align-self: flex-start; background: var(--white); border: 1px solid #eee; border-top-left-radius: 2px; }
        .msg.user { align-self: flex-end; background: var(--pink-main); color: white; border-top-right-radius: 2px; }
        .sender-name { font-size: 11px; color: #888; margin-bottom: 4px; }

        /* 캐릭터 선택창 */
        .char-selector {
            background: var(--white); padding: 10px; display: flex; gap: 10px; overflow-x: auto;
            border-top: 1px solid #eee; scrollbar-width: none;
        }
        .char-chip {
            flex-shrink: 0; padding: 6px 12px; border-radius: 20px; background: #eee;
            font-size: 12px; font-weight: bold; cursor: pointer; border: 2px solid transparent;
        }
        .char-chip.active { background: var(--pink-soft); border-color: var(--pink-main); color: var(--pink-dark); }

        /* 입력창 */
        .input-area {
            background: var(--white); padding: 10px 15px 30px 15px; display: flex; gap: 10px; align-items: center;
        }
        #msgInput {
            flex: 1; border: 1px solid #ddd; border-radius: 20px; padding: 10px 15px; outline: none;
        }
        .btn-send { background: var(--pink-main); color: white; border: none; width: 40px; height: 40px; border-radius: 50%; font-weight: bold; cursor: pointer; }

        /* 설정 모달 */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 100; align-items: center; justify-content: center; }
        .modal-content { background: white; width: 80%; padding: 20px; border-radius: 20px; }
    </style>
</head>
<body>

<div class="header">
    <span onclick="location.href='index.html'" style="cursor:pointer">◀</span>
    <span id="chatTitle">대화 상대를 선택하세요</span>
    <span onclick="openSettings()" style="cursor:pointer">⚙️</span>
</div>

<div id="chatDisplay">
    <div class="msg bot" style="background:#fff9fa;">안녕하세요! 대화할 캐릭터를 선택하고 메시지를 보내보세요.</div>
</div>

<div class="char-selector" id="charList">
    <!-- 캐릭터 목록이 여기에 렌더링됨 -->
</div>

<div class="input-area">
    <input type="text" id="msgInput" placeholder="메시지 입력..." onkeypress="if(event.keyCode==13) sendMsg()">
    <button class="btn-send" onclick="sendMsg()">↑</button>
</div>

<!-- API 설정 모달 -->
<div id="settingsModal" class="modal">
    <div class="modal-content">
        <h3>Gemini API 설정</h3>
        <p style="font-size:12px; color:#666;">Google AI Studio에서 발급받은 키를 입력하세요.</p>
        <input type="password" id="apiKeyInput" placeholder="API Key 입력" style="width:100%; padding:10px; margin:10px 0; border:1px solid #ddd; border-radius:10px; box-sizing:border-box;">
        <button onclick="saveApiKey()" style="width:100%; padding:12px; border:none; background:var(--pink-main); color:white; border-radius:10px; font-weight:bold;">저장 후 닫기</button>
    </div>
</div>

<script>
    const CHAR_KEY = 'chars_csv_final_v2';
    const CHAT_KEY = 'gemini_chat_history';
    const API_KEY_STORAGE = 'gemini_api_key';

    let characters = JSON.parse(localStorage.getItem(CHAR_KEY)) || [];
    let selectedChar = null;
    let chatHistory = []; // 대화 문맥 기억용

    window.onload = () => {
        renderCharSelector();
        if(!localStorage.getItem(API_KEY_STORAGE)) openSettings();
    };

    function renderCharSelector() {
        const list = document.getElementById('charList');
        list.innerHTML = characters.map(c => `
            <div class="char-chip" id="char-${c.id}" onclick="selectChar(${c.id})">${c.name}</div>
        `).join('');
    }

    function selectChar(id) {
        selectedChar = characters.find(c => c.id === id);
        document.querySelectorAll('.char-chip').forEach(el => el.classList.remove('active'));
        document.getElementById(`char-${id}`).classList.add('active');
        document.getElementById('chatTitle').innerText = `${selectedChar.name}와(과) 대화 중`;
        chatHistory = []; // 캐릭터 바뀌면 대화 기억 초기화
    }

    async function sendMsg() {
        const input = document.getElementById('msgInput');
        const text = input.value.trim();
        if(!text || !selectedChar) return;
        if(!localStorage.getItem(API_KEY_STORAGE)) return openSettings();

        // 1. 유저 메시지 화면 표시
        appendMsg('user', text);
        input.value = '';

        // 2. Gemini에게 보낼 문맥 생성
        const prompt = `너는 '${selectedChar.name}'(이)라는 캐릭터야. 
        성격/특징: ${selectedChar.info || '평범함'}. 
        이 성격에 맞게 1~2문장으로 짧고 친근하게 대답해줘. 
        상대방 대화: ${text}`;

        // 3. 로딩 표시
        const loadingId = Date.now();
        appendMsg('bot', '...', loadingId);

        try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${localStorage.getItem(API_KEY_STORAGE)}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: prompt }] }]
                })
            });
            const data = await response.json();
            const botText = data.candidates[0].content.parts[0].text;
            
            // 4. 로딩 지우고 실제 응답 표시
            document.getElementById(loadingId).remove();
            appendMsg('bot', botText, null, selectedChar.name);
        } catch (e) {
            console.error(e);
            document.getElementById(loadingId).innerText = "오류가 발생했습니다. 키를 확인해주세요.";
        }
    }

    function appendMsg(type, text, id, name = '나') {
        const display = document.getElementById('chatDisplay');
        const div = document.createElement('div');
        div.className = `msg ${type}`;
        if(id) div.id = id;
        
        const nameTag = `<div class="sender-name">${type === 'bot' ? name : '나'}</div>`;
        div.innerHTML = `${type === 'bot' ? nameTag : ''}${text}`;
        
        display.appendChild(div);
        display.scrollTop = display.scrollHeight;
    }

    function openSettings() { document.getElementById('settingsModal').style.display = 'flex'; }
    function saveApiKey() {
        const key = document.getElementById('apiKeyInput').value;
        if(key) localStorage.setItem(API_KEY_STORAGE, key);
        document.getElementById('settingsModal').style.display = 'none';
    }
</script>
</body>
</html>
