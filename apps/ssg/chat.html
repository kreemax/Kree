<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Story Chat Pro</title>
    <style>
        :root { --pink-bg: #fdf2f4; --pink-main: #ff85a2; --white: #ffffff; }
        body { margin: 0; padding: 0; font-family: -apple-system, sans-serif; background: var(--pink-bg); display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* 헤더 */
        .header { background: var(--white); padding: 15px; border-bottom: 1px solid #eee; font-weight: bold; display: flex; justify-content: space-between; align-items: center; z-index: 10; }
        
        /* 채팅 표시 영역 */
        #chatDisplay { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; }
        .msg { max-width: 80%; padding: 10px 14px; border-radius: 18px; font-size: 14px; line-height: 1.5; word-break: break-all; position: relative; }
        .msg.bot { align-self: flex-start; background: var(--white); border: 1px solid #eee; border-top-left-radius: 2px; }
        .msg.user { align-self: flex-end; background: var(--pink-main); color: white; border-top-right-radius: 2px; }
        .msg-name { font-size: 11px; color: #888; font-weight: bold; margin-bottom: 4px; }

        /* 캐릭터 선택 (채팅방 목록) */
        .char-selector { background: var(--white); padding: 12px; display: flex; gap: 8px; overflow-x: auto; border-top: 1px solid #eee; border-bottom: 1px solid #eee; }
        .char-chip { flex-shrink: 0; padding: 8px 15px; border-radius: 20px; background: #f0f0f0; font-size: 12px; font-weight: bold; cursor: pointer; border: 2px solid transparent; display: flex; align-items: center; gap: 5px; }
        .char-chip.active { background: #fff0f3; border-color: var(--pink-main); color: #fb6f92; }
        .exit-btn { font-size: 14px; color: #ccc; cursor: pointer; margin-left: 5px; }
        .exit-btn:hover { color: var(--pink-main); }

        /* 입력창 */
        .input-area { background: var(--white); padding: 10px 15px 35px 15px; display: flex; gap: 10px; border-top: 1px solid #eee; }
        #msgInput { flex: 1; border: 1px solid #ddd; border-radius: 22px; padding: 12px 18px; outline: none; }
        .btn-send { background: var(--pink-main); color: white; border: none; width: 42px; height: 42px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 20px; }

        /* 모달 */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 100; align-items: center; justify-content: center; }
        .modal-content { background: white; width: 85%; max-width: 320px; padding: 25px; border-radius: 25px; text-align: center; }
    </style>
</head>
<body>

<div class="header">
    <span onclick="location.href='cha.html'" style="cursor:pointer; color:#888;">◀ 관리</span>
    <span id="chatTitle">캐릭터를 선택하세요</span>
    <span onclick="openSettings()" style="cursor:pointer; font-size: 20px;">⚙️</span>
</div>

<div id="chatDisplay">
    <div class="msg bot">대화를 시작할 캐릭터를 아래에서 선택해주세요!</div>
</div>

<div class="char-selector" id="charList"></div>

<div class="input-area">
    <input type="text" id="msgInput" placeholder="메시지를 입력하세요..." onkeypress="if(event.keyCode==13) sendMsg()">
    <button class="btn-send" onclick="sendMsg()">↑</button>
</div>

<div id="settingsModal" class="modal">
    <div class="modal-content">
        <h3>Gemini API 설정</h3>
        <input type="text" id="apiKeyInput" placeholder="API 키를 입력하세요" style="width:100%; padding:12px; margin:15px 0; border:1px solid #ddd; border-radius:12px; box-sizing:border-box;">
        <button onclick="saveApiKey()" style="width:100%; padding:14px; border:none; background:var(--pink-main); color:white; border-radius:12px; font-weight:bold; cursor:pointer;">저장 후 새로고침</button>
    </div>
</div>

<script>
    const CHAR_KEY = 'chars_csv_final_v2'; 
    const API_KEY_STORAGE = 'gemini_api_key';
    const CHAT_HISTORY_KEY = 'chat_histories_v1'; // 채팅 내역 저장용 키

    let characters = JSON.parse(localStorage.getItem(CHAR_KEY)) || [];
    let chatHistories = JSON.parse(localStorage.getItem(CHAT_HISTORY_KEY)) || {};
    let selectedChar = null;
    let activeModel = null;

    window.onload = async () => {
        renderChars();
        const apiKey = localStorage.getItem(API_KEY_STORAGE);
        if(!apiKey) openSettings(); else await findAvailableModel(apiKey);
    };

    async function findAvailableModel(apiKey) {
        try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${apiKey}`);
            const data = await response.json();
            if (data.models) {
                const bestModel = data.models.find(m => m.supportedGenerationMethods.includes('generateContent') && m.name.includes('flash')) 
                               || data.models.find(m => m.supportedGenerationMethods.includes('generateContent'));
                if (bestModel) {
                    activeModel = bestModel.name;
                    return;
                }
            }
            throw new Error("모델을 찾을 수 없습니다.");
        } catch (e) {
            console.error(e);
        }
    }

    function renderChars() {
        const charList = document.getElementById('charList');
        charList.innerHTML = characters.map((c, i) => `
            <div class="char-chip" id="char-${i}" onclick="selectChar(${i})">
                ${c.name}
                <span class="exit-btn" onclick="exitChat(event, ${i})">×</span>
            </div>
        `).join('');
    }

    // 캐릭터 선택 및 대화 내역 불러오기
    function selectChar(i) {
        selectedChar = characters[i];
        document.querySelectorAll('.char-chip').forEach(el => el.classList.remove('active'));
        document.getElementById(`char-${i}`).classList.add('active');
        document.getElementById('chatTitle').innerText = selectedChar.name;

        renderChatHistory();
    }

    // 채팅 내역 화면에 그리기
    function renderChatHistory() {
        const display = document.getElementById('chatDisplay');
        display.innerHTML = '';
        
        const history = chatHistories[selectedChar.name] || [];
        if(history.length === 0) {
            appendMsg('bot', `${selectedChar.name}님과 대화를 시작해보세요!`, null, selectedChar.name);
        } else {
            history.forEach(msg => {
                appendMsg(msg.type, msg.text, null, msg.type === 'bot' ? selectedChar.name : '나', false);
            });
        }
    }

    async function sendMsg() {
        const input = document.getElementById('msgInput');
        const text = input.value.trim();
        const apiKey = localStorage.getItem(API_KEY_STORAGE);

        if(!text || !selectedChar || !apiKey || !activeModel) return;

        // 1. 내 메시지 추가 및 저장
        appendMsg('user', text);
        saveChat(selectedChar.name, 'user', text);
        
        input.value = '';
        const loadingId = 'load-' + Date.now();
        appendMsg('bot', '...', loadingId, selectedChar.name);

        try {
            // 세계관(World) 데이터가 있다면 가져오기 (선택 사항)
            const worldData = JSON.parse(localStorage.getItem('world_settings_v1')) || [];
            const worldContext = worldData.map(s => s.content).join('\n');

            const url = `https://generativelanguage.googleapis.com/v1beta/${activeModel}:generateContent?key=${apiKey}`;
            const response = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: `[세계관]:${worldContext}\n너는 '${selectedChar.name}'이야. 성격:${(selectedChar.memos||[]).join(',')}. 한국어로 친구처럼 대답해.\n질문: ${text}` }] }]
                })
            });

            const data = await response.json();
            const botReply = data.candidates[0].content.parts[0].text;
            
            document.getElementById(loadingId).innerText = botReply;
            saveChat(selectedChar.name, 'bot', botReply); // 2. 봇 메시지 저장
        } catch (e) {
            document.getElementById(loadingId).innerText = "연결 오류가 발생했습니다.";
        }
    }

    // 메시지 화면 표시 (save=false면 화면에만 그림)
    function appendMsg(type, text, id, name = '나', scroll = true) {
        const display = document.getElementById('chatDisplay');
        const div = document.createElement('div');
        div.className = `msg ${type}`;
        if(id) div.id = id;
        
        div.innerHTML = `
            ${type === 'bot' ? `<div class="msg-name">${name}</div>` : ''}
            <div class="text-content">${text}</div>
        `;
        
        display.appendChild(div);
        if(scroll) display.scrollTop = display.scrollHeight;
    }

    // 로컬 스토리지에 채팅 저장
    function saveChat(charName, type, text) {
        if(!chatHistories[charName]) chatHistories[charName] = [];
        chatHistories[charName].push({ type, text, time: Date.now() });
        localStorage.setItem(CHAT_HISTORY_KEY, JSON.stringify(chatHistories));
    }

    // 나가기 (채팅 내역 삭제)
    function exitChat(event, i) {
        event.stopPropagation(); // 부모 클릭(채팅방 선택) 방지
        const charName = characters[i].name;
        if(confirm(`${charName}님과의 대화 내역을 모두 삭제하고 나갈까요?`)) {
            delete chatHistories[charName];
            localStorage.setItem(CHAT_HISTORY_KEY, JSON.stringify(chatHistories));
            if(selectedChar && selectedChar.name === charName) {
                selectedChar = null;
                document.getElementById('chatTitle').innerText = "캐릭터를 선택하세요";
                document.getElementById('chatDisplay').innerHTML = '<div class="msg bot">대화가 종료되었습니다.</div>';
            }
            renderChars();
        }
    }

    function openSettings() { document.getElementById('settingsModal').style.display = 'flex'; }
    function saveApiKey() {
        localStorage.setItem(API_KEY_STORAGE, document.getElementById('apiKeyInput').value.trim());
        location.reload();
    }
</script>
</body>
</html>
