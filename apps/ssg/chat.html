<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Story Chat Pro</title>
    <style>
        :root { --pink-bg: #fdf2f4; --pink-main: #ff85a2; --pink-dark: #fb6f92; --white: #ffffff; }
        body { margin: 0; padding: 0; font-family: -apple-system, sans-serif; background: var(--pink-bg); display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        .header { background: var(--white); padding: 15px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #eee; font-weight: bold; }
        #chatDisplay { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; }
        .msg { max-width: 80%; padding: 10px 14px; border-radius: 18px; font-size: 14px; line-height: 1.5; word-break: break-all; }
        .msg.bot { align-self: flex-start; background: var(--white); border: 1px solid #eee; border-top-left-radius: 2px; }
        .msg.user { align-self: flex-end; background: var(--pink-main); color: white; border-top-right-radius: 2px; }
        .sender-name { font-size: 11px; color: #888; margin-bottom: 4px; font-weight: bold; }
        .char-selector { background: var(--white); padding: 12px; display: flex; gap: 8px; overflow-x: auto; border-top: 1px solid #eee; }
        .char-chip { flex-shrink: 0; padding: 8px 15px; border-radius: 20px; background: #f0f0f0; font-size: 12px; font-weight: bold; cursor: pointer; border: 2px solid transparent; }
        .char-chip.active { background: #fff0f3; border-color: var(--pink-main); color: var(--pink-dark); }
        .input-area { background: var(--white); padding: 10px 15px 35px 15px; display: flex; gap: 10px; border-top: 1px solid #eee; }
        #msgInput { flex: 1; border: 1px solid #ddd; border-radius: 22px; padding: 12px 18px; outline: none; }
        .btn-send { background: var(--pink-main); color: white; border: none; width: 42px; height: 42px; border-radius: 50%; font-weight: bold; cursor: pointer; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 100; align-items: center; justify-content: center; }
        .modal-content { background: white; width: 85%; max-width: 320px; padding: 25px; border-radius: 25px; text-align: center; }
        .loading-dots::after { content: '...'; animation: dots 1.5s infinite; }
        @keyframes dots { 0%, 20% { content: '.'; } 40% { content: '..'; } 60% { content: '...'; } }
    </style>
</head>
<body>

<div class="header">
    <span onclick="location.href='cha.html'" style="cursor:pointer; color:#888;">◀ 관리</span>
    <span id="chatTitle">대화 상대를 선택하세요</span>
    <span onclick="openSettings()" style="cursor:pointer; font-size: 20px;">⚙️</span>
</div>

<div id="chatDisplay">
    <div class="msg bot">캐릭터를 선택하고 대화를 시작하세요!</div>
</div>

<div class="char-selector" id="charList"></div>

<div class="input-area">
    <input type="text" id="msgInput" placeholder="메시지를 입력하세요..." onkeypress="if(event.keyCode==13) sendMsg()">
    <button class="btn-send" onclick="sendMsg()">↑</button>
</div>

<div id="settingsModal" class="modal">
    <div class="modal-content">
        <h3 style="margin-top:0;">API 설정</h3>
        <input type="text" id="apiKeyInput" placeholder="AI Key를 입력하세요" style="width:100%; padding:12px; margin:15px 0; border:1px solid #ddd; border-radius:12px; box-sizing:border-box;">
        <button onclick="saveApiKey()" style="width:100%; padding:14px; border:none; background:var(--pink-main); color:white; border-radius:12px; font-weight:bold; cursor:pointer;">저장 및 적용</button>
    </div>
</div>

<script>
    // 기존 데이터 구조 유지
    const CHAR_KEY = 'chars_csv_final_v2'; 
    const API_KEY_STORAGE = 'gemini_api_key';
    let characters = JSON.parse(localStorage.getItem(CHAR_KEY)) || [];
    let selectedChar = null;

    window.onload = () => {
        renderChars();
        const savedKey = localStorage.getItem(API_KEY_STORAGE);
        if(savedKey) {
            document.getElementById('apiKeyInput').value = savedKey;
        } else {
            openSettings();
        }
    };

    function renderChars() {
        const list = document.getElementById('charList');
        list.innerHTML = characters.map((c, i) => `<div class="char-chip" id="char-${i}" onclick="selectChar(${i})">${c.name}</div>`).join('');
    }

    function selectChar(i) {
        selectedChar = characters[i];
        document.querySelectorAll('.char-chip').forEach(el => el.classList.remove('active'));
        document.getElementById(`char-${i}`).classList.add('active');
        document.getElementById('chatTitle').innerText = selectedChar.name + "님과 대화 중";
        appendMsg('bot', `${selectedChar.name}(이)가 연결되었습니다.`, null, '시스템');
    }

    async function sendMsg() {
        const input = document.getElementById('msgInput');
        const text = input.value.trim();
        const apiKey = localStorage.getItem(API_KEY_STORAGE);

        if(!text || !selectedChar || !apiKey) return;

        appendMsg('user', text);
        input.value = '';
        const loadingId = 'load-' + Date.now();
        appendMsg('bot', '<span class="loading-dots">생각 중</span>', loadingId, selectedChar.name);

        try {
            // 가장 범용적인 v1beta 엔드포인트 사용
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`;
            
            const response = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{
                        parts: [{ 
                            text: `너는 '${selectedChar.name}'이야. 특징: ${(selectedChar.memos||[]).join(', ')}. 친구처럼 한국어로 짧게 대답해. 질문: ${text}` 
                        }]
                    }]
                })
            });

            const data = await response.json();

            if (data.error) {
                // 에러 발생 시 팝업으로 상세 이유 표시
                alert(`API 에러 발생: ${data.error.message}\n(코드: ${data.error.status})`);
                throw new Error(data.error.message);
            }

            const botText = data.candidates[0].content.parts[0].text;
            document.getElementById(loadingId).innerHTML = botText;

        } catch (e) {
            document.getElementById(loadingId).innerHTML = `<span style="color:red;">호출 실패: ${e.message}</span>`;
        }
    }

    function appendMsg(type, text, id, name = '나') {
        const display = document.getElementById('chatDisplay');
        const div = document.createElement('div');
        div.className = `msg ${type}`;
        if(id) div.id = id;
        div.innerHTML = `${type === 'bot' ? `<div class="sender-name">${name}</div>` : ''}${text}`;
        display.appendChild(div);
        display.scrollTop = display.scrollHeight;
    }

    function openSettings() { document.getElementById('settingsModal').style.display = 'flex'; }
    function saveApiKey() {
        const key = document.getElementById('apiKeyInput').value.trim();
        if(key) {
            localStorage.setItem(API_KEY_STORAGE, key);
            document.getElementById('settingsModal').style.display = 'none';
            alert('키가 저장되었습니다. 다시 대화를 시도해보세요!');
        }
    }
</script>
</body>
</html>
