<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>World Setting - Dalsu Universe</title>
    <style>
        :root { --bg: #f8f9fa; --card: #ffffff; --accent: #ff85a2; --text: #333; }
        body { margin: 0; padding: 0; font-family: -apple-system, sans-serif; background: var(--bg); display: flex; flex-direction: column; height: 100vh; color: var(--text); }
        
        /* 상단 검색바 */
        .header { background: var(--card); padding: 15px; border-bottom: 1px solid #eee; position: sticky; top: 0; z-index: 10; }
        #searchInput { width: 100%; padding: 12px; border: 1.5px solid #eee; border-radius: 12px; box-sizing: border-box; outline: none; transition: 0.3s; font-size: 14px; }
        #searchInput:focus { border-color: var(--accent); background: #fff5f7; }

        /* 세계관 리스트 영역 */
        #worldList { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column-reverse; gap: 10px; }
        .setting-item { background: var(--card); padding: 15px; border-radius: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); border-left: 4px solid var(--accent); line-height: 1.6; font-size: 14px; animation: fadeIn 0.3s ease; position: relative; }
        .setting-item .delete-btn { position: absolute; right: 10px; top: 10px; color: #ccc; cursor: pointer; font-size: 12px; }
        
        /* 하단 입력 폼 */
        .footer { background: var(--card); padding: 15px 15px 30px 15px; border-top: 1px solid #eee; }
        .input-group { display: flex; flex-direction: column; gap: 8px; }
        #worldInput { width: 100%; height: 60px; padding: 12px; border: 1.5px solid #eee; border-radius: 12px; box-sizing: border-box; resize: none; outline: none; font-size: 14px; }
        #worldInput:focus { border-color: var(--accent); }
        .btn-save { background: var(--accent); color: white; border: none; padding: 10px; border-radius: 10px; font-weight: bold; cursor: pointer; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="header">
    <div style="font-weight: bold; margin-bottom: 10px; display: flex; justify-content: space-between;">
        <span>🌍 전체 세계관 설정</span>
        <span style="color: var(--accent); cursor: pointer;" onclick="location.href='chat.html'">대화로 가기 ◀</span>
    </div>
    <input type="text" id="searchInput" placeholder="설정 검색..." oninput="filterSettings()">
</div>

<div id="worldList">
    <!-- 설정 아이템들이 여기에 생성됩니다 -->
</div>

<div class="footer">
    <div class="input-group">
        <textarea id="worldInput" placeholder="새로운 세계관 설정을 입력하세요 (예: 부산은 현재 AI 기술이 고도로 발달한 상태다)"></textarea>
        <button class="btn-send btn-save" onclick="addSetting()">설정 추가하기</button>
    </div>
</div>

<script>
    const WORLD_KEY = 'world_settings_v1';
    let settings = JSON.parse(localStorage.getItem(WORLD_KEY)) || [];

    window.onload = renderSettings;

    // 설정 추가 함수
    function addSetting() {
        const input = document.getElementById('worldInput');
        const text = input.value.trim();
        
        if(!text) return;

        const newSetting = {
            id: Date.now(),
            content: text,
            date: new Date().toLocaleString()
        };

        settings.push(newSetting);
        saveToLocal();
        input.value = '';
        renderSettings();
        
        // 입력 후 리스트 하단으로 스크롤 (생성 시 위로 가기 위해)
        const list = document.getElementById('worldList');
        list.scrollTop = 0;
    }

    // 화면 그리기 (최신 항목이 위로 오도록 flex-direction: column-reverse 사용)
    function renderSettings() {
        const list = document.getElementById('worldList');
        list.innerHTML = settings.map(item => `
            <div class="setting-item" data-content="${item.content}">
                <div class="delete-btn" onclick="deleteSetting(${item.id})">✕</div>
                ${item.content}
                <div style="font-size: 10px; color: #aaa; margin-top: 8px;">${item.date}</div>
            </div>
        `).join('');
    }

    // 실시간 검색 기능
    function filterSettings() {
        const query = document.getElementById('searchInput').value.toLowerCase();
        const items = document.querySelectorAll('.setting-item');
        
        items.forEach(item => {
            const content = item.getAttribute('data-content').toLowerCase();
            item.style.display = content.includes(query) ? 'block' : 'none';
        });
    }

    // 삭제 기능
    function deleteSetting(id) {
        if(confirm('이 설정을 삭제할까요?')) {
            settings = settings.filter(s => s.id !== id);
            saveToLocal();
            renderSettings();
        }
    }

    function saveToLocal() {
        localStorage.setItem(WORLD_KEY, JSON.stringify(settings));
    }
</script>
</body>
</html>
