<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>World Archive - Dalsu</title>
    <style>
        :root { --bg: #fdf2f4; --card: #ffffff; --accent: #ff85a2; --text: #444; }
        body { margin: 0; padding: 0; font-family: -apple-system, sans-serif; background: var(--bg); display: flex; flex-direction: column; height: 100vh; color: var(--text); }
        
        /* 상단 헤더 */
        .header { background: var(--card); padding: 15px; border-bottom: 1px solid #eee; position: sticky; top: 0; z-index: 10; }
        .nav-buttons { display: flex; gap: 10px; margin-top: 10px; }
        #searchInput { flex: 1; padding: 10px; border: 1.5px solid #eee; border-radius: 10px; outline: none; font-size: 14px; }
        .btn-view { background: #eee; border: none; padding: 10px 15px; border-radius: 10px; font-size: 13px; cursor: pointer; font-weight: bold; }
        .btn-view.active { background: var(--accent); color: white; }

        /* 세계관 리스트 (아래로 쌓임) */
        #worldList { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 15px; }
        
        /* 설정 카드 스타일 */
        .setting-item { 
            background: var(--card); padding: 18px; border-radius: 15px; 
            box-shadow: 0 2px 8px rgba(0,0,0,0.06); border-left: 5px solid var(--accent);
            cursor: grab; position: relative;
        }
        .dragging { opacity: 0.5; }

        .content-text { font-size: 15px; line-height: 1.7; white-space: pre-wrap; margin-bottom: 10px; }
        .controls { display: flex; gap: 12px; opacity: 0.5; font-size: 12px; }
        .controls span { cursor: pointer; color: var(--accent); }

        /* 전체보기 모드 전용 스타일 */
        .book-mode .setting-item { border-left: none; box-shadow: none; border-bottom: 1px dashed #ddd; border-radius: 0; padding: 20px 5px; background: transparent; }
        .book-mode .controls, .book-mode .footer, .book-mode .insert-btn { display: none !important; }
        .book-mode #worldList { gap: 0; background: #fffcf9; /* 종이 느낌 */ }

        /* 입력 폼 및 삽입 버튼 */
        .insert-area { display: flex; justify-content: center; margin: -5px 0; }
        .insert-btn { background: #ffdae3; border: none; width: 24px; height: 24px; border-radius: 50%; color: white; cursor: pointer; font-size: 18px; line-height: 1; z-index: 2; }
        
        .footer { background: var(--card); padding: 15px 15px 35px 15px; border-top: 1px solid #eee; }
        #worldInput { width: 100%; height: 65px; padding: 12px; border: 1.5px solid #eee; border-radius: 12px; box-sizing: border-box; resize: none; outline: none; margin-bottom: 8px; font-size: 14px; }
        .btn-main { background: var(--accent); color: white; border: none; width: 100%; padding: 14px; border-radius: 12px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div class="header">
    <div style="font-weight: bold; display: flex; justify-content: space-between; align-items: center;">
        <span>🌍 World Archive</span>
        <span style="font-size: 12px; color: #888;" onclick="location.href='chat.html'">채팅창 ◀</span>
    </div>
    <div class="nav-buttons">
        <input type="text" id="searchInput" placeholder="설정 검색..." oninput="renderSettings()">
        <button id="viewToggle" class="btn-view" onclick="toggleBookMode()">전체보기 📖</button>
    </div>
</div>

<div id="worldList" ondragover="initDragAndDrop(event)"></div>

<div class="footer">
    <textarea id="worldInput" placeholder="여기에 새 설정을 쓰면 맨 아래에 추가됩니다..."></textarea>
    <button class="btn-main" onclick="addSetting()">마지막에 설정 추가</button>
</div>

<script>
    const WORLD_KEY = 'world_settings_v1';
    let settings = JSON.parse(localStorage.getItem(WORLD_KEY)) || [];
    let isBookMode = false;

    window.onload = renderSettings;

    // 1. 전체보기(독서 모드) 토글
    function toggleBookMode() {
        isBookMode = !isBookMode;
        const btn = document.getElementById('viewToggle');
        document.body.classList.toggle('book-mode', isBookMode);
        btn.classList.toggle('active', isBookMode);
        btn.innerText = isBookMode ? "편집모드 ✏️" : "전체보기 📖";
        renderSettings();
    }

    // 2. 렌더링 (새 글이 아래로 붙는 구조)
    function renderSettings() {
        const query = document.getElementById('searchInput').value.toLowerCase();
        const list = document.getElementById('worldList');
        list.innerHTML = '';

        settings.forEach((item, index) => {
            if (item.content.toLowerCase().includes(query)) {
                const div = document.createElement('div');
                div.className = 'setting-item';
                div.draggable = !isBookMode;
                div.dataset.index = index;
                div.innerHTML = `
                    <div class="content-text" onclick="if(!isBookMode)editSetting(${index})">${item.content}</div>
                    <div class="controls">
                        <span onclick="editSetting(${index})">수정</span>
                        <span onclick="deleteSetting(${index})">삭제</span>
                        <span>☰ 드래그</span>
                    </div>
                `;

                // 편집 모드일 때만 중간 삽입 버튼 표시
                if(!isBookMode) {
                    const insertDiv = document.createElement('div');
                    insertDiv.className = 'insert-area';
                    insertDiv.innerHTML = `<button class="insert-btn" onclick="insertNew(${index + 1})">+</button>`;
                    list.appendChild(div);
                    list.appendChild(insertDiv);
                } else {
                    list.appendChild(div);
                }

                div.addEventListener('dragstart', () => div.classList.add('dragging'));
                div.addEventListener('dragend', () => {
                    div.classList.remove('dragging');
                    saveNewOrder();
                });
            }
        });
    }

    // 3. 중간 삽입 기능
    function insertNew(pos) {
        const text = prompt("이 위치에 들어갈 내용을 입력하세요:");
        if(text) {
            settings.splice(pos, 0, { id: Date.now(), content: text.trim() });
            saveAndRefresh();
        }
    }

    // 4. 새 글을 맨 아래에 추가
    function addSetting() {
        const input = document.getElementById('worldInput');
        if(!input.value.trim()) return;
        settings.push({ id: Date.now(), content: input.value.trim() });
        input.value = '';
        saveAndRefresh();
        // 추가 후 맨 아래로 스크롤
        const list = document.getElementById('worldList');
        list.scrollTop = list.scrollHeight;
    }

    function editSetting(index) {
        const newText = prompt("수정할 내용:", settings[index].content);
        if (newText) { settings[index].content = newText.trim(); saveAndRefresh(); }
    }

    function deleteSetting(index) {
        if(confirm("삭제하시겠습니까?")) { settings.splice(index, 1); saveAndRefresh(); }
    }

    function initDragAndDrop(e) {
        if(isBookMode) return;
        e.preventDefault();
        const list = document.getElementById('worldList');
        const draggingItem = document.querySelector('.dragging');
        const siblings = [...list.querySelectorAll('.setting-item:not(.dragging)')];
        let nextSibling = siblings.find(sibling => e.clientY <= sibling.offsetTop + sibling.offsetHeight / 2);
        list.insertBefore(draggingItem, nextSibling);
    }

    function saveNewOrder() {
        const items = [...document.querySelectorAll('.setting-item')];
        settings = items.map(item => settings[item.dataset.index]);
        localStorage.setItem(WORLD_KEY, JSON.stringify(settings));
    }

    function saveAndRefresh() {
        localStorage.setItem(WORLD_KEY, JSON.stringify(settings));
        renderSettings();
    }
</script>
</body>
</html>
