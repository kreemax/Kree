<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Character Space Orbit - Group Focus</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; color: white; font-family: -apple-system, sans-serif; }
        canvas { display: block; }
        .back-btn { 
            position: fixed; top: 20px; right: 20px; 
            padding: 10px 20px; background: rgba(255,255,255,0.2); 
            border: 1px solid rgba(255,255,255,0.4); color: white; 
            border-radius: 20px; cursor: pointer; text-decoration: none; font-size: 13px;
            backdrop-filter: blur(5px); z-index: 1000;
        }
    </style>
</head>
<body>
    <a href="cha.html" class="back-btn">← 리스트로 돌아가기</a>
    <canvas id="spaceCanvas"></canvas>

<script>
    const canvas = document.getElementById('spaceCanvas');
    const ctx = canvas.getContext('2d');
    let characters = JSON.parse(localStorage.getItem('chars_csv_final_v2')) || [];
    let orbits = [];

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    function initSpace() {
        const groups = {};
        characters.forEach(c => {
            const g = c.group || 'Default';
            if (!groups[g]) groups[g] = [];
            groups[g].push(c);
        });

        Object.keys(groups).forEach(groupName => {
            const members = groups[groupName];
            // 리더 선출: 매력(CHA) > 체력(HP)
            members.sort((a, b) => {
                if (parseInt(b.cha) !== parseInt(a.cha)) return (parseInt(b.cha)||0) - (parseInt(a.cha)||0);
                return (parseInt(b.hp)||0) - (parseInt(a.hp)||0);
            });

            members.forEach((char, idx) => {
                const isLeader = idx === 0;
                orbits.push({
                    data: char,
                    isLeader: isLeader,
                    group: groupName,
                    angle: Math.random() * Math.PI * 2,
                    // 지능(INT)에 따른 속도
                    speed: (parseInt(char.int) || 5) * 0.001 + 0.005,
                    // 리더는 중앙에서 멀리, 멤버는 리더 근처에서 공전
                    orbitRadius: isLeader ? 200 + (Math.random() * 150) : 50 + (Math.random() * 40),
                    zAngle: (Math.random() - 0.5) * Math.PI * 0.5, 
                    currentX: 0,
                    currentY: 0,
                    img: null
                });
            });
        });

        orbits.forEach(orb => {
            if (orb.data.symbol) {
                const img = new Image();
                img.src = `img/${orb.data.symbol}`;
                img.onload = () => orb.img = img;
            }
        });
    }

    function draw() {
        // 우주 배경 (잔상 효과)
        ctx.fillStyle = 'rgba(0, 0, 0, 0.2)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        const centerX = canvas.width / 2;
        const centerY = canvas.height / 2;

        // 1단계: 리더 위치 먼저 계산
        orbits.filter(o => o.isLeader).forEach(leader => {
            leader.angle += leader.speed;
            leader.currentX = centerX + Math.cos(leader.angle) * leader.orbitRadius * 1.6;
            leader.currentY = centerY + Math.sin(leader.angle) * Math.cos(leader.zAngle) * leader.orbitRadius;
        });

        // 2단계: 그룹원 위치 계산 및 모든 캐릭터 그리기
        orbits.forEach(orb => {
            let x, y, scale;

            if (orb.isLeader) {
                x = orb.currentX;
                y = orb.currentY;
                scale = 0.6 + (Math.sin(orb.angle) + 1) * 0.4;
            } else {
                // 소속 그룹 리더 찾기
                const leader = orbits.find(o => o.isLeader && o.group === orb.group);
                orb.angle += orb.speed;
                
                const lx = leader ? leader.currentX : centerX;
                const ly = leader ? leader.currentY : centerY;
                
                x = lx + Math.cos(orb.angle) * orb.orbitRadius;
                y = ly + Math.sin(orb.angle) * Math.cos(orb.zAngle) * orb.orbitRadius;
                scale = 0.5 + (Math.sin(orb.angle) + 1) * 0.3;
            }

            const bodySize = Math.max((parseInt(orb.data.hp) || 10) * scale, 5);

            // 캐릭터 본체 그리기 (멀어지면 흐려짐)
            ctx.save();
            ctx.globalAlpha = 0.3 + (scale * 0.7);
            if (orb.img && orb.img.complete) {
                ctx.beginPath();
                ctx.arc(x, y, bodySize, 0, Math.PI * 2);
                ctx.clip();
                ctx.drawImage(orb.img, x - bodySize, y - bodySize, bodySize * 2, bodySize * 2);
            } else {
                ctx.beginPath();
                ctx.arc(x, y, bodySize, 0, Math.PI * 2);
                ctx.fillStyle = orb.isLeader ? '#007aff' : '#5ac8fa';
                ctx.fill();
            }
            ctx.restore();

            // 텍스트 그리기 (블러/투명도 영향 없음)
            ctx.save();
            ctx.globalAlpha = 1.0; // 텍스트는 항상 선명하게
            ctx.textAlign = 'center';
            
            // 이름표
            ctx.font = `bold ${Math.max(12 * scale, 10)}px sans-serif`;
            ctx.fillStyle = 'white';
            ctx.shadowBlur = 4;
            ctx.shadowColor = 'black';
            ctx.fillText(orb.data.name, x, y + bodySize + 15);

            // 리더 마크
            if (orb.isLeader) {
                ctx.font = `bold ${Math.max(10 * scale, 8)}px sans-serif`;
                ctx.fillStyle = '#ffcc00';
                ctx.fillText('★ LEADER', x, y - bodySize - 8);
            }
            ctx.restore();
        });

        requestAnimationFrame(draw);
    }

    initSpace();
    draw();
</script>
</body>
</html>
