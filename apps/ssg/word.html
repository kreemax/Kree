<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>World Builder Pro</title>
    <style>
        :root { --bg: #fdf2f4; --card: #ffffff; --accent: #ff85a2; --text: #444; }
        body { margin: 0; padding: 0; font-family: -apple-system, sans-serif; background: var(--bg); display: flex; flex-direction: column; height: 100vh; color: var(--text); }
        
        /* 상단 검색바 */
        .header { background: var(--card); padding: 15px; border-bottom: 1px solid #eee; position: sticky; top: 0; z-index: 10; }
        #searchInput { width: 100%; padding: 12px; border: 1.5px solid #eee; border-radius: 12px; box-sizing: border-box; outline: none; font-size: 14px; }

        /* 세계관 리스트 영역 */
        #worldList { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 15px; }
        
        /* 설정 아이템 카드 */
        .setting-item { 
            background: var(--card); padding: 15px; border-radius: 15px; 
            box-shadow: 0 2px 8px rgba(0,0,0,0.06); border-left: 5px solid var(--accent);
            cursor: grab; position: relative; transition: transform 0.2s;
        }
        .setting-item:active { cursor: grabbing; transform: scale(0.98); }
        .setting-item.dragging { opacity: 0.5; border: 2px dashed var(--accent); }

        /* 카드 내 텍스트 및 버튼 */
        .content-text { font-size: 14px; line-height: 1.6; white-space: pre-wrap; margin-bottom: 10px; }
        .controls { display: flex; gap: 10px; opacity: 0.6; }
        .controls span { font-size: 12px; cursor: pointer; color: var(--accent); font-weight: bold; }
        
        /* 특정 항목 위/아래 추가 폼 */
        .insert-form { background: #fff0f3; padding: 10px; border-radius: 10px; margin: 5px 0; display: flex; flex-direction: column; gap: 5px; }
        .insert-form textarea { width: 100%; border: 1px solid #ffc2d1; border-radius: 8px; padding: 8px; font-size: 13px; resize: none; }

        /* 하단 고정 입력 폼 */
        .footer { background: var(--card); padding: 15px 15px 35px 15px; border-top: 1px solid #eee; }
        #worldInput { width: 100%; height: 60px; padding: 12px; border: 1.5px solid #eee; border-radius: 12px; box-sizing: border-box; resize: none; outline: none; margin-bottom: 8px; }
        .btn-main { background: var(--accent); color: white; border: none; width: 100%; padding: 12px; border-radius: 10px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div class="header">
    <div style="font-weight: bold; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center;">
        <span>🌍 세계관 편집 모드</span>
        <span style="color: var(--accent); cursor: pointer; font-size: 13px;" onclick="location.href='chat.html'">채팅창 이동 ◀</span>
    </div>
    <input type="text" id="searchInput" placeholder="설정 검색..." oninput="renderSettings()">
</div>

<div id="worldList" ondragover="initDragAndDrop(event)">
    <!-- 항목들이 여기에 생성됩니다 -->
</div>

<div class="footer">
    <textarea id="worldInput" placeholder="새로운 설정을 입력하세요..."></textarea>
    <button class="btn-main" onclick="addSetting()">최상단에 새 설정 추가</button>
</div>

<script>
    const WORLD_KEY = 'world_settings_v1';
    let settings = JSON.parse(localStorage.getItem(WORLD_KEY)) || [];

    window.onload = renderSettings;

    // 1. 기본 렌더링 (검색 기능 포함)
    function renderSettings() {
        const query = document.getElementById('searchInput').value.toLowerCase();
        const list = document.getElementById('worldList');
        list.innerHTML = '';

        settings.forEach((item, index) => {
            if (item.content.toLowerCase().includes(query)) {
                const div = document.createElement('div');
                div.className = 'setting-item';
                div.draggable = true;
                div.dataset.index = index;
                div.innerHTML = `
                    <div class="content-text" onclick="showInsertForm(${index})">${item.content}</div>
                    <div class="controls">
                        <span onclick="editSetting(${index})">📝 수정</span>
                        <span onclick="deleteSetting(${index})">🗑️ 삭제</span>
                        <span style="color:#aaa">☰ 드래그하여 순서 변경</span>
                    </div>
                    <div id="insert-area-${index}"></div>
                `;
                
                // 드래그 이벤트 리스너 등록
                div.addEventListener('dragstart', () => div.classList.add('dragging'));
                div.addEventListener('dragend', () => {
                    div.classList.remove('dragging');
                    saveNewOrder();
                });
                
                list.appendChild(div);
            }
        });
    }

    // 2. 글 수정 기능
    function editSetting(index) {
        const newText = prompt("내용을 수정하세요:", settings[index].content);
        if (newText !== null && newText.trim() !== "") {
            settings[index].content = newText.trim();
            saveAndRefresh();
        }
    }

    // 3. 위/아래 메모 추가 기능
    function showInsertForm(index) {
        const area = document.getElementById(`insert-area-${index}`);
        if(area.innerHTML !== "") { area.innerHTML = ""; return; } // 토글 기능

        area.innerHTML = `
            <div class="insert-form">
                <textarea id="tempInput-${index}" rows="2" placeholder="이 항목의 기준..."></textarea>
                <div style="display:flex; gap:5px;">
                    <button class="btn-main" style="flex:1; font-size:11px;" onclick="insertAt(${index}, 'up')">위에 추가</button>
                    <button class="btn-main" style="flex:1; font-size:11px;" onclick="insertAt(${index}, 'down')">아래에 추가</button>
                </div>
            </div>
        `;
    }

    function insertAt(index, direction) {
        const text = document.getElementById(`tempInput-${index}`).value.trim();
        if(!text) return;
        
        const newObj = { id: Date.now(), content: text };
        const targetPos = (direction === 'up') ? index : index + 1;
        
        settings.splice(targetPos, 0, newObj);
        saveAndRefresh();
    }

    // 4. 순서 변경 (드래그 앤 드롭 로직)
    function initDragAndDrop(e) {
        e.preventDefault();
        const list = document.getElementById('worldList');
        const draggingItem = document.querySelector('.dragging');
        const siblings = [...list.querySelectorAll('.setting-item:not(.dragging)')];
        
        let nextSibling = siblings.find(sibling => {
            return e.clientY <= sibling.offsetTop + sibling.offsetHeight / 2;
        });
        
        list.insertBefore(draggingItem, nextSibling);
    }

    function saveNewOrder() {
        const items = [...document.querySelectorAll('.setting-item')];
        const newOrder = items.map(item => settings[item.dataset.index]);
        settings = newOrder;
        localStorage.setItem(WORLD_KEY, JSON.stringify(settings));
    }

    // 5. 기본 추가 및 삭제
    function addSetting() {
        const input = document.getElementById('worldInput');
        if(!input.value.trim()) return;
        settings.unshift({ id: Date.now(), content: input.value.trim() });
        input.value = '';
        saveAndRefresh();
    }

    function deleteSetting(index) {
        if(confirm("정말 삭제할까요?")) {
            settings.splice(index, 1);
            saveAndRefresh();
        }
    }

    function saveAndRefresh() {
        localStorage.setItem(WORLD_KEY, JSON.stringify(settings));
        renderSettings();
    }
</script>
</body>
</html>
