<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Word Manager Pro</title>
    <style>
        :root { --bg: #ffffff; --accent: #007aff; --card-bg: #f2f2f7; --border: #e5e5ea; --text: #1c1c1e; --danger: #ff3b30; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; padding: 0; color: var(--text); -webkit-font-smoothing: antialiased; }
        
        /* 상단 탭 디자인 (5개 탭 대응) */
        .tab-bar { display: flex; background: #f9f9f9; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 10; padding: 10px 10px 0; overflow-x: auto; -webkit-overflow-scrolling: touch; }
        .tab { flex: 1; min-width: 60px; text-align: center; padding: 12px 0; font-size: 14px; font-weight: 700; color: #8e8e93; cursor: pointer; transition: 0.2s; border-bottom: 3px solid transparent; white-space: nowrap; }
        .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

        /* 단어 칩 컨테이너 */
        #wordContainer { padding: 20px; display: flex; flex-wrap: wrap; gap: 10px; align-content: flex-start; min-height: 200px; padding-bottom: 100px; }
        .word-chip { background: var(--card-bg); color: var(--text); padding: 10px 18px; border-radius: 20px; font-size: 15px; font-weight: 500; border: 1px solid var(--border); cursor: pointer; animation: fadeIn 0.3s ease; }
        .word-chip:active { transform: scale(0.95); background: #e5e5ea; }

        /* 메뉴 공통 스타일 */
        .sheet-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 200; }
        .action-sheet { position: fixed; bottom: 0; left: 0; right: 0; background: white; border-top-left-radius: 24px; border-top-right-radius: 24px; padding: 20px; z-index: 201; transform: translateY(100%); transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .sheet-open { transform: translateY(0); }
        .menu-item { width: 100%; padding: 16px; border: none; background: none; text-align: left; font-size: 17px; border-bottom: 1px solid #f2f2f7; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
        .menu-item:last-child { border: none; }
        .menu-item.danger { color: var(--danger); }
        .menu-item:active { background: #f2f2f7; }

        /* 하단 버튼들 */
        .fab { position: fixed; bottom: 30px; width: 62px; height: 62px; color: white; border-radius: 50%; border: none; box-shadow: 0 4px 15px rgba(0,0,0,0.2); z-index: 50; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .fab-right { right: 30px; background: var(--accent); font-size: 32px; }
        .fab-left { left: 30px; background: #8e8e93; font-size: 24px; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="tab-bar">
    <div class="tab active" onclick="switchTab('누구')">누구</div>
    <div class="tab" onclick="switchTab('통합')">통합</div>
    <div class="tab" onclick="switchTab('장소')">장소</div>
    <div class="tab" onclick="switchTab('시작')">시작</div>
    <div class="tab" onclick="switchTab('액션')">액션</div>
</div>

<div id="wordContainer"></div>

<!-- 좌우 하단 메뉴 버튼 -->
<button class="fab fab-left" onclick="openAdminMenu()">⚙️</button>
<button class="fab fab-right" onclick="addNewWord()">+</button>

<input type="file" id="csvInput" hidden accept=".csv" onchange="importCSV(event)">

<!-- [1] 단어 관리 메뉴 -->
<div id="wordSheetOverlay" class="sheet-overlay" onclick="closeSheets()"></div>
<div id="wordActionSheet" class="action-sheet">
    <div id="selectedWordDisplay" style="margin-bottom: 15px; font-weight: bold; color: #8e8e93; font-size: 13px; padding-left: 10px;"></div>
    <button class="menu-item" onclick="duplicateWord(1)">1개 추가 <span>+1</span></button>
    <button class="menu-item" onclick="duplicateWord(3)">3개 추가 <span>+3</span></button>
    <button class="menu-item" onclick="duplicateWord(5)">5개 추가 <span>+5</span></button>
    <button class="menu-item" onclick="editWord()">수정 <span>✎</span></button>
    <button class="menu-item danger" onclick="deleteWord()">삭제 <span>🗑</span></button>
</div>

<!-- [2] 데이터 관리 메뉴 (좌측 버튼) -->
<div id="adminSheet" class="action-sheet">
    <div style="margin-bottom: 15px; font-weight: bold; color: #8e8e93; font-size: 13px; padding-left: 10px;">데이터 관리</div>
    <button class="menu-item" onclick="exportCSV()">엑셀(CSV) 다운로드 <span>📥</span></button>
    <button class="menu-item" onclick="document.getElementById('csvInput').click()">파일(CSV) 업로드 <span>📤</span></button>
    <button class="menu-item danger" onclick="clearAllData()">전체 데이터 삭제 <span>⚠️</span></button>
    <button class="menu-item" onclick="closeSheets()" style="justify-content: center; color: #8e8e93; font-size: 15px;">닫기</button>
</div>

<script>
    let wordsData = JSON.parse(localStorage.getItem('words_data_v2')) || { '누구': [], '통합': [], '장소': [], '시작': [], '액션': [] };
    let currentTab = '누구';
    let selectedIdx = -1;

    function saveData() {
        localStorage.setItem('words_data_v2', JSON.stringify(wordsData));
    }

    function switchTab(tab) {
        currentTab = tab;
        document.querySelectorAll('.tab').forEach(el => {
            el.classList.toggle('active', el.innerText === tab);
        });
        render();
    }

    function render() {
        const container = document.getElementById('wordContainer');
        container.innerHTML = '';
        if (wordsData[currentTab].length === 0) {
            container.innerHTML = '<p style="color:#ccc; width:100%; text-align:center; margin-top:50px;">단어를 추가해주세요.</p>';
        }
        wordsData[currentTab].forEach((word, idx) => {
            const chip = document.createElement('div');
            chip.className = 'word-chip';
            chip.innerText = word;
            chip.onclick = () => openWordMenu(idx);
            container.appendChild(chip);
        });
    }

    function addNewWord() {
        const newWord = prompt(`[${currentTab}] 탭에 추가할 단어:`);
        if (newWord && newWord.trim()) {
            wordsData[currentTab].push(newWord.trim());
            saveData(); render();
        }
    }

    // --- 시트 제어 ---
    function openWordMenu(idx) {
        selectedIdx = idx;
        const word = wordsData[currentTab][idx];
        document.getElementById('selectedWordDisplay').innerText = `"${word}" 항목 관리`;
        document.getElementById('wordSheetOverlay').style.display = 'block';
        setTimeout(() => document.getElementById('wordActionSheet').classList.add('sheet-open'), 10);
    }

    function openAdminMenu() {
        document.getElementById('wordSheetOverlay').style.display = 'block';
        setTimeout(() => document.getElementById('adminSheet').classList.add('sheet-open'), 10);
    }

    function closeSheets() {
        document.getElementById('wordActionSheet').classList.remove('sheet-open');
        document.getElementById('adminSheet').classList.remove('sheet-open');
        setTimeout(() => {
            document.getElementById('wordSheetOverlay').style.display = 'none';
        }, 300);
    }

    // --- 단어 액션 ---
    function duplicateWord(count) {
        const wordToCopy = wordsData[currentTab][selectedIdx];
        for(let i=0; i<count; i++) {
            wordsData[currentTab].splice(selectedIdx + 1, 0, wordToCopy);
        }
        saveData(); render(); closeSheets();
    }

    function editWord() {
        const oldWord = wordsData[currentTab][selectedIdx];
        const newWord = prompt('단어 수정:', oldWord);
        if (newWord && newWord.trim()) {
            wordsData[currentTab][selectedIdx] = newWord.trim();
            saveData(); render(); closeSheets();
        }
    }

    function deleteWord() {
        wordsData[currentTab].splice(selectedIdx, 1);
        saveData(); render(); closeSheets();
    }

    // --- 데이터 관리 기능 ---
    function exportCSV() {
        let csv = "\ufeff탭,단어\n";
        Object.keys(wordsData).forEach(tab => {
            wordsData[tab].forEach(word => {
                csv += `"${tab}","${word.replace(/"/g, '""')}"\n`;
            });
        });
        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = `단어데이터_${new Date().toLocaleDateString()}.csv`;
        link.click();
        closeSheets();
    }

    function importCSV(e) {
        const file = e.target.files[0];
        if(!file) return;
        const reader = new FileReader();
        reader.onload = function(event) {
            const lines = event.target.result.split('\n');
            const newData = { '누구': [], '통합': [], '장소': [], '시작': [], '액션': [] };
            lines.slice(1).forEach(line => {
                const parts = line.split(',');
                if(parts.length >= 2) {
                    const tab = parts[0].replace(/"/g, '').trim();
                    const word = parts[1].replace(/"/g, '').trim();
                    if(newData[tab]) newData[tab].push(word);
                }
            });
            if(confirm('기존 데이터를 덮어쓰고 파일을 불러오시겠습니까?')) {
                wordsData = newData;
                saveData(); render();
            }
        };
        reader.readAsText(file);
        closeSheets();
    }

    function clearAllData() {
        if(confirm('⚠️ 모든 탭의 단어가 삭제됩니다.\n이 작업은 되돌릴 수 없습니다. 정말 실행할까요?')) {
            if(confirm('마지막 확인: 정말로 전체 삭제하시겠습니까?')) {
                wordsData = { '누구': [], '통합': [], '장소': [], '시작': [], '액션': [] };
                saveData(); render(); closeSheets();
            }
        }
    }

    render();
</script>

</body>
</html>
