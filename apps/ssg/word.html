<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Word Manager Pro - Complete</title>
    <style>
        :root { --bg: #ffffff; --accent: #007aff; --card-bg: #f2f2f7; --border: #e5e5ea; --text: #1c1c1e; --danger: #ff3b30; --success: #34c759; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; padding: 0; color: var(--text); -webkit-font-smoothing: antialiased; }
        
        .tab-bar { display: flex; background: #f9f9f9; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 10; padding: 10px 10px 0; overflow-x: auto; }
        .tab { flex: 1; min-width: 60px; text-align: center; padding: 12px 0; font-size: 14px; font-weight: 700; color: #8e8e93; cursor: pointer; border-bottom: 3px solid transparent; }
        .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

        #wordContainer { padding: 20px; display: flex; flex-wrap: wrap; gap: 10px; padding-bottom: 180px; }
        .word-chip { background: var(--card-bg); padding: 10px 18px; border-radius: 20px; font-size: 15px; font-weight: 500; border: 1px solid var(--border); cursor: pointer; transition: 0.2s; position: relative; }
        .word-chip.selected { background: var(--accent); color: white; border-color: var(--accent); transform: scale(1.05); }
        .edit-mode-active .word-chip:not(.selected) { opacity: 0.8; }

        .fab-group { position: fixed; bottom: 30px; right: 30px; display: flex; flex-direction: column; gap: 15px; z-index: 100; }
        .fab { width: 62px; height: 62px; color: white; border-radius: 50%; border: none; box-shadow: 0 4px 15px rgba(0,0,0,0.2); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 24px; }
        .fab-add { background: var(--accent); font-size: 32px; }
        .fab-select { background: #8e8e93; transition: 0.3s; }
        .fab-select.active { background: var(--success); transform: rotate(360deg); }
        .fab-left { position: fixed; bottom: 30px; left: 30px; background: #8e8e93; }

        #multiSelectBar { 
            position: fixed; bottom: 0; left: 0; right: 0; background: rgba(255,255,255,0.95); 
            border-top: 1px solid var(--border); padding: 15px 20px 35px; 
            display: none; justify-content: space-between; align-items: center; z-index: 150;
            backdrop-filter: blur(10px); box-shadow: 0 -5px 15px rgba(0,0,0,0.05);
        }

        .sheet-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 200; }
        .action-sheet { position: fixed; bottom: 0; left: 0; right: 0; background: white; border-top-left-radius: 24px; border-top-right-radius: 24px; padding: 20px; z-index: 201; transform: translateY(100%); transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .sheet-open { transform: translateY(0); }
        .menu-item { width: 100%; padding: 16px; border: none; background: none; text-align: left; font-size: 17px; border-bottom: 1px solid #f2f2f7; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
        .menu-item.danger { color: var(--danger); }
        .menu-item:active { background: #f2f2f7; }
    </style>
</head>
<body>

<div class="tab-bar">
    <div class="tab active" onclick="switchTab('누구')">누구</div>
    <div class="tab" onclick="switchTab('통합')">통합</div>
    <div class="tab" onclick="switchTab('장소')">장소</div>
    <div class="tab" onclick="switchTab('시작')">시작</div>
    <div class="tab" onclick="switchTab('액션')">액션</div>
</div>

<div id="wordContainer"></div>

<!-- 파일 업로드 인풋 (숨김) -->
<input type="file" id="csvFileInput" hidden accept=".csv" onchange="importCSV(event)">

<button class="fab fab-left" onclick="openAdminMenu()">⚙️</button>
<div class="fab-group">
    <button id="selectModeBtn" class="fab fab-select" onclick="toggleEditMode()">✔️</button>
    <button class="fab fab-add" onclick="addNewWord()">+</button>
</div>

<div id="multiSelectBar">
    <span id="selectCount" style="font-weight: bold; color: var(--accent);">0개 선택됨</span>
    <div style="display: flex; gap: 8px;">
        <button onclick="deleteSelected()" style="padding: 10px 15px; border-radius: 12px; border: 1px solid var(--danger); background: white; color: var(--danger); font-weight: bold;">삭제</button>
        <button onclick="openMoveCopySheet('copy')" style="padding: 10px 15px; border-radius: 12px; border: 1px solid var(--accent); background: white; color: var(--accent); font-weight: bold;">복사</button>
        <button onclick="openMoveCopySheet('move')" style="padding: 10px 15px; border-radius: 12px; background: var(--accent); border: none; color: white; font-weight: bold;">이동</button>
    </div>
</div>

<div id="commonOverlay" class="sheet-overlay" onclick="closeSheets()"></div>

<!-- 단일 항목 관리 시트 -->
<div id="singleActionSheet" class="action-sheet">
    <div id="selectedWordDisplay" style="margin-bottom: 15px; font-weight: bold; color: #8e8e93; font-size: 13px; padding-left: 10px;"></div>
    <button class="menu-item" onclick="duplicateWord(1)">1개 추가 <span>+1</span></button>
    <button class="menu-item" onclick="duplicateWord(3)">3개 추가 <span>+3</span></button>
    <button class="menu-item" onclick="duplicateWord(5)">5개 추가 <span>+5</span></button>
    <button class="menu-item" onclick="editWord()">수정 <span>✎</span></button>
    <button class="menu-item danger" onclick="deleteSingleWord()">삭제 <span>🗑</span></button>
</div>

<!-- 이동/복사 대상 시트 -->
<div id="targetTabSheet" class="action-sheet">
    <div id="targetSheetTitle" style="margin-bottom: 15px; font-weight: bold; color: #8e8e93; font-size: 13px;">대상을 선택하세요</div>
    <div id="tabOptions"></div>
    <button class="menu-item" onclick="closeSheets()" style="justify-content: center; color: #8e8e93;">취소</button>
</div>

<!-- 관리 메뉴 시트 (업로드/다운로드 포함) -->
<div id="adminSheet" class="action-sheet">
    <div style="margin-bottom: 15px; font-weight: bold; color: #8e8e93; font-size: 13px;">데이터 관리</div>
    <button class="menu-item" onclick="exportCSV()">엑셀(CSV) 다운로드 <span>📥</span></button>
    <button class="menu-item" onclick="document.getElementById('csvFileInput').click()">파일(CSV) 업로드 <span>📤</span></button>
    <button class="menu-item danger" onclick="clearAllData()">전체 데이터 삭제 <span>⚠️</span></button>
    <button class="menu-item" onclick="closeSheets()" style="justify-content: center; color: #8e8e93;">닫기</button>
</div>

<script>
    let wordsData = JSON.parse(localStorage.getItem('words_data_v2')) || { '누구': [], '통합': [], '장소': [], '시작': [], '액션': [] };
    let currentTab = '누구';
    let isEditMode = false;
    let selectedIndices = new Set();
    let singleTargetIdx = -1;
    let moveCopyMode = '';

    function saveData() { localStorage.setItem('words_data_v2', JSON.stringify(wordsData)); }

    function switchTab(tab) {
        if(isEditMode) toggleEditMode();
        currentTab = tab;
        document.querySelectorAll('.tab').forEach(el => el.classList.toggle('active', el.innerText === tab));
        render();
    }

    function render() {
        const container = document.getElementById('wordContainer');
        container.innerHTML = '';
        wordsData[currentTab].forEach((word, idx) => {
            const chip = document.createElement('div');
            chip.className = `word-chip ${selectedIndices.has(idx) ? 'selected' : ''}`;
            chip.innerText = word;
            chip.onclick = () => handleChipClick(idx);
            container.appendChild(chip);
        });
    }

    function handleChipClick(idx) {
        if (isEditMode) {
            if (selectedIndices.has(idx)) selectedIndices.delete(idx);
            else selectedIndices.add(idx);
            document.getElementById('selectCount').innerText = `${selectedIndices.size}개 선택됨`;
            render();
        } else {
            singleTargetIdx = idx;
            const word = wordsData[currentTab][idx];
            document.getElementById('selectedWordDisplay').innerText = `"${word}" 항목 관리`;
            document.getElementById('commonOverlay').style.display = 'block';
            setTimeout(() => document.getElementById('singleActionSheet').classList.add('sheet-open'), 10);
        }
    }

    function toggleEditMode() {
        isEditMode = !isEditMode;
        selectedIndices.clear();
        const btn = document.getElementById('selectModeBtn');
        const bar = document.getElementById('multiSelectBar');
        if (isEditMode) {
            btn.classList.add('active');
            bar.style.display = 'flex';
            document.body.classList.add('edit-mode-active');
        } else {
            btn.classList.remove('active');
            bar.style.display = 'none';
            document.body.classList.remove('edit-mode-active');
        }
        render();
    }

    // --- 단일 액션 ---
    function duplicateWord(count) {
        const word = wordsData[currentTab][singleTargetIdx];
        for(let i=0; i<count; i++) wordsData[currentTab].splice(singleTargetIdx + 1, 0, word);
        saveData(); render(); closeSheets();
    }
    function editWord() {
        const oldWord = wordsData[currentTab][singleTargetIdx];
        const newWord = prompt('수정할 내용:', oldWord);
        if(newWord) { wordsData[currentTab][singleTargetIdx] = newWord.trim(); saveData(); render(); }
        closeSheets();
    }
    function deleteSingleWord() {
        wordsData[currentTab].splice(singleTargetIdx, 1);
        saveData(); render(); closeSheets();
    }

    // --- 다중 액션 ---
    function deleteSelected() {
        if(selectedIndices.size === 0) return;
        if(confirm(`선택한 ${selectedIndices.size}개의 항목을 삭제할까요?`)) {
            wordsData[currentTab] = wordsData[currentTab].filter((_, idx) => !selectedIndices.has(idx));
            saveData(); toggleEditMode(); render();
        }
    }
    function openMoveCopySheet(mode) {
        if (selectedIndices.size === 0) return;
        moveCopyMode = mode;
        const options = document.getElementById('tabOptions');
        options.innerHTML = '';
        Object.keys(wordsData).forEach(tab => {
            if (tab === currentTab && mode === 'move') return;
            const btn = document.createElement('button');
            btn.className = 'menu-item';
            btn.innerHTML = `${tab} 탭으로 ${mode === 'move' ? '이동' : '복사'} <span>→</span>`;
            btn.onclick = () => executeMoveCopy(tab);
            options.appendChild(btn);
        });
        document.getElementById('commonOverlay').style.display = 'block';
        setTimeout(() => document.getElementById('targetTabSheet').classList.add('sheet-open'), 10);
    }
    function executeMoveCopy(targetTab) {
        const selectedWords = Array.from(selectedIndices).map(idx => wordsData[currentTab][idx]);
        wordsData[targetTab].push(...selectedWords);
        if (moveCopyMode === 'move') wordsData[currentTab] = wordsData[currentTab].filter((_, idx) => !selectedIndices.has(idx));
        saveData(); closeSheets(); toggleEditMode(); render();
    }

    // --- CSV 및 전체 관리 ---
    function exportCSV() {
        let csv = "\ufeff탭,단어\n";
        Object.keys(wordsData).forEach(tab => {
            wordsData[tab].forEach(word => {
                csv += `"${tab}","${word.replace(/"/g, '""')}"\n`;
            });
        });
        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = `단어데이터_${new Date().toLocaleDateString()}.csv`;
        link.click();
        closeSheets();
    }

    function importCSV(e) {
        const file = e.target.files[0];
        if(!file) return;
        const reader = new FileReader();
        reader.onload = function(event) {
            const lines = event.target.result.split('\n');
            const newData = { '누구': [], '통합': [], '장소': [], '시작': [], '액션': [] };
            lines.slice(1).forEach(line => {
                if(!line.trim()) return;
                const parts = line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/); // CSV 쉼표 분리 (따옴표 배제)
                if(parts.length >= 2) {
                    const tab = parts[0].replace(/"/g, '').trim();
                    const word = parts[1].replace(/"/g, '').trim();
                    if(newData[tab]) newData[tab].push(word);
                }
            });
            if(confirm('데이터를 불러오시겠습니까? (기존 데이터와 합쳐집니다. 교체를 원하시면 전체 삭제 후 시도하세요)')) {
                Object.keys(newData).forEach(tab => wordsData[tab].push(...newData[tab]));
                saveData(); render();
            }
        };
        reader.readAsText(file);
        closeSheets();
        e.target.value = ''; // 인풋 초기화
    }

    function clearAllData() {
        if(confirm('⚠️ 모든 단어가 삭제됩니다. 정말 실행할까요?')) {
            wordsData = { '누구': [], '통합': [], '장소': [], '시작': [], '액션': [] };
            saveData(); render(); closeSheets();
        }
    }

    function closeSheets() {
        document.querySelectorAll('.action-sheet').forEach(s => s.classList.remove('sheet-open'));
        setTimeout(() => document.getElementById('commonOverlay').style.display = 'none', 300);
    }
    function openAdminMenu() {
        document.getElementById('commonOverlay').style.display = 'block';
        setTimeout(() => document.getElementById('adminSheet').classList.add('sheet-open'), 10);
    }
    function addNewWord() {
        const word = prompt('새 단어:');
        if(word && word.trim()) { wordsData[currentTab].push(word.trim()); saveData(); render(); }
    }

    render();
</script>
</body>
</html>
