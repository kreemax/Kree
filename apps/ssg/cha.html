<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mobile Char Manager</title>
    <style>
        :root { --bg: #ffffff; --accent: #007aff; --card-bg: #f9f9f9; --border: #e5e5ea; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; padding: 0; color: #1c1c1e; }
        
        /* 메인 리스트 */
        #listContainer { padding: 20px; padding-bottom: 100px; }
        .char-item { 
            background: var(--card-bg); border-radius: 16px; padding: 16px; margin-bottom: 12px; 
            display: flex; align-items: center; border: 1px solid var(--border);
        }
        .sym-view { 
            width: 55px; height: 55px; border-radius: 50%; margin-right: 15px; 
            background: #e5e5ea; display: flex; align-items: center; justify-content: center; font-size: 24px; overflow: hidden;
        }
        .sym-view img { width: 100%; height: 100%; object-fit: cover; }
        .info h3 { margin: 0; font-size: 18px; font-weight: 600; }
        .info p { margin: 4px 0 0; color: #8e8e93; font-size: 14px; }

        /* 모바일 전체화면 상세 페이지 */
        .modal { 
            display: none; position: fixed; inset: 0; background: white; z-index: 100; 
            overflow-y: auto; padding: 25px; animation: slideUp 0.3s ease-out;
        }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

        /* 심볼 선택기 개선 */
        .symbol-section { text-align: center; margin-bottom: 25px; }
        .main-symbol { 
            width: 90px; height: 90px; border-radius: 50%; background: #f2f2f7; 
            margin: 0 auto 15px; display: flex; align-items: center; justify-content: center; 
            font-size: 40px; border: 2px solid var(--accent); overflow: hidden;
        }
        .main-symbol img { width: 100%; height: 100%; object-fit: cover; }
        
        .symbol-grid { display: flex; justify-content: center; gap: 12px; overflow-x: auto; padding: 10px 0; }
        .sym-option { 
            width: 50px; height: 50px; border-radius: 50%; border: 2px solid #efeff4; 
            object-fit: cover; transition: 0.2s; background: #f2f2f7; flex-shrink: 0;
        }
        .sym-option.active { border-color: var(--accent); transform: scale(1.1); }

        /* 입력 폼 */
        .form-group { margin-bottom: 12px; }
        input, textarea { 
            width: 100%; border: 1px solid var(--border); border-radius: 12px; 
            padding: 14px; box-sizing: border-box; font-size: 16px; background: #fff;
        }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
        
        /* 버튼 */
        .btn-row { display: grid; grid-template-columns: 1.5fr 1fr; gap: 10px; margin-top: 30px; }
        .btn-save { background: var(--accent); color: white; border: none; padding: 16px; border-radius: 14px; font-weight: 600; font-size: 16px; }
        .btn-close { background: #f2f2f7; color: #1c1c1e; border: none; padding: 16px; border-radius: 14px; font-weight: 600; }
        .btn-del { width: 100%; margin-top: 15px; background: none; border: none; color: #ff3b30; font-size: 14px; }

        .fab { 
            position: fixed; bottom: 30px; right: 30px; width: 64px; height: 64px; 
            background: var(--accent); color: white; border-radius: 50%; font-size: 32px; 
            border: none; box-shadow: 0 8px 16px rgba(0,122,255,0.3);
        }
    </style>
</head>
<body>

<div id="listContainer"></div>
<button class="fab" onclick="openModal()">+</button>

<div id="modal" class="modal">
    <div class="symbol-section">
        <div class="main-symbol" id="mainSymBox">👤</div>
        <div class="symbol-grid" id="symPicker"></div>
    </div>
    
    <div class="form-group"><input type="text" id="in-name" placeholder="이름"></div>
    <div class="form-group"><input type="text" id="in-rank" placeholder="계급"></div>
    
    <div class="grid-2 form-group">
        <input type="text" id="in-job" placeholder="직업 (6자)" maxlength="6">
        <input type="number" id="in-pearl" placeholder="진주 (5자리)" oninput="if(value.length>5) value=value.slice(0,5)">
    </div>
    
    <div class="grid-4 form-group">
        <input type="number" id="in-hp" placeholder="체력" oninput="if(value.length>5) value=value.slice(0,5)">
        <input type="number" id="in-str" placeholder="힘" oninput="if(value.length>5) value=value.slice(0,5)">
        <input type="number" id="in-int" placeholder="지능" oninput="if(value.length>5) value=value.slice(0,5)">
        <input type="number" id="in-cha" placeholder="매력" oninput="if(value.length>5) value=value.slice(0,5)">
    </div>
    
    <div class="form-group"><textarea id="in-look" placeholder="외모 (2줄)" rows="2"></textarea></div>
    <div class="form-group"><textarea id="in-clothes" placeholder="의류 (2줄)" rows="2"></textarea></div>
    
    <div class="btn-row">
        <button class="btn-save" onclick="save()">저장</button>
        <button class="btn-close" onclick="closeModal()">닫기</button>
    </div>
    <button id="delBtn" class="btn-del" onclick="deleteChar()">캐릭터 삭제</button>
</div>

<script>
    // 이미지 파일명 리스트
    const images = ['1.png', '2.png', '3.png', '4.png', '5.png'];
    let characters = JSON.parse(localStorage.getItem('chars_mobile_v2')) || [];
    let currentIdx = -1;
    let selectedImgName = '';

    // 심볼 선택기 초기화 (이미지 없을 시 대비 처리)
    function initSymPicker() {
        const picker = document.getElementById('symPicker');
        picker.innerHTML = images.map(img => `
            <img src="img/${img}" class="sym-option" 
                 onerror="this.style.display='none'" 
                 onclick="selectSym('${img}', this)">
        `).join('');
        
        // 이미지 폴더가 비어있을 경우 안내 문구 대신 기본 아이콘 사용
        if(picker.innerHTML === "") {
            picker.innerHTML = "<small style='color:#8e8e93'>img 폴더에 이미지를 넣어주세요</small>";
        }
    }

    function selectSym(name, el) {
        selectedImgName = name;
        const mainBox = document.getElementById('mainSymBox');
        mainBox.innerHTML = `<img src="img/${name}" onerror="this.parentElement.innerHTML='👤'">`;
        
        document.querySelectorAll('.sym-option').forEach(opt => opt.classList.remove('active'));
        if(el) el.classList.add('active');
    }

    function render() {
        const list = document.getElementById('listContainer');
        list.innerHTML = characters.length ? '' : '<p style="text-align:center; padding-top:50px; color:#8e8e93;">캐릭터를 추가해주세요.</p>';
        
        characters.forEach((c, i) => {
            const item = document.createElement('div');
            item.className = 'char-item';
            item.onclick = () => openModal(i);
            item.innerHTML = `
                <div class="sym-view">
                    ${c.symbol ? `<img src="img/${c.symbol}" onerror="this.parentElement.innerHTML='👤'">` : '👤'}
                </div>
                <div class="info">
                    <h3>${c.name || '이름 없음'}</h3>
                    <p>${c.rank || '계급 미정'} · ${c.job || '직업 미정'}</p>
                </div>
            `;
            list.appendChild(item);
        });
        localStorage.setItem('chars_mobile_v2', JSON.stringify(characters));
    }

    function openModal(idx = -1) {
        currentIdx = idx;
        const c = idx > -1 ? characters[idx] : {symbol:'', name:'', rank:'', job:'', pearl:'', hp:'', str:'', int:'', cha:'', look:'', clothes:''};
        
        // 심볼 초기화
        if(c.symbol) selectSym(c.symbol);
        else {
            selectedImgName = '';
            document.getElementById('mainSymBox').innerHTML = '👤';
            document.querySelectorAll('.sym-option').forEach(opt => opt.classList.remove('active'));
        }

        document.getElementById('in-name').value = c.name;
        document.getElementById('in-rank').value = c.rank;
        document.getElementById('in-job').value = c.job;
        document.getElementById('in-pearl').value = c.pearl;
        document.getElementById('in-hp').value = c.hp;
        document.getElementById('in-str').value = c.str;
        document.getElementById('in-int').value = c.int;
        document.getElementById('in-cha').value = c.cha;
        document.getElementById('in-look').value = c.look;
        document.getElementById('in-clothes').value = c.clothes;
        
        document.getElementById('delBtn').style.display = idx > -1 ? 'block' : 'none';
        document.getElementById('modal').style.display = 'block';
        document.body.style.overflow = 'hidden'; // 배경 스크롤 방지
    }

    function closeModal() { 
        document.getElementById('modal').style.display = 'none'; 
        document.body.style.overflow = 'auto';
    }

    function save() {
        if(!document.getElementById('in-name').value) { alert('이름을 입력해주세요.'); return; }
        
        const c = {
            symbol: selectedImgName,
            name: document.getElementById('in-name').value,
            rank: document.getElementById('in-rank').value,
            job: document.getElementById('in-job').value,
            pearl: document.getElementById('in-pearl').value,
            hp: document.getElementById('in-hp').value,
            str: document.getElementById('in-str').value,
            int: document.getElementById('in-int').value,
            cha: document.getElementById('in-cha').value,
            look: document.getElementById('in-look').value,
            clothes: document.getElementById('in-clothes').value
        };
        
        if(currentIdx > -1) characters[currentIdx] = c;
        else characters.push(c);
        
        render(); 
        closeModal();
    }

    function deleteChar() {
        if(confirm('이 캐릭터를 삭제하시겠습니까?')) {
            characters.splice(currentIdx, 1);
            render(); closeModal();
        }
    }

    initSymPicker();
    render();
</script>
</body>
</html>
