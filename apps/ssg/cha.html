<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mobile Char Manager</title>
    <style>
        :root { --bg: #f2f2f7; --accent: #007aff; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); margin: 0; padding: 15px; }
        
        /* 모바일 리스트 스타일 */
        .char-item { background: white; border-radius: 16px; padding: 16px; margin-bottom: 12px; display: flex; align-items: center; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .sym { width: 50px; height: 50px; border-radius: 50%; margin-right: 15px; background: #eee; }
        .info h3 { margin: 0; font-size: 17px; }
        .info p { margin: 2px 0 0; color: #8e8e93; font-size: 14px; }

        /* 모바일 상세 페이지 (전체화면 모달) */
        .modal { display: none; position: fixed; inset: 0; background: white; z-index: 100; overflow-y: auto; padding: 20px; }
        .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-top: 15px; }
        input, textarea { width: 100%; border: 1px solid #d1d1d6; border-radius: 10px; padding: 12px; box-sizing: border-box; font-size: 16px; margin-top: 5px; }
        
        /* 심볼 선택 그리드 */
        .symbol-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin: 20px 0; }
        .sym-option { width: 100%; aspect-ratio: 1; border-radius: 50%; border: 2px solid transparent; cursor: pointer; }
        .sym-option.selected { border-color: var(--accent); }

        .fab { position: fixed; bottom: 30px; right: 30px; width: 60px; height: 60px; background: var(--accent); color: white; border-radius: 50%; font-size: 30px; border: none; box-shadow: 0 4px 15px rgba(0,122,255,0.4); }
    </style>
</head>
<body>

<div id="listContainer"></div>
<button class="fab" onclick="openModal()">+</button>

<div id="modal" class="modal">
    <div style="text-align: center;">
        <img id="selectedSym" src="img/1.png" style="width: 80px; height: 80px; border-radius: 50%;">
        <div class="symbol-grid" id="symPicker"></div>
    </div>
    
    <input type="text" id="in-name" placeholder="이름 (이름이 중요)">
    <input type="text" id="in-rank" placeholder="계급">
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
        <input type="text" id="in-job" placeholder="직업 (6자)" maxlength="6">
        <input type="number" id="in-pearl" placeholder="진주 (5자리)">
    </div>
    
    <div class="grid-4">
        <input type="number" id="in-hp" placeholder="체력">
        <input type="number" id="in-str" placeholder="힘">
        <input type="number" id="in-int" placeholder="지능">
        <input type="number" id="in-cha" placeholder="매력">
    </div>
    
    <textarea id="in-look" placeholder="외모 (2줄 내용)" rows="2"></textarea>
    <textarea id="in-clothes" placeholder="의류 (2줄 내용)" rows="2"></textarea>
    
    <div style="margin-top: 20px; display: flex; gap: 10px;">
        <button onclick="save()" style="flex:1; background:var(--accent); color:white; border:none; padding:15px; border-radius:10px;">저장</button>
        <button onclick="closeModal()" style="flex:1; padding:15px; border-radius:10px;">닫기</button>
    </div>
</div>

<script>
    const images = ['1.png', '2.png', '3.png', '4.png', '5.png'];
    let characters = JSON.parse(localStorage.getItem('chars')) || [];
    let currentIdx = -1;

    // 심볼 선택기 렌더링
    function initSymPicker() {
        const picker = document.getElementById('symPicker');
        images.forEach(img => {
            picker.innerHTML += `<img src="img/${img}" class="sym-option" onclick="selectSym('${img}')">`;
        });
    }

    function selectSym(name) {
        document.getElementById('selectedSym').src = 'img/' + name;
        document.getElementById('selectedSym').dataset.val = name;
        document.querySelectorAll('.sym-option').forEach(el => el.classList.remove('selected'));
    }

    function render() {
        const list = document.getElementById('listContainer');
        list.innerHTML = characters.map((c, i) => `
            <div class="char-item" onclick="openModal(${i})">
                <img src="img/${c.symbol}" class="sym">
                <div class="info"><h3>${c.name}</h3><p>${c.rank}</p></div>
            </div>
        `).join('');
    }

    function openModal(idx = -1) {
        currentIdx = idx;
        const c = idx > -1 ? characters[idx] : {symbol:'1.png', name:'', rank:'', job:'', pearl:'', hp:'', str:'', int:'', cha:'', look:'', clothes:''};
        document.getElementById('selectedSym').src = 'img/' + c.symbol;
        document.getElementById('selectedSym').dataset.val = c.symbol;
        document.getElementById('in-name').value = c.name;
        document.getElementById('in-rank').value = c.rank;
        document.getElementById('in-job').value = c.job;
        document.getElementById('in-pearl').value = c.pearl;
        document.getElementById('in-hp').value = c.hp;
        document.getElementById('in-str').value = c.str;
        document.getElementById('in-int').value = c.int;
        document.getElementById('in-cha').value = c.cha;
        document.getElementById('in-look').value = c.look;
        document.getElementById('in-clothes').value = c.clothes;
        document.getElementById('modal').style.display = 'block';
    }

    function closeModal() { document.getElementById('modal').style.display = 'none'; }

    function save() {
        const c = {
            symbol: document.getElementById('selectedSym').dataset.val,
            name: document.getElementById('in-name').value,
            rank: document.getElementById('in-rank').value,
            job: document.getElementById('in-job').value,
            pearl: document.getElementById('in-pearl').value,
            hp: document.getElementById('in-hp').value,
            str: document.getElementById('in-str').value,
            int: document.getElementById('in-int').value,
            cha: document.getElementById('in-cha').value,
            look: document.getElementById('in-look').value,
            clothes: document.getElementById('in-clothes').value
        };
        if(currentIdx > -1) characters[currentIdx] = c; else characters.push(c);
        localStorage.setItem('chars', JSON.stringify(characters));
        render(); closeModal();
    }

    initSymPicker();
    render();
</script>
</body>
</html>
