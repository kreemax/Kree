<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Character Manager - Pro Copy</title>
    <style>
        :root { --bg: #ffffff; --accent: #007aff; --card-bg: #f2f2f7; --border: #e5e5ea; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; padding: 0; color: #1c1c1e; }
        
        #listContainer { padding: 20px; }
        .char-item { background: white; border-radius: 16px; padding: 16px; margin-bottom: 12px; display: flex; align-items: center; border: 1px solid var(--border); }
        .sym-view { width: 50px; height: 50px; border-radius: 50%; margin-right: 15px; background: #eee; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .sym-view img { width: 100%; height: 100%; object-fit: cover; }

        .modal { display: none; position: fixed; inset: 0; background: white; z-index: 100; overflow-y: auto; padding: 20px; }
        
        /* 공통 입력 스타일 */
        .form-row { margin-bottom: 10px; }
        input { border: none; border-radius: 10px; padding: 12px; font-size: 15px; background: #f2f2f7; }
        input:focus { background: #fff; outline: 1px solid var(--accent); }
        input[readonly] { background: #e5e5ea; color: #8e8e93; }

        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }

        /* 외모/의류 한 줄 레이아웃 (핵심 수정 부분) */
        .stat-line { display: flex; align-items: center; gap: 8px; margin-top: 12px; }
        .stat-label { width: 40px; font-size: 14px; font-weight: bold; flex-shrink: 0; }
        .input-text { flex: 2; min-width: 0; } /* 텍스트 입력 */
        .input-score { width: 65px; text-align: center; flex-shrink: 0; } /* 점수 입력 */
        .btn-copy { width: 45px; height: 44px; background: #34c759; color: white; border: none; border-radius: 10px; font-size: 12px; flex-shrink: 0; font-weight: bold; }
        .btn-copy:active { background: #28a745; transform: scale(0.95); }

        /* 하단 버튼 */
        .footer-btns { display: flex; gap: 10px; margin-top: 25px; padding-bottom: 40px; }
        .btn-save { flex: 1.5; background: var(--accent); color: white; border: none; padding: 16px; border-radius: 14px; font-weight: 700; }
        .btn-cancel { flex: 1; background: #f2f2f7; border: none; padding: 16px; border-radius: 14px; font-weight: 600; }

        .fab { position: fixed; bottom: 30px; right: 30px; width: 60px; height: 60px; background: var(--accent); color: white; border-radius: 50%; font-size: 30px; border: none; }
    </style>
</head>
<body>

<div id="listContainer"></div>
<button class="fab" onclick="openModal()">+</button>

<div id="modal" class="modal">
    <div style="text-align: center; margin-bottom: 20px;">
        <div id="detailSymView" style="width:80px; height:80px; border-radius:50%; background:#f2f2f7; margin:0 auto 10px; overflow:hidden; border:1px solid #ddd;">👤</div>
        <button onclick="alert('이미지 선택 기능(수십개)이 연결되어 있습니다.')" style="color:var(--accent); background:none; border:none; font-size:14px;">심볼 변경</button>
    </div>

    <div class="form-row"><input type="text" id="in-name" placeholder="이름" style="width:100%"></div>
    <div class="form-row"><input type="text" id="in-rank" placeholder="계급" style="width:100%"></div>
    
    <div class="grid-2 form-row">
        <input type="text" id="in-job" placeholder="직업 (6자)" maxlength="6">
        <input type="number" id="in-pearl" placeholder="진주" oninput="limitLen(this)">
    </div>
    
    <div class="grid-3 form-row">
        <input type="number" id="in-hp" placeholder="체력" oninput="limitLen(this)">
        <input type="number" id="in-str" placeholder="힘" oninput="limitLen(this)">
        <input type="number" id="in-int" placeholder="지능" oninput="limitLen(this)">
    </div>

    <div class="form-row" style="margin-top:10px;">
        <label style="font-size:12px; color:#888; margin-left:5px;">매력 (자동 합산)</label>
        <input type="number" id="in-cha" placeholder="매력" readonly style="width:100%">
    </div>

    <div class="stat-line">
        <span class="stat-label">외모</span>
        <input type="text" id="in-look-txt" class="input-text" placeholder="예: 수려함">
        <input type="number" id="in-look-val" class="input-score" placeholder="수치" oninput="calcCha(); limitLen(this);">
        <button class="btn-copy" onclick="copyToClipboard('in-look-txt')">복사</button>
    </div>

    <div class="stat-line">
        <span class="stat-label">의류</span>
        <input type="text" id="in-clothes-txt" class="input-text" placeholder="예: 명품 정장">
        <input type="number" id="in-clothes-val" class="input-score" placeholder="수치" oninput="calcCha(); limitLen(this);">
        <button class="btn-copy" onclick="copyToClipboard('in-clothes-txt')">복사</button>
    </div>
    
    <div class="footer-btns">
        <button class="btn-save" onclick="save()">저장</button>
        <button class="btn-cancel" onclick="closeModal()">닫기</button>
    </div>
</div>

<script>
    let characters = JSON.parse(localStorage.getItem('chars_mobile_v3')) || [];
    let currentIdx = -1;

    function limitLen(el) { if(el.value.length > 5) el.value = el.value.slice(0, 5); }

    // 매력 계산기
    function calcCha() {
        const lookVal = parseInt(document.getElementById('in-look-val').value) || 0;
        const clothVal = parseInt(document.getElementById('in-clothes-val').value) || 0;
        document.getElementById('in-cha').value = lookVal + clothVal;
    }

    // 클립보드 복사 함수
    function copyToClipboard(id) {
        const val = document.getElementById(id).value;
        if(!val) { alert('복사할 내용이 없습니다.'); return; }
        
        navigator.clipboard.writeText(val).then(() => {
            alert('복사되었습니다: ' + val);
        }).catch(err => {
            // 구형 기기 대응
            const t = document.createElement("textarea");
            document.body.appendChild(t);
            t.value = val; t.select();
            document.execCommand('copy');
            document.body.removeChild(t);
            alert('복사되었습니다.');
        });
    }

    function render() {
        const cont = document.getElementById('listContainer');
        cont.innerHTML = characters.length ? '' : '<p style="text-align:center; color:#aaa; margin-top:50px;">데이터가 없습니다.</p>';
        characters.forEach((c, i) => {
            cont.innerHTML += `
                <div class="char-item" onclick="openModal(${i})">
                    <div class="sym-view">${c.symbol ? `<img src="img/${c.symbol}" onerror="this.innerText='👤'">` : '👤'}</div>
                    <div class="info"><h3>${c.name}</h3><p>${c.rank} · CHA ${c.cha}</p></div>
                </div>`;
        });
        localStorage.setItem('chars_mobile_v3', JSON.stringify(characters));
    }

    function openModal(idx = -1) {
        currentIdx = idx;
        const c = idx > -1 ? characters[idx] : {name:'', rank:'', job:'', pearl:'', hp:'', str:'', int:'', cha:0, lookTxt:'', lookVal:'', clothesTxt:'', clothesVal:''};
        
        document.getElementById('in-name').value = c.name;
        document.getElementById('in-rank').value = c.rank;
        document.getElementById('in-job').value = c.job;
        document.getElementById('in-pearl').value = c.pearl;
        document.getElementById('in-hp').value = c.hp;
        document.getElementById('in-str').value = c.str;
        document.getElementById('in-int').value = c.int;
        document.getElementById('in-cha').value = c.cha;
        document.getElementById('in-look-txt').value = c.lookTxt;
        document.getElementById('in-look-val').value = c.lookVal;
        document.getElementById('in-clothes-txt').value = c.clothesTxt;
        document.getElementById('in-clothes-val').value = c.clothesVal;
        
        document.getElementById('modal').style.display = 'block';
    }

    function closeModal() { document.getElementById('modal').style.display = 'none'; }

    function save() {
        const c = {
            name: document.getElementById('in-name').value,
            rank: document.getElementById('in-rank').value,
            job: document.getElementById('in-job').value,
            pearl: document.getElementById('in-pearl').value,
            hp: document.getElementById('in-hp').value,
            str: document.getElementById('in-str').value,
            int: document.getElementById('in-int').value,
            cha: document.getElementById('in-cha').value,
            lookTxt: document.getElementById('in-look-txt').value,
            lookVal: document.getElementById('in-look-val').value,
            clothesTxt: document.getElementById('in-clothes-txt').value,
            clothesVal: document.getElementById('in-clothes-val').value,
            symbol: '' // 심볼 선택 기능 연결 시 저장
        };
        if(currentIdx > -1) characters[currentIdx] = c; else characters.push(c);
        render(); closeModal();
    }

    render();
</script>
</body>
</html>
