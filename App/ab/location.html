<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>스토리북 - 장소 관리</title>
    <style>
        :root {
            --primary: #4f46e5;
            --danger: #ef4444;
            --bg: #f8fafc;
        }
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; padding: 16px; color: #1e293b; }
        
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .back-btn { text-decoration: none; color: var(--primary); font-weight: bold; }

        /* 등록 폼 */
        .add-form { display: flex; gap: 8px; margin-bottom: 20px; }
        .add-input { flex: 1; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; }
        .add-btn { background: var(--primary); color: white; border: none; padding: 0 20px; border-radius: 8px; font-weight: bold; }

        /* 장소 리스트 */
        .location-list { display: grid; gap: 10px; }
        .location-item { 
            background: white; padding: 16px; border-radius: 12px; 
            display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }
        .info { flex: 1; cursor: pointer; }
        .name { font-weight: bold; display: block; margin-bottom: 4px; }
        .usage-count { font-size: 12px; color: #64748b; }

        /* 버튼들 */
        .actions { display: flex; gap: 10px; }
        .view-link { color: var(--primary); font-size: 13px; text-decoration: none; border: 1px solid #e2e8f0; padding: 6px 10px; border-radius: 6px; }
        .del-btn { color: var(--danger); font-size: 13px; background: none; border: 1px solid #fee2e2; padding: 6px 10px; border-radius: 6px; cursor: pointer; }

        /* 모달 스타일 (사용 리스트 보기) */
        #modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 100; }
        .modal-content { background: white; margin: 20% auto; padding: 20px; width: 80%; border-radius: 16px; max-height: 60vh; overflow-y: auto; }
        .modal-header { display: flex; justify-content: space-between; margin-bottom: 15px; font-weight: bold; }
        .close-modal { cursor: pointer; color: #94a3b8; }
        .usage-item { padding: 10px 0; border-bottom: 1px solid #f1f5f9; font-size: 14px; }
    </style>
</head>
<body>

    <div class="header">
        <a href="dashboard.html" class="back-btn">← 뒤로</a>
        <h2>장소 관리</h2>
        <div></div>
    </div>

    <div class="add-form">
        <input type="text" id="newLocation" class="add-input" placeholder="새 장소 이름 입력">
        <button class="add-btn" onclick="addLocation()">추가</button>
    </div>

    <div class="location-list" id="locationList">
        </div>

    <div id="modal">
        <div class="modal-content">
            <div class="modal-header">
                <span id="modalTitle">장소 사용 리스트</span>
                <span class="close-modal" onclick="closeModal()">✕</span>
            </div>
            <div id="modalList">
                </div>
        </div>
    </div>

    <script>
        // 1. 초기 임의 데이터 (10개)
        let locations = [
            { id: 1, name: "산", count: 3 },
            { id: 2, name: "바다", count: 1 },
            { id: 3, name: "카페 옥상", count: 5 },
            { id: 4, name: "도서관", count: 2 },
            { id: 5, name: "지하 주차장", count: 1 },
            { id: 6, name: "편의점", count: 4 },
            { id: 7, name: "고층 빌딩", count: 1 },
            { id: 8, name: "기차역", count: 2 },
            { id: 9, name: "방송국", count: 1 },
            { id: 10, name: "공원 평상", count: 6 }
        ];

        // 2. 렌더링 함수
        function render() {
            const listEl = document.getElementById('locationList');
            listEl.innerHTML = locations.map(loc => `
                <div class="location-item">
                    <div class="info" onclick="viewUsages('${loc.name}')">
                        <span class="name">${loc.name}</span>
                        <span class="usage-count">사용된 스토리: ${loc.count}건</span>
                    </div>
                    <div class="actions">
                        <button class="view-link" onclick="viewUsages('${loc.name}')">보기</button>
                        <button class="del-btn" onclick="deleteLocation(${loc.id})">삭제</button>
                    </div>
                </div>
            `).join('');
        }

        // 3. 추가 기능
        function addLocation() {
            const input = document.getElementById('newLocation');
            if(!input.value.trim()) return;
            
            const newLoc = {
                id: Date.now(),
                name: input.value,
                count: 0
            };
            locations.unshift(newLoc);
            input.value = '';
            render();
        }

        // 4. 삭제 기능
        function deleteLocation(id) {
            if(confirm('이 장소를 삭제하시겠습니까?')) {
                locations = locations.filter(loc => loc.id !== id);
                render();
            }
        }

        // 5. 사용 리스트 보기 (모달)
        function viewUsages(name) {
            document.getElementById('modal').style.display = 'block';
            document.getElementById('modalTitle').innerText = `[${name}] 사용 스토리`;
            
            // 임의의 사용 예시 데이터
            const mockUsages = [
                { title: "우연한 만남", code: "CODE01" },
                { title: "비밀 계획", code: "CODE03" }
            ];
            
            const modalListEl = document.getElementById('modalList');
            modalListEl.innerHTML = mockUsages.map(u => `
                <div class="usage-item">
                    <strong>${u.title}</strong> (${u.code})
                </div>
            `).join('') || '<div class="usage-item">사용된 기록이 없습니다.</div>';
        }

        function closeModal() {
            document.getElementById('modal').style.display = 'none';
        }

        // 초기 실행
        render();
    </script>
</body>
</html>
