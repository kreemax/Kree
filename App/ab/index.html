<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Word DB Master v8</title>
    <style>
        :root {
            --bg: #000; --card: #1a1a1a; --item: #2d2d2d;
            --primary: #3498db; --success: #2ecc71; --text: #fff; --dim: #888;
        }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; overflow: hidden; display: flex; flex-direction: column; height: 100vh; }
        
        button { cursor: pointer; border: none; transition: 0.2s; border-radius: 8px; }
        input, textarea { width: 100%; box-sizing: border-box; padding: 12px; border: 1px solid #333; border-radius: 8px; background: #111; color: #fff; margin-bottom: 8px; }

        .header { padding: 15px; background: var(--bg); border-bottom: 1px solid #222; flex-shrink: 0; }
        .content { flex: 1; overflow-y: auto; padding-bottom: 100px; } 
        .list-item { padding: 15px; border-bottom: 1px solid #1a1a1a; cursor: pointer; }
        .list-row1 { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; font-size: 15px; font-weight: 600; }
        .list-row2 { font-size: 13px; color: var(--dim); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; padding-left: 28px; }
        .flag { font-size: 10px; padding: 2px 5px; border-radius: 4px; color: #fff; flex-shrink: 0; }
        .flag-r { background: #e74c3c; } .flag-m { background: var(--success); }

        .bottom-bar { display: flex; justify-content: space-around; padding: 15px 0 35px; background: rgba(0,0,0,0.9); border-top: 1px solid #222; position: fixed; bottom: 0; width: 100%; z-index: 10; }
        .btn-main { width: 60px; height: 60px; border-radius: 50%; color: #fff; font-size: 24px; font-weight: bold; }

        .layer { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 100; flex-direction: column; }
        .layer-header { padding: 15px; display: grid; grid-template-columns: 1fr 60px 60px; gap: 8px; align-items: center; border-bottom: 1px solid #222; background: #0a0a0a; }
        .header-title-box { font-size: 18px; font-weight: 800; color: var(--primary); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .head-btn { background: #222; color: #fff; padding: 10px 0; font-size: 13px; text-align: center; font-weight: bold; }
        .layer-body { flex: 1; overflow-y: auto; padding: 15px 15px 50px 15px; }

        /* 시스템 전용 스타일 */
        .sys-tabs { display: flex; gap: 5px; overflow-x: auto; margin-bottom: 15px; padding-bottom: 5px; scrollbar-width: none; }
        .sys-tabs::-webkit-scrollbar { display: none; }
        .tab-btn { flex-shrink: 0; padding: 8px 15px; background: #222; color: #888; font-size: 13px; border-radius: 20px; }
        .tab-btn.active { background: var(--primary); color: #fff; }
        .sys-search { margin-bottom: 15px; border-color: var(--primary); opacity: 0.7; }
        .sys-item-card { background: #111; border-radius: 10px; padding: 12px; margin-bottom: 10px; border: 1px solid #222; }
        .sys-item-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 5px; }
        .sys-item-name { font-weight: bold; color: var(--primary); }
        .sys-item-desc { font-size: 12px; color: #888; line-height: 1.4; margin-top: 4px; }
        .sys-item-btns { display: flex; gap: 10px; margin-top: 8px; justify-content: flex-end; }
        .sys-small-btn { font-size: 11px; padding: 5px 10px; background: #222; color: #ccc; border-radius: 5px; }

        /* 기존 상세 페이지 스타일 */
        .step-container { background: var(--card); border-radius: 15px; padding: 20px; margin-bottom: 15px; position: relative; }
        .step-label { color: var(--primary); font-size: 11px; font-weight: bold; margin-bottom: 12px; letter-spacing: 1px; }
        .tag-wrapper { display: flex; flex-wrap: wrap; gap: 10px; }
        .tag { background: var(--item); padding: 10px 14px; border-radius: 10px; display: flex; align-items: center; gap: 8px; font-size: 14px; border: 1px solid #333; }
        .tag .remove { color: #666; font-weight: bold; padding: 2px 5px; }
        .info-box { font-size: 14px; color: #aaa; line-height: 1.6; padding: 15px; background: #151515; border-radius: 12px; border-left: 4px solid var(--primary); margin-bottom: 12px; }
        .info-box b { color: var(--primary); display: block; margin-bottom: 6px; font-size: 10px; text-transform: uppercase; }
        .btn-group { position: absolute; right: 15px; top: 12px; display: flex; gap: 5px; }
        .plus-btn { width: 35px; height: 35px; color: white; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="header">
        <input type="text" id="searchBar" placeholder="메인 리스트 검색..." onkeyup="filterList()">
    </div>

    <div class="content" id="mainList"></div>

    <div class="bottom-bar">
        <button class="btn-main" style="background:#e74c3c" onclick="generateRandom()">R</button>
        <button class="btn-main" style="background:var(--success)" onclick="openManualLayer()">+</button>
        <button class="btn-main" style="background:#34495e" onclick="openSystem()">S</button>
    </div>

    <div id="detailLayer" class="layer">
        <div class="layer-header">
            <div id="detailTitleDisp" class="header-title-box" onclick="editTitle()">제목 없음</div>
            <button class="head-btn" style="background:var(--primary)" onclick="copyToClipboard()">복사</button>
            <button class="head-btn" onclick="closeLayer('detailLayer')">닫기</button>
        </div>
        <div class="layer-body">
            <div class="step-container">
                <div class="step-label">BASE ELEMENTS</div>
                <div class="tag-wrapper" id="baseTags"></div>
            </div>
            <div id="infoDisplayArea"></div>
            <div class="step-container">
                <div class="step-label">ACTIONS</div>
                <div class="btn-group">
                    <button class="plus-btn" style="background:var(--primary)" onclick="addActionRandom()">R+</button>
                    <button class="plus-btn" style="background:var(--success)" onclick="addActionManual()">M+</button>
                </div>
                <div class="tag-wrapper" id="actionTags"></div>
            </div>
            <button onclick="deleteItem()" style="width:100%; color:#555; background:none; padding:20px; font-size:13px;">이 기록 완전히 삭제하기</button>
        </div>
    </div>

    <div id="sysLayer" class="layer">
        <div class="layer-header">
            <div class="header-title-box" style="grid-column: span 2;">시스템 관리</div>
            <button class="head-btn" onclick="closeLayer('sysLayer')">닫기</button>
        </div>
        <div class="layer-body">
            <div class="sys-tabs">
                <button class="tab-btn active" onclick="changeTab('place', this)">장소</button>
                <button class="tab-btn" onclick="changeTab('person', this)">인물</button>
                <button class="tab-btn" onclick="changeTab('start', this)">시작</button>
                <button class="tab-btn" onclick="changeTab('action', this)">액션</button>
            </div>

            <input type="text" id="sysSearch" class="sys-search" placeholder="항목 검색..." onkeyup="renderSysList()">
            
            <div id="sysPlaceInput" style="display:block;"><input type="text" id="sysPlaceName" placeholder="장소명 (중복불가)"><textarea id="sysPlaceDesc" placeholder="장소 설명"></textarea></div>
            <div id="sysPersonInput" style="display:none;"><input type="text" id="sysPersonName" placeholder="인물 이름 (중복불가)"><textarea id="sysPersonLook" placeholder="외모 특징"></textarea><textarea id="sysPersonCloth" placeholder="의상 정보"></textarea></div>
            <input type="text" id="sysCommonInp" placeholder="항목 입력 (중복불가)" style="display:none;">
            
            <button id="addBtn" onclick="addSysItem()" style="width:100%; padding:15px; background:var(--primary); color:#fff; font-weight:bold; margin-bottom:20px;">항목 추가하기</button>
            
            <div id="sysList"></div>
        </div>
    </div>

    <script>
        let db = JSON.parse(localStorage.getItem('wordSystem')) || {
            place: [{name:"거실", desc:"가족들이 모여 쉬는 포근한 공간입니다."}], 
            person: [{name:"탐정", look:"날카로운 눈매", cloth:"회색 트렌치 코트"}],
            start: ["조용히", "갑자기"],
            action: ["조사를 시작한다"]
        };
        let logs = JSON.parse(localStorage.getItem('wordLogs')) || [];
        let currIdx = null;
        let currentTab = 'place';

        const save = () => {
            // 모든 카테고리 가나다순 정렬
            db.place.sort((a,b) => a.name.localeCompare(b.name));
            db.person.sort((a,b) => a.name.localeCompare(b.name));
            db.start.sort((a,b) => a.localeCompare(b));
            db.action.sort((a,b) => a.localeCompare(b));
            localStorage.setItem('wordSystem', JSON.stringify(db));
            localStorage.setItem('wordLogs', JSON.stringify(logs));
        };

        function renderList() {
            const container = document.getElementById('mainList');
            container.innerHTML = logs.map((log, i) => `
                <div class="list-item" onclick="openDetail(${i})">
                    <div class="list-row1">
                        <span class="flag ${log.type === 'R' ? 'flag-r' : 'flag-m'}">${log.type}</span>
                        <span>${log.title} | ${log.place} | ${log.person} | ${log.start}</span>
                    </div>
                    <div class="list-row2">${log.actions.length > 0 ? log.actions.join(', ') : '추가된 액션 없음'}</div>
                </div>
            `).join('');
        }

        function openDetail(idx) {
            currIdx = idx; const log = logs[idx];
            document.getElementById('detailTitleDisp').innerText = log.title;
            document.getElementById('baseTags').innerHTML = `
                <div class="tag" onclick="editBase('place')">${log.place}</div>
                <div class="tag" onclick="editBase('person')">${log.person}</div>
                <div class="tag" onclick="editBase('start')">${log.start}</div>
            `;
            const infoArea = document.getElementById('infoDisplayArea');
            let infoHtml = '';
            const matchedP = db.place.find(p => p.name === log.place);
            if(matchedP) infoHtml += `<div class="info-box"><b>Place Description</b>${matchedP.desc}</div>`;
            const matchedPer = db.person.find(p => p.name === log.person);
            if(matchedPer) {
                infoHtml += `<div class="info-box"><b>Appearance</b>${matchedPer.look}</div>`;
                infoHtml += `<div class="info-box"><b>Outfit</b>${matchedPer.cloth}</div>`;
            }
            infoArea.innerHTML = infoHtml;
            renderActionTags();
            document.getElementById('detailLayer').style.display = 'flex';
        }

        // --- 시스템 관리 로직 ---
        function openSystem() { document.getElementById('sysLayer').style.display = 'flex'; renderSysList(); }

        function changeTab(tab, btn) {
            currentTab = tab;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            
            document.getElementById('sysPlaceInput').style.display = (tab === 'place') ? 'block' : 'none';
            document.getElementById('sysPersonInput').style.display = (tab === 'person') ? 'block' : 'none';
            document.getElementById('sysCommonInp').style.display = (tab === 'start' || tab === 'action') ? 'block' : 'none';
            
            renderSysList();
        }

        function renderSysList() {
            const q = document.getElementById('sysSearch').value.toLowerCase();
            const div = document.getElementById('sysList');
            let items = db[currentTab];
            
            // 필터링
            if(q) {
                items = items.filter(v => {
                    const target = (typeof v === 'object') ? v.name : v;
                    return target.toLowerCase().includes(q);
                });
            }

            div.innerHTML = items.map((v, i) => {
                const name = (typeof v === 'object') ? v.name : v;
                return `
                <div class="sys-item-card">
                    <div class="sys-item-header">
                        <span class="sys-item-name">${name}</span>
                        <div class="sys-item-btns">
                            ${(currentTab === 'place' || currentTab === 'person') ? `<button class="sys-small-btn" onclick="editSysItem('${currentTab}', ${db[currentTab].indexOf(v)})">수정</button>` : ''}
                            <button class="sys-small-btn" style="color:#e74c3c" onclick="deleteSysItem('${currentTab}', ${db[currentTab].indexOf(v)})">삭제</button>
                        </div>
                    </div>
                    ${v.desc ? `<div class="sys-item-desc">${v.desc}</div>` : ''}
                    ${v.look ? `<div class="sys-item-desc"><b>외모:</b> ${v.look} / <b>의상:</b> ${v.cloth}</div>` : ''}
                </div>`;
            }).join('');
        }

        function addSysItem() {
            const cat = currentTab;
            if(cat === 'place') {
                const name = document.getElementById('sysPlaceName').value.trim();
                const desc = document.getElementById('sysPlaceDesc').value.trim();
                if(!name) return;
                if(db.place.some(p => p.name === name)) return alert("이미 존재하는 장소명입니다.");
                db.place.push({name, desc});
            } else if(cat === 'person') {
                const name = document.getElementById('sysPersonName').value.trim();
                const look = document.getElementById('sysPersonLook').value.trim();
                const cloth = document.getElementById('sysPersonCloth').value.trim();
                if(!name) return;
                if(db.person.some(p => p.name === name)) return alert("이미 존재하는 인물명입니다.");
                db.person.push({name, look, cloth});
            } else {
                const val = document.getElementById('sysCommonInp').value.trim();
                if(!val) return;
                if(db[cat].includes(val)) return alert("이미 존재하는 항목입니다.");
                db[cat].push(val);
            }
            save(); renderSysList();
            document.querySelectorAll('#sysLayer input, #sysLayer textarea').forEach(el => el.value = '');
        }

        function editSysItem(cat, idx) {
            const item = db[cat][idx];
            if(cat === 'place') {
                const newName = prompt("새 장소명", item.name);
                if(!newName) return;
                if(newName !== item.name && db.place.some(p => p.name === newName)) return alert("중복된 이름입니다.");
                const newDesc = prompt("새 장소 설명", item.desc);
                db.place[idx] = {name: newName, desc: newDesc};
            } else if(cat === 'person') {
                const newName = prompt("새 인물 이름", item.name);
                if(!newName) return;
                if(newName !== item.name && db.person.some(p => p.name === newName)) return alert("중복된 이름입니다.");
                const newLook = prompt("새 외모 정보", item.look);
                const newCloth = prompt("새 의상 정보", item.cloth);
                db.person[idx] = {name: newName, look: newLook, cloth: newCloth};
            }
            save(); renderSysList();
        }

        function deleteSysItem(c, i) { if(confirm("삭제하시겠습니까?")) { db[c].splice(i,1); save(); renderSysList(); } }

        // --- 기타 공통 로직 ---
        function copyToClipboard() {
            const log = logs[currIdx];
            const matchedP = db.place.find(p => p.name === log.place);
            const matchedPer = db.person.find(p => p.name === log.person);
            const resultText = `${log.place}, ${matchedP?matchedP.desc:''}, ${matchedPer?matchedPer.look:''}, ${matchedPer?matchedPer.cloth:''}, ${log.actions.join(', ')}`;
            navigator.clipboard.writeText(resultText).then(() => alert("복사되었습니다!"));
        }

        function renderActionTags() {
            document.getElementById('actionTags').innerHTML = logs[currIdx].actions.map((act, i) => `
                <div class="tag">${act} <span class="remove" onclick="event.stopPropagation(); removeAction(${i})">×</span></div>
            `).join('');
        }

        function editTitle() { const val = prompt("제목 수정", logs[currIdx].title); if(val) { logs[currIdx].title = val; save(); openDetail(currIdx); renderList(); } }
        function editBase(key) { const val = prompt(`${key} 수정`, logs[currIdx][key]); if(val) { logs[currIdx][key] = val; save(); openDetail(currIdx); renderList(); } }
        function addActionRandom() { const act = db.action[Math.floor(Math.random() * db.action.length)]; if(act) { logs[currIdx].actions.push(act); save(); renderActionTags(); renderList(); } }
        function addActionManual() { const val = prompt("액션 추가"); if(val) { logs[currIdx].actions.push(val); save(); renderActionTags(); renderList(); } }
        function removeAction(i) { logs[currIdx].actions.splice(i,1); save(); renderActionTags(); renderList(); }
        function generateRandom() {
            const p = db.place[Math.floor(Math.random() * db.place.length)] || {name:"?"};
            const per = db.person[Math.floor(Math.random() * db.person.length)] || {name:"?"};
            const s = db.start[Math.floor(Math.random() * db.start.length)] || "?";
            logs.unshift({ title: `조합 #${logs.length + 1}`, type: 'R', place: p.name, person: per.name, start: s, actions: [] });
            save(); renderList(); openDetail(0);
        }
        function openManualLayer() { const t = prompt("새 제목"); if(t) { logs.unshift({ title: t, type: 'M', place: '장소명', person: '인물명', start: '시작', actions: [] }); save(); renderList(); openDetail(0); } }
        function deleteItem() { if(confirm("삭제하시겠습니까?")) { logs.splice(currIdx, 1); save(); renderList(); closeLayer('detailLayer'); } }
        function closeLayer(id) { document.getElementById(id).style.display = 'none'; }
        function filterList() {
            const q = document.getElementById('searchBar').value.toLowerCase();
            document.querySelectorAll('.list-item').forEach(item => item.style.display = item.innerText.toLowerCase().includes(q) ? '' : 'none');
        }

        renderList();
    </script>
</body>
</html>
