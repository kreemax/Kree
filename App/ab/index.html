<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>단어 생성기 Pro</title>
    <style>
        :root {
            --bg-color: #f0f2f5;
            --card-bg: #ffffff;
            --primary: #4a90e2;
            --secondary: #6c757d;
            --accent: #ff6b6b;
            --success: #4fab40;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            margin: 0; padding: 0;
            display: flex; flex-direction: column; height: 100vh;
            color: #333;
        }

        /* 상단 검색창 */
        .header {
            padding: 15px;
            background: var(--card-bg);
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            z-index: 10;
        }

        #searchBar {
            width: 100%; padding: 12px;
            border: 1px solid #ddd; border-radius: 25px;
            box-sizing: border-box; font-size: 16px;
            outline: none; transition: border 0.3s;
        }

        #searchBar:focus { border-color: var(--primary); }

        /* 리스트 영역 */
        .content {
            flex: 1; overflow-y: auto; padding: 15px;
            display: flex; flex-direction: column; gap: 12px;
        }

        .word-card {
            background: var(--card-bg);
            padding: 18px; border-radius: 12px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            border-left: 6px solid var(--primary);
            position: relative;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .word-card .category {
            font-size: 11px; font-weight: bold;
            color: var(--secondary); text-transform: uppercase;
            margin-bottom: 8px; letter-spacing: 1px;
        }

        .word-card .text { font-size: 18px; line-height: 1.4; font-weight: 500; }

        .action-btn {
            margin-top: 12px; padding: 8px 15px;
            background: #fff; border: 1px dashed var(--primary);
            color: var(--primary); border-radius: 6px;
            font-size: 14px; cursor: pointer; width: 100%;
        }

        /* 하단 버튼 바 */
        .bottom-bar {
            display: flex; justify-content: space-around; align-items: center;
            padding: 15px 10px 25px 10px;
            background: var(--card-bg); border-top: 1px solid #eee;
        }

        .btn {
            width: 65px; height: 65px; border-radius: 50%;
            border: none; color: white; font-size: 22px;
            font-weight: bold; cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
            display: flex; align-items: center; justify-content: center;
        }

        .btn-r { background: linear-gradient(135deg, #ff6b6b, #ee5253); }
        .btn-p { background: linear-gradient(135deg, #4fab40, #3d8b31); }
        .btn-s { background: linear-gradient(135deg, #4a90e2, #357abd); }

        /* 시스템 모달 */
        .modal {
            display: none; position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6); z-index: 100;
        }

        .modal-content {
            background: white; margin: 10% auto; padding: 20px;
            width: 85%; max-height: 75vh; border-radius: 20px;
            overflow-y: auto; position: relative;
        }

        .db-item {
            display: flex; justify-content: space-between;
            padding: 10px; border-bottom: 1px solid #eee; align-items: center;
        }

        .delete-btn { color: #ff6b6b; border: none; background: none; font-size: 14px; }

        .backup-section {
            margin-top: 20px; display: flex; gap: 8px;
        }

        .backup-section button {
            flex: 1; padding: 10px; font-size: 12px; border-radius: 8px; border: 1px solid #ddd;
        }
    </style>
</head>
<body>

    <div class="header">
        <input type="text" id="searchBar" placeholder="검색어 입력..." onkeyup="filterList()">
    </div>

    <div class="content" id="mainList">
        <div class="word-card">
            <div class="category">System</div>
            <div class="text">반갑습니다! 아래 R 버튼을 눌러보세요.</div>
        </div>
    </div>

    <div class="bottom-bar">
        <button class="btn btn-r" onclick="generateRandom()">R</button>
        <button class="btn btn-p" onclick="manualAdd()">+</button>
        <button class="btn btn-s" onclick="toggleSystem()">S</button>
    </div>

    <div id="systemModal" class="modal">
        <div class="modal-content">
            <h3 style="margin-top:0;">데이터 관리</h3>
            
            <select id="categorySelect" style="width: 100%; padding: 10px; margin-bottom: 10px;" onchange="renderDBList()">
                <option value="place">📍 장소</option>
                <option value="person">👤 인물</option>
                <option value="start">🚩 시작</option>
                <option value="action">⚡ 액션</option>
            </select>

            <div style="display: flex; gap: 5px; margin-bottom: 15px;">
                <input type="text" id="newItemInput" placeholder="항목 추가..." style="flex:1; padding:10px;">
                <button onclick="addItem()" style="padding:10px; background:var(--primary); color:white; border:none; border-radius:5px;">추가</button>
            </div>

            <div id="dbListDisplay" style="max-height: 200px; overflow-y: auto; border: 1px solid #eee; border-radius: 8px;">
                </div>

            <div class="backup-section">
                <button onclick="exportData()">내보내기</button>
                <button onclick="importData()">가져오기</button>
                <input type="file" id="fileInput" style="display: none;" onchange="processFile(this)">
            </div>
            
            <button onclick="toggleSystem()" style="width:100%; margin-top:20px; padding:12px; border:none; border-radius:10px; background:#eee;">닫기</button>
        </div>
    </div>

    <script>
        // 초기 데이터 (LocalStorage에 없을 경우 사용)
        let db = {
            place: ["비 내리는 정류장", "북적이는 카페", "달 위", "도서관 맨 구석"],
            person: ["낯선 여행자", "꼬마 유령", "은퇴한 마술사", "길고양이"],
            start: ["조심스럽게 다가가서", "갑자기 소리를 지르며", "한참을 망설이다가", "무심결에"],
            action: ["춤을 춘다", "사라진다", "박수를 친다", "노래를 부른다", "선물을 건넨다"]
        };

        // 데이터 로드
        if (localStorage.getItem('wordGeneratorDB')) {
            db = JSON.parse(localStorage.getItem('wordGeneratorDB'));
        }

        function saveToStorage() {
            localStorage.setItem('wordGeneratorDB', JSON.stringify(db));
        }

        // R: 랜덤 조합 생성 (장소/인물/시작)
        function generateRandom() {
            const p = db.place[Math.floor(Math.random() * db.place.length)];
            const per = db.person[Math.floor(Math.random() * db.person.length)];
            const s = db.start[Math.floor(Math.random() * db.start.length)];
            
            const cardId = 'card-' + Date.now();
            const text = `${p}에서 ${per}이(가) ${s}`;
            
            const html = `
                <div class="word-card" id="${cardId}">
                    <div class="category">Random 조합</div>
                    <div class="text" id="text-${cardId}">${text}</div>
                    <button class="action-btn" id="btn-${cardId}" onclick="addAutoAction('${cardId}')">+ 액션 자동 추가</button>
                </div>
            `;
            document.getElementById('mainList').insertAdjacentHTML('afterbegin', html);
        }

        // 액션 자동 추가 기능
        function addAutoAction(cardId) {
            const action = db.action[Math.floor(Math.random() * db.action.length)];
            const textElement = document.getElementById(`text-${cardId}`);
            const btn = document.getElementById(`btn-${cardId}`);
            
            textElement.innerText += ` ${action}.`;
            btn.remove(); // 버튼 삭제 (한 번만 추가 가능하게)
        }

        // +: 수동 입력
        function manualAdd() {
            const val = prompt("원하는 문장을 직접 입력하세요:");
            if(val) {
                const html = `
                    <div class="word-card">
                        <div class="category">수동 입력</div>
                        <div class="text">${val}</div>
                    </div>
                `;
                document.getElementById('mainList').insertAdjacentHTML('afterbegin', html);
            }
        }

        // S: 시스템 관리 기능들
        function toggleSystem() {
            const modal = document.getElementById('systemModal');
            const isOpen = modal.style.display === 'block';
            modal.style.display = isOpen ? 'none' : 'block';
            if (!isOpen) renderDBList();
        }

        function renderDBList() {
            const cat = document.getElementById('categorySelect').value;
            const container = document.getElementById('dbListDisplay');
            container.innerHTML = '';

            db[cat].forEach((item, index) => {
                container.innerHTML += `
                    <div class="db-item">
                        <span>${item}</span>
                        <button class="delete-btn" onclick="deleteItem('${cat}', ${index})">삭제</button>
                    </div>
                `;
            });
        }

        function addItem() {
            const cat = document.getElementById('categorySelect').value;
            const input = document.getElementById('newItemInput');
            if (!input.value.trim()) return;

            db[cat].push(input.value.trim());
            saveToStorage();
            input.value = '';
            renderDBList();
        }

        function deleteItem(cat, index) {
            db[cat].splice(index, 1);
            saveToStorage();
            renderDBList();
        }

        // 검색 필터
        function filterList() {
            const query = document.getElementById('searchBar').value.toLowerCase();
            const cards = document.getElementsByClassName('word-card');
            for (let card of cards) {
                card.style.display = card.innerText.toLowerCase().includes(query) ? "block" : "none";
            }
        }

        // 데이터 백업/가져오기
        function exportData() {
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(db));
            const dlAnchor = document.createElement('a');
            dlAnchor.setAttribute("href", dataStr);
            dlAnchor.setAttribute("download", "word_db_backup.json");
            dlAnchor.click();
        }

        function importData() { document.getElementById('fileInput').click(); }

        function processFile(input) {
            const reader = new FileReader();
            reader.onload = function(e) {
                db = JSON.parse(e.target.result);
                saveToStorage();
                alert("불러오기 완료!");
                renderDBList();
            };
            reader.readAsText(input.files[0]);
        }
    </script>
</body>
</html>
