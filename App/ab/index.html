<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>단어 DB 매니저</title>
    <style>
        :root {
            --bg: #f4f7f6;
            --primary: #2c3e50;
            --accent-r: #e74c3c;
            --accent-m: #27ae60;
            --border: #dee2e6;
        }

        body {
            font-family: -apple-system, sans-serif;
            background-color: var(--bg);
            margin: 0; padding: 0;
            display: flex; flex-direction: column; height: 100vh;
        }

        /* 상단 검색바 */
        .header {
            padding: 15px;
            background: #fff;
            border-bottom: 1px solid var(--border);
            position: sticky; top: 0; z-index: 10;
        }

        #searchBar {
            width: 100%; padding: 10px 15px;
            border-radius: 20px; border: 1px solid var(--border);
            box-sizing: border-box; font-size: 15px;
        }

        /* DB 리스트 테이블 */
        .content {
            flex: 1; overflow-y: auto; padding: 0;
            background: #fff;
        }

        table {
            width: 100%; border-collapse: collapse;
            font-size: 14px;
        }

        th {
            background: #f8f9fa; position: sticky; top: 0;
            padding: 10px; border-bottom: 2px solid var(--border);
            text-align: left; color: #666; font-size: 12px;
        }

        td {
            padding: 12px 10px; border-bottom: 1px solid #eee;
            vertical-align: middle;
        }

        .flag {
            font-weight: bold; font-size: 11px; padding: 2px 5px;
            border-radius: 3px; margin-right: 5px; color: #fff;
        }
        .flag-r { background: var(--accent-r); } /* Random */
        .flag-m { background: var(--accent-m); } /* Manual */

        .title-text { font-weight: bold; color: var(--primary); display: block; margin-bottom: 3px; }
        .content-text { color: #555; line-height: 1.4; }

        .action-cell-btn {
            background: #f0f0f0; border: 1px solid #ccc;
            padding: 4px 8px; border-radius: 4px; font-size: 11px;
        }

        /* 하단 버튼 바 */
        .bottom-bar {
            display: flex; justify-content: space-around;
            padding: 10px 0 25px 0; background: #fff;
            border-top: 1px solid var(--border);
        }

        .btn {
            width: 55px; height: 55px; border-radius: 50%; border: none;
            color: #fff; font-weight: bold; font-size: 18px; cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .btn-r { background: var(--accent-r); }
        .btn-p { background: var(--accent-m); }
        .btn-s { background: var(--primary); }

        /* 모달 설정 */
        .modal {
            display: none; position: fixed; top: 0; left: 0;
            width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 100;
        }
        .modal-inner {
            background: #fff; margin: 15% auto; padding: 20px;
            width: 85%; border-radius: 12px; max-height: 70vh; overflow-y: auto;
        }
    </style>
</head>
<body>

    <div class="header">
        <input type="text" id="searchBar" placeholder="데이터베이스 검색..." onkeyup="filterTable()">
    </div>

    <div class="content">
        <table id="dbTable">
            <thead>
                <tr>
                    <th width="30%">제목</th>
                    <th width="70%">내용 및 액션</th>
                </tr>
            </thead>
            <tbody id="dbBody">
                </tbody>
        </table>
    </div>

    <div class="bottom-bar">
        <button class="btn btn-r" onclick="generateRandom()">R</button>
        <button class="btn btn-p" onclick="manualInput()">+</button>
        <button class="btn btn-s" onclick="toggleSystem()">S</button>
    </div>

    <div id="sysModal" class="modal">
        <div class="modal-inner">
            <h3 id="modalTitle">데이터 관리</h3>
            <select id="catSel" style="width:100%; padding:10px; margin-bottom:10px;" onchange="updateItemList()">
                <option value="place">장소 리스트</option>
                <option value="person">인물 리스트</option>
                <option value="start">시작 리스트</option>
                <option value="action">액션 리스트</option>
            </select>
            <div style="display:flex; gap:5px; margin-bottom:15px;">
                <input type="text" id="newItem" style="flex:1; padding:8px;" placeholder="새 항목 추가">
                <button onclick="saveNewItem()">추가</button>
            </div>
            <div id="itemList" style="border-top:1px solid #eee; padding-top:10px;"></div>
            <hr>
            <button onclick="exportJSON()" style="width:100%; padding:10px; margin-bottom:5px;">백업 (JSON 내보내기)</button>
            <button onclick="toggleSystem()" style="width:100%; padding:10px; background:#ddd; border:none;">닫기</button>
        </div>
    </div>

    <script>
        let db = JSON.parse(localStorage.getItem('wordData')) || {
            place: ["공원", "사무실"], person: ["철수", "영희"],
            start: ["갑자기", "조용히"], action: ["뛴다", "웃는다"]
        };
        let logCount = 0; // 랜덤 생성 번호용

        function save() { localStorage.setItem('wordData', JSON.stringify(db)); }

        // R: 랜덤 생성
        function generateRandom() {
            logCount++;
            const p = db.place[Math.floor(Math.random() * db.place.length)];
            const per = db.person[Math.floor(Math.random() * db.person.length)];
            const s = db.start[Math.floor(Math.random() * db.start.length)];
            
            addRow(`조합 #${logCount}`, `${p} / ${per} / ${s}`, 'R');
        }

        // +: 수동 입력
        function manualInput() {
            const title = prompt("제목을 입력하세요 (예: 아이디어1)");
            if(!title) return;
            const content = prompt("내용을 입력하세요");
            if(content) addRow(title, content, 'M');
        }

        // 테이블에 행 추가
        function addRow(title, content, type) {
            const tbody = document.getElementById('dbBody');
            const rowId = 'row-' + Date.now();
            const flagClass = type === 'R' ? 'flag-r' : 'flag-m';
            
            const tr = document.createElement('tr');
            tr.id = rowId;
            tr.innerHTML = `
                <td>
                    <span class="flag ${flagClass}">${type}</span>
                    <span class="title-text">${title}</span>
                </td>
                <td>
                    <div class="content-text" id="text-${rowId}">${content}</div>
                    ${type === 'R' ? `<button class="action-cell-btn" id="btn-${rowId}" onclick="attachAction('${rowId}')">+ 액션 추가</button>` : ''}
                </td>
            `;
            tbody.prepend(tr);
        }

        // 액션 추가 로직
        function attachAction(id) {
            const act = db.action[Math.floor(Math.random() * db.action.length)];
            document.getElementById('text-' + id).innerText += " → " + act;
            document.getElementById('btn-' + id).remove();
        }

        // 검색
        function filterTable() {
            const q = document.getElementById('searchBar').value.toLowerCase();
            const rows = document.querySelectorAll('#dbBody tr');
            rows.forEach(r => r.style.display = r.innerText.toLowerCase().includes(q) ? '' : 'none');
        }

        // 시스템 설정 관리
        function toggleSystem() {
            const m = document.getElementById('sysModal');
            m.style.display = m.style.display === 'block' ? 'none' : 'block';
            if(m.style.display === 'block') updateItemList();
        }

        function updateItemList() {
            const cat = document.getElementById('catSel').value;
            const listDiv = document.getElementById('itemList');
            listDiv.innerHTML = db[cat].map((item, idx) => `
                <div style="display:flex; justify-content:space-between; padding:5px 0;">
                    <span>${item}</span>
                    <button onclick="deleteItem('${cat}', ${idx})" style="color:red; border:none; background:none;">삭제</button>
                </div>
            `).join('');
        }

        function saveNewItem() {
            const val = document.getElementById('newItem').value.trim();
            if(!val) return;
            db[document.getElementById('catSel').value].push(val);
            save(); document.getElementById('newItem').value = ''; updateItemList();
        }

        function deleteItem(cat, idx) {
            if(confirm("삭제할까요?")) { db[cat].splice(idx, 1); save(); updateItemList(); }
        }

        function exportJSON() {
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(db));
            const dl = document.createElement('a');
            dl.setAttribute("href", dataStr);
            dl.setAttribute("download", "word_db.json");
            dl.click();
        }
    </script>
</body>
</html>
