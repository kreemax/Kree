<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Word DB Master - Tag Style</title>
    <style>
        :root {
            --bg: #000000; --card-bg: #1a1a1a; --item-bg: #2d2d2d;
            --primary: #3498db; --text: #ffffff; --text-dim: #888888;
        }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; overflow: hidden; display: flex; flex-direction: column; height: 100vh; }
        
        button { cursor: pointer; border: none; transition: 0.2s; }
        input { width: 100%; box-sizing: border-box; padding: 12px; border: 1px solid #333; border-radius: 8px; background: #111; color: #fff; }

        /* 상단 헤더 */
        .header { padding: 15px; background: var(--bg); border-bottom: 1px solid #222; }
        
        /* 메인 리스트 */
        .content { flex: 1; overflow-y: auto; background: var(--bg); }
        table { width: 100%; border-collapse: collapse; table-layout: fixed; }
        th { background: #111; padding: 12px; border-bottom: 1px solid #333; font-size: 11px; text-align: left; color: var(--text-dim); }
        td { padding: 15px 10px; border-bottom: 1px solid #1a1a1a; font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* 하단 바 */
        .bottom-bar { display: flex; justify-content: space-around; padding: 15px 0 30px; background: var(--bg); border-top: 1px solid #222; }
        .btn { width: 60px; height: 60px; border-radius: 50%; color: #fff; font-size: 24px; font-weight: bold; }
        .btn-r { background: #e74c3c; } .btn-p { background: #2ecc71; } .btn-s { background: #34495e; }

        /* 상세 페이지 (이미지 UI 스타일) */
        .layer { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 100; flex-direction: column; }
        .layer-header { padding: 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #222; }
        .layer-body { flex: 1; overflow-y: auto; padding: 15px; }

        .step-container { background: var(--card-bg); border-radius: 15px; padding: 20px; margin-bottom: 15px; position: relative; }
        .step-label { color: var(--primary); font-size: 12px; font-weight: bold; margin-bottom: 15px; text-transform: uppercase; }
        
        .tag-wrapper { display: flex; flex-wrap: wrap; gap: 10px; }
        .tag { background: var(--item-bg); padding: 10px 15px; border-radius: 10px; display: flex; align-items: center; gap: 8px; font-size: 15px; }
        .tag .remove { color: #555; font-size: 16px; font-weight: bold; margin-left: 5px; }

        .add-icon-btn { position: absolute; right: 15px; top: 15px; width: 30px; height: 30px; border-radius: 8px; background: var(--primary); color: white; display: flex; align-items: center; justify-content: center; font-size: 20px; }

        /* 수동 입력 폼 */
        .modal-body { background: var(--card-bg); margin: 20% auto; width: 85%; padding: 25px; border-radius: 20px; }
        .submit-btn { width: 100%; padding: 15px; background: var(--primary); color: white; font-weight: bold; border-radius: 12px; margin-top: 15px; font-size: 16px; }
    </style>
</head>
<body>

    <div class="header">
        <input type="text" id="searchBar" placeholder="검색어를 입력하세요..." onkeyup="filterTable()">
    </div>

    <div class="content">
        <table>
            <thead><tr><th width="40%">제목</th><th width="30%">장소</th><th width="30%">인물</th></tr></thead>
            <tbody id="dbBody"></tbody>
        </table>
    </div>

    <div class="bottom-bar">
        <button class="btn btn-r" onclick="generateRandom()">R</button>
        <button class="btn btn-p" onclick="openLayer('manualModal')">+</button>
        <button class="btn btn-s" onclick="openSystem()">S</button>
    </div>

    <div id="detailLayer" class="layer">
        <div class="layer-header">
            <h2 id="detailTitle" style="margin:0; font-size: 20px;">상세 정보</h2>
            <button onclick="closeLayer('detailLayer')" style="background:none; color:var(--text-dim); font-size: 18px;">닫기</button>
        </div>
        <div class="layer-body">
            <div class="step-container">
                <div class="step-label">Base Elements</div>
                <div class="tag-wrapper" id="baseTags"></div>
            </div>

            <div class="step-container">
                <div class="step-label">Actions</div>
                <button class="add-icon-btn" onclick="addRandomActionToDetail()">+</button>
                <div class="tag-wrapper" id="actionTags"></div>
            </div>

            <button onclick="deleteCurrentItem()" style="width:100%; padding:15px; background:none; color:#555; margin-top:20px;">데이터 전체 삭제</button>
        </div>
    </div>

    <div id="manualModal" class="layer" style="background: rgba(0,0,0,0.8);">
        <div class="modal-body">
            <h3 style="margin-top:0">수동 입력</h3>
            <input type="text" id="mTitle" placeholder="제목" style="margin-bottom:10px">
            <input type="text" id="mPlace" placeholder="장소" style="margin-bottom:10px">
            <input type="text" id="mPerson" placeholder="인물" style="margin-bottom:10px">
            <input type="text" id="mStart" placeholder="시작" style="margin-bottom:10px">
            <button class="submit-btn" onclick="submitManual()">입력 완료</button>
            <button onclick="closeLayer('manualModal')" style="width:100%; margin-top:10px; background:none; color:var(--text-dim);">취소</button>
        </div>
    </div>

    <script>
        let db = JSON.parse(localStorage.getItem('wordSystem')) || {
            place: ["거실", "주방", "침실"], person: ["나", "가족"], start: ["조명", "소파"], action: ["모던", "화이트", "심플"]
        };
        let logs = JSON.parse(localStorage.getItem('wordLogs')) || [];
        let currentIdx = null;

        const save = () => {
            localStorage.setItem('wordSystem', JSON.stringify(db));
            localStorage.setItem('wordLogs', JSON.stringify(logs));
        };

        function renderTable() {
            const body = document.getElementById('dbBody');
            body.innerHTML = logs.map((log, i) => `
                <tr onclick="openDetail(${i})">
                    <td>${log.title}</td>
                    <td>${log.place}</td>
                    <td>${log.person}</td>
                </tr>
            `).join('');
        }

        function openDetail(idx) {
            currentIdx = idx;
            const log = logs[idx];
            document.getElementById('detailTitle').innerText = log.title;
            
            // 기본 태그 구성
            const baseTags = document.getElementById('baseTags');
            baseTags.innerHTML = [log.place, log.person, log.start].map((val, i) => `
                <div class="tag">${val} <span class="remove" onclick="removeBaseTag(${i})">×</span></div>
            `).join('');

            // 액션 태그 구성
            renderActionTags();
            document.getElementById('detailLayer').style.display = 'flex';
        }

        function renderActionTags() {
            const log = logs[currentIdx];
            const actionTags = document.getElementById('actionTags');
            actionTags.innerHTML = log.actions.map((act, i) => `
                <div class="tag">${act} <span class="remove" onclick="removeActionTag(${i})">×</span></div>
            `).join('');
        }

        function removeBaseTag(i) {
            const keys = ['place', 'person', 'start'];
            logs[currentIdx][keys[i]] = '---';
            save(); openDetail(currentIdx);
        }

        function removeActionTag(i) {
            logs[currentIdx].actions.splice(i, 1);
            save(); renderActionTags();
        }

        function addRandomActionToDetail() {
            const act = db.action[Math.floor(Math.random() * db.action.length)];
            logs[currentIdx].actions.push(act);
            save(); renderActionTags();
        }

        function generateRandom() {
            const log = {
                title: `조합 #${logs.length + 1}`,
                place: db.place[Math.floor(Math.random() * db.place.length)],
                person: db.person[Math.floor(Math.random() * db.person.length)],
                start: db.start[Math.floor(Math.random() * db.start.length)],
                actions: [], type: 'R'
            };
            logs.unshift(log); save(); renderTable(); openDetail(0);
        }

        function submitManual() {
            const log = {
                title: document.getElementById('mTitle').value || '무제',
                place: document.getElementById('mPlace').value,
                person: document.getElementById('mPerson').value,
                start: document.getElementById('mStart').value,
                actions: [], type: 'M'
            };
            logs.unshift(log); save(); renderTable();
            closeLayer('manualModal'); openDetail(0);
        }

        function deleteCurrentItem() {
            if(confirm("정말 삭제할까요?")) {
                logs.splice(currentIdx, 1); save(); renderTable(); closeLayer('detailLayer');
            }
        }

        function filterTable() {
            const q = document.getElementById('searchBar').value.toLowerCase();
            const rows = document.querySelectorAll('#dbBody tr');
            rows.forEach(r => r.style.display = r.innerText.toLowerCase().includes(q) ? '' : 'none');
        }

        function openLayer(id) { document.getElementById(id).style.display = 'flex'; }
        function closeLayer(id) { document.getElementById(id).style.display = 'none'; }
        function openSystem() { alert('시스템 관리 기능은 이전과 동일하게 동작합니다.'); }

        renderTable();
    </script>
</body>
</html>
