<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Word DB Master v8.7</title>
    <style>
        :root {
            --bg: #000; --card: #1a1a1a; --item: #2d2d2d;
            --primary: #3498db; --success: #2ecc71; --text: #fff; --dim: #888; --danger: #e74c3c;
        }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; overflow: hidden; display: flex; flex-direction: column; height: 100vh; }
        
        button { cursor: pointer; border: none; transition: 0.2s; border-radius: 8px; }
        input, textarea { width: 100%; box-sizing: border-box; padding: 12px; border: 1px solid #333; border-radius: 8px; background: #111; color: #fff; margin-bottom: 8px; }

        .header { padding: 15px; background: var(--bg); border-bottom: 1px solid #222; flex-shrink: 0; }
        .content { flex: 1; overflow-y: auto; padding-bottom: 100px; } 
        .list-item { padding: 15px; border-bottom: 1px solid #1a1a1a; cursor: pointer; }
        .list-row1 { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; font-size: 14px; font-weight: 600; }
        .list-row2 { font-size: 12px; color: var(--dim); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; padding-left: 28px; }
        .flag { font-size: 10px; padding: 2px 5px; border-radius: 4px; color: #fff; flex-shrink: 0; }
        .flag-r { background: var(--danger); } .flag-m { background: var(--success); }

        .bottom-bar { display: flex; justify-content: space-around; padding: 15px 0 35px; background: rgba(0,0,0,0.9); border-top: 1px solid #222; position: fixed; bottom: 0; width: 100%; z-index: 10; }
        .btn-main { width: 60px; height: 60px; border-radius: 50%; color: #fff; font-size: 24px; font-weight: bold; }

        .layer { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 100; flex-direction: column; }
        .layer-header { padding: 15px; display: grid; grid-template-columns: 1fr 60px 60px; gap: 8px; align-items: center; border-bottom: 1px solid #222; background: #0a0a0a; }
        .header-title-box { font-size: 18px; font-weight: 800; color: var(--primary); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .head-btn { background: #222; color: #fff; padding: 10px 0; font-size: 13px; text-align: center; font-weight: bold; }
        .layer-body { flex: 1; overflow-y: auto; padding: 15px 15px 50px 15px; }

        .step-container { background: var(--card); border-radius: 15px; padding: 20px; margin-bottom: 15px; position: relative; }
        .step-label { color: var(--primary); font-size: 11px; font-weight: bold; margin-bottom: 12px; letter-spacing: 1px; }
        .tag-wrapper { display: flex; flex-wrap: wrap; gap: 10px; }
        .tag { background: var(--item); padding: 10px 14px; border-radius: 10px; display: flex; align-items: center; gap: 8px; font-size: 14px; border: 1px solid #333; }
        .tag .remove { color: #e74c3c; font-weight: bold; margin-left: 5px; }

        .info-box { font-size: 14px; color: #aaa; line-height: 1.6; padding: 15px; background: #151515; border-radius: 12px; border-left: 4px solid var(--primary); margin-bottom: 12px; }
        .info-box b { color: var(--primary); display: block; margin-bottom: 6px; font-size: 10px; text-transform: uppercase; }
        
        .btn-group { position: absolute; right: 15px; top: 12px; display: flex; gap: 5px; }
        .plus-btn { width: 35px; height: 35px; color: white; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: bold; border-radius: 8px; }

        /* 시스템 관리 스타일 */
        .sys-tabs { display: flex; gap: 5px; overflow-x: auto; margin-bottom: 15px; padding-bottom: 5px; }
        .tab-btn { flex-shrink: 0; padding: 8px 15px; background: #222; color: #888; font-size: 13px; border-radius: 20px; }
        .tab-btn.active { background: var(--primary); color: #fff; }
        .sys-item-card { background: #111; border-radius: 10px; padding: 12px; margin-bottom: 10px; border: 1px solid #222; }
        .sys-item-header { display: flex; justify-content: space-between; align-items: center; }
        .sys-small-btn { font-size: 11px; padding: 5px 10px; background: #222; color: #ccc; border-radius: 5px; margin-left: 5px; }
    </style>
</head>
<body>

    <div class="header">
        <input type="text" id="searchBar" placeholder="메인 리스트 검색..." onkeyup="filterList()">
    </div>

    <div class="content" id="mainList"></div>

    <div class="bottom-bar">
        <button class="btn-main" style="background:var(--danger)" onclick="generateRandom()">R</button>
        <button class="btn-main" style="background:var(--success)" onclick="openManualLayer()">+</button>
        <button class="btn-main" style="background:#34495e" onclick="openSystem()">S</button>
    </div>

    <div id="detailLayer" class="layer">
        <div class="layer-header">
            <div id="detailTitleDisp" class="header-title-box" onclick="editTitle()">제목 없음</div>
            <button class="head-btn" style="background:var(--primary)" onclick="copyToClipboard()">복사</button>
            <button class="head-btn" onclick="closeLayer('detailLayer')">닫기</button>
        </div>
        <div class="layer-body">
            <div class="step-container">
                <div class="step-label">BASE ELEMENTS (Click to edit)</div>
                <div class="tag-wrapper" id="baseTags"></div>
            </div>
            <div id="infoDisplayArea"></div>
            <div class="step-container">
                <div class="step-label">ACTIONS</div>
                <div class="btn-group">
                    <button class="plus-btn" style="background:var(--primary)" onclick="addActionRandom()">R+</button>
                    <button class="plus-btn" style="background:var(--success)" onclick="addActionManual()">M+</button>
                </div>
                <div class="tag-wrapper" id="actionTags"></div>
            </div>
            <button onclick="deleteItem()" style="width:100%; color:#555; background:none; padding:20px; font-size:13px;">이 기록 완전히 삭제하기</button>
        </div>
    </div>

    <div id="sysLayer" class="layer">
        <div class="layer-header">
            <div class="header-title-box" style="grid-column: span 2;">시스템 관리</div>
            <button class="head-btn" onclick="closeLayer('sysLayer')">닫기</button>
        </div>
        <div class="layer-body">
            <div class="sys-tabs">
                <button class="tab-btn active" onclick="changeTab('place', this)">장소</button>
                <button class="tab-btn" onclick="changeTab('person', this)">인물</button>
                <button class="tab-btn" onclick="changeTab('start', this)">시작</button>
                <button class="tab-btn" onclick="changeTab('action', this)">액션</button>
                <button class="tab-btn" onclick="changeTab('data', this)" style="color:var(--success)">데이터</button>
            </div>

            <div id="sysDataPanel" style="display:none;">
                <div class="info-box"><b>DB 관리</b> 엑셀(CSV) 백업 및 일괄 등록</div>
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:20px;">
                    <button class="head-btn" onclick="exportExcel('db')">DB 엑셀저장</button>
                    <button class="head-btn" onclick="importExcel('db')">DB 엑셀등록</button>
                    <button class="head-btn" onclick="exportExcel('logs')">로그 엑셀저장</button>
                    <button class="head-btn" onclick="importExcel('logs')">로그 엑셀등록</button>
                    <button class="head-btn" style="background:var(--danger); grid-column:span 2;" onclick="resetData()">모든 데이터 초기화</button>
                </div>
                <input type="file" id="fileInput" style="display:none;" accept=".csv, text/csv, .txt">
            </div>

            <div id="sysInputs">
                <input type="text" id="sysSearch" placeholder="항목 검색..." onkeyup="renderSysList()">
                <div id="sysPlaceInput"><input type="text" id="sysPlaceName" placeholder="장소명"><textarea id="sysPlaceDesc" placeholder="설명"></textarea></div>
                <div id="sysPersonInput" style="display:none;"><input type="text" id="sysPersonName" placeholder="이름"><textarea id="sysPersonLook" placeholder="외모"></textarea><textarea id="sysPersonCloth" placeholder="의상"></textarea></div>
                <input type="text" id="sysCommonInp" placeholder="항목 입력" style="display:none;">
                <button id="addBtn" onclick="addSysItem()" style="width:100%; padding:15px; background:var(--primary); color:#fff; font-weight:bold; margin-bottom:20px;">항목 추가</button>
            </div>
            
            <div id="sysList"></div>
        </div>
    </div>

    <script>
        let db = JSON.parse(localStorage.getItem('wordSystem')) || { place: [], person: [], start: [], action: [] };
        let logs = JSON.parse(localStorage.getItem('wordLogs')) || [];
        let currIdx = null; let currentTab = 'place';

        const save = () => {
            localStorage.setItem('wordSystem', JSON.stringify(db));
            localStorage.setItem('wordLogs', JSON.stringify(logs));
        };

        function renderList() {
            document.getElementById('mainList').innerHTML = logs.map((log, i) => `
                <div class="list-item" onclick="openDetail(${i})">
                    <div class="list-row1">
                        <span class="flag ${log.type==='R'?'flag-r':'flag-m'}">${log.type}</span>
                        <span>${log.title} | ${log.place} | ${log.person} | ${log.start}</span>
                    </div>
                    <div class="list-row2">${log.actions.join(', ') || '액션 없음'}</div>
                </div>
            `).join('');
        }

        function openDetail(idx) {
            currIdx = idx; const log = logs[idx];
            document.getElementById('detailTitleDisp').innerText = log.title;
            document.getElementById('baseTags').innerHTML = `
                <div class="tag" onclick="editBase('place')">${log.place}</div>
                <div class="tag" onclick="editBase('person')">${log.person}</div>
                <div class="tag" onclick="editBase('start')">${log.start}</div>
            `;
            renderInfoArea(log);
            renderActionTags();
            document.getElementById('detailLayer').style.display = 'flex';
        }

        function renderInfoArea(log) {
            let html = '';
            const p = db.place.find(v => v.name === log.place);
            if(p) html += `<div class="info-box"><b>Place</b>${p.desc}</div>`;
            const per = db.person.find(v => v.name === log.person);
            if(per) html += `<div class="info-box"><b>Person</b>${per.look}<br>${per.cloth}</div>`;
            document.getElementById('infoDisplayArea').innerHTML = html;
        }

        function renderActionTags() {
            document.getElementById('actionTags').innerHTML = logs[currIdx].actions.map((act, i) => `
                <div class="tag">${act} <span class="remove" onclick="removeAction(${i})">×</span></div>
            `).join('');
        }

        function editTitle() { const v = prompt("제목 수정", logs[currIdx].title); if(v){ logs[currIdx].title=v; save(); renderList(); openDetail(currIdx); }}
        function editBase(key) { const v = prompt(`${key} 수정`, logs[currIdx][key]); if(v){ logs[currIdx][key]=v; save(); renderList(); openDetail(currIdx); }}
        function addActionRandom() { const a = db.action[Math.floor(Math.random()*db.action.length)]; if(a){ logs[currIdx].actions.push(a); save(); renderActionTags(); renderList(); }}
        function addActionManual() { const v = prompt("액션 직접 입력"); if(v){ logs[currIdx].actions.push(v); save(); renderActionTags(); renderList(); }}
        function removeAction(i) { logs[currIdx].actions.splice(i,1); save(); renderActionTags(); renderList(); }

        function openSystem() { document.getElementById('sysLayer').style.display = 'flex'; renderSysList(); }
        function closeLayer(id) { document.getElementById(id).style.display = 'none'; }

        function changeTab(tab, btn) {
            currentTab = tab;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            const isData = tab === 'data';
            document.getElementById('sysDataPanel').style.display = isData ? 'block' : 'none';
            document.getElementById('sysInputs').style.display = isData ? 'none' : 'block';
            if(!isData) {
                document.getElementById('sysPlaceInput').style.display = tab==='place'?'block':'none';
                document.getElementById('sysPersonInput').style.display = tab==='person'?'block':'none';
                document.getElementById('sysCommonInp').style.display = (tab==='start'||tab==='action')?'block':'none';
            }
            renderSysList();
        }

        function renderSysList() {
            if(currentTab === 'data') { document.getElementById('sysList').innerHTML = ''; return; }
            const q = document.getElementById('sysSearch').value.toLowerCase();
            let items = db[currentTab] || [];
            if(q) items = items.filter(v => (typeof v === 'object' ? v.name : v).toLowerCase().includes(q));
            
            document.getElementById('sysList').innerHTML = items.map((v, i) => {
                const name = typeof v === 'object' ? v.name : v;
                const idx = db[currentTab].indexOf(v);
                return `
                <div class="sys-item-card">
                    <div class="sys-item-header">
                        <span style="font-weight:bold; color:var(--primary)">${name}</span>
                        <div>
                            ${(currentTab==='place'||currentTab==='person') ? `<button class="sys-small-btn" onclick="editSysItem('${currentTab}', ${idx})">수정</button>` : ''}
                            <button class="sys-small-btn" style="color:var(--danger)" onclick="deleteSysItem('${currentTab}', ${idx})">삭제</button>
                        </div>
                    </div>
                </div>`;
            }).join('');
        }

        function editSysItem(cat, idx) {
            const item = db[cat][idx];
            if(cat === 'place') {
                const n = prompt("장소명", item.name); if(!n) return;
                const d = prompt("설명", item.desc); db.place[idx] = {name:n, desc:d};
            } else if(cat === 'person') {
                const n = prompt("이름", item.name); if(!n) return;
                const l = prompt("외모", item.look);
                const c = prompt("의상", item.cloth); db.person[idx] = {name:n, look:l, cloth:c};
            }
            save(); renderSysList();
        }

        function addSysItem() {
            if(currentTab === 'place') {
                const n = document.getElementById('sysPlaceName').value.trim(); if(!n) return;
                db.place.push({name:n, desc: document.getElementById('sysPlaceDesc').value});
            } else if(currentTab === 'person') {
                const n = document.getElementById('sysPersonName').value.trim(); if(!n) return;
                db.person.push({name:n, look: document.getElementById('sysPersonLook').value, cloth: document.getElementById('sysPersonCloth').value});
            } else {
                const v = document.getElementById('sysCommonInp').value.trim(); if(!v) return;
                db[currentTab].push(v);
            }
            save(); renderSysList();
            document.querySelectorAll('#sysLayer input, #sysLayer textarea').forEach(el => el.value = '');
        }

        function deleteSysItem(c, i) { if(confirm("삭제할까요?")) { db[c].splice(i,1); save(); renderSysList(); } }

        function resetData() { if(confirm("모든 데이터가 삭제됩니다!")) { localStorage.clear(); location.reload(); }}

        function exportExcel(type) {
            let csv = "\uFEFF";
            if(type === 'db') {
                csv += "분류,이름,설명1,설명2\n";
                db.place.forEach(p => csv += `장소,${p.name},"${p.desc}",\n`);
                db.person.forEach(p => csv += `인물,${p.name},"${p.look}","${p.cloth}"\n`);
                db.start.forEach(s => csv += `시작,${s},,\n`);
                db.action.forEach(a => csv += `액션,${a},,\n`);
            } else {
                csv += "제목,유형,장소,인물,시작,액션들\n";
                logs.forEach(l => csv += `"${l.title}",${l.type},${l.place},${l.person},${l.start},"${l.actions.join('|')}"\n`);
            }
            const b = new Blob([csv], {type:"text/csv;charset=utf-8;"});
            const a = document.createElement('a'); a.href=URL.createObjectURL(b);
            a.download=`${type}_backup.csv`; a.click();
        }

        function importExcel(type) {
            const fileInput = document.getElementById('fileInput');
            fileInput.onchange = e => {
                const r = new FileReader();
                r.onload = ev => {
                    const lines = ev.target.result.split('\n').slice(1);
                    lines.forEach(line => {
                        if(!line.trim()) return;
                        const c = line.split(',').map(v => v.replace(/"/g, '').trim());
                        if(type==='db') {
                            if(c[0]==='장소') db.place.push({name:c[1], desc:c[2]});
                            else if(c[0]==='인물') db.person.push({name:c[1], look:c[2], cloth:c[3]});
                            else if(c[0]==='시작') db.start.push(c[1]);
                            else if(c[0]==='액션') db.action.push(c[1]);
                        } else {
                            logs.push({title:c[0], type:c[1], place:c[2], person:c[3], start:c[4], actions:c[5]?c[5].split('|'):[]});
                        }
                    });
                    save(); renderList(); alert("등록되었습니다."); location.reload();
                };
                r.readAsText(e.target.files[0]);
            };
            fileInput.click();
        }

        function generateRandom() {
            const p = db.place[Math.floor(Math.random()*db.place.length)] || {name:"?"};
            const per = db.person[Math.floor(Math.random()*db.person.length)] || {name:"?"};
            const s = db.start[Math.floor(Math.random()*db.start.length)] || "시작";
            logs.unshift({ title:`조합 #${logs.length+1}`, type:'R', place:p.name, person:per.name, start:s, actions:[] });
            save(); renderList(); openDetail(0);
        }
        function openManualLayer() { const t = prompt("제목"); if(t){ logs.unshift({title:t, type:'M', place:'?', person:'?', start:'?', actions:[]}); save(); renderList(); openDetail(0); }}
        function deleteItem() { if(confirm("삭제?")) { logs.splice(currIdx,1); save(); renderList(); closeLayer('detailLayer'); }}
        function filterList() {
            const q = document.getElementById('searchBar').value.toLowerCase();
            document.querySelectorAll('.list-item').forEach(el => el.style.display = el.innerText.toLowerCase().includes(q)?'':'none');
        }
        function copyToClipboard() {
            const l = logs[currIdx];
            const p = db.place.find(v=>v.name===l.place);
            const per = db.person.find(v=>v.name===l.person);
            const text = `${l.place}, ${p?p.desc:''}, ${per?per.look:''}, ${per?per.cloth:''}, ${l.actions.join(', ')}`;
            navigator.clipboard.writeText(text).then(()=>alert("복사완료"));
        }

        renderList();
    </script>
</body>
</html>
