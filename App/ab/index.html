<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Word DB Master v5</title>
    <style>
        :root {
            --bg: #000; --card: #1a1a1a; --item: #2d2d2d;
            --primary: #3498db; --success: #2ecc71; --text: #fff; --dim: #888;
        }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; overflow: hidden; display: flex; flex-direction: column; height: 100vh; }
        
        button { cursor: pointer; border: none; transition: 0.2s; border-radius: 8px; }
        input, textarea { width: 100%; box-sizing: border-box; padding: 12px; border: 1px solid #333; border-radius: 8px; background: #111; color: #fff; margin-bottom: 8px; }

        .header { padding: 15px; background: var(--bg); border-bottom: 1px solid #222; }
        
        /* 메인 리스트 */
        .content { flex: 1; overflow-y: auto; }
        .list-item { padding: 15px; border-bottom: 1px solid #1a1a1a; cursor: pointer; }
        .list-row1 { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; font-size: 15px; font-weight: 600; }
        .list-row2 { font-size: 13px; color: var(--dim); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; padding-left: 28px; }
        .flag { font-size: 10px; padding: 2px 5px; border-radius: 4px; color: #fff; }
        .flag-r { background: #e74c3c; } .flag-m { background: var(--success); }

        .bottom-bar { display: flex; justify-content: space-around; padding: 10px 0 30px; background: #000; border-top: 1px solid #222; }
        .btn-main { width: 60px; height: 60px; border-radius: 50%; color: #fff; font-size: 24px; font-weight: bold; }

        /* 상세/시스템 레이어 */
        .layer { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 100; flex-direction: column; }
        .layer-header { padding: 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #222; }
        .layer-body { flex: 1; overflow-y: auto; padding: 15px; }

        .step-container { background: var(--card); border-radius: 15px; padding: 20px; margin-bottom: 15px; position: relative; }
        .step-label { color: var(--primary); font-size: 11px; font-weight: bold; margin-bottom: 12px; letter-spacing: 1px; }
        
        /* 태그 스타일 */
        .tag-wrapper { display: flex; flex-wrap: wrap; gap: 10px; }
        .tag { background: var(--item); padding: 10px 14px; border-radius: 10px; display: flex; align-items: center; gap: 8px; font-size: 14px; border: 1px solid #333; }
        .tag .remove { color: #666; font-weight: bold; padding: 2px 5px; }
        .title-tag { background: transparent; border: 1px dashed var(--primary); color: var(--primary); font-size: 18px; width: 100%; margin-bottom: 10px; justify-content: center; }

        /* 정보 박스 (장소, 외모, 의상) */
        .info-box { font-size: 14px; color: #aaa; line-height: 1.6; padding: 12px; background: #1a1a1a; border-radius: 8px; border-left: 3px solid var(--primary); margin-bottom: 10px; }
        .info-box b { color: var(--primary); display: block; margin-bottom: 4px; font-size: 11px; text-transform: uppercase; }

        .btn-group { position: absolute; right: 15px; top: 12px; display: flex; gap: 5px; }
        .plus-btn { width: 32px; height: 32px; color: white; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="header">
        <input type="text" id="searchBar" placeholder="검색..." onkeyup="filterList()">
    </div>

    <div class="content" id="mainList"></div>

    <div class="bottom-bar">
        <button class="btn-main" style="background:#e74c3c" onclick="generateRandom()">R</button>
        <button class="btn-main" style="background:var(--success)" onclick="openManualLayer()">+</button>
        <button class="btn-main" style="background:#34495e" onclick="openSystem()">S</button>
    </div>

    <div id="detailLayer" class="layer">
        <div class="layer-header">
            <div id="detailTitleDisp" class="tag title-tag" onclick="editTitle()">제목 없음</div>
            <button onclick="closeLayer('detailLayer')" style="background:none; color:var(--dim); margin-left:15px;">닫기</button>
        </div>
        <div class="layer-body">
            <div class="step-container">
                <div class="step-label">BASE ELEMENTS</div>
                <div class="tag-wrapper" id="baseTags"></div>
            </div>

            <div id="infoDisplayArea"></div>

            <div class="step-container">
                <div class="step-label">ACTIONS</div>
                <div class="btn-group">
                    <button class="plus-btn" style="background:var(--primary)" onclick="addActionRandom()">R+</button>
                    <button class="plus-btn" style="background:var(--success)" onclick="addActionManual()">M+</button>
                </div>
                <div class="tag-wrapper" id="actionTags"></div>
            </div>
            
            <button onclick="deleteItem()" style="width:100%; color:#555; background:none; margin-top:20px;">삭제하기</button>
        </div>
    </div>

    <div id="sysLayer" class="layer">
        <div class="layer-header"><h3>시스템 설정</h3><button onclick="closeLayer('sysLayer')">닫기</button></div>
        <div class="layer-body">
            <select id="catSel" onchange="renderSysList()" style="margin-bottom:10px;">
                <option value="place">장소 리스트 (명칭/설명)</option>
                <option value="person">인물 리스트 (이름/외모/의상)</option>
                <option value="action">액션 리스트 관리</option>
            </select>
            
            <div id="sysPlaceInput" style="display:none;">
                <input type="text" id="sysPlaceName" placeholder="장소명">
                <textarea id="sysPlaceDesc" placeholder="장소 설명"></textarea>
            </div>
            <div id="sysPersonInput" style="display:none;">
                <input type="text" id="sysPersonName" placeholder="인물 이름">
                <textarea id="sysPersonLook" placeholder="외모 특징"></textarea>
                <textarea id="sysPersonCloth" placeholder="의상 정보"></textarea>
            </div>
            <input type="text" id="sysCommonInp" placeholder="항목 입력" style="display:none;">
            
            <button onclick="addSysItem()" style="width:100%; padding:12px; background:var(--primary); color:#fff; font-weight:bold; margin-top:5px;">항목 추가</button>
            <div id="sysList" style="margin-top:15px; border-top:1px solid #222;"></div>
        </div>
    </div>

    <script>
        let db = JSON.parse(localStorage.getItem('wordSystem')) || {
            place: [{name:"거실", desc:"가족들이 모여 쉬는 포근한 공간입니다."}], 
            person: [{name:"탐정", look:"날카로운 눈매와 헝클어진 머리", cloth:"회색 트렌치 코트와 중절모"}],
            action: ["사건 현장을 조사한다", "담배를 입에 문다"]
        };
        let logs = JSON.parse(localStorage.getItem('wordLogs')) || [];
        let currIdx = null;

        const save = () => {
            localStorage.setItem('wordSystem', JSON.stringify(db));
            localStorage.setItem('wordLogs', JSON.stringify(logs));
        };

        function renderList() {
            const container = document.getElementById('mainList');
            container.innerHTML = logs.map((log, i) => `
                <div class="list-item" onclick="openDetail(${i})">
                    <div class="list-row1">
                        <span class="flag ${log.type === 'R' ? 'flag-r' : 'flag-m'}">${log.type}</span>
                        <span>${log.title} | ${log.place} | ${log.person}</span>
                    </div>
                    <div class="list-row2">${log.actions.length > 0 ? log.actions.join(', ') : '액션 없음'}</div>
                </div>
            `).join('');
        }

        function openDetail(idx) {
            currIdx = idx;
            const log = logs[idx];
            document.getElementById('detailTitleDisp').innerText = log.title;
            
            // Base Elements (장소, 인물만 표시)
            const baseTags = document.getElementById('baseTags');
            baseTags.innerHTML = `
                <div class="tag" onclick="editBase('place')">${log.place}</div>
                <div class="tag" onclick="editBase('person')">${log.person}</div>
            `;

            // 정보 표시 (장소설명, 인물외모, 인물의상 매칭)
            const infoArea = document.getElementById('infoDisplayArea');
            let infoHtml = '';
            
            const matchedPlace = db.place.find(p => p.name === log.place);
            if(matchedPlace) infoHtml += `<div class="info-box"><b>Place Info</b>${matchedPlace.desc}</div>`;
            
            const matchedPerson = db.person.find(p => p.name === log.person);
            if(matchedPerson) {
                infoHtml += `<div class="info-box"><b>Appearance</b>${matchedPerson.look}</div>`;
                infoHtml += `<div class="info-box"><b>Outfit</b>${matchedPerson.cloth}</div>`;
            }
            infoArea.innerHTML = infoHtml;

            renderActionTags();
            document.getElementById('detailLayer').style.display = 'flex';
        }

        function renderActionTags() {
            const actionTags = document.getElementById('actionTags');
            actionTags.innerHTML = logs[currIdx].actions.map((act, i) => `
                <div class="tag">${act} <span class="remove" onclick="event.stopPropagation(); removeAction(${i})">×</span></div>
            `).join('');
        }

        // 시스템 관리
        function openSystem() {
            document.getElementById('sysLayer').style.display = 'flex';
            renderSysList();
        }

        function renderSysList() {
            const cat = document.getElementById('catSel').value;
            document.getElementById('sysPlaceInput').style.display = (cat === 'place') ? 'block' : 'none';
            document.getElementById('sysPersonInput').style.display = (cat === 'person') ? 'block' : 'none';
            document.getElementById('sysCommonInp').style.display = (cat === 'action') ? 'block' : 'none';

            const div = document.getElementById('sysList');
            div.innerHTML = db[cat].map((v, i) => `
                <div style="display:flex; justify-content:space-between; padding:12px; border-bottom:1px solid #1a1a1a; font-size:13px;">
                    <span>${cat === 'place' ? `<b>${v.name}</b>` : cat === 'person' ? `<b>${v.name}</b>` : v}</span>
                    <button onclick="deleteSysItem('${cat}',${i})" style="color:#e74c3c; background:none;">삭제</button>
                </div>
            `).join('');
        }

        function addSysItem() {
            const cat = document.getElementById('catSel').value;
            if(cat === 'place') {
                const name = document.getElementById('sysPlaceName').value.trim();
                const desc = document.getElementById('sysPlaceDesc').value.trim();
                if(name) { db.place.push({name, desc}); }
            } else if(cat === 'person') {
                const name = document.getElementById('sysPersonName').value.trim();
                const look = document.getElementById('sysPersonLook').value.trim();
                const cloth = document.getElementById('sysPersonCloth').value.trim();
                if(name) { db.person.push({name, look, cloth}); }
            } else {
                const val = document.getElementById('sysCommonInp').value.trim();
                if(val) { db.action.push(val); }
            }
            save(); renderSysList();
            // 입력창 초기화
            document.querySelectorAll('#sysLayer input, #sysLayer textarea').forEach(el => el.value = '');
        }

        function deleteSysItem(c, i) { db[c].splice(i,1); save(); renderSysList(); }

        // 수정/생성 로직
        function editTitle() {
            const val = prompt("제목 수정", logs[currIdx].title);
            if(val) { logs[currIdx].title = val; save(); openDetail(currIdx); renderList(); }
        }

        function editBase(key) {
            const val = prompt(`${key} 수정`, logs[currIdx][key]);
            if(val) { logs[currIdx][key] = val; save(); openDetail(currIdx); renderList(); }
        }

        function addActionRandom() {
            const act = db.action[Math.floor(Math.random() * db.action.length)];
            if(act) { logs[currIdx].actions.push(act); save(); renderActionTags(); renderList(); }
        }

        function addActionManual() {
            const val = prompt("수동 액션 추가");
            if(val) { logs[currIdx].actions.push(val); save(); renderActionTags(); renderList(); }
        }

        function removeAction(i) { logs[currIdx].actions.splice(i,1); save(); renderActionTags(); renderList(); }

        function generateRandom() {
            const rPlace = db.place[Math.floor(Math.random() * db.place.length)] || {name:"?"};
            const rPerson = db.person[Math.floor(Math.random() * db.person.length)] || {name:"?"};
            const log = {
                title: `조합 #${logs.length + 1}`, type: 'R',
                place: rPlace.name, person: rPerson.name, actions: []
            };
            logs.unshift(log); save(); renderList(); openDetail(0);
        }

        function openManualLayer() {
            const title = prompt("새 제목"); if(!title) return;
            const log = { title, type: 'M', place: '장소명', person: '인물명', actions: [] };
            logs.unshift(log); save(); renderList(); openDetail(0);
        }

        function deleteItem() { if(confirm("삭제할까요?")) { logs.splice(currIdx, 1); save(); renderList(); closeLayer('detailLayer'); } }
        function closeLayer(id) { document.getElementById(id).style.display = 'none'; }
        
        function filterList() {
            const q = document.getElementById('searchBar').value.toLowerCase();
            const items = document.querySelectorAll('.list-item');
            items.forEach(item => item.style.display = item.innerText.toLowerCase().includes(q) ? '' : 'none');
        }

        renderList();
    </script>
</body>
</html>
</html>
