<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Word DB Master v8.5</title>
    <style>
        :root {
            --bg: #000; --card: #1a1a1a; --item: #2d2d2d;
            --primary: #3498db; --success: #2ecc71; --text: #fff; --dim: #888; --danger: #e74c3c;
        }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; overflow: hidden; display: flex; flex-direction: column; height: 100vh; }
        
        button { cursor: pointer; border: none; transition: 0.2s; border-radius: 8px; }
        input, textarea { width: 100%; box-sizing: border-box; padding: 12px; border: 1px solid #333; border-radius: 8px; background: #111; color: #fff; margin-bottom: 8px; }

        .header { padding: 15px; background: var(--bg); border-bottom: 1px solid #222; flex-shrink: 0; }
        .content { flex: 1; overflow-y: auto; padding-bottom: 100px; } 
        .list-item { padding: 15px; border-bottom: 1px solid #1a1a1a; cursor: pointer; }
        .list-row1 { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; font-size: 15px; font-weight: 600; }
        .list-row2 { font-size: 13px; color: var(--dim); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; padding-left: 28px; }
        .flag { font-size: 10px; padding: 2px 5px; border-radius: 4px; color: #fff; flex-shrink: 0; }
        .flag-r { background: var(--danger); } .flag-m { background: var(--success); }

        .bottom-bar { display: flex; justify-content: space-around; padding: 15px 0 35px; background: rgba(0,0,0,0.9); border-top: 1px solid #222; position: fixed; bottom: 0; width: 100%; z-index: 10; }
        .btn-main { width: 60px; height: 60px; border-radius: 50%; color: #fff; font-size: 24px; font-weight: bold; }

        .layer { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 100; flex-direction: column; }
        .layer-header { padding: 15px; display: grid; grid-template-columns: 1fr 60px 60px; gap: 8px; align-items: center; border-bottom: 1px solid #222; background: #0a0a0a; }
        .header-title-box { font-size: 18px; font-weight: 800; color: var(--primary); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .head-btn { background: #222; color: #fff; padding: 10px 0; font-size: 13px; text-align: center; font-weight: bold; }
        .layer-body { flex: 1; overflow-y: auto; padding: 15px 15px 50px 15px; }

        /* 시스템 관리 스타일 */
        .sys-tabs { display: flex; gap: 5px; overflow-x: auto; margin-bottom: 15px; padding-bottom: 5px; scrollbar-width: none; }
        .sys-tabs::-webkit-scrollbar { display: none; }
        .tab-btn { flex-shrink: 0; padding: 8px 15px; background: #222; color: #888; font-size: 13px; border-radius: 20px; }
        .tab-btn.active { background: var(--primary); color: #fff; }
        .sys-search { margin-bottom: 15px; border-color: var(--primary); opacity: 0.7; }
        .sys-item-card { background: #111; border-radius: 10px; padding: 12px; margin-bottom: 10px; border: 1px solid #222; }
        .sys-item-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 5px; }
        .sys-item-name { font-weight: bold; color: var(--primary); }
        .sys-item-btns { display: flex; gap: 10px; margin-top: 8px; justify-content: flex-end; }
        .sys-small-btn { font-size: 11px; padding: 5px 10px; background: #222; color: #ccc; border-radius: 5px; }

        /* 데이터 관리 패널 전용 */
        .data-panel { background: #111; border-radius: 12px; padding: 15px; margin-bottom: 20px; border: 1px solid #222; }
        .data-section-title { font-size: 12px; color: var(--primary); font-weight: bold; margin-bottom: 10px; }
        .grid-button-area { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 8px; }
        .full-btn { grid-column: span 2; }

        .step-container { background: var(--card); border-radius: 15px; padding: 20px; margin-bottom: 15px; position: relative; }
        .tag-wrapper { display: flex; flex-wrap: wrap; gap: 10px; }
        .tag { background: var(--item); padding: 10px 14px; border-radius: 10px; display: flex; align-items: center; gap: 8px; font-size: 14px; border: 1px solid #333; }
        .info-box { font-size: 14px; color: #aaa; line-height: 1.6; padding: 15px; background: #151515; border-radius: 12px; border-left: 4px solid var(--primary); margin-bottom: 12px; }
        .info-box b { color: var(--primary); display: block; margin-bottom: 6px; font-size: 10px; }
    </style>
</head>
<body>

    <div class="header">
        <input type="text" id="searchBar" placeholder="메인 리스트 검색..." onkeyup="filterList()">
    </div>

    <div class="content" id="mainList"></div>

    <div class="bottom-bar">
        <button class="btn-main" style="background:var(--danger)" onclick="generateRandom()">R</button>
        <button class="btn-main" style="background:var(--success)" onclick="openManualLayer()">+</button>
        <button class="btn-main" style="background:#34495e" onclick="openSystem()">S</button>
    </div>

    <div id="detailLayer" class="layer">
        <div class="layer-header">
            <div id="detailTitleDisp" class="header-title-box" onclick="editTitle()">제목 없음</div>
            <button class="head-btn" style="background:var(--primary)" onclick="copyToClipboard()">복사</button>
            <button class="head-btn" onclick="closeLayer('detailLayer')">닫기</button>
        </div>
        <div class="layer-body">
            <div class="step-container" id="baseTagsArea">
                <div class="tag-wrapper" id="baseTags"></div>
            </div>
            <div id="infoDisplayArea"></div>
            <div class="step-container">
                <div class="tag-wrapper" id="actionTags"></div>
            </div>
            <button onclick="deleteItem()" style="width:100%; color:#555; background:none; padding:20px; font-size:13px;">기록 삭제</button>
        </div>
    </div>

    <div id="sysLayer" class="layer">
        <div class="layer-header">
            <div class="header-title-box" style="grid-column: span 2;">시스템 관리</div>
            <button class="head-btn" onclick="closeLayer('sysLayer')">닫기</button>
        </div>
        <div class="layer-body">
            <div class="sys-tabs">
                <button class="tab-btn active" onclick="changeTab('place', this)">장소</button>
                <button class="tab-btn" onclick="changeTab('person', this)">인물</button>
                <button class="tab-btn" onclick="changeTab('start', this)">시작</button>
                <button class="tab-btn" onclick="changeTab('action', this)">액션</button>
                <button class="tab-btn" onclick="changeTab('data', this)" style="color:var(--success)">데이터</button>
            </div>

            <div id="sysDataPanel" style="display:none;">
                <div class="data-panel">
                    <div class="data-section-title">SYSTEM DB (기준 데이터)</div>
                    <div class="grid-button-area">
                        <button class="sys-small-btn" onclick="exportJSON('db')">JSON 내보내기</button>
                        <button class="sys-small-btn" onclick="importJSON('db')">JSON 가져오기</button>
                        <button class="sys-small-btn" onclick="exportExcel('db')" style="background:#27ae60; color:white;">CSV(엑셀) 저장</button>
                        <button class="sys-small-btn" onclick="importExcel('db')" style="background:#2ecc71; color:white;">CSV(엑셀) 등록</button>
                        <button class="sys-small-btn full-btn" onclick="resetData('db')" style="background:var(--danger); color:white;">DB 전체 삭제</button>
                    </div>
                </div>
                <div class="data-panel">
                    <div class="data-section-title">MAIN LOGS (작성된 리스트)</div>
                    <div class="grid-button-area">
                        <button class="sys-small-btn" onclick="exportJSON('logs')">JSON 내보내기</button>
                        <button class="sys-small-btn" onclick="importJSON('logs')">JSON 가져오기</button>
                        <button class="sys-small-btn" onclick="exportExcel('logs')" style="background:#27ae60; color:white;">CSV(엑셀) 저장</button>
                        <button class="sys-small-btn" onclick="importExcel('logs')" style="background:#2ecc71; color:white;">CSV(엑셀) 등록</button>
                        <button class="sys-small-btn full-btn" onclick="resetData('logs')" style="background:var(--danger); color:white;">리스트 전체 삭제</button>
                    </div>
                </div>
                <div class="info-box"><b>Tip</b> CSV 등록 시 콤마(,)로 구분된 형식을 지켜주세요. 내보낸 파일을 수정하여 다시 올리면 편리합니다.</div>
            </div>

            <input type="text" id="sysSearch" class="sys-search" placeholder="항목 검색..." onkeyup="renderSysList()">
            <div id="sysPlaceInput" style="display:block;"><input type="text" id="sysPlaceName" placeholder="장소명"><textarea id="sysPlaceDesc" placeholder="설명"></textarea></div>
            <div id="sysPersonInput" style="display:none;"><input type="text" id="sysPersonName" placeholder="이름"><textarea id="sysPersonLook" placeholder="외모"></textarea><textarea id="sysPersonCloth" placeholder="의상"></textarea></div>
            <input type="text" id="sysCommonInp" placeholder="항목 입력" style="display:none;">
            <button id="addBtn" onclick="addSysItem()" style="width:100%; padding:15px; background:var(--primary); color:#fff; font-weight:bold; margin-bottom:20px;">추가하기</button>
            <div id="sysList"></div>
        </div>
    </div>

    <script>
        let db = JSON.parse(localStorage.getItem('wordSystem')) || { place: [], person: [], start: [], action: [] };
        let logs = JSON.parse(localStorage.getItem('wordLogs')) || [];
        let currIdx = null; let currentTab = 'place';

        const save = () => {
            if(db.place) db.place.sort((a,b)=>a.name.localeCompare(b.name));
            if(db.person) db.person.sort((a,b)=>a.name.localeCompare(b.name));
            localStorage.setItem('wordSystem', JSON.stringify(db));
            localStorage.setItem('wordLogs', JSON.stringify(logs));
        };

        function renderList() {
            document.getElementById('mainList').innerHTML = logs.map((log, i) => `
                <div class="list-item" onclick="openDetail(${i})">
                    <div class="list-row1"><span class="flag ${log.type==='R'?'flag-r':'flag-m'}">${log.type}</span><span>${log.title} | ${log.place}</span></div>
                    <div class="list-row2">${log.actions.join(', ') || '액션 없음'}</div>
                </div>
            `).join('');
        }

        function openDetail(idx) {
            currIdx = idx; const log = logs[idx];
            document.getElementById('detailTitleDisp').innerText = log.title;
            document.getElementById('baseTags').innerHTML = `<div class="tag">${log.place}</div><div class="tag">${log.person}</div><div class="tag">${log.start}</div>`;
            
            let infoHtml = '';
            const p = db.place.find(v => v.name === log.place);
            if(p) infoHtml += `<div class="info-box"><b>Place</b>${p.desc}</div>`;
            const per = db.person.find(v => v.name === log.person);
            if(per) infoHtml += `<div class="info-box"><b>Person</b>${per.look}<br>${per.cloth}</div>`;
            document.getElementById('infoDisplayArea').innerHTML = infoHtml;

            document.getElementById('actionTags').innerHTML = log.actions.map((act, i) => `<div class="tag">${act}</div>`).join('');
            document.getElementById('detailLayer').style.display = 'flex';
        }

        function openSystem() { document.getElementById('sysLayer').style.display = 'flex'; renderSysList(); }
        function closeLayer(id) { document.getElementById(id).style.display = 'none'; }

        function changeTab(tab, btn) {
            currentTab = tab;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            const isData = tab === 'data';
            document.getElementById('sysDataPanel').style.display = isData ? 'block' : 'none';
            document.getElementById('sysSearch').style.display = isData ? 'none' : 'block';
            document.getElementById('addBtn').style.display = isData ? 'none' : 'block';
            document.getElementById('sysPlaceInput').style.display = tab === 'place' ? 'block' : 'none';
            document.getElementById('sysPersonInput').style.display = tab === 'person' ? 'block' : 'none';
            document.getElementById('sysCommonInp').style.display = (tab === 'start' || tab === 'action') ? 'block' : 'none';
            renderSysList();
        }

        function renderSysList() {
            if(currentTab === 'data') { document.getElementById('sysList').innerHTML = ''; return; }
            const q = document.getElementById('sysSearch').value.toLowerCase();
            let items = db[currentTab] || [];
            if(q) items = items.filter(v => (typeof v === 'object' ? v.name : v).toLowerCase().includes(q));
            document.getElementById('sysList').innerHTML = items.map((v, i) => `
                <div class="sys-item-card">
                    <div class="sys-item-header">
                        <span class="sys-item-name">${typeof v === 'object' ? v.name : v}</span>
                        <button class="sys-small-btn" style="color:var(--danger)" onclick="deleteSysItem('${currentTab}', ${db[currentTab].indexOf(v)})">삭제</button>
                    </div>
                </div>
            `).join('');
        }

        function addSysItem() {
            if(currentTab === 'place') {
                const name = document.getElementById('sysPlaceName').value.trim();
                if(!name) return; db.place.push({name, desc: document.getElementById('sysPlaceDesc').value});
            } else if(currentTab === 'person') {
                const name = document.getElementById('sysPersonName').value.trim();
                if(!name) return; db.person.push({name, look: document.getElementById('sysPersonLook').value, cloth: document.getElementById('sysPersonCloth').value});
            } else {
                const val = document.getElementById('sysCommonInp').value.trim();
                if(!val) return; db[currentTab].push(val);
            }
            save(); renderSysList();
            document.querySelectorAll('#sysLayer input, #sysLayer textarea').forEach(el => el.value = '');
        }

        function deleteSysItem(c, i) { if(confirm("삭제할까요?")) { db[c].splice(i,1); save(); renderSysList(); } }

        /* --- 데이터 관리 핵심 기능 --- */

        function resetData(type) {
            if(confirm("정말로 모든 데이터를 삭제하시겠습니까? 이 작업은 되돌릴 수 없습니다.")) {
                if(type === 'db') db = { place: [], person: [], start: [], action: [] };
                else logs = [];
                save(); alert("삭제되었습니다."); location.reload();
            }
        }

        function exportJSON(type) {
            const blob = new Blob([JSON.stringify(type==='db'?db:logs, null, 2)], {type: "application/json"});
            const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
            a.download = `backup_${type}_${new Date().getTime()}.json`; a.click();
        }

        function importJSON(type) {
            const input = document.createElement('input'); input.type = 'file'; input.accept = '.json';
            input.onchange = e => {
                const reader = new FileReader();
                reader.onload = event => {
                    const data = JSON.parse(event.target.result);
                    if(type==='db') db = data; else logs = data;
                    save(); alert("복구 완료"); location.reload();
                };
                reader.readAsText(e.target.files[0]);
            };
            input.click();
        }

        function exportExcel(type) {
            let csv = "\uFEFF";
            if(type === 'db') {
                csv += "분류,이름,설명1,설명2\n";
                db.place.forEach(v => csv += `장소,${v.name},"${v.desc}",\n`);
                db.person.forEach(v => csv += `인물,${v.name},"${v.look}","${v.cloth}"\n`);
                db.start.forEach(v => csv += `시작,${v},,\n`);
                db.action.forEach(v => csv += `액션,${v},,\n`);
            } else {
                csv += "제목,유형,장소,인물,시작,액션들\n";
                logs.forEach(l => csv += `"${l.title}",${l.type},${l.place},${l.person},${l.start},"${l.actions.join('|')}"\n`);
            }
            const blob = new Blob([csv], {type: "text/csv;charset=utf-8;"});
            const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
            a.download = `data_${type}.csv`; a.click();
        }

        function importExcel(type) {
            const input = document.createElement('input'); input.type = 'file'; input.accept = '.csv';
            input.onchange = e => {
                const reader = new FileReader();
                reader.onload = event => {
                    const lines = event.target.result.split('\n').slice(1); // 헤더 제외
                    lines.forEach(line => {
                        if(!line.trim()) return;
                        const cols = line.split(',').map(c => c.replace(/"/g, '').trim());
                        if(type === 'db') {
                            const [cat, name, d1, d2] = cols;
                            if(cat === '장소') db.place.push({name, desc: d1});
                            else if(cat === '인물') db.person.push({name, look: d1, cloth: d2});
                            else if(cat === '시작') db.start.push(name);
                            else if(cat === '액션') db.action.push(name);
                        } else {
                            const [title, ltype, place, person, start, acts] = cols;
                            logs.push({title, type: ltype, place, person, start, actions: acts ? acts.split('|') : []});
                        }
                    });
                    save(); alert("등록 완료"); location.reload();
                };
                reader.readAsText(e.target.files[0]);
            };
            input.click();
        }

        /* --- 기타 로직 --- */
        function generateRandom() {
            const p = db.place[Math.floor(Math.random()*db.place.length)] || {name:"?"};
            const per = db.person[Math.floor(Math.random()*db.person.length)] || {name:"?"};
            logs.unshift({ title: `조합 #${logs.length+1}`, type: 'R', place: p.name, person: per.name, start: db.start[0]||"시작", actions: [] });
            save(); renderList(); openDetail(0);
        }
        function openManualLayer() { const t = prompt("제목"); if(t) { logs.unshift({title:t, type:'M', place:'?', person:'?', start:'?', actions:[]}); save(); renderList(); openDetail(0); } }
        function deleteItem() { if(confirm("삭제?")) { logs.splice(currIdx,1); save(); renderList(); closeLayer('detailLayer'); } }
        function filterList() {
            const q = document.getElementById('searchBar').value.toLowerCase();
            document.querySelectorAll('.list-item').forEach(el => el.style.display = el.innerText.toLowerCase().includes(q) ? '' : 'none');
        }

        renderList();
    </script>
</body>
</html>
