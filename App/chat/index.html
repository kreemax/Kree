<!DOCTYPE html>
<html>
<body>
    <input type="text" id="msg" placeholder="말을 걸어보세요">
    <button onclick="chat()">전송</button>
    <div id="out" style="white-space: pre-wrap; margin-top: 20px; border: 1px solid #ccc;"></div>

    <script>
        async function chat() {
            const k = "AQ.Ab8RN6KxYvdAGvYKHeqr1FC7ckLT7Mj7oaI4ExIILFQbSyipzg"; 
            const i = document.getElementById('msg');
            const o = document.getElementById('out');
            
            o.innerText += "\n나: " + i.value;
            
            try {
                const r = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${k}`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({contents: [{parts: [{text: i.value}]}]})
                });
                const d = await r.json();
                const txt = d.candidates[0].content.parts[0].text;
                o.innerText += "\nAI: " + txt;
            } catch(e) {
                o.innerText += "\n오류: API키나 인터넷을 확인하세요!";
            }
            i.value = "";
        }
    </script>
</body>
</html>
