<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MRank Final - My Music Dashboard</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
    <style>
        :root {
            --primary: #ff4757;
            --bg: #f1f2f6;
            --card: #ffffff;
            --edit: #ffc107;
            --delete: #ff4d4d;
            --search-bg: rgba(225, 226, 230, 0.8);
        }
        body { font-family: sans-serif; background: var(--bg); margin: 0; padding-bottom: 100px; -webkit-tap-highlight-color: transparent; }
        
        /* Tab Styles */
        .tabs { display: flex; position: sticky; top: 0; background: #fff; border-bottom: 1px solid #ddd; z-index: 10; }
        .tab-btn { flex: 1; padding: 15px; border: none; background: none; cursor: pointer; font-weight: bold; color: #777; }
        .tab-btn.active { color: var(--primary); border-bottom: 3px solid var(--primary); }

        /* List Styles */
        .container { padding: 15px; }
        .rank-item { 
            position: relative;
            background-color: var(--card); 
            background-size: cover; 
            background-position: center;
            border-radius: 12px; 
            margin-bottom: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1); 
            overflow: hidden;
            z-index: 1;
        }

        /* 배경 이미지 가독성을 위한 어두운 오버레이 */
        .rank-item::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.45); /* 배경이 있을 때 기본값 */
            z-index: -1;
        }

        .item-content { padding: 15px; position: relative; }

        .item-top { display: flex; align-items: center; margin-bottom: 12px; }
        
        /* 드래그 핸들 (숫자 부분) */
        .rank-num { 
            font-size: 1.4rem; font-weight: 900; width: 45px; 
            color: #fff; text-shadow: 1px 1px 3px rgba(0,0,0,0.5);
            cursor: move; 
        }

        .info { flex: 1; overflow: hidden; }
        .info h3 { margin: 0; font-size: 1.2rem; color: #fff; text-shadow: 1px 1px 3px rgba(0,0,0,0.8); cursor: pointer; }
        .memo { font-size: 0.9rem; color: #00ff88; font-weight: bold; margin-top: 4px; display: block; text-shadow: 1px 1px 2px rgba(0,0,0,0.8); }

        /* 검색 버튼 레이아웃 */
        .search-btns { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; margin-bottom: 12px; }
        .btn-search { 
            padding: 8px 2px; border-radius: 6px; border: none; 
            background: var(--search-bg); font-size: 11px; font-weight: bold; cursor: pointer; color: #333;
        }

        /* 하단 액션 버튼 */
        .action-btns { display: flex; justify-content: flex-end; gap: 8px; border-top: 1px solid rgba(255,255,255,0.2); padding-top: 10px; }
        .btn-action { padding: 8px 16px; border-radius: 6px; border: none; font-size: 12px; font-weight: bold; cursor: pointer; color: white; }
        .btn-lyric { background: #57606f; }
        .btn-edit { background: var(--edit); color: #000; }
        .btn-delete { background: var(--delete); }

        /* Floating Add Button */
        .add-btn {
            position: fixed; bottom: 25px; right: 25px; width: 65px; height: 65px;
            background: var(--primary); color: #fff; border-radius: 50%; border: none;
            font-size: 35px; box-shadow: 0 4px 15px rgba(255, 71, 87, 0.4); cursor: pointer; z-index: 20;
        }

        /* Modal */
        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); align-items: center; justify-content: center; z-index: 100;
        }
        .modal-content { background: #fff; padding: 25px; border-radius: 15px; width: 85%; max-width: 450px; max-height: 85vh; overflow-y: auto; }
        .modal-content input, .modal-content textarea { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        .lyric-text { white-space: pre-wrap; line-height: 1.7; background: #f1f2f6; padding: 20px; border-radius: 10px; font-size: 1rem; color: #2f3542; }
    </style>
</head>
<body>

<div class="tabs">
    <button class="tab-btn active" onclick="switchTab('listen')">듣는용</button>
    <button class="tab-btn" onclick="switchTab('sing')">부르기</button>
    <button class="tab-btn" onclick="switchTab('etc')">기타</button>
    <button class="tab-btn" onclick="switchTab('shorts')">쇼츠</button>
</div>

<div class="container" id="rankList"></div>

<button class="add-btn" onclick="openModal()">+</button>

<div id="modal" class="modal">
    <div class="modal-content">
        <h2 id="modalTitle" style="margin-top:0;">노래 정보</h2>
        <input type="text" id="titleInput" placeholder="노래 제목 (사진파일명과 일치 권장)">
        <input type="text" id="urlInput" placeholder="유튜브 주소 (생략 가능)">
        <input type="text" id="memoInput" placeholder="메모 (노래방 번호 등)">
        <textarea id="lyricInput" rows="6" placeholder="가사를 입력하세요"></textarea>
        <div style="display:flex; gap:10px; margin-top:10px;">
            <button onclick="saveItem()" style="flex:1; padding:15px; background:var(--primary); color:#fff; border:none; border-radius:8px; font-weight:bold;">저장</button>
            <button onclick="closeModal()" style="flex:1; padding:15px; background:#ddd; border:none; border-radius:8px;">취소</button>
        </div>
    </div>
</div>

<div id="lyricModal" class="modal">
    <div class="modal-content">
        <h2 id="lyricTitle" style="margin-top:0;">가사</h2>
        <div id="lyricDisplay" class="lyric-text"></div>
        <button onclick="closeLyricModal()" style="width:100%; margin-top:20px; padding:15px; background:#2f3542; color:#fff; border:none; border-radius:8px; font-weight:bold;">닫기</button>
    </div>
</div>

<script>
    let currentTab = 'listen';
    let data = JSON.parse(localStorage.getItem('mRankDataFinal')) || { listen: [], sing: [], etc: [], shorts: [] };
    let editIndex = null;

    const listElement = document.getElementById('rankList');

    // SortableJS 설정 (간섭 방지)
    new Sortable(listElement, {
        animation: 150,
        handle: '.rank-num', // 숫자 영역만 드래그 가능
        filter: '.btn-search, .btn-action, h3', 
        preventOnFilter: false,
        onEnd: () => reorderData()
    });

    function switchTab(tab) {
        currentTab = tab;
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.classList.toggle('active', btn.getAttribute('onclick').includes(tab));
        });
        render();
    }

    function render() {
        listElement.innerHTML = '';
        data[currentTab].forEach((item, index) => {
            const div = document.createElement('div');
            div.className = 'rank-item';
            
            // 이미지 배경 처리 (제목.jpg)
            const bgImage = encodeURIComponent(item.title) + ".jpg";
            div.style.backgroundImage = `url('${bgImage}')`;

            div.innerHTML = `
                <div class="item-content">
                    <div class="item-top">
                        <div class="rank-num">${index + 1}</div>
                        <div class="info">
                            <h3 onclick="openSongLink('${item.url}')">${item.title}</h3>
                            <span class="memo">${item.memo}</span>
                        </div>
                    </div>
                    <div class="search-btns">
                        <button class="btn-search" onclick="searchYoutube('${item.title}', '뮤직비디오')">뮤비</button>
                        <button class="btn-search" onclick="searchYoutube('${item.title}', '무대')">무대</button>
                        <button class="btn-search" onclick="searchYoutube('${item.title}', '라이브')">라이브</button>
                        <button class="btn-search" onclick="searchYoutube('${item.title}', '퍼포먼스')">퍼포먼스</button>
                        <button class="btn-search" onclick="searchYoutube('${item.title}', '리믹스')">리믹스</button>
                        <button class="btn-search" onclick="searchYoutube('${item.title}', '챌린지')">챌린지</button>
                    </div>
                    <div class="action-btns">
                        <button class="btn-action btn-lyric" onclick="showLyrics(${index})">가사</button>
                        <button class="btn-action btn-edit" onclick="editItem(${index})">수정</button>
                        <button class="btn-action btn-delete" onclick="deleteItem(${index})">삭제</button>
                    </div>
                </div>
            `;
            listElement.appendChild(div);
        });
    }

    // 유튜브 검색 (브라우저 유지 시도)
    function searchYoutube(title, keyword) {
        const query = encodeURIComponent(title + " " + keyword);
        const url = `https://m.youtube.com/results?search_query=${query}`;
        const newWindow = window.open(url, '_blank');
        if (newWindow) newWindow.opener = null;
    }

    // 제목 클릭 시 링크 이동
    function openSongLink(url) {
        if(!url) return;
        const targetUrl = url.includes('youtube.com') ? url.replace('www.', 'm.') : url;
        const newWindow = window.open(targetUrl, '_blank');
        if (newWindow) newWindow.opener = null;
    }

    function showLyrics(index) {
        const item = data[currentTab][index];
        document.getElementById('lyricTitle').innerText = item.title;
        document.getElementById('lyricDisplay').innerText = item.lyric || "가사 정보가 없습니다.";
        document.getElementById('lyricModal').style.display = 'flex';
    }

    function closeLyricModal() { document.getElementById('lyricModal').style.display = 'none'; }

    function openModal() {
        editIndex = null;
        document.getElementById('modalTitle').innerText = "새 곡 추가";
        document.getElementById('titleInput').value = '';
        document.getElementById('urlInput').value = '';
        document.getElementById('memoInput').value = '';
        document.getElementById('lyricInput').value = '';
        document.getElementById('modal').style.display = 'flex';
    }

    function closeModal() { document.getElementById('modal').style.display = 'none'; }

    function saveItem() {
        const newItem = {
            title: document.getElementById('titleInput').value || '제목 없음',
            url: document.getElementById('urlInput').value,
            memo: document.getElementById('memoInput').value,
            lyric: document.getElementById('lyricInput').value
        };
        if(editIndex !== null) data[currentTab][editIndex] = newItem;
        else data[currentTab].push(newItem);
        
        saveToLocal();
        closeModal();
        render();
    }

    function editItem(index) {
        editIndex = index;
        const item = data[currentTab][index];
        document.getElementById('modalTitle').innerText = "정보 수정";
        document.getElementById('titleInput').value = item.title;
        document.getElementById('urlInput').value = item.url;
        document.getElementById('memoInput').value = item.memo;
        document.getElementById('lyricInput').value = item.lyric || '';
        document.getElementById('modal').style.display = 'flex';
    }

    function deleteItem(index) {
        if(confirm('이 항목을 삭제할까요?')) {
            data[currentTab].splice(index, 1);
            saveToLocal();
            render();
        }
    }

    function reorderData() {
        const newOrder = [];
        const items = listElement.querySelectorAll('.rank-item');
        items.forEach(el => {
            const title = el.querySelector('h3').innerText;
            const item = data[currentTab].find(d => d.title === title);
            if(item) newOrder.push(item);
        });
        data[currentTab] = newOrder;
        saveToLocal();
        render();
    }

    function saveToLocal() { localStorage.setItem('mRankDataFinal', JSON.stringify(data)); }

    render();
</script>

</body>
</html>
