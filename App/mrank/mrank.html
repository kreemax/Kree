<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MRank Slim v1.2</title>
    <link rel="icon" type="image/png" href="icon.png">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
    <style>
        :root { --bg: #121212; --card: #1e1e1e; --text: #ffffff; --primary: #ff4757; --accent: #00ff88; --input: #000; }
        body.light-mode { --bg: #f1f2f6; --card: #ffffff; --text: #2f3542; --primary: #ff4757; --accent: #2ed573; --input: #fff; }
        
        body { font-family: sans-serif; background: var(--bg); margin: 0; color: var(--text); padding-bottom: 80px; transition: 0.3s; }
        .tabs { display: flex; position: sticky; top: 0; background: #000; z-index: 10; border-bottom: 1px solid #333; }
        .tab-btn { flex: 1; padding: 15px 0; border: none; background: none; color: #888; font-weight: bold; cursor: pointer; font-size: 0.85rem; }
        .tab-btn.active { color: var(--primary); border-bottom: 3px solid var(--primary); }

        .container { padding: 0; display: none; }
        .container.active { display: block; }

        /* 카드 디자인 */
        .rank-item { position: relative; height: 110px; margin-bottom: 2px; background-size: cover; background-position: center; overflow: hidden; }
        .rank-item::before { content: ""; position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.45); z-index: 1; }
        .item-content { position: relative; z-index: 2; height: 100%; display: flex; align-items: center; padding: 0 15px; }
        .rank-num { font-size: 1.4rem; font-weight: 900; width: 35px; color: #fff; cursor: move; }
        .info { flex: 1; min-width: 0; }
        .info h3 { margin: 0; color: #fff; font-size: 1.1rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .memo { color: var(--accent); font-size: 0.8rem; font-weight: bold; }

        .btn-group { display: flex; gap: 8px; }
        .icon-btn { background: rgba(255,255,255,0.2); border: none; border-radius: 50%; width: 36px; height: 36px; color: #fff; font-size: 1.1rem; cursor: pointer; display: flex; align-items: center; justify-content: center; }

        /* 설정 탭 슬림화 */
        .settings { padding: 15px; }
        .setting-item { background: var(--card); padding: 12px; border-radius: 10px; margin-bottom: 10px; border: 1px solid rgba(255,255,255,0.05); }
        .setting-item h4 { margin: 0 0 10px 0; font-size: 0.9rem; color: #888; text-transform: uppercase; }
        
        .flex-row { display: flex; align-items: center; gap: 10px; }
        .flex-row input { flex: 1; margin: 0; min-width: 0; } /* 인풋 길이 유연하게 */
        .btn-small { padding: 8px 15px; border-radius: 6px; border: none; background: #333; color: #fff; font-size: 0.85rem; cursor: pointer; white-space: nowrap; }

        .list-edit { list-style: none; padding: 0; margin: 5px 0; }
        .list-edit li { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; }
        .list-edit input { padding: 6px 10px; font-size: 0.85rem; }

        /* 하단 팝업 */
        .overlay { display: none; position: fixed; bottom: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 100; align-items: flex-end; }
        .menu-sheet { background: var(--card); width: 100%; border-radius: 20px 20px 0 0; padding: 20px; box-sizing: border-box; }
        .menu-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
        .sheet-btn { padding: 12px 5px; border-radius: 8px; border: 1px solid #444; background: #333; color: #fff; font-weight: bold; cursor: pointer; font-size: 0.8rem; }
        .sheet-btn.red { background: var(--primary); }

        .add-btn { position: fixed; bottom: 20px; right: 20px; width: 55px; height: 55px; background: var(--primary); color: #fff; border-radius: 50%; border: none; font-size: 30px; z-index: 50; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 200; align-items: center; justify-content: center; }
        .modal-content { background: var(--card); padding: 20px; border-radius: 12px; width: 90%; }
        input, textarea { width: 100%; padding: 10px; margin: 5px 0; background: var(--input); color: var(--text); border: 1px solid #444; border-radius: 6px; box-sizing: border-box; }
    </style>
</head>
<body class="dark-mode">

<div class="tabs" id="tabBar">
    </div>

<div id="list-container" class="container active"><div id="rankList"></div></div>

<div id="settings-container" class="container">
    <div class="settings">
        <div class="setting-item flex-row" style="justify-content: space-between;">
            <h4 style="margin:0;">Dark / Light Mode</h4>
            <button class="btn-small" onclick="toggleTheme()" id="themeStatus">DARK</button>
        </div>

        <div class="setting-item">
            <h4>Tab Names</h4>
            <ul class="list-edit" id="tabEditList"></ul>
        </div>

        <div class="setting-item">
            <h4>Search Keywords</h4>
            <div class="flex-row">
                <input type="text" id="newKeyword" placeholder="Keyword...">
                <button class="btn-small" style="background: var(--primary);" onclick="addKeyword()">추가</button>
            </div>
            <ul class="list-edit" id="keywordList" style="margin-top:10px;"></ul>
        </div>

        <div class="setting-item flex-row">
            <button class="btn-small" style="flex:1" onclick="exportData()">백업(저장)</button>
            <button class="btn-small" style="flex:1" onclick="document.getElementById('importFile').click()">복원(불러오기)</button>
            <input type="file" id="importFile" style="display:none" onchange="importData(event)">
        </div>
        
        <p style="text-align:center; opacity:0.3; font-size: 0.8rem;">VERSION 1.2 • <span onclick="location.reload()">Refresh</span></p>
    </div>
</div>

<button id="floating-add" class="add-btn" onclick="openModal()">+</button>

<div id="searchOverlay" class="overlay" onclick="closePopups()">
    <div class="menu-sheet" onclick="event.stopPropagation()">
        <h3 id="searchTitle" style="margin-top:0; font-size:1rem;">검색</h3>
        <div id="searchGrid" class="menu-grid"></div>
    </div>
</div>

<div id="menuOverlay" class="overlay" onclick="closePopups()">
    <div class="menu-sheet" onclick="event.stopPropagation()">
        <h3 id="menuTitle" style="margin-top:0; font-size:1rem;">메뉴</h3>
        <div class="menu-grid" style="grid-template-columns: repeat(3, 1fr);">
            <button class="sheet-btn" onclick="showLyricsFromMenu()">가사</button>
            <button class="sheet-btn" onclick="editFromMenu()">수정</button>
            <button class="sheet-btn red" onclick="deleteFromMenu()">삭제</button>
        </div>
    </div>
</div>

<div id="modal" class="modal">
    <div class="modal-content">
        <h3 id="modalTitle" style="margin-top:0;">노래 추가/수정</h3>
        <input type="text" id="titleInput" placeholder="제목">
        <input type="text" id="urlInput" placeholder="유튜브 링크">
        <input type="text" id="memoInput" placeholder="메모">
        <textarea id="lyricInput" rows="4" placeholder="가사"></textarea>
        <div style="display:flex; gap:10px; margin-top:10px;">
            <button class="sheet-btn" style="flex:1; background:var(--primary);" onclick="saveItem()">저장</button>
            <button class="sheet-btn" style="flex:1;" onclick="closeModal()">취소</button>
        </div>
    </div>
</div>

<script>
    let currentTab = 'tab1';
    let data = JSON.parse(localStorage.getItem('mRank_v1.2')) || { tab1: [], tab2: [], tab3: [], tab4: [] };
    let keywords = JSON.parse(localStorage.getItem('mRank_Keywords')) || ['뮤비', '무대', '직캠', '비하인드'];
    let tabNames = JSON.parse(localStorage.getItem('mRank_TabNames')) || { tab1: '듣는용', tab2: '부르기', tab3: '기타', tab4: '쇼츠', settings: '설정' };
    let selectedIndex = null;
    let isLightMode = localStorage.getItem('theme') === 'light';

    if(isLightMode) { document.body.classList.add('light-mode'); document.getElementById('themeStatus').innerText = 'LIGHT'; }

    const listElement = document.getElementById('rankList');
    new Sortable(listElement, { animation: 150, handle: '.rank-num', onEnd: () => reorderData() });

    function initTabs() {
        const tabBar = document.getElementById('tabBar');
        tabBar.innerHTML = Object.keys(tabNames).map(key => `
            <button class="tab-btn ${currentTab === key ? 'active' : ''}" onclick="switchTab('${key}')" id="btn-${key}">${tabNames[key]}</button>
        `).join('');
    }

    function switchTab(tab) {
        currentTab = tab;
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.id === `btn-${tab}`));
        document.getElementById('list-container').classList.toggle('active', tab !== 'settings');
        document.getElementById('settings-container').classList.toggle('active', tab === 'settings');
        document.getElementById('floating-add').style.display = tab === 'settings' ? 'none' : 'flex';
        if(tab === 'settings') renderSettings(); else render();
    }

    function render() {
        listElement.innerHTML = '';
        if(!data[currentTab]) data[currentTab] = [];
        data[currentTab].forEach((item, index) => {
            const div = document.createElement('div');
            div.className = 'rank-item';
            div.style.backgroundImage = `url('${encodeURIComponent(item.title)}.jpg')`;
            div.innerHTML = `
                <div class="item-content">
                    <div class="rank-num">${index + 1}</div>
                    <div class="info">
                        <h3 onclick="window.open('${item.url || '#'}')">${item.title}</h3>
                        <div class="memo">${item.memo}</div>
                    </div>
                    <div class="btn-group">
                        <button class="icon-btn" onclick="openSearch(${index})">🔍</button>
                        <button class="icon-btn" onclick="openMenu(${index})">⋮</button>
                    </div>
                </div>`;
            listElement.appendChild(div);
        });
    }

    function openSearch(index) {
        selectedIndex = index;
        const item = data[currentTab][index];
        document.getElementById('searchTitle').innerText = item.title;
        document.getElementById('searchGrid').innerHTML = keywords.map(k => `<button class="sheet-btn" onclick="doSearch('${item.title}', '${k}')">${k}</button>`).join('');
        document.getElementById('searchOverlay').style.display = 'flex';
    }

    function doSearch(title, k) { window.open(`https://m.youtube.com/results?search_query=${encodeURIComponent(title + ' ' + k)}`, '_blank'); }
    function openMenu(index) { selectedIndex = index; document.getElementById('menuTitle').innerText = data[currentTab][index].title; document.getElementById('menuOverlay').style.display = 'flex'; }
    function closePopups() { document.querySelectorAll('.overlay').forEach(o => o.style.display = 'none'); }

    function toggleTheme() {
        isLightMode = !isLightMode;
        document.body.classList.toggle('light-mode', isLightMode);
        document.getElementById('themeStatus').innerText = isLightMode ? 'LIGHT' : 'DARK';
        localStorage.setItem('theme', isLightMode ? 'light' : 'dark');
    }

    function renderSettings() {
        // 탭 이름 수정 리스트
        const tList = document.getElementById('tabEditList');
        tList.innerHTML = Object.keys(tabNames).map(key => `
            <li><input type="text" value="${tabNames[key]}" onchange="updateTabName('${key}', this.value)"></li>
        `).join('');

        // 키워드 리스트
        const kList = document.getElementById('keywordList');
        kList.innerHTML = keywords.map((k, i) => `
            <li class="keyword-item"><span style="font-size:0.9rem;">${k}</span> <button class="btn-small" style="padding:2px 8px; background:#444;" onclick="deleteKeyword(${i})">삭제</button></li>
        `).join('');
    }

    function updateTabName(key, val) { tabNames[key] = val; localStorage.setItem('mRank_TabNames', JSON.stringify(tabNames)); initTabs(); }
    function addKeyword() { const val = document.getElementById('newKeyword').value; if(val) { keywords.push(val); localStorage.setItem('mRank_Keywords', JSON.stringify(keywords)); renderSettings(); document.getElementById('newKeyword').value=''; } }
    function deleteKeyword(i) { keywords.splice(i, 1); localStorage.setItem('mRank_Keywords', JSON.stringify(keywords)); renderSettings(); }

    function openModal() { selectedIndex = null; document.getElementById('modal').style.display='flex'; }
    function closeModal() { document.getElementById('modal').style.display='none'; }
    
    function saveItem() {
        const newItem = { title: document.getElementById('titleInput').value || '제목 없음', url: document.getElementById('urlInput').value, memo: document.getElementById('memoInput').value, lyric: document.getElementById('lyricInput').value };
        if(selectedIndex !== null) data[currentTab][selectedIndex] = newItem; else data[currentTab].push(newItem);
        localStorage.setItem('mRank_v1.2', JSON.stringify(data)); closeModal(); render();
    }

    function editFromMenu() { const item = data[currentTab][selectedIndex]; document.getElementById('titleInput').value = item.title; document.getElementById('urlInput').value = item.url; document.getElementById('memoInput').value = item.memo; document.getElementById('lyricInput').value = item.lyric; closePopups(); document.getElementById('modal').style.display='flex'; }
    function deleteFromMenu() { if(confirm('삭제하시겠습니까?')) { data[currentTab].splice(selectedIndex, 1); localStorage.setItem('mRank_v1.2', JSON.stringify(data)); closePopups(); render(); } }
    function showLyricsFromMenu() { alert(data[currentTab][selectedIndex].lyric || "가사가 없습니다."); closePopups(); }

    function reorderData() {
        const newOrder = [];
        listElement.querySelectorAll('.rank-item').forEach(el => {
            const title = el.querySelector('h3').innerText;
            const item = data[currentTab].find(d => d.title === title);
            if(item) newOrder.push(item);
        });
        data[currentTab] = newOrder; localStorage.setItem('mRank_v1.2', JSON.stringify(data)); render();
    }

    function exportData() {
        const blob = new Blob([JSON.stringify({data, keywords, tabNames})], {type: 'application/json'});
        const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'mrank_v1.2_total_backup.json'; a.click();
    }
    function importData(e) {
        const reader = new FileReader();
        reader.onload = (event) => { 
            const imported = JSON.parse(event.target.result);
            data = imported.data || data; keywords = imported.keywords || keywords; tabNames = imported.tabNames || tabNames;
            localStorage.setItem('mRank_v1.2', JSON.stringify(data));
            localStorage.setItem('mRank_Keywords', JSON.stringify(keywords));
            localStorage.setItem('mRank_TabNames', JSON.stringify(tabNames));
            location.reload(); 
        };
        reader.readAsText(e.target.files[0]);
    }

    initTabs();
    render();
</script>
</body>
</html>
