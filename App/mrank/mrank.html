<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MRank V3 - Final</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
    <style>
        :root {
            --primary: #ff4757;
            --bg: #f1f2f6;
            --card: #ffffff;
            --edit: #ffc107;
            --delete: #ff4d4d;
            --search-bg: #e1e2e6;
        }
        body { font-family: sans-serif; background: var(--bg); margin: 0; padding-bottom: 100px; -webkit-tap-highlight-color: transparent; }
        
        .tabs { display: flex; position: sticky; top: 0; background: #fff; border-bottom: 1px solid #ddd; z-index: 10; }
        .tab-btn { flex: 1; padding: 15px; border: none; background: none; cursor: pointer; font-weight: bold; color: #777; }
        .tab-btn.active { color: var(--primary); border-bottom: 3px solid var(--primary); }

        .container { padding: 15px; }
        .rank-item { 
            background: var(--card); border-radius: 8px; padding: 15px; margin-bottom: 12px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1); 
            /* 드래그 가능함을 알리는 스타일은 유지하되 전체 클릭 간섭 방지 */
        }
        .item-top { display: flex; align-items: center; margin-bottom: 10px; }
        
        /* 드래그 핸들: 숫자가 써진 부분을 잡아야 드래그가 되게 설정 (터치 오류 방지) */
        .rank-num { 
            font-size: 1.2rem; font-weight: 800; width: 40px; color: var(--primary); 
            cursor: move; /* 드래그 핸들 아이콘 */
        }

        .info { flex: 1; overflow: hidden; }
        .info h3 { margin: 0; font-size: 1.1rem; color: #333; display: inline-block; }
        .memo { font-size: 0.85rem; color: #2ed573; font-weight: bold; margin-top: 4px; display: block; }

        /* 검색 버튼 레이아웃 */
        .search-btns { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; margin-bottom: 10px; }
        .btn-search { 
            padding: 8px 4px; border-radius: 4px; border: none; 
            background: var(--search-bg); font-size: 11px; font-weight: bold; cursor: pointer; 
        }
        .btn-search:active { background: #ccc; }

        .action-btns { display: flex; justify-content: flex-end; gap: 8px; border-top: 1px solid #eee; padding-top: 10px; }
        .btn-action { padding: 8px 15px; border-radius: 4px; border: none; font-size: 12px; font-weight: bold; cursor: pointer; color: white; }
        .btn-lyric { background: #57606f; }
        .btn-edit { background: var(--edit); color: #000; }
        .btn-delete { background: var(--delete); }

        .add-btn {
            position: fixed; bottom: 20px; right: 20px; width: 60px; height: 60px;
            background: var(--primary); color: #fff; border-radius: 50%; border: none;
            font-size: 30px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); cursor: pointer; z-index: 20;
        }

        /* 모달 공통 */
        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); align-items: center; justify-content: center; z-index: 100;
        }
        .modal-content { background: #fff; padding: 20px; border-radius: 12px; width: 85%; max-width: 450px; max-height: 85vh; overflow-y: auto; }
        .modal-content input, .modal-content textarea { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; font-size: 16px; }
        .lyric-text { white-space: pre-wrap; line-height: 1.6; background: #f9f9f9; padding: 15px; border-radius: 8px; font-size: 0.95rem; color: #333; }
    </style>
</head>
<body>

<div class="tabs">
    <button class="tab-btn active" onclick="switchTab('listen')">듣는용</button>
    <button class="tab-btn" onclick="switchTab('sing')">부르기</button>
    <button class="tab-btn" onclick="switchTab('etc')">기타</button>
    <button class="tab-btn" onclick="switchTab('shorts')">쇼츠</button>
</div>

<div class="container" id="rankList"></div>

<button class="add-btn" onclick="openModal()">+</button>

<div id="modal" class="modal">
    <div class="modal-content">
        <h2 id="modalTitle" style="margin-top:0;">곡 정보 입력</h2>
        <input type="text" id="titleInput" placeholder="노래 제목">
        <input type="text" id="urlInput" placeholder="유튜브 링크 주소">
        <input type="text" id="memoInput" placeholder="메모 (노래방 번호 등)">
        <textarea id="lyricInput" rows="6" placeholder="가사를 입력하세요"></textarea>
        <div style="display:flex; gap:10px; margin-top:10px;">
            <button onclick="saveItem()" style="flex:1; padding:15px; background:var(--primary); color:#fff; border:none; border-radius:5px; font-weight:bold;">저장</button>
            <button onclick="closeModal()" style="flex:1; padding:15px; background:#ddd; border:none; border-radius:5px;">취소</button>
        </div>
    </div>
</div>

<div id="lyricModal" class="modal">
    <div class="modal-content">
        <h2 id="lyricTitle" style="margin-top:0; font-size:1.2rem;">가사</h2>
        <div id="lyricDisplay" class="lyric-text"></div>
        <button onclick="closeLyricModal()" style="width:100%; margin-top:15px; padding:15px; background:#57606f; color:#fff; border:none; border-radius:5px; font-weight:bold;">닫기</button>
    </div>
</div>

<script>
    let currentTab = 'listen';
    let data = JSON.parse(localStorage.getItem('mRankDataV3')) || { listen: [], sing: [], etc: [], shorts: [] };
    let editIndex = null;

    const listElement = document.getElementById('rankList');

    // Sortable 설정 변경: 버튼 영역(filter)에서는 드래그 무시, 핸들(handle) 권장
    new Sortable(listElement, {
        animation: 150,
        handle: '.rank-num', // 순위 숫자 부분을 잡아야만 드래그 가능 (버튼 클릭 방해 방지)
        filter: '.btn-search, .btn-action, h3', // 이 요소들은 드래그를 시작하지 않음
        preventOnFilter: false,
        onEnd: () => reorderData()
    });

    function switchTab(tab) {
        currentTab = tab;
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.classList.toggle('active', btn.getAttribute('onclick').includes(tab));
        });
        render();
    }

    function render() {
        listElement.innerHTML = '';
        data[currentTab].forEach((item, index) => {
            const div = document.createElement('div');
            div.className = 'rank-item';
            div.setAttribute('data-id', index);
            div.innerHTML = `
                <div class="item-top">
                    <div class="rank-num">${index + 1}</div>
                    <div class="info">
                        <h3 onclick="if('${item.url}') window.open('${item.url}', '_blank')">${item.title}</h3>
                        <span class="memo">${item.memo}</span>
                    </div>
                </div>
                <div class="search-btns">
                    <button class="btn-search" onclick="searchYoutube('${item.title}', '뮤직비디오')">뮤비</button>
                    <button class="btn-search" onclick="searchYoutube('${item.title}', '무대')">무대</button>
                    <button class="btn-search" onclick="searchYoutube('${item.title}', '라이브')">라이브</button>
                    <button class="btn-search" onclick="searchYoutube('${item.title}', '퍼포먼스')">퍼포먼스</button>
                    <button class="btn-search" onclick="searchYoutube('${item.title}', '리믹스')">리믹스</button>
                    <button class="btn-search" onclick="searchYoutube('${item.title}', '챌린지')">챌린지</button>
                </div>
                <div class="action-btns">
                    <button class="btn-action btn-lyric" onclick="showLyrics(${index})">가사</button>
                    <button class="btn-action btn-edit" onclick="editItem(${index})">수정</button>
                    <button class="btn-action btn-delete" onclick="deleteItem(${index})">삭제</button>
                </div>
            `;
            listElement.appendChild(div);
        });
    }

    function searchYoutube(title, keyword) {
        const query = encodeURIComponent(title + " " + keyword);
        window.open(`https://www.youtube.com/results?search_query=${query}`, '_blank');
    }

    function showLyrics(index) {
        const item = data[currentTab][index];
        document.getElementById('lyricTitle').innerText = item.title;
        document.getElementById('lyricDisplay').innerText = item.lyric || "등록된 가사가 없습니다.";
        document.getElementById('lyricModal').style.display = 'flex';
    }

    function closeLyricModal() { document.getElementById('lyricModal').style.display = 'none'; }

    function openModal() {
        editIndex = null;
        document.getElementById('modalTitle').innerText = "곡 추가";
        document.getElementById('titleInput').value = '';
        document.getElementById('urlInput').value = '';
        document.getElementById('memoInput').value = '';
        document.getElementById('lyricInput').value = '';
        document.getElementById('modal').style.display = 'flex';
    }

    function closeModal() { document.getElementById('modal').style.display = 'none'; }

    function saveItem() {
        const newItem = {
            title: document.getElementById('titleInput').value || '제목 없음',
            url: document.getElementById('urlInput').value,
            memo: document.getElementById('memoInput').value,
            lyric: document.getElementById('lyricInput').value
        };
        if(editIndex !== null) data[currentTab][editIndex] = newItem;
        else data[currentTab].push(newItem);
        
        saveToLocal();
        closeModal();
        render();
    }

    function editItem(index) {
        editIndex = index;
        const item = data[currentTab][index];
        document.getElementById('modalTitle').innerText = "곡 수정";
        document.getElementById('titleInput').value = item.title;
        document.getElementById('urlInput').value = item.url;
        document.getElementById('memoInput').value = item.memo;
        document.getElementById('lyricInput').value = item.lyric || '';
        document.getElementById('modal').style.display = 'flex';
    }

    function deleteItem(index) {
        if(confirm('정말 삭제하시겠습니까?')) {
            data[currentTab].splice(index, 1);
            saveToLocal();
            render();
        }
    }

    function reorderData() {
        const newOrder = [];
        const items = listElement.querySelectorAll('.rank-item');
        items.forEach(el => {
            const title = el.querySelector('h3').innerText;
            const memo = el.querySelector('.memo').innerText;
            // 제목과 메모가 일치하는 원본 데이터를 찾아 새 순서대로 배열 생성
            const item = data[currentTab].find(d => d.title === title && d.memo === memo);
            if(item) newOrder.push(item);
        });
        data[currentTab] = newOrder;
        saveToLocal();
        render(); // 순위 번호 재정렬을 위해 다시 그림
    }

    function saveToLocal() { localStorage.setItem('mRankDataV3', JSON.stringify(data)); }

    render();
</script>

</body>
</html>
