<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MRank Slim v1.1</title>
    <link rel="icon" type="image/png" href="icon.png">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
    <style>
        :root {
            --bg: #121212; --card: #1e1e1e; --text: #ffffff; --primary: #ff4757; --accent: #00ff88;
        }
        body.light-mode {
            --bg: #f1f2f6; --card: #ffffff; --text: #2f3542; --primary: #ff4757; --accent: #2ed573;
        }
        
        body { font-family: sans-serif; background: var(--bg); margin: 0; color: var(--text); padding-bottom: 80px; transition: 0.3s; }
        .tabs { display: flex; position: sticky; top: 0; background: #000; z-index: 10; border-bottom: 1px solid #333; }
        .tab-btn { flex: 1; padding: 15px 0; border: none; background: none; color: #888; font-weight: bold; cursor: pointer; }
        .tab-btn.active { color: var(--primary); border-bottom: 3px solid var(--primary); }

        .container { padding: 0; display: none; }
        .container.active { display: block; }

        /* 슬림 카드 디자인 */
        .rank-item { 
            position: relative; height: 120px; margin-bottom: 2px; 
            background-size: cover; background-position: center; overflow: hidden;
        }
        .rank-item::before { 
            content: ""; position: absolute; top: 0; left: 0; right: 0; bottom: 0; 
            background: rgba(0,0,0,0.4); z-index: 1; 
        }
        .item-content { 
            position: relative; z-index: 2; height: 100%; display: flex; align-items: center; padding: 0 15px; 
        }
        .rank-num { font-size: 1.5rem; font-weight: 900; width: 40px; color: #fff; cursor: move; }
        .info { flex: 1; min-width: 0; }
        .info h3 { margin: 0; color: #fff; font-size: 1.1rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .memo { color: var(--accent); font-size: 0.8rem; font-weight: bold; }

        /* 버튼 그룹 */
        .btn-group { display: flex; gap: 10px; }
        .icon-btn { 
            background: rgba(255,255,255,0.2); border: none; border-radius: 50%; 
            width: 38px; height: 38px; color: #fff; font-size: 1.2rem; cursor: pointer; 
            display: flex; align-items: center; justify-content: center;
        }

        /* 팝업 오버레이 */
        .overlay { 
            display: none; position: fixed; bottom: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.8); z-index: 100; align-items: flex-end; 
        }
        .menu-sheet { 
            background: var(--card); width: 100%; border-radius: 20px 20px 0 0; 
            padding: 20px; box-sizing: border-box; 
        }
        .menu-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .sheet-btn { 
            padding: 15px; border-radius: 10px; border: 1px solid #444; 
            background: #333; color: #fff; font-weight: bold; cursor: pointer; 
        }
        .sheet-btn.red { background: var(--primary); }

        /* 설정 탭 */
        .settings { padding: 20px; }
        .setting-item { background: var(--card); padding: 15px; border-radius: 10px; margin-bottom: 15px; }
        .keyword-list { list-style: none; padding: 0; margin: 10px 0; }
        .keyword-item { display: flex; justify-content: space-between; padding: 5px 0; border-bottom: 1px solid #333; }
        
        .add-btn { position: fixed; bottom: 20px; right: 20px; width: 55px; height: 55px; background: var(--primary); color: #fff; border-radius: 50%; border: none; font-size: 30px; z-index: 50; }
        
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 200; align-items: center; justify-content: center; }
        .modal-content { background: var(--card); padding: 20px; border-radius: 12px; width: 90%; }
        input, textarea { width: 100%; padding: 12px; margin: 8px 0; background: #000; color: #fff; border: 1px solid #333; border-radius: 6px; box-sizing: border-box; }
    </style>
</head>
<body class="dark-mode">

<div class="tabs">
    <button class="tab-btn active" onclick="switchTab('listen')">듣는용</button>
    <button class="tab-btn" onclick="switchTab('sing')">부르기</button>
    <button class="tab-btn" onclick="switchTab('etc')">기타</button>
    <button class="tab-btn" onclick="switchTab('shorts')">쇼츠</button>
    <button class="tab-btn" onclick="switchTab('settings')">설정</button>
</div>

<div id="list-container" class="container active"><div id="rankList"></div></div>

<div id="settings-container" class="container">
    <div class="settings">
        <div class="setting-item">
            <h3>Theme</h3>
            <button class="sheet-btn" onclick="toggleTheme()">Dark / Light 모드 전환</button>
        </div>
        <div class="setting-item">
            <h3>Search Keywords</h3>
            <div style="display:flex; gap:5px;">
                <input type="text" id="newKeyword" placeholder="새 키워드" style="margin:0;">
                <button class="sheet-btn" style="padding:10px;" onclick="addKeyword()">추가</button>
            </div>
            <ul id="keywordList" class="keyword-list"></ul>
        </div>
        <div class="setting-item">
            <h3>Data Management</h3>
            <button class="sheet-btn" onclick="exportData()">내보내기 (JSON)</button>
            <button class="sheet-btn" onclick="document.getElementById('importFile').click()">가져오기 (JSON)</button>
            <input type="file" id="importFile" style="display:none" onchange="importData(event)">
        </div>
        <img src="main.jpg" style="width:100%; border-radius:10px; margin-top:10px;">
        <p style="text-align:center; opacity:0.5;">VERSION 1.1</p>
    </div>
</div>

<button id="floating-add" class="add-btn" onclick="openModal()">+</button>

<div id="searchOverlay" class="overlay" onclick="closePopups()">
    <div class="menu-sheet" onclick="event.stopPropagation()">
        <h3 id="searchTitle">검색</h3>
        <div id="searchGrid" class="menu-grid"></div>
    </div>
</div>

<div id="menuOverlay" class="overlay" onclick="closePopups()">
    <div class="menu-sheet" onclick="event.stopPropagation()">
        <h3 id="menuTitle">메뉴</h3>
        <div class="menu-grid">
            <button class="sheet-btn" onclick="showLyricsFromMenu()">가사보기</button>
            <button class="sheet-btn" onclick="editFromMenu()">정보수정</button>
            <button class="sheet-btn red" onclick="deleteFromMenu()">항목삭제</button>
        </div>
    </div>
</div>

<div id="modal" class="modal">
    <div class="modal-content">
        <h2 id="modalTitle">노래 추가/수정</h2>
        <input type="text" id="titleInput" placeholder="노래 제목">
        <input type="text" id="urlInput" placeholder="유튜브 주소">
        <input type="text" id="memoInput" placeholder="메모 (노래방 번호)">
        <textarea id="lyricInput" rows="5" placeholder="가사 입력"></textarea>
        <div style="display:flex; gap:10px;">
            <button class="sheet-btn" style="flex:1; background:var(--primary);" onclick="saveItem()">저장</button>
            <button class="sheet-btn" style="flex:1;" onclick="closeModal()">취소</button>
        </div>
    </div>
</div>

<script>
    let currentTab = 'listen';
    let data = JSON.parse(localStorage.getItem('mRank_v1.1')) || { listen: [], sing: [], etc: [], shorts: [] };
    let keywords = JSON.parse(localStorage.getItem('mRank_Keywords')) || ['뮤비', '무대', '라이브', '퍼포', '리믹스', '챌린지', '직캠', '비하인드'];
    let selectedIndex = null;
    let isLightMode = localStorage.getItem('theme') === 'light';

    if(isLightMode) document.body.classList.add('light-mode');

    const listElement = document.getElementById('rankList');
    new Sortable(listElement, { animation: 150, handle: '.rank-num', onEnd: () => reorderData() });

    function switchTab(tab) {
        currentTab = tab;
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.getAttribute('onclick').includes(tab)));
        document.getElementById('list-container').classList.toggle('active', tab !== 'settings');
        document.getElementById('settings-container').classList.toggle('active', tab === 'settings');
        document.getElementById('floating-add').style.display = tab === 'settings' ? 'none' : 'flex';
        if(tab === 'settings') renderKeywords(); else render();
    }

    function render() {
        listElement.innerHTML = '';
        data[currentTab].forEach((item, index) => {
            const div = document.createElement('div');
            div.className = 'rank-item';
            div.style.backgroundImage = `url('${encodeURIComponent(item.title)}.jpg')`;
            div.innerHTML = `
                <div class="item-content">
                    <div class="rank-num">${index + 1}</div>
                    <div class="info">
                        <h3 onclick="window.open('${item.url || '#'}')">${item.title}</h3>
                        <div class="memo">${item.memo}</div>
                    </div>
                    <div class="btn-group">
                        <button class="icon-btn" onclick="openSearch(${index})">🔍</button>
                        <button class="icon-btn" onclick="openMenu(${index})">⋮</button>
                    </div>
                </div>`;
            listElement.appendChild(div);
        });
    }

    // 검색 팝업
    function openSearch(index) {
        selectedIndex = index;
        const item = data[currentTab][index];
        document.getElementById('searchTitle').innerText = `${item.title} 검색`;
        const grid = document.getElementById('searchGrid');
        grid.innerHTML = keywords.map(k => `<button class="sheet-btn" onclick="doSearch('${item.title}', '${k}')">${k}</button>`).join('');
        document.getElementById('searchOverlay').style.display = 'flex';
    }

    function doSearch(title, k) {
        window.open(`https://m.youtube.com/results?search_query=${encodeURIComponent(title + ' ' + (k === '비하인드' ? '녹음 비하인드' : k))}`, '_blank');
    }

    // 메뉴 팝업
    function openMenu(index) {
        selectedIndex = index;
        document.getElementById('menuTitle').innerText = data[currentTab][index].title;
        document.getElementById('menuOverlay').style.display = 'flex';
    }

    function closePopups() { 
        document.getElementById('searchOverlay').style.display = 'none'; 
        document.getElementById('menuOverlay').style.display = 'none'; 
    }

    // 설정: 테마 및 키워드 관리
    function toggleTheme() {
        isLightMode = !isLightMode;
        document.body.classList.toggle('light-mode', isLightMode);
        localStorage.setItem('theme', isLightMode ? 'light' : 'dark');
    }

    function renderKeywords() {
        const list = document.getElementById('keywordList');
        list.innerHTML = keywords.map((k, i) => `
            <li class="keyword-item">${k} <span style="color:red; cursor:pointer;" onclick="deleteKeyword(${i})">삭제</span></li>
        `).join('');
    }

    function addKeyword() {
        const val = document.getElementById('newKeyword').value;
        if(val) { keywords.push(val); saveKeywords(); renderKeywords(); document.getElementById('newKeyword').value=''; }
    }

    function deleteKeyword(i) { keywords.splice(i, 1); saveKeywords(); renderKeywords(); }
    function saveKeywords() { localStorage.setItem('mRank_Keywords', JSON.stringify(keywords)); }

    // 기본 CRUD 기능
    function openModal() { selectedIndex = null; document.getElementById('modal').style.display='flex'; }
    function closeModal() { document.getElementById('modal').style.display='none'; }
    
    function saveItem() {
        const newItem = {
            title: document.getElementById('titleInput').value || '제목 없음',
            url: document.getElementById('urlInput').value,
            memo: document.getElementById('memoInput').value,
            lyric: document.getElementById('lyricInput').value
        };
        if(selectedIndex !== null) data[currentTab][selectedIndex] = newItem;
        else data[currentTab].push(newItem);
        saveData(); closeModal(); render();
    }

    function editFromMenu() {
        const item = data[currentTab][selectedIndex];
        document.getElementById('titleInput').value = item.title;
        document.getElementById('urlInput').value = item.url;
        document.getElementById('memoInput').value = item.memo;
        document.getElementById('lyricInput').value = item.lyric;
        closePopups(); document.getElementById('modal').style.display='flex';
    }

    function deleteFromMenu() {
        if(confirm('삭제하시겠습니까?')) {
            data[currentTab].splice(selectedIndex, 1);
            saveData(); closePopups(); render();
        }
    }

    function showLyricsFromMenu() {
        alert(data[currentTab][selectedIndex].lyric || "가사가 없습니다.");
        closePopups();
    }

    function reorderData() {
        const newOrder = [];
        listElement.querySelectorAll('.rank-item').forEach(el => {
            const title = el.querySelector('h3').innerText;
            const item = data[currentTab].find(d => d.title === title);
            if(item) newOrder.push(item);
        });
        data[currentTab] = newOrder; saveData(); render();
    }

    function saveData() { localStorage.setItem('mRank_v1.1', JSON.stringify(data)); }
    function exportData() {
        const blob = new Blob([JSON.stringify(data)], {type: 'application/json'});
        const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'mrank_backup.json'; a.click();
    }
    function importData(e) {
        const reader = new FileReader();
        reader.onload = (event) => { data = JSON.parse(event.target.result); saveData(); location.reload(); };
        reader.readAsText(e.target.files[0]);
    }

    render();
</script>
</body>
</html>
