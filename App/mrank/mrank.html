<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MRank Black v1.0</title>
    <link rel="icon" type="image/png" href="icon.png">
    <link rel="apple-touch-icon" href="icon.png">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
    <style>
        :root {
            --primary: #ff4757;
            --bg: #121212;
            --card-bg: #1e1e1e;
            --text: #ffffff;
            --sub-text: #00ff88;
            --edit: #ffc107;
            --delete: #ff4d4d;
            --btn-glass: rgba(255, 255, 255, 0.12);
        }
        
        body { font-family: sans-serif; background: var(--bg); margin: 0; padding-bottom: 100px; color: var(--text); -webkit-tap-highlight-color: transparent; }

        /* Tabs Style */
        .tabs { display: flex; position: sticky; top: 0; background: #000; border-bottom: 1px solid #333; z-index: 10; }
        .tab-btn { flex: 1; padding: 15px 0; border: none; background: none; cursor: pointer; font-weight: bold; color: #888; font-size: 0.85rem; }
        .tab-btn.active { color: var(--primary); border-bottom: 3px solid var(--primary); }

        /* List Container */
        .container { padding: 0; display: block; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        .rank-item { position: relative; background-color: var(--card-bg); background-size: cover; background-position: center; margin-bottom: 2px; overflow: hidden; z-index: 1; height: 210px; }
        .rank-item::before { content: ""; position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: linear-gradient(to bottom, rgba(0,0,0,0.2), rgba(0,0,0,0.7)); z-index: -1; }

        .item-content { padding: 12px; height: 100%; display: flex; flex-direction: column; box-sizing: border-box; }
        .item-top { display: flex; align-items: flex-start; margin-bottom: 8px; }
        .rank-num { font-size: 1.5rem; font-weight: 900; width: 35px; color: #fff; text-shadow: 2px 2px 4px rgba(0,0,0,0.7); cursor: move; }
        .info { flex: 1; overflow: hidden; }
        .info h3 { margin: 0; font-size: 1.3rem; color: #fff; text-shadow: 2px 2px 4px rgba(0,0,0,0.9); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .memo { font-size: 0.85rem; color: var(--sub-text); font-weight: bold; margin-top: 2px; }

        .search-btns { display: grid; grid-template-columns: repeat(4, 1fr); gap: 4px; margin-top: auto; }
        .btn-search { padding: 7px 0; border-radius: 4px; border: 1px solid rgba(255,255,255,0.1); background: var(--btn-glass); font-size: 10px; font-weight: bold; color: #fff; }

        .action-btns { display: flex; justify-content: flex-end; gap: 6px; margin-top: 8px; padding-top: 8px; border-top: 1px solid rgba(255,255,255,0.1); }
        .btn-action { padding: 5px 12px; border-radius: 4px; border: none; font-size: 11px; font-weight: bold; color: white; }
        .btn-lyric { background: rgba(87, 96, 111, 0.7); }
        .btn-edit { background: var(--edit); color: #000; }
        .btn-delete { background: var(--delete); }

        /* Settings Tab Style */
        .settings-page { padding: 30px 20px; text-align: center; }
        .setting-card { background: #1e1e1e; padding: 20px; border-radius: 12px; margin-bottom: 20px; border: 1px solid #333; }
        .btn-setting { width: 100%; padding: 15px; margin: 10px 0; border-radius: 8px; border: none; font-weight: bold; font-size: 1rem; cursor: pointer; }
        .btn-export { background: #2f3542; color: #fff; }
        .btn-import { background: #57606f; color: #fff; }
        .main-img { width: 100%; max-width: 300px; border-radius: 10px; margin: 20px auto; display: block; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .version-text { color: #555; font-size: 0.9rem; margin-top: 10px; font-weight: bold; }

        .add-btn { position: fixed; bottom: 20px; right: 20px; width: 55px; height: 55px; background: var(--primary); color: #fff; border-radius: 50%; border: none; font-size: 30px; box-shadow: 0 4px 15px rgba(255, 71, 87, 0.4); z-index: 20; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); align-items: center; justify-content: center; z-index: 100; }
        .modal-content { background: #222; padding: 20px; border-radius: 12px; width: 90%; color: #fff; border: 1px solid #444; }
        .modal-content input, .modal-content textarea { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #444; border-radius: 6px; box-sizing: border-box; background: #111; color: #fff; }
    </style>
</head>
<body>

<div class="tabs">
    <button class="tab-btn active" onclick="switchTab('listen')">듣는용</button>
    <button class="tab-btn" onclick="switchTab('sing')">부르기</button>
    <button class="tab-btn" onclick="switchTab('etc')">기타</button>
    <button class="tab-btn" onclick="switchTab('shorts')">쇼츠</button>
    <button class="tab-btn" onclick="switchTab('settings')">설정</button>
</div>

<div id="main-container" class="container tab-content active">
    <div id="rankList"></div>
</div>

<div id="settings-container" class="container tab-content">
    <div class="settings-page">
        <div class="setting-card">
            <h3 style="margin-top:0">Data Management</h3>
            <button class="btn-setting btn-export" onclick="exportData()">Data Backup (JSON)</button>
            <button class="btn-setting btn-import" onclick="document.getElementById('importFile').click()">Data Restore (JSON)</button>
            <input type="file" id="importFile" style="display:none" onchange="importData(event)">
        </div>
        
        <img src="main.jpg" alt="Main Image" class="main-img" onerror="this.style.display='none'">
        <div class="version-text">VERSION 1.0</div>
    </div>
</div>

<button id="floating-add" class="add-btn" onclick="openModal()">+</button>

<div id="modal" class="modal">
    <div class="modal-content">
        <h2 style="margin-top:0;">노래 추가/수정</h2>
        <input type="text" id="titleInput" placeholder="노래 제목">
        <input type="text" id="urlInput" placeholder="유튜브 주소">
        <input type="text" id="memoInput" placeholder="메모 (노래방 번호)">
        <textarea id="lyricInput" rows="5" placeholder="가사 입력"></textarea>
        <div style="display:flex; gap:10px;">
            <button onclick="saveItem()" style="flex:1; padding:12px; background:var(--primary); color:#fff; border:none; border-radius:6px; font-weight:bold;">저장</button>
            <button onclick="closeModal()" style="flex:1; padding:12px; background:#444; color:#fff; border:none; border-radius:6px;">취소</button>
        </div>
    </div>
</div>

<div id="lyricModal" class="modal">
    <div class="modal-content" style="max-height: 80vh; overflow-y: auto;">
        <h2 id="lyricTitle" style="margin-top:0;">가사</h2>
        <div id="lyricDisplay" style="white-space: pre-wrap; line-height: 1.6;"></div>
        <button onclick="closeLyricModal()" style="width:100%; margin-top:20px; padding:12px; background:#444; color:#fff; border:none; border-radius:6px;">닫기</button>
    </div>
</div>

<script>
    let currentTab = 'listen';
    const STORAGE_KEY = 'mRank_Black_Data';
    let data = JSON.parse(localStorage.getItem(STORAGE_KEY)) || { listen: [], sing: [], etc: [], shorts: [] };
    let editIndex = null;

    const listElement = document.getElementById('rankList');

    new Sortable(listElement, {
        animation: 150, handle: '.rank-num', filter: '.btn-search, .btn-action, h3',
        onEnd: () => reorderData()
    });

    function switchTab(tab) {
        currentTab = tab;
        
        // 탭 버튼 활성화 상태 변경
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.classList.toggle('active', btn.getAttribute('onclick').includes(tab));
        });

        // 컨텐츠 전환
        if (tab === 'settings') {
            document.getElementById('main-container').classList.remove('active');
            document.getElementById('settings-container').classList.add('active');
            document.getElementById('floating-add').style.display = 'none';
        } else {
            document.getElementById('main-container').classList.add('active');
            document.getElementById('settings-container').classList.remove('active');
            document.getElementById('floating-add').style.display = 'flex';
            render();
        }
    }

    function render() {
        listElement.innerHTML = '';
        if(!data[currentTab]) data[currentTab] = [];
        
        data[currentTab].forEach((item, index) => {
            const div = document.createElement('div');
            div.className = 'rank-item';
            div.style.backgroundImage = `url('${encodeURIComponent(item.title)}.jpg')`;
            div.innerHTML = `
                <div class="item-content">
                    <div class="item-top"><div class="rank-num">${index + 1}</div>
                        <div class="info"><h3 onclick="openSongLink('${item.url}')">${item.title}</h3><span class="memo">${item.memo}</span></div>
                    </div>
                    <div class="search-btns">
                        ${['뮤비','무대','라이브','퍼포','리믹스','챌린지','직캠','비하인드'].map(k => 
                            `<button class="btn-search" onclick="searchYoutube('${item.title}', '${k === '비하인드' ? '녹음 비하인드' : k}')">${k}</button>`).join('')}
                    </div>
                    <div class="action-btns">
                        <button class="btn-action btn-lyric" onclick="showLyrics(${index})">가사</button>
                        <button class="btn-action btn-edit" onclick="editItem(${index})">수정</button>
                        <button class="btn-action btn-delete" onclick="deleteItem(${index})">삭제</button>
                    </div>
                </div>`;
            listElement.appendChild(div);
        });
    }

    // 데이터 백업
    function exportData() {
        const dataStr = JSON.stringify(data, null, 2);
        const dataUri = 'data:application/json;charset=utf-8,'+ encodeURIComponent(dataStr);
        const link = document.createElement('a');
        link.setAttribute('href', dataUri);
        link.setAttribute('download', 'mrank_backup.json');
        link.click();
    }

    // 데이터 복원
    function importData(event) {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(e) {
            try {
                const importedData = JSON.parse(e.target.result);
                if (confirm('기존 데이터가 모두 교체됩니다. 진행할까요?')) {
                    data = importedData;
                    saveToLocal();
                    alert('복원 완료!');
                    location.reload();
                }
            } catch (err) { alert('파일이 올바르지 않습니다.'); }
        };
        reader.readAsText(file);
    }

    function searchYoutube(title, keyword) { window.open(`https://m.youtube.com/results?search_query=${encodeURIComponent(title + " " + keyword)}`, '_blank'); }
    function openSongLink(url) { if(url) window.open(url.replace('www.', 'm.'), '_blank'); }
    
    function showLyrics(index) {
        const item = data[currentTab][index];
        document.getElementById('lyricTitle').innerText = item.title;
        document.getElementById('lyricDisplay').innerText = item.lyric || "가사가 없습니다.";
        document.getElementById('lyricModal').style.display = 'flex';
    }
    
    function closeLyricModal() { document.getElementById('lyricModal').style.display = 'none'; }
    function openModal() { editIndex = null; document.getElementById('titleInput').value=''; document.getElementById('urlInput').value=''; document.getElementById('memoInput').value=''; document.getElementById('lyricInput').value=''; document.getElementById('modal').style.display = 'flex'; }
    function closeModal() { document.getElementById('modal').style.display = 'none'; }

    function saveItem() {
        const newItem = { title: document.getElementById('titleInput').value || '제목 없음', url: document.getElementById('urlInput').value, memo: document.getElementById('memoInput').value, lyric: document.getElementById('lyricInput').value };
        if(editIndex !== null) data[currentTab][editIndex] = newItem;
        else data[currentTab].push(newItem);
        saveToLocal(); closeModal(); render();
    }

    function editItem(index) {
        editIndex = index; const item = data[currentTab][index];
        document.getElementById('titleInput').value = item.title; document.getElementById('urlInput').value = item.url; document.getElementById('memoInput').value = item.memo; document.getElementById('lyricInput').value = item.lyric;
        document.getElementById('modal').style.display = 'flex';
    }

    function deleteItem(index) { if(confirm('삭제할까요?')) { data[currentTab].splice(index, 1); saveToLocal(); render(); } }

    function reorderData() {
        const newOrder = [];
        listElement.querySelectorAll('.rank-item').forEach(el => {
            const title = el.querySelector('h3').innerText;
            const item = data[currentTab].find(d => d.title === title);
            if(item) newOrder.push(item);
        });
        data[currentTab] = newOrder; saveToLocal(); render();
    }

    function saveToLocal() { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); }

    render();
</script>
</body>
</html>
