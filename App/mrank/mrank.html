<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MRank V2 - My Music Dashboard</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
    <style>
        :root {
            --primary: #ff4757;
            --bg: #f1f2f6;
            --card: #ffffff;
            --edit: #ffc107; /* 노란 계열 */
            --delete: #ff4d4d; /* 적색 계열 */
        }
        body { font-family: sans-serif; background: var(--bg); margin: 0; padding-bottom: 80px; }
        
        /* Tab Styles */
        .tabs { display: flex; position: sticky; top: 0; background: #fff; border-bottom: 1px solid #ddd; z-index: 10; }
        .tab-btn { flex: 1; padding: 15px; border: none; background: none; cursor: pointer; font-weight: bold; color: #777; }
        .tab-btn.active { color: var(--primary); border-bottom: 3px solid var(--primary); }

        /* List Styles */
        .container { padding: 15px; }
        .rank-item { 
            background: var(--card); border-radius: 8px; padding: 15px; margin-bottom: 12px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1); cursor: grab;
        }
        .item-top { display: flex; align-items: center; margin-bottom: 10px; }
        .rank-num { font-size: 1.2rem; font-weight: 800; width: 35px; color: var(--primary); }
        .info { flex: 1; overflow: hidden; }
        .info h3 { margin: 0; font-size: 1.1rem; color: #333; cursor: pointer; text-decoration: none; }
        .info h3:hover { text-decoration: underline; }
        .memo { font-size: 0.85rem; color: #2ed573; font-weight: bold; margin-top: 4px; display: block; }

        /* Button Groups */
        .search-btns { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 10px; }
        .btn-search { padding: 4px 8px; border-radius: 4px; border: 1px solid #ddd; background: #f8f9fa; font-size: 11px; cursor: pointer; }
        
        .action-btns { display: flex; justify-content: flex-end; gap: 8px; border-top: 1px solid #eee; pt: 8px; padding-top: 8px; }
        .btn-action { padding: 6px 12px; border-radius: 4px; border: none; font-size: 12px; font-weight: bold; cursor: pointer; color: white; }
        .btn-lyric { background: #57606f; }
        .btn-edit { background: var(--edit); color: #000; }
        .btn-delete { background: var(--delete); }

        /* Floating Add Button */
        .add-btn {
            position: fixed; bottom: 20px; right: 20px; width: 60px; height: 60px;
            background: var(--primary); color: #fff; border-radius: 50%; border: none;
            font-size: 30px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); cursor: pointer; z-index: 20;
        }

        /* Modal Styles */
        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6); align-items: center; justify-content: center; z-index: 100;
        }
        .modal-content { background: #fff; padding: 20px; border-radius: 12px; width: 85%; max-width: 450px; max-height: 80vh; overflow-y: auto; }
        .modal-content input, .modal-content textarea { 
            width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; 
        }
        .lyric-text { white-space: pre-wrap; line-height: 1.6; background: #f9f9f9; padding: 15px; border-radius: 8px; font-size: 0.9rem; }
    </style>
</head>
<body>

<div class="tabs">
    <button class="tab-btn active" onclick="switchTab('listen')">듣는용</button>
    <button class="tab-btn" onclick="switchTab('sing')">부르기</button>
    <button class="tab-btn" onclick="switchTab('etc')">기타</button>
    <button class="tab-btn" onclick="switchTab('shorts')">쇼츠</button>
</div>

<div class="container" id="rankList"></div>

<button class="add-btn" onclick="openModal()">+</button>

<div id="modal" class="modal">
    <div class="modal-content">
        <h2 id="modalTitle">곡 정보 입력</h2>
        <input type="text" id="titleInput" placeholder="노래 제목">
        <input type="text" id="urlInput" placeholder="유튜브 링크 주소">
        <input type="text" id="memoInput" placeholder="메모 (노래방 번호 등)">
        <textarea id="lyricInput" rows="5" placeholder="가사를 입력하세요"></textarea>
        <div style="display:flex; gap:10px;">
            <button onclick="saveItem()" style="flex:1; padding:12px; background:var(--primary); color:#fff; border:none; border-radius:5px; font-weight:bold;">저장</button>
            <button onclick="closeModal()" style="flex:1; padding:12px; background:#ddd; border:none; border-radius:5px;">취소</button>
        </div>
    </div>
</div>

<div id="lyricModal" class="modal">
    <div class="modal-content">
        <h2 id="lyricTitle">가사</h2>
        <div id="lyricDisplay" class="lyric-text"></div>
        <button onclick="closeLyricModal()" style="width:100%; margin-top:15px; padding:12px; background:#57606f; color:#fff; border:none; border-radius:5px;">닫기</button>
    </div>
</div>

<script>
    let currentTab = 'listen';
    let data = JSON.parse(localStorage.getItem('mRankDataV2')) || { listen: [], sing: [], etc: [], shorts: [] };
    let editIndex = null;

    const listElement = document.getElementById('rankList');

    new Sortable(listElement, {
        animation: 150,
        onEnd: () => reorderData()
    });

    function switchTab(tab) {
        currentTab = tab;
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.classList.toggle('active', btn.getAttribute('onclick').includes(tab));
        });
        render();
    }

    function render() {
        listElement.innerHTML = '';
        data[currentTab].forEach((item, index) => {
            const div = document.createElement('div');
            div.className = 'rank-item';
            div.innerHTML = `
                <div class="item-top">
                    <div class="rank-num">${index + 1}</div>
                    <div class="info">
                        <h3 onclick="window.open('${item.url}', '_blank')">${item.title}</h3>
                        <span class="memo">${item.memo}</span>
                    </div>
                </div>
                <div class="search-btns">
                    <button class="btn-search" onclick="searchYoutube('${item.title}', '뮤직비디오')">뮤비</button>
                    <button class="btn-search" onclick="searchYoutube('${item.title}', '무대')">무대</button>
                    <button class="btn-search" onclick="searchYoutube('${item.title}', '라이브')">라이브</button>
                    <button class="btn-search" onclick="searchYoutube('${item.title}', '퍼포먼스')">퍼포먼스</button>
                </div>
                <div class="action-btns">
                    <button class="btn-action btn-lyric" onclick="showLyrics(${index})">가사</button>
                    <button class="btn-action btn-edit" onclick="editItem(${index})">수정</button>
                    <button class="btn-action btn-delete" onclick="deleteItem(${index})">삭제</button>
                </div>
            `;
            listElement.appendChild(div);
        });
    }

    function searchYoutube(title, keyword) {
        const query = encodeURIComponent(title + " " + keyword);
        window.open(`https://www.youtube.com/results?search_query=${query}`, '_blank');
    }

    function showLyrics(index) {
        const item = data[currentTab][index];
        document.getElementById('lyricTitle').innerText = item.title + " - 가사";
        document.getElementById('lyricDisplay').innerText = item.lyric || "등록된 가사가 없습니다.";
        document.getElementById('lyricModal').style.display = 'flex';
    }

    function closeLyricModal() { document.getElementById('lyricModal').style.display = 'none'; }

    function openModal() {
        editIndex = null;
        document.getElementById('modalTitle').innerText = "곡 추가";
        document.getElementById('titleInput').value = '';
        document.getElementById('urlInput').value = '';
        document.getElementById('memoInput').value = '';
        document.getElementById('lyricInput').value = '';
        document.getElementById('modal').style.display = 'flex';
    }

    function closeModal() { document.getElementById('modal').style.display = 'none'; }

    function saveItem() {
        const newItem = {
            title: document.getElementById('titleInput').value || '제목 없음',
            url: document.getElementById('urlInput').value,
            memo: document.getElementById('memoInput').value,
            lyric: document.getElementById('lyricInput').value
        };
        if(editIndex !== null) data[currentTab][editIndex] = newItem;
        else data[currentTab].push(newItem);
        
        saveToLocal();
        closeModal();
        render();
    }

    function editItem(index) {
        editIndex = index;
        const item = data[currentTab][index];
        document.getElementById('modalTitle').innerText = "곡 수정";
        document.getElementById('titleInput').value = item.title;
        document.getElementById('urlInput').value = item.url;
        document.getElementById('memoInput').value = item.memo;
        document.getElementById('lyricInput').value = item.lyric || '';
        document.getElementById('modal').style.display = 'flex';
    }

    function deleteItem(index) {
        if(confirm('삭제하시겠습니까?')) {
            data[currentTab].splice(index, 1);
            saveToLocal();
            render();
        }
    }

    function reorderData() {
        const items = [];
        // 현재 렌더링된 순서대로 데이터 재배열 로직 (V2에 맞게 보완)
        const currentListItems = document.querySelectorAll('.rank-item');
        currentListItems.forEach((el, idx) => {
            const title = el.querySelector('h3').innerText;
            // 실제 데이터 객체에서 타이틀이 일치하는 항목을 찾아 순서 재배치
            const foundItem = data[currentTab].find(d => d.title === title);
            if(foundItem) items.push(foundItem);
        });
        data[currentTab] = items;
        saveToLocal();
        render();
    }

    function saveToLocal() { localStorage.setItem('mRankDataV2', JSON.stringify(data)); }

    render();
</script>

</body>
</html>
