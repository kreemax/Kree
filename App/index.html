<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <link rel="manifest" href="manifest.json">
    <title>Security Access</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; font-family: -apple-system, sans-serif;
            background-color: #000; user-select: none; -webkit-tap-highlight-color: transparent;
        }

        /* 배경 이미지 설정 */
        .bg-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: url('bg.jpg') no-repeat center center;
            background-size: cover; z-index: -1;
        }

        .overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center;
            background: transparent; /* 윗부분 검은색 제거 */
        }

        /* 상단 앱 정보 (아이콘 + 이름) */
        .app-header {
            margin-top: 8vh; /* 상단 여백 */
            text-align: center;
        }

        .app-icon {
            width: 60px; height: 60px;
            border-radius: 14px; /* 앱 아이콘 특유의 굴곡 */
            object-fit: cover;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            margin-bottom: 10px;
        }

        .app-name {
            font-size: 1.1rem;
            font-weight: 600;
            color: white;
            text-shadow: 0 2px 8px rgba(0,0,0,0.5);
        }

        /* PIN 입력 구역 (위치 하향 조정) */
        .pin-section {
            margin-top: 15vh; /* 상단 앱 정보로부터 아래로 내림 */
            text-align: center;
            width: 100%;
        }

        .instruction {
            font-size: 1.1rem; margin-bottom: 25px;
            color: white; font-weight: 400;
            opacity: 0.9;
            text-shadow: 0 1px 5px rgba(0,0,0,0.3);
        }

        .pin-input-area {
            display: flex; gap: 10px; justify-content: center; align-items: center;
            width: 80%; max-width: 320px; height: 55px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.2); /* 반투명 흰색 */
            backdrop-filter: blur(15px);
            border-radius: 28px;
        }

        .dot {
            width: 12px; height: 12px;
            border-radius: 50%;
            background-color: rgba(255, 255, 255, 0.3);
            transition: all 0.1s ease;
        }
        .dot.filled { background-color: white; box-shadow: 0 0 5px white; }

        /* 하단 키보드 (검은색 배경 유지) */
        .keypad-container {
            margin-top: auto;
            width: 100%;
            background: rgba(0, 0, 0, 0.8); /* 키보드 부분만 진한 검은색 */
            backdrop-filter: blur(10px);
            padding: 20px 0;
            padding-bottom: calc(20px + env(safe-area-inset-bottom));
        }

        .keypad {
            display: grid; grid-template-columns: repeat(3, 1fr);
            gap: 10px; width: 92%; max-width: 380px; margin: 0 auto;
        }

        .key {
            height: 52px; background: rgba(255, 255, 255, 0.1);
            color: white; display: flex; flex-direction: column; 
            align-items: center; justify-content: center;
            border-radius: 8px; transition: background 0.05s;
        }
        .key:active { background: rgba(255, 255, 255, 0.3); }
        .key-num { font-size: 1.5rem; }
        .key-abc { font-size: 0.6rem; color: rgba(255,255,255,0.6); }

        .key.special { background: rgba(255, 255, 255, 0.05); }
        #key-done { color: #30d158; font-weight: bold; }

        #lock-message {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: #ff4d4d; background: rgba(0,0,0,0.9);
            padding: 25px; border-radius: 20px; display: none;
            text-align: center; width: 75%; z-index: 100;
        }
    </style>
</head>
<body>

    <div class="bg-container"></div>
    
    <div class="overlay">
        <div class="app-header">
            <img src="icon.jpg" class="app-icon" alt="App Icon">
            <div class="app-name">MY APP TITLE</div>
        </div>

        <div class="pin-section">
            <p class="instruction" id="status-text">PIN을 입력하세요</p>
            <div class="pin-input-area">
                <div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div>
                <div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div>
            </div>
        </div>

        <div class="keypad-container">
            <div class="keypad">
                <div class="key" onclick="press(1)"><span class="key-num">1</span></div>
                <div class="key" onclick="press(2)"><span class="key-num">2</span><span class="key-abc">ABC</span></div>
                <div class="key" onclick="press(3)"><span class="key-num">3</span><span class="key-abc">DEF</span></div>
                <div class="key" onclick="press(4)"><span class="key-num">4</span><span class="key-abc">GHI</span></div>
                <div class="key" onclick="press(5)"><span class="key-num">5</span><span class="key-abc">JKL</span></div>
                <div class="key" onclick="press(6)"><span class="key-num">6</span><span class="key-abc">MNO</span></div>
                <div class="key" onclick="press(7)"><span class="key-num">7</span><span class="key-abc">PQRS</span></div>
                <div class="key" onclick="press(8)"><span class="key-num">8</span><span class="key-abc">TUV</span></div>
                <div class="key" onclick="press(9)"><span class="key-num">9</span><span class="key-abc">WXYZ</span></div>
                <div class="key special" onclick="backspace()">⌫</div>
                <div class="key" onclick="press(0)"><span class="key-num">0</span></div>
                <div class="key special" onclick="checkPin()" id="key-done">완료</div>
            </div>
        </div>

        <div id="lock-message"></div>
    </div>

    <script>
        let currentInput = "";
        const dots = document.querySelectorAll('.dot');
        const lockMessage = document.getElementById('lock-message');
        const keypadContainer = document.querySelector('.keypad-container');
        
        const CORRECT_PIN = "59595959";
        const LOCK_TIME_HRS = 8;

        function isLocked() {
            const lockUntil = localStorage.getItem('pin_lock_until');
            if (lockUntil) {
                const now = new Date().getTime();
                if (now < lockUntil) return true;
                localStorage.removeItem('pin_lock_until');
            }
            return false;
        }

        function updateLockTimer() {
            const lockUntil = localStorage.getItem('pin_lock_until');
            const now = new Date().getTime();
            const remaining = lockUntil - now;

            if (remaining > 0) {
                const h = Math.floor(remaining / 3600000);
                const m = Math.floor((remaining % 3600000) / 60000);
                const s = Math.floor((remaining % 60000) / 1000);
                lockMessage.style.display = 'block';
                lockMessage.innerHTML = `보안 정책에 따라<br>접근이 제한됩니다.<br><br><strong>${h}시간 ${m}분 ${s}초</strong> 뒤 재시도`;
                keypadContainer.style.opacity = "0.3";
                keypadContainer.style.pointerEvents = "none";
                setTimeout(updateLockTimer, 1000);
            } else {
                location.reload();
            }
        }

        function press(num) {
            if (isLocked() || currentInput.length >= 8) return;
            currentInput += num;
            updateDots();
            if (currentInput.length === 8) setTimeout(checkPin, 150);
        }

        function backspace() {
            if (isLocked()) return;
            currentInput = currentInput.slice(0, -1);
            updateDots();
        }

        function updateDots() {
            dots.forEach((dot, i) => i < currentInput.length ? dot.classList.add('filled') : dot.classList.remove('filled'));
        }

        function checkPin() {
            if (isLocked() || currentInput.length === 0) return;
            if (currentInput === CORRECT_PIN) {
                window.location.href = 'main.html';
            } else {
                const lockTime = new Date().getTime() + (LOCK_TIME_HRS * 60 * 60 * 1000);
                localStorage.setItem('pin_lock_until', lockTime);
                updateLockTimer();
            }
            currentInput = "";
            updateDots();
        }

        window.onload = () => { if (isLocked()) updateLockTimer(); };
    </script>
</body>
</html>
