<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <link rel="manifest" href="manifest.json">
    <title>Security Access</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; font-family: sans-serif; background-color: #000;
        }

        .bg-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: url('bg.jpg') no-repeat center center;
            background-size: cover; z-index: -1;
        }

        .overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.3);
            display: flex; flex-direction: column; align-items: center;
        }

        .header-title {
            margin-top: 10vh; font-size: 2.2rem; font-weight: bold;
            color: white; text-shadow: 2px 2px 10px rgba(0,0,0,0.5);
        }

        .pin-section { margin-top: 8vh; text-align: center; width: 100%; }
        .instruction { font-size: 1.2rem; margin-bottom: 25px; color: white; }

        /* [수정] 입력창을 투명하게 만들어 화면 전체에 배치 */
        #pin-input {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            opacity: 0; /* 완전히 투명하게 */
            font-size: 16px; /* 줌 방지 */
            z-index: 10;
            border: none; outline: none;
        }

        .pin-dots { display: flex; gap: 12px; justify-content: center; z-index: 5; }
        .dot {
            width: 18px; height: 18px;
            border: 2px solid rgba(255, 255, 255, 0.8);
            border-radius: 50%; transition: all 0.1s;
        }
        .dot.filled { background-color: white; box-shadow: 0 0 10px white; }

        #lock-message {
            margin-top: 30px; color: #ff4d4d; background: rgba(0,0,0,0.7);
            padding: 12px 24px; border-radius: 25px; display: none;
            font-size: 0.95rem; font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="bg-container"></div>
    
    <div class="overlay">
        <div class="header-title">MY APP TITLE</div>

        <div class="pin-section">
            <p class="instruction" id="status-text">PIN을 입력하세요</p>
            
            <div class="pin-dots">
                <div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div>
                <div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div>
            </div>

            <input type="tel" 
                   id="pin-input" 
                   maxlength="8" 
                   inputmode="numeric" 
                   pattern="[0-9]*"
                   autocomplete="off"
                   autofocus>
            
            <p id="lock-message"></p>
        </div>
    </div>

    <script>
        const pinInput = document.getElementById('pin-input');
        const dots = document.querySelectorAll('.dot');
        const lockMessage = document.getElementById('lock-message');
        const statusText = document.getElementById('status-text');
        
        const CORRECT_PIN = "59595959";
        const LOCK_TIME_HRS = 8;

        function isLocked() {
            const lockUntil = localStorage.getItem('pin_lock_until');
            if (lockUntil) {
                const now = new Date().getTime();
                if (now < lockUntil) return true;
                localStorage.removeItem('pin_lock_until');
            }
            return false;
        }

        function updateLockTimer() {
            const lockUntil = localStorage.getItem('pin_lock_until');
            const now = new Date().getTime();
            const remaining = lockUntil - now;

            if (remaining > 0) {
                const h = Math.floor(remaining / 3600000);
                const m = Math.floor((remaining % 3600000) / 60000);
                const s = Math.floor((remaining % 60000) / 1000);
                lockMessage.style.display = 'inline-block';
                lockMessage.innerText = `오류! ${h}시간 ${m}분 ${s}초 뒤 재시도 가능`;
                statusText.innerText = "접근 제한됨";
                pinInput.blur();
                setTimeout(updateLockTimer, 1000);
            } else {
                location.reload();
            }
        }

        pinInput.addEventListener('input', (e) => {
            let val = e.target.value.replace(/[^0-9]/g, '');
            e.target.value = val;
            
            dots.forEach((dot, i) => i < val.length ? dot.classList.add('filled') : dot.classList.remove('filled'));

            if (val.length === 8) {
                if (val === CORRECT_PIN) {
                    window.location.href = 'main.html';
                } else {
                    const lockTime = new Date().getTime() + (LOCK_TIME_HRS * 60 * 60 * 1000);
                    localStorage.setItem('pin_lock_until', lockTime);
                    updateLockTimer();
                }
                pinInput.value = '';
            }
        });

        // 화면 어디를 눌러도 입력창에 포커스
        window.addEventListener('click', () => {
            if (!isLocked()) pinInput.focus();
        });

        window.onload = () => {
            if (isLocked()) updateLockTimer();
            else setTimeout(() => pinInput.focus(), 300);
        };
    </script>
</body>
</html>
