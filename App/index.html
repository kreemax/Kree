<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <link rel="manifest" href="manifest.json">
    <title>Security Access</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Pretendard', -apple-system, sans-serif;
            /* 페이지 전체를 클릭 가능하게 설정 */
            cursor: pointer;
        }

        .bg-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('bg.jpg') no-repeat center center;
            background-size: cover;
            z-index: -1;
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 상단 제목 위치 */
        .header-title {
            margin-top: 10vh; /* 위에서 10% 지점 */
            font-size: 2.2rem;
            font-weight: bold;
            color: white;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.5);
        }

        /* PIN 입력 구역 위치 상향 조정 */
        .pin-section {
            margin-top: 8vh; /* 제목 아래로 바짝 올림 */
            text-align: center;
            width: 100%;
        }

        .instruction {
            font-size: 1.2rem;
            margin-bottom: 25px;
            color: white;
            font-weight: 500;
        }

        #pin-input {
            position: absolute;
            opacity: 0;
            top: -100px;
            left: -100px;
        }

        .pin-dots {
            display: flex;
            gap: 12px;
            justify-content: center;
        }

        .dot {
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255, 255, 255, 0.8);
            border-radius: 50%;
            transition: all 0.1s;
        }

        .dot.filled {
            background-color: white;
            box-shadow: 0 0 10px white;
        }

        #lock-message {
            margin-top: 30px;
            color: #ff4d4d;
            background: rgba(0,0,0,0.6);
            padding: 10px 20px;
            border-radius: 20px;
            display: none;
            font-size: 0.9rem;
        }
    </style>
</head>
<body onclick="focusInput()">

    <div class="bg-container"></div>
    
    <div class="overlay">
        <div class="header-title">MY APP TITLE</div>

        <div class="pin-section">
            <p class="instruction" id="status-text">PIN을 입력하세요</p>
            
            <div class="pin-dots">
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
            </div>

            <input type="tel" id="pin-input" maxlength="8" pattern="\d*" inputmode="numeric" autofocus>
            
            <p id="lock-message"></p>
        </div>
    </div>

    <script>
        const pinInput = document.getElementById('pin-input');
        const dots = document.querySelectorAll('.dot');
        const lockMessage = document.getElementById('lock-message');
        const statusText = document.getElementById('status-text');
        
        const CORRECT_PIN = "59595959";
        const LOCK_TIME_HRS = 8;

        // 포커스 함수
        function focusInput() {
            if (!isLocked()) {
                pinInput.focus();
            }
        }

        function isLocked() {
            const lockUntil = localStorage.getItem('pin_lock_until');
            if (lockUntil) {
                const now = new Date().getTime();
                if (now < lockUntil) return true;
                localStorage.removeItem('pin_lock_until');
            }
            return false;
        }

        function updateLockTimer() {
            const lockUntil = localStorage.getItem('pin_lock_until');
            const now = new Date().getTime();
            const remaining = lockUntil - now;

            if (remaining > 0) {
                const h = Math.floor(remaining / 3600000);
                const m = Math.floor((remaining % 3600000) / 60000);
                const s = Math.floor((remaining % 60000) / 1000);
                
                lockMessage.style.display = 'inline-block';
                lockMessage.innerText = `오류! ${h}시간 ${m}분 ${s}초 뒤 재시도 가능`;
                setTimeout(updateLockTimer, 1000);
            } else {
                location.reload();
            }
        }

        pinInput.addEventListener('input', (e) => {
            const val = e.target.value;
            dots.forEach((dot, i) => i < val.length ? dot.classList.add('filled') : dot.classList.remove('filled'));

            if (val.length === 8) {
                if (val === CORRECT_PIN) {
                    window.location.href = 'main.html';
                } else {
                    const lockTime = new Date().getTime() + (LOCK_TIME_HRS * 60 * 60 * 1000);
                    localStorage.setItem('pin_lock_until', lockTime);
                    updateLockTimer();
                }
                pinInput.value = '';
            }
        });

        // 시작 시 자동 실행 시도 및 이벤트 리스너
        window.onload = () => {
            if (isLocked()) {
                updateLockTimer();
                statusText.innerText = "접근 제한됨";
            } else {
                // 최대한 자동으로 띄우기 위해 autofocus 설정과 클릭 유도
                pinInput.focus();
            }
        };
    </script>
</body>
</html>
