<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <link rel="manifest" href="manifest.json">
    <title>Security Access</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; font-family: -apple-system, sans-serif;
            background-color: #000; user-select: none; -webkit-tap-highlight-color: transparent;
        }

        .bg-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: url('bg.jpg') no-repeat center center;
            background-size: cover; z-index: 1;
        }

        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center;
            background: transparent; z-index: 2;
        }

        .app-header {
            margin-top: 7vh;
            text-align: center;
            z-index: 3;
        }

        .app-icon {
            width: 60px; height: 60px;
            background: transparent; 
            object-fit: cover;
            margin-bottom: 5px;
        }

        .app-name {
            font-size: 1rem; font-weight: 600;
            color: white; text-shadow: 0 1px 4px rgba(0,0,0,0.6);
        }

        .pin-section {
            margin-top: auto; 
            margin-bottom: 25px;
            text-align: center;
            width: 100%;
            z-index: 3;
        }

        .instruction {
            font-size: 1.1rem; margin-bottom: 15px;
            color: white; font-weight: 500;
            text-shadow: 0 1px 5px rgba(0,0,0,0.5);
        }

        /* [수정] 폼 두께를 더 얇게 (height 55px -> 42px) */
        .pin-input-area {
            display: flex; 
            gap: 12px; 
            justify-content: center; /* 가로 정중앙 */
            align-items: center;    /* 세로 정중앙 */
            width: 75%; 
            max-width: 280px; 
            height: 42px; 
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.22);
            backdrop-filter: blur(15px);
            border-radius: 25px;
        }

        /* [수정] 점 정렬 및 스타일 */
        .dot {
            width: 9px; height: 9px;
            border-radius: 50%;
            background-color: transparent;
            transition: background-color 0.1s;
            /* 점들이 입력될 때 밀리지 않도록 고정 크기 유지 */
            flex-shrink: 0; 
        }
        .dot.active {
            background-color: white;
            box-shadow: 0 0 3px white;
        }

        .keypad-container {
            width: 100%;
            background: rgba(0, 0, 0, 0.88);
            backdrop-filter: blur(10px);
            padding: 15px 0;
            padding-bottom: calc(15px + env(safe-area-inset-bottom));
            z-index: 3;
            border-top: 1px solid rgba(255,255,255,0.1);
        }

        .keypad {
            display: grid; grid-template-columns: repeat(3, 1fr);
            gap: 10px; width: 92%; max-width: 380px; margin: 0 auto;
        }

        /* [수정] 키보드 높이 불균형 해결 */
        .key {
            height: 55px; background: rgba(255, 255, 255, 0.08);
            color: white; display: flex; flex-direction: column; 
            align-items: center; justify-content: center;
            border-radius: 10px; transition: background 0.05s;
        }
        .key:active { background: rgba(255, 255, 255, 0.22); }
        .key-num { font-size: 1.6rem; line-height: 1.2; }
        
        /* 1번 번호 등에 알파벳이 없어도 높이를 맞추기 위한 설정 */
        .key-abc { 
            font-size: 0.65rem; 
            color: rgba(255,255,255,0.5); 
            margin-top: -2px;
            min-height: 0.85rem; /* 알파벳이 없어도 공간 차지 */
        }

        .key.special { background: rgba(255, 255, 255, 0.04); }
        #key-done { color: #34c759; font-weight: bold; font-size: 1.05rem; }

        #lock-message {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: #ff4d4d; background: rgba(0,0,0,0.95);
            padding: 25px; border-radius: 20px; display: none;
            text-align: center; width: 75%; z-index: 100;
        }
    </style>
</head>
<body>

    <div class="bg-container"></div>
    
    <div class="overlay">
        <div class="app-header">
            <img src="icon.png" class="app-icon" alt="">
            <div class="app-name">MY APP TITLE</div>
        </div>

        <div class="pin-section">
            <p class="instruction">PIN을 입력하세요</p>
            <div class="pin-input-area">
                <div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div>
                <div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div>
            </div>
        </div>

        <div class="keypad-container">
            <div class="keypad">
                <div class="key" onclick="press(1)"><span class="key-num">1</span><span class="key-abc"></span></div>
                <div class="key" onclick="press(2)"><span class="key-num">2</span><span class="key-abc">ABC</span></div>
                <div class="key" onclick="press(3)"><span class="key-num">3</span><span class="key-abc">DEF</span></div>
                <div class="key" onclick="press(4)"><span class="key-num">4</span><span class="key-abc">GHI</span></div>
                <div class="key" onclick="press(5)"><span class="key-num">5</span><span class="key-abc">JKL</span></div>
                <div class="key" onclick="press(6)"><span class="key-num">6</span><span class="key-abc">MNO</span></div>
                <div class="key" onclick="press(7)"><span class="key-num">7</span><span class="key-abc">PQRS</span></div>
                <div class="key" onclick="press(8)"><span class="key-num">8</span><span class="key-abc">TUV</span></div>
                <div class="key" onclick="press(9)"><span class="key-num">9</span><span class="key-abc">WXYZ</span></div>
                <div class="key special" onclick="backspace()">⌫</div>
                <div class="key" onclick="press(0)"><span class="key-num">0</span><span class="key-abc"></span></div>
                <div class="key special" onclick="checkPin()" id="key-done">완료</div>
            </div>
        </div>

        <div id="lock-message"></div>
    </div>

    <script>
        let currentInput = "";
        const dots = document.querySelectorAll('.dot');
        const lockMessage = document.getElementById('lock-message');
        const keypadContainer = document.querySelector('.keypad-container');
        
        const CORRECT_PIN = "59595959";
        const LOCK_TIME_HRS = 8;

        function isLocked() {
            const lockUntil = localStorage.getItem('pin_lock_until');
            if (lockUntil) {
                const now = new Date().getTime();
                if (now < lockUntil) return true;
                localStorage.removeItem('pin_lock_until');
            }
            return false;
        }

        function updateLockTimer() {
            const lockUntil = localStorage.getItem('pin_lock_until');
            const now = new Date().getTime();
            const remaining = lockUntil - now;

            if (remaining > 0) {
                const h = Math.floor(remaining / 3600000);
                const m = Math.floor((remaining % 3600000) / 60000);
                const s = Math.floor((remaining % 60000) / 1000);
                lockMessage.style.display = 'block';
                lockMessage.innerHTML = `보안 정책에 따라<br>접근이 제한됩니다.<br><br><strong>${h}시간 ${m}분 ${s}초</strong> 뒤 재시도`;
                keypadContainer.style.opacity = "0.3";
                keypadContainer.style.pointerEvents = "none";
                setTimeout(updateLockTimer, 1000);
            } else {
                location.reload();
            }
        }

        function press(num) {
            if (isLocked() || currentInput.length >= 8) return;
            currentInput += num;
            updateDots();
            if (currentInput.length === 8) setTimeout(checkPin, 150);
        }

        function backspace() {
            if (isLocked()) return;
            currentInput = currentInput.slice(0, -1);
            updateDots();
        }

        function updateDots() {
            dots.forEach((dot, i) => {
                if (i < currentInput.length) {
                    dot.classList.add('active');
                } else {
                    dot.classList.remove('active');
                }
            });
        }

        function checkPin() {
            if (isLocked() || currentInput.length === 0) return;
            if (currentInput === CORRECT_PIN) {
                window.location.href = 'main.html';
            } else {
                const lockTime = new Date().getTime() + (LOCK_TIME_HRS * 60 * 60 * 1000);
                localStorage.setItem('pin_lock_until', lockTime);
                updateLockTimer();
            }
            currentInput = "";
            updateDots();
        }

        window.onload = () => { if (isLocked()) updateLockTimer(); };
    </script>
</body>
</html>
