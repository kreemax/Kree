<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <link rel="manifest" href="manifest.json">
    <title>Security Access</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Pretendard', -apple-system, sans-serif;
            cursor: pointer;
            background-color: #000;
        }

        /* 배경 이미지 설정 */
        .bg-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('bg.jpg') no-repeat center center;
            background-size: cover;
            z-index: -1;
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 상단 제목 위치 */
        .header-title {
            margin-top: 10vh;
            font-size: 2.2rem;
            font-weight: bold;
            color: white;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.5);
        }

        /* PIN 입력 구역 */
        .pin-section {
            margin-top: 8vh;
            text-align: center;
            width: 100%;
        }

        .instruction {
            font-size: 1.2rem;
            margin-bottom: 25px;
            color: white;
            font-weight: 500;
        }

        /* 브라우저를 속이기 위한 특수 스타일 */
        #pin-input {
            position: absolute;
            opacity: 0;
            top: -100px;
            left: -100px;
            /* 입력되는 텍스트를 점(●)으로 강제 변환 (보안 유지) */
            -webkit-text-security: disc !important;
        }

        .pin-dots {
            display: flex;
            gap: 12px;
            justify-content: center;
        }

        .dot {
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255, 255, 255, 0.8);
            border-radius: 50%;
            transition: all 0.1s;
        }

        .dot.filled {
            background-color: white;
            box-shadow: 0 0 10px white;
        }

        /* 차단 타이머 메시지 */
        #lock-message {
            margin-top: 30px;
            color: #ff4d4d;
            background: rgba(0,0,0,0.7);
            padding: 12px 24px;
            border-radius: 25px;
            display: none;
            font-size: 0.95rem;
            font-weight: bold;
            border: 1px solid rgba(255, 77, 77, 0.3);
        }
    </style>

    <link rel="apple-touch-icon" href="icon.png">
    <link rel="icon" type="image/png" href="icon.png">
</head>
<body onclick="focusInput()">

    <div class="bg-container"></div>
    
    <div class="overlay">
        <div class="header-title">MY APP TITLE</div>

        <div class="pin-section">
            <p class="instruction" id="status-text">PIN을 입력하세요</p>
            
            <div class="pin-dots">
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
            </div>

            <input type="number" 
                   id="pin-input" 
                   pattern="\d*" 
                   inputmode="decimal" 
                   autocomplete="off"
                   name="secure_internal_access_field"
                   autofocus>
            
            <p id="lock-message"></p>
        </div>
    </div>

    <script>
        const pinInput = document.getElementById('pin-input');
        const dots = document.querySelectorAll('.dot');
        const lockMessage = document.getElementById('lock-message');
        const statusText = document.getElementById('status-text');
        
        const CORRECT_PIN = "59595959";
        const LOCK_TIME_HRS = 8;

        // 화면 클릭 시 입력창으로 포커스 유도
        function focusInput() {
            if (!isLocked()) {
                pinInput.focus();
            }
        }

        // 로컬 스토리지를 이용한 차단 상태 체크
        function isLocked() {
            const lockUntil = localStorage.getItem('pin_lock_until');
            if (lockUntil) {
                const now = new Date().getTime();
                if (now < lockUntil) return true;
                localStorage.removeItem('pin_lock_until'); // 시간 지나면 해제
            }
            return false;
        }

        // 남은 시간 실시간 표시
        function updateLockTimer() {
            const lockUntil = localStorage.getItem('pin_lock_until');
            const now = new Date().getTime();
            const remaining = lockUntil - now;

            if (remaining > 0) {
                const h = Math.floor(remaining / 3600000);
                const m = Math.floor((remaining % 3600000) / 60000);
                const s = Math.floor((remaining % 60000) / 1000);
                
                lockMessage.style.display = 'inline-block';
                lockMessage.innerText = `오류! ${h}시간 ${m}분 ${s}초 뒤 재시도 가능`;
                statusText.innerText = "접근 제한됨";
                pinInput.blur(); // 입력 방지
                setTimeout(updateLockTimer, 1000);
            } else {
                location.reload(); // 차단 해제 시 자동 새로고침
            }
        }

        // 입력 감지 및 결과 체크
        pinInput.addEventListener('input', (e) => {
            const val = e.target.value;
            
            // 점 애니메이션 표시
            dots.forEach((dot, i) => i < val.length ? dot.classList.add('filled') : dot.classList.remove('filled'));

            // 8자리 입력 시 체크
            if (val.length === 8) {
                if (val === CORRECT_PIN) {
                    window.location.href = 'main.html';
                } else {
                    // 틀렸을 경우 즉시 8시간 차단 저장
                    const lockTime = new Date().getTime() + (LOCK_TIME_HRS * 60 * 60 * 1000);
                    localStorage.setItem('pin_lock_until', lockTime);
                    updateLockTimer();
                }
                pinInput.value = ''; // 입력 초기화
            }
        });

        // 페이지 로드 시 초기 상태 실행
        window.onload = () => {
            if (isLocked()) {
                updateLockTimer();
            } else {
                // 약간의 지연 후 포커스 (일부 브라우저 대응)
                setTimeout(() => pinInput.focus(), 300);
            }
        };
    </script>
</body>
</html>
