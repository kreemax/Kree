<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <link rel="manifest" href="manifest.json">
    <title>Security Access</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; font-family: sans-serif; background-color: #000;
            user-select: none; -webkit-tap-highlight-color: transparent;
        }

        .bg-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: url('bg.jpg') no-repeat center center;
            background-size: cover; z-index: -1;
        }

        .overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.4);
            display: flex; flex-direction: column; align-items: center;
        }

        .header-title {
            margin-top: 8vh; font-size: 2rem; font-weight: bold;
            color: white; text-shadow: 2px 2px 10px rgba(0,0,0,0.5);
        }

        .pin-section { margin-top: 5vh; text-align: center; width: 100%; }
        .instruction { font-size: 1.1rem; margin-bottom: 20px; color: white; opacity: 0.9; }

        .pin-dots { display: flex; gap: 12px; justify-content: center; margin-bottom: 30px; }
        .dot {
            width: 16px; height: 16px; border: 2px solid rgba(255, 255, 255, 0.6);
            border-radius: 50%; transition: all 0.1s;
        }
        .dot.filled { background-color: white; box-shadow: 0 0 8px white; border-color: white; }

        /* [핵심] 우리가 직접 만드는 숫자 키패드 */
        .keypad {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            width: 80%;
            max-width: 300px;
            margin-top: auto;
            margin-bottom: 8vh;
        }

        .key {
            aspect-ratio: 1;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(5px);
            color: white;
            font-size: 1.5rem;
            font-weight: bold;
            display: flex; align-items: center; justify-content: center;
            border-radius: 50%;
            transition: background 0.1s;
        }

        .key:active { background: rgba(255, 255, 255, 0.4); }
        .key.empty { background: transparent; }

        #lock-message {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: #ff4d4d; background: rgba(0,0,0,0.85);
            padding: 20px; border-radius: 15px; display: none;
            font-size: 1rem; text-align: center; width: 70%; z-index: 100;
        }
    </style>
    <link rel="apple-touch-icon" href="icon.png">
    <link rel="icon" type="image/png" href="icon.png">
</head>
<body>

    <div class="bg-container"></div>
    
    <div class="overlay">
        <div class="header-title">MY PRIVATE</div>

        <div class="pin-section">
            <p class="instruction" id="status-text">PIN을 입력하세요</p>
            <div class="pin-dots">
                <div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div>
                <div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div>
            </div>
        </div>

        <div class="keypad" id="keypad">
            <div class="key" onclick="press(1)">1</div>
            <div class="key" onclick="press(2)">2</div>
            <div class="key" onclick="press(3)">3</div>
            <div class="key" onclick="press(4)">4</div>
            <div class="key" onclick="press(5)">5</div>
            <div class="key" onclick="press(6)">6</div>
            <div class="key" onclick="press(7)">7</div>
            <div class="key" onclick="press(8)">8</div>
            <div class="key" onclick="press(9)">9</div>
            <div class="key empty"></div>
            <div class="key" onclick="press(0)">0</div>
            <div class="key" onclick="backspace()">←</div>
        </div>

        <div id="lock-message"></div>
    </div>

    <script>
        let currentInput = "";
        const dots = document.querySelectorAll('.dot');
        const lockMessage = document.getElementById('lock-message');
        const statusText = document.getElementById('status-text');
        
        const CORRECT_PIN = "59595959";
        const LOCK_TIME_HRS = 8;

        function isLocked() {
            const lockUntil = localStorage.getItem('pin_lock_until');
            if (lockUntil) {
                const now = new Date().getTime();
                if (now < lockUntil) return true;
                localStorage.removeItem('pin_lock_until');
            }
            return false;
        }

        function updateLockTimer() {
            const lockUntil = localStorage.getItem('pin_lock_until');
            const now = new Date().getTime();
            const remaining = lockUntil - now;

            if (remaining > 0) {
                const h = Math.floor(remaining / 3600000);
                const m = Math.floor((remaining % 3600000) / 60000);
                const s = Math.floor((remaining % 60000) / 1000);
                lockMessage.style.display = 'block';
                lockMessage.innerText = `접근 제한\n\n${h}시간 ${m}분 ${s}초 뒤 재시도 가능`;
                document.getElementById('keypad').style.opacity = "0.2";
                document.getElementById('keypad').style.pointerEvents = "none";
                setTimeout(updateLockTimer, 1000);
            } else {
                location.reload();
            }
        }

        function press(num) {
            if (isLocked() || currentInput.length >= 8) return;
            currentInput += num;
            updateDots();
            if (currentInput.length === 8) checkPin();
        }

        function backspace() {
            currentInput = currentInput.slice(0, -1);
            updateDots();
        }

        function updateDots() {
            dots.forEach((dot, i) => i < currentInput.length ? dot.classList.add('filled') : dot.classList.remove('filled'));
        }

        function checkPin() {
            if (currentInput === CORRECT_PIN) {
                window.location.href = 'main.html';
            } else {
                const lockTime = new Date().getTime() + (LOCK_TIME_HRS * 60 * 60 * 1000);
                localStorage.setItem('pin_lock_until', lockTime);
                updateLockTimer();
            }
            currentInput = "";
        }

        window.onload = () => {
            if (isLocked()) updateLockTimer();
        };
    </script>
</body>
</html>
