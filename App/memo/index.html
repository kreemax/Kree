<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Quick Snail Memo</title>
    <style>
        :root {
            --bg: #121212;
            --key-bg: #2d2d2d;
            --text: #ffffff;
            --primary: #4dabf7;
        }
        body {
            font-family: sans-serif; margin: 0; padding: 0;
            background: var(--bg); color: var(--text);
            display: flex; flex-direction: column; height: 100vh; overflow: hidden;
        }

        /* 검색창 영역 */
        .header { padding: 10px; background: #000; }
        #display {
            width: 100%; padding: 15px; border: none; border-radius: 8px;
            background: #222; color: #fff; font-size: 1.2rem; outline: none;
            box-sizing: border-box;
        }

        /* 단어 칩 영역 */
        .word-bar {
            display: flex; gap: 8px; padding: 10px; overflow-x: auto;
            background: #1a1a1a; border-bottom: 1px solid #333;
        }
        .word-chip {
            background: var(--primary); padding: 6px 12px; border-radius: 15px;
            white-space: nowrap; font-size: 0.9rem; font-weight: bold;
        }

        /* 메모 리스트 */
        .memo-container {
            flex: 1; overflow-y: auto; padding: 10px;
            display: flex; flex-wrap: wrap; align-content: flex-start; gap: 8px;
        }
        .memo-chip {
            background: #333; padding: 8px 12px; border-radius: 18px;
            display: flex; align-items: center; gap: 8px; font-size: 0.9rem;
        }
        .del-btn { color: #ff6b6b; font-weight: bold; }

        /* 천지인 키패드 */
        .keypad {
            display: grid; grid-template-columns: repeat(4, 1fr);
            gap: 5px; padding: 5px; background: #000;
        }
        .key {
            background: var(--key-bg); border-radius: 5px; height: 60px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            font-size: 1.1rem; font-weight: bold; user-select: none;
        }
        .key:active { background: #444; }
        .key span { font-size: 0.7rem; color: #888; margin-top: 2px; }
        .key.enter { background: #333; }
        .key.back { font-size: 1.4rem; }
    </style>
</head>
<body>

<div class="header">
    <input type="text" id="display" placeholder="입력/검색..." readonly>
</div>

<div class="word-bar" id="wordBar">
    <div class="word-chip" onclick="saveMemo()">➕ 저장/추가</div>
    </div>

<div class="memo-container" id="memoList"></div>

<div class="keypad">
    <div class="key" onclick="addChar('ㅣ')">ㅣ<span>1</span></div>
    <div class="key" onclick="addChar('·')">·<span>2</span></div>
    <div class="key" onclick="addChar('ㅡ')">ㅡ<span>3</span></div>
    <div class="key back" onclick="backspace()">⌫</div>

    <div class="key" onclick="addChar('ㄱㅋ')">ㄱㅋ<span>4</span></div>
    <div class="key" onclick="addChar('ㄴㄹ')">ㄴㄹ<span>5</span></div>
    <div class="key" onclick="addChar('ㄷㅌ')">ㄷㅌ<span>6</span></div>
    <div class="key enter" onclick="saveMemo()">⏎</div>

    <div class="key" onclick="addChar('ㅂㅍ')">ㅂㅍ<span>7</span></div>
    <div class="key" onclick="addChar('ㅅㅎ')">ㅅㅎ<span>8</span></div>
    <div class="key" onclick="addChar('ㅈㅊ')">ㅈㅊ<span>9</span></div>
    <div class="key" onclick="addChar(',?!')">.,?!</div>

    <div class="key" onclick="changeMode()">!#1</div>
    <div class="key" onclick="addChar('ㅇㅁ')">ㅇㅁ<span>0</span></div>
    <div class="key" onclick="addChar(' ')">⎵</div>
    <div class="key" onclick="addChar(',')">,</div>
</div>

<script src="https://unpkg.com/hangul-js"></script>
<script>
    const display = document.getElementById('display');
    const memoList = document.getElementById('memoList');
    let inputStack = [];
    let memos = JSON.parse(localStorage.getItem('myMemos') || '[]');

    function renderMemos(filter = '') {
        memoList.innerHTML = '';
        const filtered = memos.filter(m => m.includes(filter));
        filtered.forEach(text => {
            const div = document.createElement('div');
            div.className = 'memo-chip';
            div.innerHTML = `${text} <span class="del-btn" onclick="deleteMemo('${text}')">×</span>`;
            memoList.appendChild(div);
        });
    }

    function addChar(char) {
        // 실제로는 더 복잡한 천지인 엔진이 필요하지만, 
        // 여기서는 hangul-js를 이용해 기본 조합을 구현합니다.
        // 버튼의 첫 글자를 스택에 추가
        inputStack.push(char[0]); 
        updateDisplay();
    }

    function backspace() {
        inputStack.pop();
        updateDisplay();
    }

    function updateDisplay() {
        // hangul-js로 조합
        display.value = Hangul.assemble(inputStack);
        renderMemos(display.value);
    }

    function saveMemo() {
        const val = display.value.trim();
        if (val && !memos.includes(val)) {
            memos.unshift(val);
            localStorage.setItem('myMemos', JSON.stringify(memos));
            inputStack = [];
            display.value = '';
            renderMemos();
        }
    }

    function deleteMemo(text) {
        memos = memos.filter(m => m !== text);
        localStorage.setItem('myMemos', JSON.stringify(memos));
        renderMemos(display.value);
    }

    renderMemos();
</script>

</body>
</html>
